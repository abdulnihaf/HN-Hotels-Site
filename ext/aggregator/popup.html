<!DOCTYPE html>
<html>
<head>
<style>
  body { width: 320px; font-family: -apple-system, sans-serif; padding: 16px; margin: 0; background: #1a1a2e; color: #e0e0e0; }
  h2 { margin: 0 0 12px; font-size: 16px; color: #ff6b35; }
  .status { background: #16213e; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
  .status-row { display: flex; justify-content: space-between; margin: 4px 0; font-size: 13px; }
  .label { color: #888; }
  .value { font-weight: 600; }
  .ok { color: #4caf50; }
  .warn { color: #ff9800; }
  button { width: 100%; padding: 10px; margin: 4px 0; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-push { background: #ff6b35; color: white; }
  .btn-refresh { background: #16213e; color: #ff6b35; border: 1px solid #ff6b35; }
  .btn-push:hover { background: #e55a2b; }
  .btn-refresh:hover { background: #1a2744; }
  #log { font-size: 11px; color: #666; margin-top: 8px; max-height: 60px; overflow-y: auto; }
</style>
</head>
<body>
  <h2>HN Aggregator Pulse</h2>
  <div class="status">
    <div class="status-row">
      <span class="label">Buffer</span>
      <span class="value" id="buffer">--</span>
    </div>
    <div class="status-row">
      <span class="label">Push interval</span>
      <span class="value" id="push-interval">--</span>
    </div>
    <div class="status-row">
      <span class="label">Refresh interval</span>
      <span class="value" id="refresh-interval">--</span>
    </div>
    <div class="status-row">
      <span class="label">Endpoint</span>
      <span class="value" id="endpoint" style="font-size:10px;word-break:break-all;">--</span>
    </div>
  </div>
  <button class="btn-push" id="push-btn">Push Now</button>
  <button class="btn-refresh" id="refresh-btn">Refresh All Tabs</button>
  <div id="log"></div>

  <script src="popup.js"></script>
</body>
</html>
