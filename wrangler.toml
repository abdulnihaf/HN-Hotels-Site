name = "hn-hotels-site"
pages_build_output_dir = "."
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Secrets (set via: wrangler pages secret put <NAME>)
# WA_ACCESS_TOKEN        — Meta WhatsApp Cloud API bearer token
# WA_PHONE_ID            — WhatsApp phone number ID
# DASHBOARD_KEY          — Dashboard authentication key
# GEMINI_API_KEY         — Google Gemini API key for AI role mapping
# GOOGLE_PLACES_API_KEY  — Google Places API (New) for expansion intelligence
# ODOO_API_KEY           — Odoo 19 API key (user: yash@gmail.com) for system reads + admin sync
# ODOO_UID_ZOYA          — Zoya's Odoo user ID (for purchase order tracking)
# ODOO_KEY_ZOYA          — Zoya's Odoo API key
# ODOO_UID_FAHEEM        — Faheem's Odoo user ID (for settlement tracking)
# ODOO_KEY_FAHEEM        — Faheem's Odoo API key
# EXOTEL_SID             — Exotel account SID (hnhotels1) ✅ set 2026-05-05
# EXOTEL_API_KEY         — Exotel API key (username) ✅ set 2026-05-05
# EXOTEL_API_TOKEN       — Exotel API token (password) ✅ set 2026-05-05
# EXOTEL_CALLER_ID       — Exotel virtual ExoPhone number (set after KYC + recharge + ExoPhone assignment)

[[d1_databases]]
binding = "DB"
database_name = "hn-hiring"
database_id = "a0107321-790a-4d46-ac3c-a54a676c6bcb"

# KV for storing Swiggy/Zomato auth sessions (captured by extension, read by cron worker)
[[kv_namespaces]]
binding = "SESSIONS"
id = "1aa1acbca55544e59e428d248b928a67"
