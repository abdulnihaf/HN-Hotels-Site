name = "hn-hotels-site"
pages_build_output_dir = "."
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Secrets (set via: wrangler pages secret put <NAME> --project-name hn-hotels-site)
# WA_ACCESS_TOKEN              — Meta WhatsApp Cloud API bearer token
# WA_PHONE_ID                  — WhatsApp phone number ID
# DASHBOARD_KEY                — Dashboard authentication key
# GEMINI_API_KEY               — Google Gemini API key for AI role mapping
# GOOGLE_PLACES_API_KEY        — Google Places API (New). Used by /api/gbp-cockpit for review aggregates and by expansion intelligence
# ODOO_API_KEY                 — Odoo 19 API key (user: yash@gmail.com) for system reads + admin sync
# ODOO_UID_ZOYA                — Zoya's Odoo user ID (for purchase order tracking)
# ODOO_KEY_ZOYA                — Zoya's Odoo API key
# ODOO_UID_FAHEEM              — Faheem's Odoo user ID (for settlement tracking)
# ODOO_KEY_FAHEEM              — Faheem's Odoo API key
# KITE_API_SECRET              — Zerodha Kite Connect API secret (used by /wealth/auth/callback)
# GOOGLE_ADS_CLIENT_ID         — OAuth client ID (NCH Marketing Web). Used by /api/gbp-cockpit
# GOOGLE_ADS_CLIENT_SECRET     — OAuth client secret. Used by /api/gbp-cockpit
# GOOGLE_ORGANIC_REFRESH_TOKEN — refresh token with scopes adwords + webmasters.readonly + business.manage. Used by /api/gbp-cockpit. See docs/GBP_COCKPIT_RUNBOOK.md
# EXOTEL_SID                   — Exotel account SID (hnhotels1) ✅ set 2026-05-05
# EXOTEL_API_KEY               — Exotel API key (username) ✅ set 2026-05-05
# EXOTEL_API_TOKEN             — Exotel API token (password) ✅ set 2026-05-05
# EXOTEL_CALLER_ID             — 09513886363 (existing India mobile on account) ✅ set 2026-05-05
# NAAM_POST_CRON_TOKEN         — Shared bearer token between Pages /api/naam-post?action=cron and workers/naam-post-cron
# ANTHROPIC_API_KEY            — Anthropic API key for organic copy generation (/api/naam-post)
# GEMINI_API_KEY               — Google Gemini image generation key for /api/naam-post
# HE_META_PAGE_ACCESS_TOKEN / NCH_META_PAGE_ACCESS_TOKEN — Meta page tokens for FB+IG publishing
# HE_META_PAGE_ID / NCH_META_PAGE_ID                     — Meta page IDs
# HE_META_IG_ACCOUNT_ID / NCH_META_IG_ACCOUNT_ID         — Instagram business account IDs
# META_USER_ACCESS_TOKEN                                 — Meta user token for token health checks
# META_GRAPH_API_VERSION                                 — e.g. v21.0
# GBP_ACCOUNT_NAME                                       — Google Business Profile account resource name
# HE_GBP_LOCATION_NAME / NCH_GBP_LOCATION_NAME           — GBP location resource names
# GBP_CLIENT_ID / GBP_CLIENT_SECRET / GBP_REFRESH_TOKEN  — Google OAuth for GBP posting

[vars]
# Kite Connect public-ish API key — exposed in Worker env, used by OAuth flow
KITE_API_KEY = "85yfvys3t9t66l35"
# WhatsApp Business Account IDs + phone number IDs (non-sensitive; token stays in secrets)
WA_HE_WABA_ID = "27110385081896362"
WA_HE_PHONE_ID = "970365416152029"
WA_PHONE_ID = "970365416152029"
# Public image URL base for NAAM_CREATIVE. Use the CDN/custom domain if configured,
# otherwise the Pages function proxy at /api/naam-creative-asset?key= serves objects.
NAAM_CREATIVE_PUBLIC_URL = "https://hnhotels.in/api/naam-creative-asset?key="

[[d1_databases]]
binding = "DB"
database_name = "hn-hiring"
database_id = "a0107321-790a-4d46-ac3c-a54a676c6bcb"

# Wealth engine D1 — read by /api/trading.js for the /trading dashboard.
# Created via: wrangler d1 create wealth-engine
# Replace database_id with output of that command.
[[d1_databases]]
binding = "WEALTH_DB"
database_name = "wealth-engine"
database_id = "1e3cea30-5990-43d2-a9de-b749d32e225a"

# NCH settlement registry (READ-ONLY) — the Takht slot↔Darbar resolver reads
# v_staff_slots / v_runner_slots here to bind each POS slot to its LIVE Darbar person.
[[d1_databases]]
binding = "NCH_DB"
database_name = "nch-settlements"
database_id = "3388724b-41b2-4925-a7df-12f068c19e6e"

# KV for storing Swiggy/Zomato auth sessions (captured by extension, read by cron worker)
[[kv_namespaces]]
binding = "SESSIONS"
id = "1aa1acbca55544e59e428d248b928a67"

# R2 — Anbar photo-settlement evidence (one JPEG per station per settle)
[[r2_buckets]]
binding = "EVIDENCE"
bucket_name = "anbar-evidence"

# R2 — Naam organic creative assets (public bucket for IG/GBP image URLs)
[[r2_buckets]]
binding = "NAAM_CREATIVE"
bucket_name = "naam-creative"
