<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f1115">
<title>My Attendance — HN Hotels</title>
<link rel="icon" href="/ops/hr/icon-192.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1115; --surface: #16181f; --surface2:#1d2029; --border: rgba(255,255,255,0.08);
    --text: #e5e7eb; --muted: #9ca3af; --dim: #6b7280;
    --green: #34d399; --green-bg: rgba(16,185,129,0.18);
    --amber: #fbbf24; --amber-bg: rgba(245,158,11,0.20);
    --rose: #fb7185; --rose-bg: rgba(244,63,94,0.18);
    --blue: #60a5fa; --blue-bg: rgba(59,130,246,0.18);
    --gray-bg: rgba(255,255,255,0.05);
  }
  html, body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body { padding: 16px 14px 36px; max-width: 480px; margin: 0 auto; }

  .header { display: flex; align-items: center; gap: 12px; padding: 14px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 16px; margin-bottom: 12px; }
  .avatar { width: 50px; height: 50px; border-radius: 25px; flex:none;
    background: linear-gradient(135deg, #6366f1, #ec4899);
    display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 19px; color: #fff; }
  .name { font-size: 19px; font-weight: 700; }
  .sub { font-size: 12.5px; color: var(--muted); margin-top: 2px; }

  .month-pick { width: 100%; padding: 12px 14px; min-height: 46px; background: var(--surface); color: var(--text);
    border: 1px solid var(--border); border-radius: 12px; font-size: 15px; margin-bottom: 14px; font-family: inherit; }

  /* Hero — the one message, big */
  .hero { background: linear-gradient(135deg, rgba(16,185,129,0.18), rgba(59,130,246,0.10));
    border: 1px solid rgba(16,185,129,0.30); border-radius: 16px; padding: 18px; text-align: center; margin-bottom: 14px; }
  .hero .big { font-size: 44px; font-weight: 800; color: var(--green); line-height: 1; }
  .hero .cap { font-size: 14px; color: var(--text); margin-top: 6px; }
  .hero .cap b { color:#fff; }

  /* Stat chips — number + icon, minimal words */
  .chips { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 14px; }
  .chip { background: var(--surface); border: 1px solid var(--border); border-radius: 13px; padding: 11px 6px; text-align: center; }
  .chip .n { font-size: 23px; font-weight: 800; line-height: 1; }
  .chip .l { font-size: 10.5px; color: var(--muted); margin-top: 5px; line-height:1.2; }
  .chip.g .n { color: var(--green); } .chip.a .n { color: var(--amber); }
  .chip.r .n { color: var(--rose); }  .chip.b .n { color: var(--blue); }

  /* Calendar */
  .cal-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 14px; margin-bottom: 12px; }
  .cal-title { font-size: 13px; text-transform: uppercase; letter-spacing: .4px; color: var(--muted); margin-bottom: 12px; font-weight: 600; }
  .wd-row { display: grid; grid-template-columns: repeat(7,1fr); gap: 6px; margin-bottom: 6px; }
  .wd { text-align: center; font-size: 10px; color: var(--dim); text-transform: uppercase; font-weight: 600; }
  .grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 6px; }
  .cell { aspect-ratio: 1; border-radius: 11px; border: none; font-family: inherit;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700; color: var(--text); cursor: pointer; position: relative; padding:0; }
  .cell .ic { font-size: 9px; line-height: 1; margin-top: 2px; opacity:.9; }
  .cell.blank { background: transparent; cursor: default; }
  .cell.present { background: var(--green-bg); color: var(--green); }
  .cell.fix     { background: var(--amber-bg); color: var(--amber); }
  .cell.absent  { background: var(--rose-bg);  color: var(--rose); }
  .cell.off     { background: var(--blue-bg);  color: var(--blue); }
  .cell.nodata  { background: var(--gray-bg);  color: var(--dim); }
  .cell.future  { background: var(--gray-bg);  color: var(--dim); opacity:.5; cursor: default; }
  .cell.sel { outline: 2px solid #fff; outline-offset: 1px; }

  .day-detail { margin-top: 12px; padding: 12px 14px; background: var(--surface2); border-radius: 12px;
    font-size: 14px; min-height: 46px; display:flex; align-items:center; gap:10px; }
  .day-detail .dot { width: 12px; height: 12px; border-radius: 6px; flex:none; }
  .day-detail .dd-main { font-weight: 700; }
  .day-detail .dd-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }

  /* Legend */
  .legend { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 14px; margin-top: 14px;
    padding-top: 14px; border-top: 1px solid var(--border); }
  .lg { display: flex; align-items: center; gap: 8px; font-size: 12.5px; }
  .lg .sw { width: 16px; height: 16px; border-radius: 5px; flex:none; }
  .lg .hi { color: var(--muted); font-size: 11px; }

  .note { border-radius: 13px; padding: 13px 15px; margin-bottom: 12px; font-size: 13.5px; line-height:1.45; }
  .note.warn { background: var(--amber-bg); border: 1px solid rgba(245,158,11,0.35); }
  .note.warn b { color: var(--amber); }

  .section { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 12px; }
  .section-title { font-size: 13px; text-transform: uppercase; letter-spacing:.4px; color: var(--muted); margin-bottom: 10px; font-weight: 600; }
  .advance-row { display:flex; align-items:center; gap:12px; padding:9px 2px; border-bottom:1px solid var(--border); }
  .advance-row:last-child { border-bottom:none; }
  .advance-row .amount { font-size:17px; font-weight:700; color:var(--green); min-width:84px; }
  .advance-row .meta { flex:1; font-size:12px; } .advance-row .meta .bot { color:var(--muted); font-size:11px; margin-top:1px; }

  .pay { background: transparent; border: 1px dashed var(--border); border-radius: 13px; padding: 14px; margin-bottom: 12px; }
  .pay .t { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 5px; }
  .pay .d { font-size: 12.5px; color: var(--muted); line-height:1.45; }

  .footer { margin-top: 18px; padding: 14px; text-align: center; font-size: 12.5px; color: var(--muted);
    background: var(--surface); border-radius: 12px; border: 1px solid var(--border); }
  .footer .contact { color: var(--green); text-decoration: none; font-weight: 600; }
  .error-box { background: rgba(244,63,94,0.10); border: 1px solid rgba(244,63,94,0.30); border-radius: 12px;
    padding: 22px; color: var(--rose); text-align: center; font-size: 14px; }
  .loading { text-align: center; padding: 48px 20px; color: var(--muted); font-size: 14px; }
</style>
</head>
<body>
<div id="root"><div class="loading">Loading your record…</div></div>

<script>
const params = new URLSearchParams(location.search);
const employeeId = params.get('id');
const token = params.get('t');
let DAYS = [];

function todayIST() { return new Date(Date.now() + 5.5 * 3600 * 1000).toISOString().slice(0, 10); }
// An attendance report is about a COMPLETED month. In the first 10 days of a month
// (the settlement window) the meaningful month is the one just finished — so on
// June 1 this opens on May, never the near-empty June. The picker still lets them flip.
function reportMonth() {
  const d = new Date(Date.now() + 5.5 * 3600 * 1000);
  if (d.getUTCDate() <= 10) d.setUTCMonth(d.getUTCMonth() - 1);
  return d.toISOString().slice(0, 7);
}
let monthState = params.get('month') || reportMonth();
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function initials(n){ return String(n||'').split(/\s+/).filter(Boolean).slice(0,2).map(s=>s[0].toUpperCase()).join('')||'?'; }
function fmtTime(ts){ if(!ts) return '—'; return ts.slice(11,16); }
const WD = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTH_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];

// One rule: any tap = present; odd taps = a punch missing (fix); 0 taps = absent.
function dayState(d){
  if (d.is_future) return { k:'future' };
  const st = d.status;
  if (st === 'week_off' || st === 'leave') return { k:'off', label: st==='leave'?'Leave / छुट्टी':'Week off / छुट्टी' };
  const pc = d.punch_count || 0;
  if (pc >= 1 || st === 'present') {
    const inc = !!d.is_single_punch || (pc % 2 === 1);
    return inc
      ? { k:'fix', label:'Present · a punch missing' }
      : { k:'present', label:'Present · full' };
  }
  if (st === 'no-data') return { k:'nodata', label:'No record' };
  return { k:'absent', label:'Absent' };
}
const ICON = { present:'✓', fix:'⚠', absent:'✕', off:'•', nodata:'', future:'' };

function showDay(i){
  const d = DAYS[i]; if (!d) return;
  const s = dayState(d);
  if (s.k === 'future' || s.k === 'blank') return;
  document.querySelectorAll('.cell').forEach(c=>c.classList.remove('sel'));
  const el = document.getElementById('c'+i); if (el) el.classList.add('sel');
  const dt = new Date(d.date+'T12:00:00');
  const head = `${dt.getDate()} ${MONTH_FULL[dt.getMonth()]} · ${WD[dt.getDay()]}`;
  const colorVar = { present:'--green', fix:'--amber', absent:'--rose', off:'--blue', nodata:'--dim' }[s.k];
  let main = s.label, sub = '';
  if (s.k === 'present') sub = `IN ${fmtTime(d.first_in_at)} → OUT ${fmtTime(d.last_out_at)} · ${d.punch_count} taps`;
  else if (s.k === 'fix') sub = `Tapped ${d.punch_count} time${d.punch_count>1?'s':''} (IN ${fmtTime(d.first_in_at)}) — tell Basheer your other time so it counts right.`;
  else if (s.k === 'absent') sub = `No tap this day.`;
  document.getElementById('dayDetail').innerHTML =
    `<span class="dot" style="background:var(${colorVar})"></span>
     <div><div class="dd-main">${esc(head)} — ${esc(main)}</div>${sub?`<div class="dd-sub">${esc(sub)}</div>`:''}</div>`;
}

async function loadSelf(){
  if (!employeeId || !token) {
    document.getElementById('root').innerHTML = `<div class="error-box">Invalid link. Ask Basheer to share your link again.</div>`; return;
  }
  try {
    const r = await fetch(`/api/hr-admin?action=staff-self&id=${employeeId}&t=${encodeURIComponent(token)}&month=${monthState}`);
    if (!r.ok) { const err = await r.json().catch(()=>({}));
      document.getElementById('root').innerHTML = `<div class="error-box">${esc(err.error==='invalid token'?'This link is no longer valid. Ask Basheer for a fresh one.':(err.error||'Could not load. Try again.'))}</div>`; return; }
    render(await r.json());
  } catch(e) {
    document.getElementById('root').innerHTML = `<div class="error-box">Network problem — check internet and try again.</div>`;
  }
}

function render(data){
  const e = data.employee, s = data.summary;
  DAYS = data.days;
  const monthLabel = MONTH_FULL[parseInt(data.month.split('-')[1])-1] + ' ' + data.month.split('-')[0];
  const displayName = e.known_as || e.name;
  const brandName = { HE:'Hamza Express', NCH:'Nawabi Chai House', HQ:'HN Hotels' }[e.brand_label] || e.brand_label;

  const today = todayIST();
  const monthOpts = [];
  for (let i=0;i<6;i++){ const d=new Date(today+'T12:00:00'); d.setMonth(d.getMonth()-i);
    const mo=d.toISOString().slice(0,7); monthOpts.push(`<option value="${mo}" ${mo===data.month?'selected':''}>${MONTH_FULL[d.getMonth()]} ${d.getFullYear()}</option>`); }

  // calendar cells with leading offset
  const firstWd = new Date(data.month + '-01T12:00:00').getDay();
  let cells = '';
  for (let b=0;b<firstWd;b++) cells += `<div class="cell blank"></div>`;
  DAYS.forEach((d,i)=>{ const st=dayState(d); const dt=new Date(d.date+'T12:00:00');
    cells += `<button class="cell ${st.k}" id="c${i}" ${(st.k==='future'||st.k==='nodata')?'':`onclick="showDay(${i})"`}>${dt.getDate()}<span class="ic">${ICON[st.k]||''}</span></button>`; });

  const advancesHtml = data.advances.length
    ? data.advances.map(a=>`<div class="advance-row"><div class="amount">₹${Number(a.amount).toLocaleString('en-IN')}</div>
        <div class="meta"><div>${esc(a.reason||'Advance')} · ${(a.paid_via||'cash').toUpperCase()}</div>
        <div class="bot">${new Date(a.advance_date+'T12:00:00').getDate()} ${monthLabel}</div></div></div>`).join('')
    : `<div style="text-align:center;color:var(--muted);font-size:13px;padding:10px 0">No advances in ${monthLabel}.</div>`;

  const salaryLine = e.pay_type === 'Contract' && e.daily_rate
    ? `Rs.${Number(e.daily_rate).toLocaleString('en-IN')}/day`
    : e.monthly_salary ? `Rs.${Number(e.monthly_salary).toLocaleString('en-IN')}/month` : '—';

  document.getElementById('root').innerHTML = `
    <div class="header">
      <div class="avatar">${esc(initials(displayName))}</div>
      <div style="flex:1;min-width:0"><div class="name">${esc(displayName)}</div>
        <div class="sub">${esc(brandName)} · ${esc(e.job_name||'')}</div></div>
    </div>
    <select class="month-pick" onchange="monthState=this.value;loadSelf()">${monthOpts.join('')}</select>

    <div class="hero">
      <div class="big">${s.present_days}</div>
      <div class="cap">days you came in <b>${esc(monthLabel)}</b></div>
    </div>

    <div class="chips">
      <div class="chip g"><div class="n">${s.accurate_days}</div><div class="l">Clean<br>days</div></div>
      <div class="chip a"><div class="n">${s.inaccurate_days}</div><div class="l">Fix<br>needed</div></div>
      <div class="chip r"><div class="n">${s.elapsed_absent}</div><div class="l">Absent</div></div>
      <div class="chip b"><div class="n">${s.off_days}</div><div class="l">Off /<br>leave</div></div>
    </div>

    ${s.inaccurate_days ? `<div class="note warn"><b>⚠ ${s.inaccurate_days} day${s.inaccurate_days>1?'s':''} need a fix.</b> On the amber days you tapped an odd number of times — one punch is missing. Tap those days below to see, and tell Basheer the missing time so the day counts fully.</div>` : ''}

    <div class="cal-card">
      <div class="cal-title">${esc(monthLabel)} — tap any day</div>
      <div class="wd-row">${WD.map(w=>`<div class="wd">${w[0]}</div>`).join('')}</div>
      <div class="grid">${cells}</div>
      <div class="day-detail" id="dayDetail"><div class="dd-sub">Tap a day above to see your in/out time.</div></div>
      <div class="legend">
        <div class="lg"><span class="sw" style="background:var(--green-bg)"></span>Present <span class="hi">हाज़िर ✓</span></div>
        <div class="lg"><span class="sw" style="background:var(--amber-bg)"></span>Fix needed <span class="hi">सुधारें ⚠</span></div>
        <div class="lg"><span class="sw" style="background:var(--rose-bg)"></span>Absent <span class="hi">ग़ैरहाज़िर ✕</span></div>
        <div class="lg"><span class="sw" style="background:var(--blue-bg)"></span>Off / leave <span class="hi">छुट्टी</span></div>
      </div>
    </div>

    <div class="pay">
      <div class="t">Days counted for pay: ${s.worked_days}</div>
      <div class="d">Base ${salaryLine}. Final pay = days you came + leaves − advances, confirmed at month-end and settled by the 7th of next month.</div>
    </div>

    <div class="section"><div class="section-title">Advances in ${esc(monthLabel)}</div>${advancesHtml}</div>

    <div class="footer">Questions? Message <a href="https://wa.me/919061906916" class="contact">Basheer bhai</a>.<br>
      <span style="font-size:11px">HN Hotels · Hamza Express · Nawabi Chai House</span></div>`;
}

loadSelf();
</script>
</body>
</html>
