<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow,noarchive">
<title>Hamza Express — Influencer Outreach Database</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0f1a; --card:#111826; --card2:#1a2234; --line:#273042;
  --text:#e6edf7; --mute:#8b95a8; --dim:#5a6477;
  --tan:#D2B48C; --sienna:#713520; --offwhite:#FAF3E3;
  --green:#22c55e; --red:#ef4444; --yellow:#eab308;
  --blue:#3b82f6; --purple:#a855f7; --cyan:#06b6d4; --orange:#f97316;
  --gold:linear-gradient(135deg,#fbbf24,#f59e0b);
  --silver:linear-gradient(135deg,#cbd5e1,#94a3b8);
  --bronze:linear-gradient(135deg,#d97706,#b45309);
  --skip:linear-gradient(135deg,#475569,#334155);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh}
.mono{font-family:'JetBrains Mono',monospace}
a{color:var(--tan);text-decoration:none}
a:hover{color:var(--offwhite)}

/* Sticky header */
.hdr{position:sticky;top:0;z-index:100;background:rgba(10,15,26,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:14px 24px}
.hdr-row1{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:12px;flex-wrap:wrap}
.brand{font-size:18px;font-weight:800;letter-spacing:-.01em;display:flex;align-items:center;gap:10px}
.brand::before{content:'';width:5px;height:22px;background:var(--gold);border-radius:3px}
.stats{display:flex;gap:14px;font-size:12px;color:var(--mute)}
.stats b{color:var(--text);font-weight:600}
.stats .gold{color:#fbbf24}
.stats .silver{color:#cbd5e1}
.stats .bronze{color:#f59e0b}
.stats .email{color:var(--green)}

/* Filter bar */
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filters input,.filters select,.filters button{background:var(--card);border:1px solid var(--line);color:var(--text);padding:7px 12px;border-radius:7px;font-family:inherit;font-size:13px}
.filters input{min-width:200px}
.filters input:focus,.filters select:focus{outline:none;border-color:var(--tan)}
.filters button{cursor:pointer;transition:all .15s}
.filters button:hover{border-color:var(--tan);background:var(--card2)}
.filters button.active{background:var(--sienna);border-color:var(--tan);color:var(--offwhite)}
.search{position:relative}
.search::before{content:'⌕';position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--mute);font-size:14px}
.search input{padding-left:30px}

/* Toolbar */
.toolbar{display:flex;justify-content:space-between;align-items:center;padding:12px 24px;border-bottom:1px solid var(--line);font-size:13px}
.toolbar .count{color:var(--mute)}
.toolbar .count b{color:var(--text)}
.toolbar .progress{color:var(--mute);font-size:12px}
.toolbar .actions{display:flex;gap:8px}
.toolbar .actions button{background:var(--card);border:1px solid var(--line);color:var(--text);padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit}
.toolbar .actions button:hover{border-color:var(--tan)}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px;padding:18px 24px 80px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:10px;transition:all .15s;position:relative}
.card:hover{border-color:var(--tan);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.4)}
.card[data-status="approved"]{border-color:var(--green);background:linear-gradient(180deg,rgba(34,197,94,.08) 0%,var(--card) 100%)}
.card[data-status="rejected"]{opacity:.5;border-color:var(--red)}
.card[data-status="rejected"]:hover{opacity:1}

/* Card header */
.ch{display:flex;gap:12px;align-items:flex-start}
.avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#713520,#D2B48C);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#0a0f1a;flex-shrink:0;font-family:'JetBrains Mono',monospace;overflow:hidden;position:relative}
.avatar img{width:100%;height:100%;object-fit:cover}
.avatar .pulse-ring{position:absolute;inset:-3px;border-radius:50%;border:2px solid var(--orange);opacity:0;animation:ring 2s infinite}
@keyframes ring{0%{opacity:.7;transform:scale(.95)}100%{opacity:0;transform:scale(1.15)}}

/* Enriched data display */
.bio-snippet{font-size:11px;color:var(--mute);line-height:1.5;background:rgba(168,85,247,.06);border-left:2px solid var(--purple);padding:6px 10px;border-radius:0 6px 6px 0;font-style:italic;max-height:54px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;cursor:pointer;transition:max-height .25s}
.bio-snippet.expanded{max-height:300px;-webkit-line-clamp:unset}
.bio-snippet:hover{background:rgba(168,85,247,.1)}
.bio-empty{font-size:11px;color:var(--dim);font-style:italic;padding:4px 0}

.badges-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:-4px}
.badge{font-size:9px;padding:2px 7px;border-radius:4px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;font-family:'JetBrains Mono',monospace;display:inline-flex;align-items:center;gap:3px}
.badge-cat{background:rgba(212,180,140,.18);color:var(--tan);border:1px solid rgba(212,180,140,.3)}
.badge-biz{background:rgba(34,197,94,.18);color:#4ade80;border:1px solid rgba(34,197,94,.4)}
.badge-verified{background:rgba(59,130,246,.2);color:#93c5fd;border:1px solid rgba(59,130,246,.4)}
.badge-pro{background:rgba(168,85,247,.18);color:#d8b4fe;border:1px solid rgba(168,85,247,.3)}

.contacts-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-top:6px}
.contact-btn{display:flex;align-items:center;justify-content:center;gap:4px;padding:7px 6px;border-radius:6px;font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace;text-decoration:none;border:1px solid var(--line);background:var(--card2);color:var(--mute);transition:all .15s;cursor:pointer;min-width:0}
.contact-btn.has{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.4);color:#4ade80}
.contact-btn.has.email-c{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.5);color:#86efac}
.contact-btn.has.phone-c{background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.5);color:#93c5fd}
.contact-btn.has.wa-c{background:rgba(34,197,94,.12);border-color:#22c55e;color:#22c55e}
.contact-btn:hover.has{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.4)}
.contact-btn.btn-hidden{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.4);color:#fbbf24;cursor:help}
.contact-btn span.lbl{font-size:9px;opacity:.7;text-transform:uppercase}
.contact-btn span.val{font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}

.followers-pulse{font-size:9px;color:var(--mute);margin-top:-2px;font-family:'JetBrains Mono',monospace}
.followers-pulse b{color:var(--green)}

.enriched-spark{position:absolute;top:14px;left:14px;width:8px;height:8px;background:var(--purple);border-radius:50%;box-shadow:0 0 8px var(--purple);animation:pulse 2s infinite}
.card.enriched{border-left:3px solid var(--purple)}
.ch-info{flex:1;min-width:0}
.cname{font-size:14px;font-weight:700;line-height:1.2;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cname.verified::after{content:'✓';color:var(--blue);margin-left:4px;font-size:11px}
.chandle{font-size:12px;color:var(--mute);font-family:'JetBrains Mono',monospace;margin-top:2px}
.chandle a:hover{color:var(--tan);text-decoration:underline}
.score-badge{position:absolute;top:14px;right:14px;width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#0a0f1a;font-family:'JetBrains Mono',monospace}
.score-badge.gold{background:var(--gold)}
.score-badge.silver{background:var(--silver)}
.score-badge.bronze{background:var(--bronze)}
.score-badge.skip{background:var(--skip);color:#cbd5e1}

/* Stats row */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;background:var(--card2);border-radius:8px;padding:8px;font-size:11px}
.sr-cell{text-align:center}
.sr-cell .v{font-size:14px;font-weight:700;color:var(--text);font-family:'JetBrains Mono',monospace}
.sr-cell .l{color:var(--mute);text-transform:uppercase;letter-spacing:.05em;font-size:9px;margin-top:2px}

/* Email */
.email-row{font-size:12px;color:var(--mute);background:rgba(34,197,94,.08);border:1px dashed rgba(34,197,94,.3);padding:6px 8px;border-radius:6px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;gap:6px}
.email-row.empty{color:var(--dim);background:transparent;border-color:var(--line);border-style:dashed;font-style:italic}
.email-row b{color:var(--green);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.email-row .copy{cursor:pointer;color:var(--mute);font-size:11px;padding:2px 6px;border-radius:4px;flex-shrink:0}
.email-row .copy:hover{background:var(--card2);color:var(--text)}

/* Signals */
.signals{display:flex;flex-wrap:wrap;gap:4px}
.chip{font-size:10px;padding:3px 7px;border-radius:4px;font-weight:600;font-family:'JetBrains Mono',monospace;letter-spacing:.02em;text-transform:uppercase}
.chip-foodblogger{background:rgba(245,158,11,.18);color:#fbbf24}
.chip-hashtag{background:rgba(59,130,246,.18);color:#93c5fd}
.chip-er-strong{background:rgba(34,197,94,.2);color:#4ade80}
.chip-er-ok{background:rgba(34,197,94,.12);color:#86efac}
.chip-sweetspot{background:rgba(168,85,247,.18);color:#d8b4fe}
.chip-email{background:rgba(34,197,94,.25);color:#86efac}
.chip-food{background:rgba(217,119,6,.18);color:#fb923c}
.chip-creator{background:rgba(6,182,212,.18);color:#67e8f9}
.chip-business{background:rgba(239,68,68,.2);color:#fca5a5}
.chip-urdu{background:linear-gradient(135deg,rgba(168,85,247,.25),rgba(217,70,239,.18));color:#e9d5ff;font-weight:700;border:1px solid rgba(168,85,247,.4)}

/* Action buttons */
.actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:auto}
.actions button{background:var(--card2);border:1px solid var(--line);color:var(--text);padding:7px 8px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .12s;display:flex;align-items:center;justify-content:center;gap:4px}
.actions button:hover{transform:translateY(-1px)}
.actions .btn-approve{color:var(--green)}
.actions .btn-approve:hover{background:rgba(34,197,94,.1);border-color:var(--green)}
.actions .btn-reject{color:var(--red)}
.actions .btn-reject:hover{background:rgba(239,68,68,.1);border-color:var(--red)}
.actions .btn-notes{color:var(--mute)}
.actions .btn-notes:hover{background:var(--card);border-color:var(--tan);color:var(--tan)}
.actions button.active.btn-approve{background:rgba(34,197,94,.2);border-color:var(--green);color:#4ade80}
.actions button.active.btn-reject{background:rgba(239,68,68,.2);border-color:var(--red);color:#fca5a5}

/* Notes textarea */
.notes-area{display:none;margin-top:6px}
.notes-area textarea{width:100%;background:var(--card2);border:1px solid var(--line);color:var(--text);padding:8px;border-radius:6px;font-family:inherit;font-size:12px;resize:vertical;min-height:50px}
.notes-area textarea:focus{outline:none;border-color:var(--tan)}
.notes-area.open{display:block}

/* IG link */
.cta-row{display:flex;gap:6px}
.cta-row a{flex:1;background:var(--card2);border:1px solid var(--line);padding:6px 8px;border-radius:6px;font-size:11px;text-align:center;font-weight:600;text-transform:uppercase;letter-spacing:.04em;font-family:'JetBrains Mono',monospace}
.cta-row a:hover{background:var(--card);border-color:var(--tan);color:var(--tan)}

/* Buckets / source meta */
.meta-line{font-size:10px;color:var(--dim);display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace}

/* Empty state */
.empty{padding:60px 20px;text-align:center;color:var(--mute)}

/* Notice */
.notice{background:linear-gradient(135deg,rgba(245,158,11,.12),rgba(217,119,6,.06));border:1px solid rgba(245,158,11,.3);border-left:3px solid #f59e0b;padding:10px 14px;margin:10px 24px;border-radius:8px;font-size:13px;color:#fde68a}
.notice b{color:#fef3c7}

/* Toast */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--green);color:var(--green);padding:10px 22px;border-radius:8px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:200;font-weight:600}
#toast.show{opacity:1}

/* Sort indicator */
select.sort{cursor:pointer}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-row1">
    <div class="brand">Hamza Express · Influencer Outreach DB</div>
    <div class="stats" id="stats">Loading…</div>
  </div>
  <div class="filters">
    <div class="search"><input type="text" id="qSearch" placeholder="Name, handle, email…"></div>
    <select id="qTier">
      <option value="">All tiers</option>
      <option value="gold">🥇 Gold (60+)</option>
      <option value="silver">🥈 Silver (40–59)</option>
      <option value="bronze">🥉 Bronze (20–39)</option>
      <option value="skip">Skip (&lt;20)</option>
    </select>
    <select id="qFollowers">
      <option value="">All sizes</option>
      <option value="5-50">Micro 5K–50K</option>
      <option value="50-200">Mid 50K–200K</option>
      <option value="200-3000">Large 200K+</option>
    </select>
    <select id="qStatus">
      <option value="">All statuses</option>
      <option value="pending">Pending review</option>
      <option value="approved">✓ Approved</option>
      <option value="rejected">✗ Rejected</option>
    </select>
    <button id="bEmail" data-filter="hasEmail">📧 Email</button>
    <button id="bPhone" data-filter="hasPhone">📞 Phone</button>
    <button id="bWA" data-filter="hasWa">💬 WhatsApp</button>
    <button id="bBiz" data-filter="business">🏢 Business</button>
    <button id="bUrdu" data-filter="urdu">🌙 Urdu/Muslim</button>
    <button id="bFood" data-filter="foodblogger">🍴 Food topic</button>
    <button id="bER" data-filter="erStrong">🔥 ER ≥2%</button>
    <button id="bEnriched" data-filter="enriched">✨ Bio enriched</button>
    <button id="bButtonOnly" data-filter="buttonOnly" title="Creators with Email/Call buttons but values hidden by API — needs Apify or logged-in scrape">🔘 Button-only (Apify cohort)</button>
    <select class="sort" id="qSort">
      <option value="score">Sort: Score ↓</option>
      <option value="followers">Sort: Followers ↓</option>
      <option value="er">Sort: ER% ↓</option>
      <option value="name">Sort: Name A–Z</option>
    </select>
  </div>
</div>

<div class="notice">
<b>Manual review mode:</b> click <b>✓</b> to approve a creator for outreach, <b>✗</b> to skip, 📝 to add notes. State is saved locally. <span id="enrichStatus" style="color:var(--orange);font-weight:600">⚡ Enriching bios via /api/influencer-bio-pulse — refreshing every 60s…</span>
</div>

<div class="toolbar">
  <div class="count">Showing <b id="vCount">0</b> of <b id="tCount">0</b> · Approved: <b id="aCount" style="color:var(--green)">0</b> · Rejected: <b id="rCount" style="color:var(--red)">0</b></div>
  <div class="actions">
    <button onclick="exportApproved()">📥 Export approved CSV</button>
    <button onclick="resetReview()" style="color:var(--red)">↺ Reset review state</button>
  </div>
</div>

<div class="grid" id="grid"></div>

<div id="toast"></div>

const STORAGE_KEY = 'he_influencer_review_v1';
let reviewState = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');

// Enrichment state — fetched from /api/influencer-bio-pulse
const ENRICH_API = '/api/influencer-bio-pulse';
let enrichMap = new Map();   // username → enriched row
let enrichStats = null;

async function fetchEnrichment() {
  try {
    const [statsR, listR] = await Promise.all([
      fetch(`${ENRICH_API}?action=stats`).then(r => r.json()),
      fetch(`${ENRICH_API}?action=list&limit=1000`).then(r => r.json()),
    ]);
    if (!listR.success) return;
    enrichStats = statsR;
    enrichMap.clear();
    for (const row of (listR.results || [])) {
      enrichMap.set(row.username.toLowerCase(), row);
    }
    // Merge into DATA: stamp each row with enriched=
    for (const p of DATA) {
      const e = enrichMap.get((p.username || '').toLowerCase());
      if (e) {
        p._enriched = e;
        // Add bio-derived contacts
        const bioEmails = JSON.parse(e.extracted_emails_json || '[]');
        const bioPhones = JSON.parse(e.extracted_phones_json || '[]');
        const bioWa = JSON.parse(e.extracted_whatsapp_json || '[]');
        // Merge bio emails into top-level emails (de-duped)
        const allEmails = new Set([...(p.emails || []), ...bioEmails]);
        if (e.business_email) allEmails.add(e.business_email);
        p.emails = [...allEmails];
        p.bio_phones = bioPhones;
        if (e.business_phone_number) p.bio_phones.push(e.business_phone_number);
        p.bio_phones = [...new Set(p.bio_phones)];
        p.bio_whatsapp = bioWa;
        p.bio_text = e.biography;
        p.profile_pic = e.profile_pic_url;
        p.category = e.category_name;
        p.is_business = e.is_business_account === 1;
        p.is_pro = e.is_professional_account === 1;
        p.is_verified_ig = e.is_verified === 1;
        p.is_private_ig = e.is_private === 1;
        p.followers_live = e.followers_count;
        p.media_count = e.media_count;
        p.contact_channels = e.contact_channels || 0;
        p.has_any_contact = e.has_any_contact === 1;
        // Button presence flags (from v2 schema)
        p.has_email_btn = e.has_email_button === 1;
        p.has_call_btn = e.has_call_button === 1;
        p.has_any_btn = e.has_any_button === 1;
        p.business_contact_method = e.business_contact_method;
        p.business_address = e.business_address_json ? (() => { try { return JSON.parse(e.business_address_json); } catch (_) { return null; } })() : null;
        // Apify cohort: button exists but no contact extracted
        p.has_button_no_value = p.has_any_btn && !p.has_any_contact;
        // Bio links — also surface them
        p.bio_links = (() => { try { return JSON.parse(e.bio_links_json || '[]'); } catch (_) { return []; } })();
        p.media_count = e.media_count;
        p.following_count = e.following_count;
        // Recompute score with enrichment signals
        recomputeScore(p);
      } else {
        p._enriched = null;
      }
    }
    updateEnrichStatus();
    render();
    updateHeaderStats();
  } catch (e) {
    document.getElementById('enrichStatus').innerHTML = '<span style="color:var(--red)">enrichment fetch failed: ' + e.message + '</span>';
  }
}

function recomputeScore(p) {
  if (!p._enriched) return;
  // Add bonus signals on top of existing baseline (additive, idempotent via tracking)
  if (!p._enriched_score_applied) {
    p._enriched_score_applied = true;
    if (p.has_any_contact) {
      p.score += 15;
      p.signals = [...(p.signals || []), 'has_any_contact'];
    }
    p.score += (p.contact_channels || 0) * 4;   // up to +12 for 3 channels
    if (p.is_business) {
      p.score += 5;
      p.signals = [...(p.signals || []), 'business_account_ig'];
    }
    if (p.is_verified_ig) {
      p.score += 8;
      p.signals = [...(p.signals || []), 'verified_ig'];
    }
    // Bio-derived emails (in addition to Modash-derived)
    if ((p._enriched.extracted_emails_json && JSON.parse(p._enriched.extracted_emails_json).length) || p._enriched.business_email) {
      if (!p.signals.includes('has_email')) {
        p.score += 8;
        p.signals = [...(p.signals || []), 'has_email_bio'];
      }
    }
    if (p.bio_phones && p.bio_phones.length) {
      p.score += 8;
      p.signals = [...(p.signals || []), 'has_phone_bio'];
    }
    if (p.bio_whatsapp && p.bio_whatsapp.length) {
      p.score += 10;  // WhatsApp is highest-value channel for India
      p.signals = [...(p.signals || []), 'has_whatsapp_bio'];
    }
  }
}

function updateEnrichStatus() {
  if (!enrichStats) return;
  const total = enrichStats.total || 0;
  const ok = (enrichStats.by_status || []).find(s => s.status === 'ok')?.c || 0;
  const c = enrichStats.contacts || {};
  const pct = ((total / DATA.length) * 100).toFixed(0);
  document.getElementById('enrichStatus').innerHTML = `
    ✨ Bio-enriched: <b>${ok}</b> of ${DATA.length} (${pct}%) ·
    📧 <b>${c.with_email || 0}</b> emails ·
    📞 <b>${c.with_phone || 0}</b> phones ·
    💬 <b>${c.with_whatsapp || 0}</b> WhatsApp ·
    🏢 <b>${c.business_accts || 0}</b> Business
  `;
}

function saveState(){localStorage.setItem(STORAGE_KEY, JSON.stringify(reviewState))}
function getStatus(u){return reviewState[u]?.status || 'pending'}
function getNotes(u){return reviewState[u]?.notes || ''}

function setStatus(u, status){
  if (!reviewState[u]) reviewState[u] = {};
  if (reviewState[u].status === status) {
    delete reviewState[u].status;
    if (!Object.keys(reviewState[u]).length) delete reviewState[u];
  } else {
    reviewState[u].status = status;
  }
  saveState();
  render();
  toast(status === 'approved' ? '✓ Approved' : status === 'rejected' ? '✗ Skipped' : 'Reset');
}
function setNotes(u, notes){
  if (!reviewState[u]) reviewState[u] = {};
  reviewState[u].notes = notes;
  if (!notes && !reviewState[u].status) delete reviewState[u];
  saveState();
}

function tierOf(score){
  if (score >= 60) return 'gold';
  if (score >= 40) return 'silver';
  if (score >= 20) return 'bronze';
  return 'skip';
}

function fmtNum(n){
  if (!n) return '0';
  if (n >= 1_000_000) return (n/1_000_000).toFixed(1).replace(/\.0$/,'') + 'M';
  if (n >= 1000) return (n/1000).toFixed(1).replace(/\.0$/,'') + 'K';
  return String(n);
}
function fmtER(er){
  if (!er) return '—';
  const p = er < 1 ? er * 100 : er;
  return p.toFixed(1) + '%';
}

function avatarInitials(name, handle){
  const src = (name || handle || '?').replace(/[^a-zA-Z]/g, '');
  if (src.length >= 2) return src.slice(0,2).toUpperCase();
  return (handle || '?').slice(0,2).toUpperCase();
}

function chipsOf(p){
  const out = [];
  for (const sig of (p.signals || [])) {
    if (sig === 'foodblogger_topic') out.push(['foodblogger', 'chip-foodblogger']);
    else if (sig === 'has_email') out.push(['email', 'chip-email']);
    else if (sig === 'has_email_bio') out.push(['📧 bio email', 'chip-email']);
    else if (sig === 'has_phone_bio') out.push(['📞 phone', 'chip-creator']);
    else if (sig === 'has_whatsapp_bio') out.push(['💬 WhatsApp', 'chip-er-strong']);
    else if (sig === 'has_any_contact') out.push(['contact ✓', 'chip-er-ok']);
    else if (sig === 'food_name') out.push(['food name', 'chip-food']);
    else if (sig === 'explicit_creator') out.push(['creator', 'chip-creator']);
    else if (sig === 'business_account') out.push(['BUSINESS', 'chip-business']);
    else if (sig === 'business_account_ig') out.push(['🏢 IG biz', 'chip-creator']);
    else if (sig === 'verified_ig') out.push(['✓ verified', 'chip-creator']);
    else if (sig === 'urdu_muslim_signal') out.push(['🌙 URDU/MUSLIM', 'chip-urdu']);
    else if (sig === 'barter_sweet_spot') out.push(['barter', 'chip-sweetspot']);
    else if (sig.startsWith('er_')) {
      out.push([sig.replace('er_','').replace('_strong','').replace('_ok',''), sig.includes('strong') ? 'chip-er-strong' : 'chip-er-ok']);
    }
  }
  return out;
}

function applyFilters(){
  const q = document.getElementById('qSearch').value.trim().toLowerCase();
  const tier = document.getElementById('qTier').value;
  const followers = document.getElementById('qFollowers').value;
  const status = document.getElementById('qStatus').value;
  const sort = document.getElementById('qSort').value;
  const onlyEmail = document.getElementById('bEmail').classList.contains('active');
  const onlyPhone = document.getElementById('bPhone')?.classList.contains('active');
  const onlyWA = document.getElementById('bWA')?.classList.contains('active');
  const onlyBiz = document.getElementById('bBiz')?.classList.contains('active');
  const onlyUrdu = document.getElementById('bUrdu').classList.contains('active');
  const onlyFood = document.getElementById('bFood').classList.contains('active');
  const onlyER = document.getElementById('bER').classList.contains('active');
  const onlyEnriched = document.getElementById('bEnriched')?.classList.contains('active');

  let arr = DATA.filter(p => {
    if (tier && tierOf(p.score) !== tier) return false;
    if (status && getStatus(p.username) !== status) return false;
    if (onlyEmail && (!p.emails || !p.emails.length)) return false;
    if (onlyPhone && (!p.bio_phones || !p.bio_phones.length)) return false;
    if (onlyWA && (!p.bio_whatsapp || !p.bio_whatsapp.length)) return false;
    if (onlyBiz && !p.is_business) return false;
    if (onlyEnriched && !p._enriched) return false;
    const onlyButtonOnly = document.getElementById('bButtonOnly')?.classList.contains('active');
    if (onlyButtonOnly && !(p._enriched && p.has_button_no_value)) return false;
    if (onlyUrdu && !(p.signals || []).includes('urdu_muslim_signal')) return false;
    if (onlyFood && !(p.signals || []).includes('foodblogger_topic')) return false;
    if (onlyER) {
      const er = p.engagementRate || 0;
      const erp = er < 1 ? er*100 : er;
      if (erp < 2) return false;
    }
    if (followers) {
      const [lo, hi] = followers.split('-').map(Number);
      const f = (p.followers || 0) / 1000;
      if (f < lo || f > hi) return false;
    }
    if (q) {
      const blob = ((p.fullname||'') + ' ' + (p.username||'') + ' ' + ((p.emails||[]).join(' ')) + ' ' + (p.bio_text||'') + ' ' + (p.category||'')).toLowerCase();
      if (!blob.includes(q)) return false;
    }
    return true;
  });

  arr.sort((a,b) => {
    if (sort === 'score') return (b.score||0) - (a.score||0);
    if (sort === 'followers') return (b.followers||0) - (a.followers||0);
    if (sort === 'er') {
      const ea = a.engagementRate||0, eb = b.engagementRate||0;
      const ap = ea < 1 ? ea*100 : ea, bp = eb < 1 ? eb*100 : eb;
      return bp - ap;
    }
    if (sort === 'name') return (a.fullname||a.username).localeCompare(b.fullname||b.username);
    return 0;
  });
  return arr;
}

function render(){
  const arr = applyFilters();
  const grid = document.getElementById('grid');
  if (!arr.length) {
    grid.innerHTML = '<div class="empty">No creators match these filters.</div>';
  } else {
    grid.innerHTML = arr.map(p => {
      const tier = tierOf(p.score);
      const status = getStatus(p.username);
      const notes = getNotes(p.username);
      const er = p.engagementRate || 0;
      const erp = er < 1 ? er*100 : er;
      const chips = chipsOf(p);
      const emails = p.emails || [];
      const phones = p.bio_phones || [];
      const wa = p.bio_whatsapp || [];
      const handle = p.username;
      const isEnriched = !!p._enriched;
      const verified = (p.isVerified || p.is_verified_ig) ? 'verified' : '';
      const followersDisplay = p.followers_live || p.followers;
      const followersDelta = (p.followers_live && p.followers && p.followers_live !== p.followers)
        ? ` <span class="followers-pulse">live: <b>${fmtNum(p.followers_live)}</b></span>` : '';

      // Avatar — real pic if enriched, fallback to initials
      const avatarHtml = (p.profile_pic)
        ? `<div class="avatar"><img src="${p.profile_pic}" alt="${handle}" loading="lazy" referrerpolicy="no-referrer" onerror="this.parentNode.innerHTML='${avatarInitials(p.fullname, handle)}'"></div>`
        : `<div class="avatar">${avatarInitials(p.fullname, handle)}</div>`;

      // Badges
      const badges = [];
      if (p.category) badges.push(`<span class="badge badge-cat">${p.category}</span>`);
      if (p.is_business) badges.push('<span class="badge badge-biz">🏢 Business</span>');
      else if (p.is_pro) badges.push('<span class="badge badge-pro">Pro</span>');
      if (p.is_verified_ig || p.isVerified) badges.push('<span class="badge badge-verified">✓ Verified</span>');

      // Contact buttons (3 channels)
      const primaryEmail = emails[0];
      const primaryPhone = phones[0];
      const primaryWa = wa[0];
      const emailBtnHidden = p.has_email_btn && !primaryEmail;
      const phoneBtnHidden = p.has_call_btn && !primaryPhone;
      const contactsRow = `
        <div class="contacts-row">
          ${primaryEmail
            ? `<a class="contact-btn has email-c" href="mailto:${primaryEmail}" title="${primaryEmail}"><span><span class="lbl">Email</span><br><span class="val">${primaryEmail.length > 20 ? primaryEmail.slice(0,18)+'…' : primaryEmail}</span></span></a>`
            : emailBtnHidden
              ? `<div class="contact-btn btn-hidden" title="IG Email button is set up but value hidden by API — needs Apify or logged-in scrape"><span><span class="lbl">Email btn</span><br><span class="val">🔘 hidden</span></span></div>`
              : `<div class="contact-btn"><span><span class="lbl">Email</span><br><span class="val">—</span></span></div>`}
          ${primaryPhone
            ? `<a class="contact-btn has phone-c" href="tel:${primaryPhone}" title="${primaryPhone}"><span><span class="lbl">Phone</span><br><span class="val">${primaryPhone}</span></span></a>`
            : phoneBtnHidden
              ? `<div class="contact-btn btn-hidden" title="IG Call button is set up but value hidden by API"><span><span class="lbl">Call btn</span><br><span class="val">🔘 hidden</span></span></div>`
              : `<div class="contact-btn"><span><span class="lbl">Phone</span><br><span class="val">—</span></span></div>`}
          ${primaryWa
            ? `<a class="contact-btn has wa-c" href="https://wa.me/${primaryWa.replace(/[^\\d]/g,'')}" target="_blank" title="${primaryWa}"><span><span class="lbl">WhatsApp</span><br><span class="val">${primaryWa}</span></span></a>`
            : `<div class="contact-btn"><span><span class="lbl">WhatsApp</span><br><span class="val">—</span></span></div>`}
        </div>
        ${emails.length > 1 ? `<div style="font-size:10px;color:var(--mute);font-family:'JetBrains Mono',monospace;padding:4px 0">+${emails.length-1} more email${emails.length>2?'s':''}: ${emails.slice(1).map(e => `<span style="cursor:pointer" onclick="copyEmail('${e}')">${e}</span>`).join(', ')}</div>` : ''}
        ${phones.length > 1 ? `<div style="font-size:10px;color:var(--mute);font-family:'JetBrains Mono',monospace;padding:4px 0">+${phones.length-1} more phone${phones.length>2?'s':''}: ${phones.slice(1).join(', ')}</div>` : ''}
        ${wa.length > 1 ? `<div style="font-size:10px;color:var(--mute);font-family:'JetBrains Mono',monospace;padding:4px 0">+${wa.length-1} more WhatsApp: ${wa.slice(1).join(', ')}</div>` : ''}
        ${(p.bio_links && p.bio_links.length > 1) ? `<div style="font-size:10px;color:var(--mute);font-family:'JetBrains Mono',monospace;padding:4px 0">🔗 ${p.bio_links.length} bio links: ${p.bio_links.slice(0, 3).map(l => `<a href="${l.url || '#'}" target="_blank" style="color:var(--cyan)">${(l.title || (l.url||'').replace(/^https?:\/\//,'').slice(0,30))}</a>`).join(' · ')}</div>` : ''}`;

      // Bio block
      const bioBlock = isEnriched
        ? (p.bio_text
            ? `<div class="bio-snippet" onclick="this.classList.toggle('expanded')">${(p.bio_text || '').replace(/[<>]/g,'').slice(0, 600)}</div>`
            : '<div class="bio-empty">no bio set</div>')
        : '';

      return `
      <div class="card ${isEnriched ? 'enriched' : ''}" data-status="${status}" data-handle="${handle}">
        ${isEnriched ? '<div class="enriched-spark" title="Bio enriched"></div>' : ''}
        <div class="score-badge ${tier}">${p.score}</div>
        <div class="ch">
          ${avatarHtml}
          <div class="ch-info">
            <div class="cname ${verified}">${(p.fullname || '—').replace(/[<>]/g,'')}</div>
            <div class="chandle"><a href="https://instagram.com/${handle}" target="_blank">@${handle}</a>${followersDelta}</div>
          </div>
        </div>
        ${badges.length ? `<div class="badges-row">${badges.join('')}</div>` : ''}
        <div class="stats-row">
          <div class="sr-cell"><div class="v">${fmtNum(followersDisplay)}</div><div class="l">Followers</div></div>
          <div class="sr-cell"><div class="v">${fmtER(p.engagementRate)}</div><div class="l">ER</div></div>
          <div class="sr-cell"><div class="v">${fmtNum(p.media_count || p.engagements)}</div><div class="l">${p.media_count ? 'Posts' : 'Eng'}</div></div>
        </div>
        ${bioBlock}
        ${contactsRow}
        <div class="signals">${chips.map(([t,c]) => `<span class="chip ${c}">${t}</span>`).join('')}</div>
        <div class="meta-line"><span>${(p.buckets||[]).filter(b => !b.includes('hashtag')).join(' · ')}</span><span>${p.city || ''}</span></div>
        <div class="notes-area ${notes ? 'open' : ''}" id="notes-${handle}"><textarea oninput="onNotes('${handle}', this.value)" placeholder="Notes…">${notes}</textarea></div>
        <div class="actions">
          <button class="btn-approve ${status==='approved'?'active':''}" onclick="setStatus('${handle}','approved')">✓ Approve</button>
          <button class="btn-reject ${status==='rejected'?'active':''}" onclick="setStatus('${handle}','rejected')">✗ Skip</button>
          <button class="btn-notes" onclick="toggleNotes('${handle}')">📝 Notes</button>
        </div>
      </div>`;
    }).join('');
  }

  // Update toolbar counts
  const total = DATA.length;
  const approved = Object.values(reviewState).filter(s => s.status === 'approved').length;
  const rejected = Object.values(reviewState).filter(s => s.status === 'rejected').length;
  document.getElementById('vCount').textContent = arr.length;
  document.getElementById('tCount').textContent = total;
  document.getElementById('aCount').textContent = approved;
  document.getElementById('rCount').textContent = rejected;
}

function toggleNotes(handle){
  document.getElementById('notes-' + handle).classList.toggle('open');
}
function onNotes(handle, val){
  setNotes(handle, val);
}
function copyEmail(e){
  navigator.clipboard.writeText(e);
  toast('Copied: ' + e);
}
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

function exportApproved(){
  const approved = DATA.filter(p => getStatus(p.username) === 'approved');
  if (!approved.length) { toast('No approved yet'); return; }
  const rows = [['rank','score','username','fullname','followers','er%','email1','email2','signals','notes']];
  approved.forEach(p => {
    const er = p.engagementRate || 0;
    const erp = er < 1 ? er*100 : er;
    rows.push([
      p.score, p.score, '@'+p.username, p.fullname,
      p.followers || '', erp.toFixed(2),
      (p.emails||[])[0] || '', (p.emails||[])[1] || '',
      (p.signals||[]).join(','),
      getNotes(p.username)
    ]);
  });
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type: 'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'he_approved_outreach_' + Date.now() + '.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast(`Exported ${approved.length} approved`);
}

function resetReview(){
  if (confirm('Reset all approve/skip/notes?')) {
    reviewState = {}; saveState(); render();
  }
}

document.addEventListener('input', e => {
  if (['qSearch','qFollowers','qTier','qStatus'].includes(e.target.id)) render();
});
document.addEventListener('change', e => {
  if (['qFollowers','qTier','qStatus','qSort'].includes(e.target.id)) render();
});
document.querySelectorAll('.filters button[data-filter]').forEach(b => b.addEventListener('click', () => {
  b.classList.toggle('active'); render();
}));

// Header stats
function updateHeaderStats(){
  const total = DATA.length;
  const gold = DATA.filter(p => p.score >= 60).length;
  const silver = DATA.filter(p => p.score >= 40 && p.score < 60).length;
  const bronze = DATA.filter(p => p.score >= 20 && p.score < 40).length;
  const withEmail = DATA.filter(p => p.emails && p.emails.length).length;
  const withPhone = DATA.filter(p => p.bio_phones && p.bio_phones.length).length;
  const withWA = DATA.filter(p => p.bio_whatsapp && p.bio_whatsapp.length).length;
  const enriched = DATA.filter(p => p._enriched).length;
  const urdu = DATA.filter(p => (p.signals||[]).includes('urdu_muslim_signal')).length;
  const buttonOnly = DATA.filter(p => p.has_button_no_value).length;
  const business = DATA.filter(p => p.is_business).length;
  document.getElementById('stats').innerHTML = `
    Total <b>${total}</b>
    · <span class="gold">Gold <b>${gold}</b></span>
    · <span class="silver">Silver <b>${silver}</b></span>
    · <span class="bronze">Bronze <b>${bronze}</b></span>
    · <span class="email">📧 <b>${withEmail}</b></span>
    · 📞 <b>${withPhone}</b>
    · 💬 <b>${withWA}</b>
    · 🔘 <b style="color:#fbbf24">${buttonOnly}</b> btn-only
    · 🏢 <b>${business}</b>
    · ✨ <b>${enriched}</b> enriched
    · 🌙 <b>${urdu}</b>
  `;
}

updateHeaderStats();
render();
fetchEnrichment();
setInterval(fetchEnrichment, 60_000);  // auto-refresh every 60s
</script>
