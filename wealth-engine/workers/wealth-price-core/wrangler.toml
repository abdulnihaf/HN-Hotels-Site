name = "wealth-price-core"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
account_id = "3d506f78b08b3d95c667b82ef6ee7ab8"

# ─────────────────────────────────────────────────────────────────────────
# Cron triggers — Cloudflare runs these in UTC.
# IST = UTC + 5:30. Reference table:
#   IST 09:00 = UTC 03:30
#   IST 09:15 = UTC 03:45
#   IST 15:30 = UTC 10:00
#   IST 16:00 = UTC 10:30
#   IST 17:35 = UTC 12:05
#   IST 18:00 = UTC 12:30
#   IST 18:15 = UTC 12:45
#   IST 19:30 = UTC 14:00
# ─────────────────────────────────────────────────────────────────────────
[triggers]
crons = [
  # ─── EOD daily one-shot reports ─────────────────────────
  "5 12 * * 1-5",       # NSE indices             17:35 IST
  "30 12 * * 1-5",      # NSE EOD bhavcopy        18:00 IST
  "45 12 * * 1-5",      # BSE EOD bhavcopy        18:15 IST
  "0 14 * * 1-5",       # NSE delivery%           19:30 IST
  "30 10 * * 1-5",      # 52w extremes            16:00 IST
  "31 10 * * 1-5",      # Circuit hits            16:01 IST (was colliding with 52w)
  # ─── Pre-open snapshots ─────────────────────────────────
  "0-8 3 * * 1-5",      # Pre-open every minute   09:00-09:08 IST
  # ─── Intraday max freshness (paid tier) ─────────────────
  "*/1 3-10 * * 1-5",   # Intraday quotes         every 1 min, 09:15-15:30 IST
  "7-52/15 3-10 * * 1-5", # Yahoo backup          every 15 min during market (offset)
  # ─── Cross-asset extended hours ─────────────────────────
  "*/5 1-18 * * *",     # GIFT Nifty              every 5 min, 06:30-23:55 IST
]

[[d1_databases]]
binding = "DB"
database_name = "wealth-engine"
# REPLACE database_id after running:
#   wrangler d1 create wealth-engine
database_id = "1e3cea30-5990-43d2-a9de-b749d32e225a"

# ─────────────────────────────────────────────────────────────────────────
# Secrets (set via: wrangler secret put <NAME> --config wrangler.toml)
#   DASHBOARD_KEY   — auth key for /run/* and /backfill HTTP triggers
#   FRED_API_KEY    — used by W7 macro worker (set here for shared access)
#   KITE_API_KEY    — Zerodha Kite Connect API key
#   KITE_API_SECRET — Zerodha Kite Connect API secret
# ─────────────────────────────────────────────────────────────────────────

[vars]
WATCHLIST_SYMBOLS = "RELIANCE,HDFCBANK,ICICIBANK,INFY,TCS,SBIN,BAJFINANCE,LT,ITC,HINDUNILVR,KOTAKBANK,AXISBANK,M&M,MARUTI,TATAMOTORS,SUNPHARMA,ASIANPAINT,BHARTIARTL,WIPRO,NTPC"
