name: Takht
options:
  bundleIdPrefix: in.hnhotels
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: 5.0
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    WATCHOS_DEPLOYMENT_TARGET: 10.0
    DEVELOPMENT_TEAM: FZ58DQ52QS
targets:
  Takht:
    type: application
    platform: iOS
    sources:
      - path: Sources/Takht
    resources:
      - path: Resources
    settings:
      base:
        PRODUCT_NAME: Takht
        PRODUCT_BUNDLE_IDENTIFIER: in.hnhotels.takht
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: Takht
        INFOPLIST_KEY_CFBundleName: Takht
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: ["UIInterfaceOrientationPortrait"]
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: in.hnhotels.takht.watchkitapp
    info:
      path: Sources/Takht/Info.plist
    entitlements:
      path: Sources/Takht/Takht.entitlements

  # Modern single-target watchOS app (replaces the deprecated watchapp2 + watchkit2-extension pair).
  TakhtWatch:
    type: application
    platform: watchOS
    sources:
      - path: Sources/TakhtWatch
      - path: Sources/Takht/TakhtStore.swift
      - path: Sources/Takht/TakhtModels.swift
    resources:
      - path: Resources
    settings:
      base:
        PRODUCT_NAME: TakhtWatch
        PRODUCT_BUNDLE_IDENTIFIER: in.hnhotels.takht.watchkitapp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: Takht
        INFOPLIST_KEY_WKApplication: YES
    info:
      path: Sources/TakhtWatch/Info.plist
    entitlements:
      path: Sources/TakhtWatch/TakhtWatch.entitlements
