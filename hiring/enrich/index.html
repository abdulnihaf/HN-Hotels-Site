<script>
const API = "/api/hiring";
const LS_KEY = "apna_enrich_settings";
let enrichResults = [];
let isRunning = false;
let shouldStop = false;
let settingsOpen = false;

function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

async function apiPost(data) {
  const r = await fetch(API, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(data) });
  return r.json();
}

// ─── localStorage Settings ─────────────────────────────────────
function loadSettings() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch { return null; }
}

function saveSettings() {
  const authRaw = document.getElementById("auth-headers").value.trim();
  let authHeaders = null;
  if (authRaw) {
    try { authHeaders = JSON.parse(authRaw); } catch {
      document.getElementById("settings-save-status").innerHTML = '<span class="text-red-400">Invalid auth headers JSON</span>';
      return;
    }
  }

  const settings = {
    auth_headers: authHeaders,
    auth_raw: authRaw,
    search_id: document.getElementById("search-id").value.trim(),
    base_query_id: document.getElementById("base-query-id").value.trim(),
    sub_query_id: document.getElementById("sub-query-id").value.trim(),
    default_role: document.getElementById("settings-role").value,
    default_city: document.getElementById("settings-city").value.trim(),
    default_source: document.getElementById("settings-source").value.trim(),
    saved_at: new Date().toISOString(),
  };

  localStorage.setItem(LS_KEY, JSON.stringify(settings));
  document.getElementById("settings-save-status").innerHTML = '<span class="text-emerald-400">Saved to browser</span>';
  setTimeout(() => { document.getElementById("settings-save-status").innerHTML = ""; }, 2000);
  updateConfigBadge();
  updateConfigBanner();

  // Apply defaults to save section
  applySaveDefaults(settings);
}

function clearSettings() {
  localStorage.removeItem(LS_KEY);
  document.getElementById("auth-headers").value = "";
  document.getElementById("search-id").value = "";
  document.getElementById("base-query-id").value = "";
  document.getElementById("sub-query-id").value = "";
  document.getElementById("settings-role").value = "";
  document.getElementById("settings-city").value = "Bangalore";
  document.getElementById("settings-source").value = "apna_enrich";
  document.getElementById("auth-status").innerHTML = "";
  document.getElementById("settings-save-status").innerHTML = '<span class="text-amber-400">Settings cleared</span>';
  setTimeout(() => { document.getElementById("settings-save-status").innerHTML = ""; }, 2000);
  updateConfigBadge();
  updateConfigBanner();
}

function restoreSettings() {
  const s = loadSettings();
  if (!s) return;

  if (s.auth_raw) {
    document.getElementById("auth-headers").value = s.auth_raw;
    // Trigger validation display
    validateAuthHeaders();
  }
  if (s.search_id) document.getElementById("search-id").value = s.search_id;
  if (s.base_query_id) document.getElementById("base-query-id").value = s.base_query_id;
  if (s.sub_query_id) document.getElementById("sub-query-id").value = s.sub_query_id;
  if (s.default_role) document.getElementById("settings-role").value = s.default_role;
  if (s.default_city) document.getElementById("settings-city").value = s.default_city;
  if (s.default_source) document.getElementById("settings-source").value = s.default_source;

  applySaveDefaults(s);
}

function applySaveDefaults(s) {
  if (s.default_role) document.getElementById("save-role").value = s.default_role;
  if (s.default_city) document.getElementById("save-city").value = s.default_city;
  if (s.default_source) document.getElementById("save-source").value = s.default_source || "apna_enrich";
}

// ─── Config Badge & Banner ─────────────────────────────────────
function updateConfigBadge() {
  const badge = document.getElementById("settings-badge");
  const s = loadSettings();
  if (s && s.auth_headers) {
    badge.className = "absolute -top-0.5 -right-0.5 w-2.5 h-2.5 rounded-full border border-surface-1 bg-emerald-400";
  } else {
    badge.className = "absolute -top-0.5 -right-0.5 w-2.5 h-2.5 rounded-full border border-surface-1 bg-red-400 animate-pulse";
  }
}

function updateConfigBanner() {
  const banner = document.getElementById("config-banner");
  const s = loadSettings();

  if (settingsOpen) {
    banner.classList.add("hidden");
    return;
  }

  if (!s || !s.auth_headers) {
    banner.classList.remove("hidden");
    banner.innerHTML = `
      <div class="flex items-center gap-2.5 px-4 py-2.5 rounded-xl bg-red-500/[.06] border border-red-500/10 cursor-pointer hover:bg-red-500/[.1] transition" onclick="toggleSettings()">
        <span class="w-2 h-2 rounded-full bg-red-400 animate-pulse shrink-0"></span>
        <span class="text-xs text-red-400/80">API not configured — click to set up auth headers</span>
        <svg class="w-3 h-3 text-red-400/40 ml-auto" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
      </div>`;
  } else {
    const ago = timeSince(new Date(s.saved_at));
    banner.classList.remove("hidden");
    banner.innerHTML = `
      <div class="flex items-center gap-2.5 px-4 py-2 rounded-xl bg-emerald-500/[.04] border border-emerald-500/[.06] cursor-pointer hover:bg-emerald-500/[.08] transition" onclick="toggleSettings()">
        <span class="w-2 h-2 rounded-full bg-emerald-400 shrink-0"></span>
        <span class="text-[11px] text-emerald-400/60">API configured ${ago}</span>
        <span class="text-[10px] text-white/15 ml-auto">click to edit</span>
      </div>`;
  }
}

function timeSince(date) {
  const s = Math.floor((Date.now() - date.getTime()) / 1000);
  if (s < 60) return "just now";
  if (s < 3600) return `${Math.floor(s / 60)}m ago`;
  if (s < 86400) return `${Math.floor(s / 3600)}h ago`;
  return `${Math.floor(s / 86400)}d ago`;
}

// ─── Settings Panel Toggle ─────────────────────────────────────
function toggleSettings() {
  settingsOpen = !settingsOpen;
  const panel = document.getElementById("settings-panel");
  if (settingsOpen) {
    panel.classList.remove("hidden");
  } else {
    panel.classList.add("hidden");
  }
  updateConfigBanner();
}

// ─── User IDs ──────────────────────────────────────────────────
function updateIdCount() {
  const ids = parseUserIds();
  document.getElementById("id-count").textContent = `${ids.length} ID${ids.length !== 1 ? 's' : ''}`;
}

function parseUserIds() {
  return document.getElementById("user-ids").value.trim().split(/[\n\r,\s]+/).filter(id => id && /^\d+$/.test(id.trim()));
}

// ─── Auth Validation ───────────────────────────────────────────
function validateAuthHeaders() {
  const raw = document.getElementById("auth-headers").value.trim();
  if (!raw) { document.getElementById("auth-status").innerHTML = ""; return; }
  try {
    const h = JSON.parse(raw);
    const keys = Object.keys(h);
    const hasAuth = keys.some(k => k.toLowerCase() === "authorization" || k.toLowerCase() === "cookie");
    if (hasAuth) {
      document.getElementById("auth-status").innerHTML = `<span class="text-emerald-400">Valid \u00b7 ${keys.length} headers</span>`;
    } else {
      document.getElementById("auth-status").innerHTML = `<span class="text-amber-400">Valid JSON but no auth/cookie found</span>`;
    }
  } catch {
    document.getElementById("auth-status").innerHTML = `<span class="text-red-400">Invalid JSON</span>`;
  }
}

function getApnaHeaders() {
  // Try from form first, then from localStorage
  const raw = document.getElementById("auth-headers").value.trim();
  if (raw) {
    try { return JSON.parse(raw); } catch { return null; }
  }
  const s = loadSettings();
  return s?.auth_headers || null;
}

function getSearchParams() {
  // Try from form first, then from localStorage
  const searchId = document.getElementById("search-id").value.trim();
  const baseQueryId = document.getElementById("base-query-id").value.trim();
  const subQueryId = document.getElementById("sub-query-id").value.trim();

  if (searchId || baseQueryId || subQueryId) {
    return {
      search_id: searchId,
      base_query_id: baseQueryId,
      sub_query_id: subQueryId,
      enterprise_member_id: "",
      workspace_id: "",
      job_id: "",
    };
  }

  const s = loadSettings();
  if (s) {
    return {
      search_id: s.search_id || "",
      base_query_id: s.base_query_id || "",
      sub_query_id: s.sub_query_id || "",
      enterprise_member_id: "",
      workspace_id: "",
      job_id: "",
    };
  }

  return { search_id: "", base_query_id: "", sub_query_id: "", enterprise_member_id: "", workspace_id: "", job_id: "" };
}

// ─── Enrichment Logic ──────────────────────────────────────────
function addLog(msg, type = "info") {
  const log = document.getElementById("log-body");
  const colors = { info: "text-white/40", success: "text-emerald-400", error: "text-red-400", warn: "text-amber-400" };
  const time = new Date().toLocaleTimeString("en-IN", { hour12: false });
  log.innerHTML += `<div class="${colors[type] || colors.info}"><span class="text-white/15">${time}</span> ${msg}</div>`;
  log.scrollTop = log.scrollHeight;
}

async function startEnrichment() {
  const headers = getApnaHeaders();
  if (!headers) {
    toggleSettings();
    if (!settingsOpen) toggleSettings();
    alert("Please configure Apna auth headers in Settings first");
    return;
  }

  const ids = parseUserIds();
  if (!ids.length) { alert("Paste at least one user ID"); return; }

  const searchParams = getSearchParams();
  if (!searchParams.search_id) {
    toggleSettings();
    if (!settingsOpen) toggleSettings();
    alert("Please configure search_id in Settings first");
    return;
  }

  // Reset
  enrichResults = [];
  shouldStop = false;
  isRunning = true;
  let successCount = 0, errorCount = 0;

  // UI states
  document.getElementById("btn-start").disabled = true;
  document.getElementById("btn-stop").classList.remove("hidden");
  document.getElementById("progress-wrap").classList.remove("hidden");
  document.getElementById("log-section").classList.remove("hidden");
  document.getElementById("results-section").classList.remove("hidden");
  document.getElementById("log-body").innerHTML = "";
  document.getElementById("results-body").innerHTML = "";

  addLog(`Starting enrichment for ${ids.length} user IDs...`);

  for (let i = 0; i < ids.length; i++) {
    if (shouldStop) {
      addLog("Stopped by user.", "warn");
      break;
    }

    const uid = ids[i].trim();
    const pct = Math.round(((i + 1) / ids.length) * 100);
    document.getElementById("progress-bar").style.width = pct + "%";
    document.getElementById("progress-text").textContent = `${i + 1}/${ids.length}`;

    try {
      addLog(`Fetching ${uid}...`);
      const result = await apiPost({
        action: "enrich_phone",
        user_id: uid,
        apna_headers: headers,
        search_params: searchParams,
      });

      if (result.phone) {
        successCount++;
        enrichResults.push({
          user_id: uid,
          phone: result.phone,
          candidate_data: result.candidate_data,
          name: result.candidate_data?.name || result.candidate_data?.candidate_name || "",
        });
        addLog(`${uid} \u2192 ${result.phone}`, "success");
      } else if (result.error) {
        errorCount++;
        enrichResults.push({ user_id: uid, phone: "", error: result.error });
        addLog(`${uid} \u2192 Error: ${result.error}`, "error");
      } else {
        errorCount++;
        enrichResults.push({ user_id: uid, phone: "", error: "No phone returned" });
        addLog(`${uid} \u2192 No phone number found`, "warn");
      }
    } catch (e) {
      errorCount++;
      enrichResults.push({ user_id: uid, phone: "", error: e.message });
      addLog(`${uid} \u2192 Network error: ${e.message}`, "error");
    }

    renderResults();
    document.getElementById("log-stats").textContent = `${successCount} found \u00b7 ${errorCount} failed`;

    // Rate limit: 500ms between requests
    if (i < ids.length - 1 && !shouldStop) {
      await new Promise(r => setTimeout(r, 500));
    }
  }

  isRunning = false;
  document.getElementById("btn-start").disabled = false;
  document.getElementById("btn-stop").classList.add("hidden");

  const withPhone = enrichResults.filter(r => r.phone).length;
  addLog(`Done. ${withPhone}/${ids.length} phones enriched.`, withPhone > 0 ? "success" : "warn");

  // Show save section if we have results
  if (withPhone > 0) {
    document.getElementById("save-section").classList.remove("hidden");
    document.getElementById("save-count").textContent = withPhone;
  }
}

function stopEnrichment() {
  shouldStop = true;
  addLog("Stopping...", "warn");
}

function renderResults() {
  const tbody = document.getElementById("results-body");
  tbody.innerHTML = enrichResults.map((r, i) => {
    const statusBadge = r.phone
      ? `<span class="text-emerald-400">Found</span>`
      : `<span class="text-red-400/60">${esc(r.error || 'Failed')}</span>`;
    return `<tr class="border-b border-white/[.02] ${r.phone ? '' : 'opacity-40'}">
      <td class="py-1.5 px-3 text-white/20">${i + 1}</td>
      <td class="py-1.5 px-2 mono text-white/40">${esc(r.user_id)}</td>
      <td class="py-1.5 px-2 mono ${r.phone ? 'text-emerald-400 font-medium' : 'text-white/15'}">${r.phone || '\u2014'}</td>
      <td class="py-1.5 px-2 text-white/50">${esc(r.name || '\u2014')}</td>
      <td class="py-1.5 px-2">${statusBadge}</td>
    </tr>`;
  }).join("");

  const withPhone = enrichResults.filter(r => r.phone).length;
  document.getElementById("results-stats").textContent = `${withPhone} found / ${enrichResults.length - withPhone} failed`;
}

async function saveToDatabase() {
  const role = document.getElementById("save-role").value;
  if (!role) { alert("Please select a role"); return; }

  const city = document.getElementById("save-city").value.trim();
  const source = document.getElementById("save-source").value.trim() || "apna_enrich";

  const withPhone = enrichResults.filter(r => r.phone);
  if (!withPhone.length) { alert("No candidates with phone numbers to save"); return; }

  document.getElementById("btn-save").disabled = true;
  document.getElementById("save-status").textContent = "Saving...";

  const candidates = withPhone.map(r => ({
    phone: r.phone,
    name: r.name || "",
    first_name: (r.name || "").split(" ")[0] || "",
    he_role: role,
    current_title: r.candidate_data?.current_job_title || r.candidate_data?.job_title || "",
    current_company: r.candidate_data?.current_company || r.candidate_data?.company || "",
    city: city,
    source: source,
  }));

  try {
    const result = await apiPost({
      action: "upload_candidates",
      candidates: candidates,
    });

    if (result.success) {
      document.getElementById("save-status").innerHTML =
        `<span class="text-emerald-400">Saved! ${result.inserted} inserted, ${result.skipped} skipped</span>`;
      if (result.errors?.length) {
        result.errors.forEach(e => addLog(`DB: ${e}`, "warn"));
      }
    } else {
      document.getElementById("save-status").innerHTML =
        `<span class="text-red-400">Error: ${result.error || 'Unknown'}</span>`;
    }
  } catch (e) {
    document.getElementById("save-status").innerHTML =
      `<span class="text-red-400">Network error: ${e.message}</span>`;
  }

  document.getElementById("btn-save").disabled = false;
}

// ─── Init ──────────────────────────────────────────────────────
document.getElementById("auth-headers").addEventListener("input", validateAuthHeaders);

// Restore saved settings on load
restoreSettings();
updateConfigBadge();
updateConfigBanner();
</script>
