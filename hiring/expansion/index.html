<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expansion Intelligence — HN Hotels</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            brand: { 50:'#fef7ed',100:'#fdecd4',200:'#f9d5a8',400:'#f0a944',500:'#e8930c',600:'#c97508' },
            surface: { 1:'#111118', 2:'#16161f', 3:'#1c1c27', 4:'#22222e' }
          }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    body { background: #0c0c14; color: #e4e4ed; }
    .glass { background: rgba(22,22,31,0.7); border: 1px solid rgba(255,255,255,0.04); backdrop-filter: blur(20px); }
    input, select { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); color: #e4e4ed; }
    input:focus, select:focus { border-color: rgba(232,147,12,.5); outline: none; box-shadow: 0 0 0 2px rgba(232,147,12,.1); }
    .btn-primary { background:#e8930c; color:#0c0c14; font-weight:600; }
    .btn-primary:hover:not(:disabled) { background:#f0a944; }
    .btn-primary:disabled { opacity:0.4; cursor:not-allowed; }
    .btn-ghost { background:rgba(255,255,255,0.04); color:rgba(255,255,255,0.5); }
    .btn-ghost:hover { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.7); }
    .btn-ghost.active { background:rgba(232,147,12,0.12); color:#f0a944; border-color:rgba(232,147,12,0.3); }
    .chip { display:inline-flex; align-items:center; gap:4px; padding:4px 10px; border-radius:8px; font-size:11px; font-weight:600; cursor:pointer; transition:all 0.15s; border:1px solid transparent; }
    .chip-zone { background:rgba(255,255,255,0.04); color:rgba(255,255,255,0.5); }
    .chip-zone:hover, .chip-zone.active { background:rgba(232,147,12,0.12); color:#f0a944; border-color:rgba(232,147,12,0.2); }
    .badge { display:inline-flex; align-items:center; padding:2px 8px; border-radius:6px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
    .badge-hot { background:rgba(239,68,68,0.15); color:#f87171; }
    .badge-warm { background:rgba(245,158,11,0.15); color:#fbbf24; }
    .badge-cold { background:rgba(59,130,246,0.15); color:#60a5fa; }
    .badge-he { background:rgba(168,85,247,0.15); color:#c084fc; }
    .badge-nch { background:rgba(16,185,129,0.15); color:#34d399; }
    .badge-vacant { background:rgba(16,185,129,0.15); color:#34d399; }
    .badge-occupied { background:rgba(239,68,68,0.12); color:#f87171; }
    .badge-neg { background:rgba(59,130,246,0.12); color:#60a5fa; }
    .badge-temp { background:rgba(251,146,60,0.15); color:#fb923c; }
    .badge-perm { background:rgba(239,68,68,0.15); color:#f87171; }
    .badge-available { background:rgba(16,185,129,0.15); color:#34d399; }
    .badge-replaced { background:rgba(245,158,11,0.15); color:#fbbf24; }
    .lead-card { transition: all 0.15s; }
    .lead-card:hover { border-color: rgba(255,255,255,0.08); transform: translateY(-1px); }
    .tab-btn { padding: 8px 16px; font-size: 13px; font-weight: 600; border-radius: 8px 8px 0 0; cursor: pointer; transition: all 0.15s; border: 1px solid transparent; border-bottom: none; }
    .tab-btn.active { background: rgba(22,22,31,0.7); color: #f0a944; border-color: rgba(255,255,255,0.04); }
    .tab-btn:not(.active) { background: transparent; color: rgba(255,255,255,0.3); }
    .tab-btn:not(.active):hover { color: rgba(255,255,255,0.5); }
    select option { background:#1c1c27; color:#e4e4ed; }
    a.link { color:#60a5fa; text-decoration:none; }
    a.link:hover { text-decoration:underline; }
    @keyframes pulse-bar { 0%,100%{opacity:0.6} 50%{opacity:1} }
    .animate-pulse-bar { animation: pulse-bar 1.5s ease-in-out infinite; }
    .photo-thumb { width:60px; height:60px; border-radius:8px; object-fit:cover; background:rgba(255,255,255,0.04); }
  </style>
</head>
<body class="min-h-screen font-sans antialiased">

<!-- Nav -->
<nav class="sticky top-0 z-40 glass border-b border-white/[.03] px-4 sm:px-6 h-14 flex items-center justify-between">
  <div class="flex items-center gap-2.5">
    <div class="w-8 h-8 rounded-lg bg-brand-500/15 flex items-center justify-center text-brand-400">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/></svg>
    </div>
    <div>
      <h1 class="text-sm font-bold tracking-tight leading-none">Expansion Intelligence</h1>
      <p class="text-[10px] text-white/25 leading-none mt-0.5">HN Hotels — Find Spaces for New Outlets</p>
    </div>
  </div>
  <a href="/" class="btn-ghost text-xs px-3 py-1.5 rounded-lg flex items-center gap-1.5 transition no-underline">
    <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/></svg>
    Home
  </a>
</nav>

<main class="max-w-7xl mx-auto px-4 sm:px-6 py-6 space-y-5">

  <!-- Search Panel -->
  <div class="glass rounded-xl p-5 space-y-4">
    <div>
      <label class="text-xs text-white/40 font-medium mb-1.5 block">Search Location</label>
      <div class="flex gap-2">
        <div class="flex-1 relative">
          <input id="locInput" type="text" placeholder="Type any Bangalore area — Indiranagar, JP Nagar, Koramangala..."
            class="w-full px-3 py-2.5 rounded-lg text-sm pr-24" onkeydown="if(event.key==='Enter')resolveLocation()">
          <div id="geoStatus" class="absolute right-2 top-1/2 -translate-y-1/2 text-[10px] text-white/20"></div>
        </div>
        <button onclick="resolveLocation()" class="btn-primary px-4 py-2.5 rounded-lg text-sm flex items-center gap-1.5">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>
          Locate
        </button>
      </div>
    </div>
    <div>
      <label class="text-xs text-white/40 font-medium mb-1.5 block">Quick Zones</label>
      <div id="zoneChips" class="flex flex-wrap gap-1.5"></div>
    </div>
    <div class="flex items-center gap-3">
      <button id="scanBtn" onclick="startScan()" disabled class="btn-primary px-6 py-2.5 rounded-lg text-sm flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.348 14.651a3.75 3.75 0 010-5.303m5.304 0a3.75 3.75 0 010 5.303m-7.425 2.122a6.75 6.75 0 010-9.546m9.546 0a6.75 6.75 0 010 9.546M5.106 18.894c-3.808-3.808-3.808-9.98 0-13.788m13.788 0c3.808 3.808 3.808 9.98 0 13.788M12 12h.008v.008H12V12zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/></svg>
        Scan for Spaces
      </button>
      <span id="scanHint" class="text-xs text-white/20">Select a location first</span>
    </div>
  </div>

  <!-- Progress -->
  <div id="progressPanel" class="glass rounded-xl p-4 hidden">
    <div class="flex items-center gap-3 mb-3">
      <div class="w-2 h-2 rounded-full bg-brand-500 animate-pulse"></div>
      <span id="progressLabel" class="text-sm font-medium animate-pulse-bar">Scanning...</span>
    </div>
    <div class="w-full h-1.5 rounded-full bg-white/[.04] overflow-hidden">
      <div id="progressBar" class="h-full bg-brand-500 rounded-full transition-all duration-300" style="width:0%"></div>
    </div>
  </div>

  <!-- Tabs + Summary + Filter + Results -->
  <div id="resultsSection" class="hidden space-y-4">

    <!-- Tabs -->
    <div class="flex items-end gap-1 border-b border-white/[.04]">
      <button onclick="switchTab('nobroker')" id="tabNB" class="tab-btn active">
        Rental Listings <span id="tabNBCount" class="ml-1 text-[10px] opacity-60"></span>
      </button>
      <button onclick="switchTab('google')" id="tabG" class="tab-btn">
        Closed Businesses <span id="tabGCount" class="ml-1 text-[10px] opacity-60"></span>
      </button>
    </div>

    <!-- NoBroker Summary -->
    <div id="nbSummary" class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-7 gap-2">
      <div class="glass rounded-lg p-3 text-center"><div id="sTotal" class="text-2xl font-extrabold text-white">0</div><div class="text-[10px] text-white/30 mt-0.5">Total Spaces</div></div>
      <div class="glass rounded-lg p-3 text-center"><div id="sVacant" class="text-2xl font-extrabold text-emerald-400">0</div><div class="text-[10px] text-white/30 mt-0.5">Vacant</div></div>
      <div class="glass rounded-lg p-3 text-center"><div id="sHot" class="text-2xl font-extrabold text-red-400">0</div><div class="text-[10px] text-white/30 mt-0.5">HOT</div></div>
      <div class="glass rounded-lg p-3 text-center"><div id="sAvgRent" class="text-2xl font-extrabold text-brand-400">0</div><div class="text-[10px] text-white/30 mt-0.5">Avg Rent</div></div>
      <div class="glass rounded-lg p-3 text-center"><div id="sHE" class="text-2xl font-extrabold text-purple-400">0</div><div class="text-[10px] text-white/30 mt-0.5">HE Fit</div></div>
      <div class="glass rounded-lg p-3 text-center"><div id="sNCH" class="text-2xl font-extrabold text-emerald-400">0</div><div class="text-[10px] text-white/30 mt-0.5">NCH Fit</div></div>
      <div class="glass rounded-lg p-3 text-center"><div id="sBoth" class="text-2xl font-extrabold text-brand-400">0</div><div class="text-[10px] text-white/30 mt-0.5">Either</div></div>
    </div>

    <!-- Google Summary (hidden by default) -->
    <div id="gSummary" class="hidden grid grid-cols-2 sm:grid-cols-4 gap-2">
      <div class="glass rounded-lg p-3 text-center"><div id="gTotal" class="text-2xl font-extrabold text-white">0</div><div class="text-[10px] text-white/30 mt-0.5">Closed Places</div></div>
      <div class="glass rounded-lg p-3 text-center"><div id="gAvail" class="text-2xl font-extrabold text-emerald-400">0</div><div class="text-[10px] text-white/30 mt-0.5">Space Available</div></div>
      <div class="glass rounded-lg p-3 text-center"><div id="gHot" class="text-2xl font-extrabold text-red-400">0</div><div class="text-[10px] text-white/30 mt-0.5">HOT</div></div>
      <div class="glass rounded-lg p-3 text-center"><div id="gReplaced" class="text-2xl font-extrabold text-amber-400">0</div><div class="text-[10px] text-white/30 mt-0.5">Replaced</div></div>
    </div>

    <!-- NoBroker Filters -->
    <div id="nbFilters" class="glass rounded-xl p-3">
      <div class="flex flex-wrap items-center gap-3">
        <div class="flex items-center gap-1">
          <span class="text-[10px] text-white/25 mr-1">Score:</span>
          <button onclick="setNBFilter('score','all')" data-nf="score-all" class="chip chip-zone active text-[10px]">All</button>
          <button onclick="setNBFilter('score','HOT')" data-nf="score-HOT" class="chip chip-zone text-[10px]">HOT</button>
          <button onclick="setNBFilter('score','WARM')" data-nf="score-WARM" class="chip chip-zone text-[10px]">WARM</button>
        </div>
        <div class="flex items-center gap-1">
          <span class="text-[10px] text-white/25 mr-1">Brand:</span>
          <button onclick="setNBFilter('brand','all')" data-nf="brand-all" class="chip chip-zone active text-[10px]">All</button>
          <button onclick="setNBFilter('brand','HE')" data-nf="brand-HE" class="chip chip-zone text-[10px]">HE</button>
          <button onclick="setNBFilter('brand','NCH')" data-nf="brand-NCH" class="chip chip-zone text-[10px]">NCH</button>
        </div>
        <div class="flex items-center gap-1">
          <span class="text-[10px] text-white/25 mr-1">Rent:</span>
          <button onclick="setNBFilter('rent','all')" data-nf="rent-all" class="chip chip-zone active text-[10px]">All</button>
          <button onclick="setNBFilter('rent','25k')" data-nf="rent-25k" class="chip chip-zone text-[10px]">&lt;25K</button>
          <button onclick="setNBFilter('rent','50k')" data-nf="rent-50k" class="chip chip-zone text-[10px]">25-50K</button>
          <button onclick="setNBFilter('rent','1l')" data-nf="rent-1l" class="chip chip-zone text-[10px]">50K-1L</button>
          <button onclick="setNBFilter('rent','1l+')" data-nf="rent-1l+" class="chip chip-zone text-[10px]">1L+</button>
        </div>
        <div class="flex items-center gap-1">
          <span class="text-[10px] text-white/25 mr-1">Status:</span>
          <button onclick="setNBFilter('status','all')" data-nf="status-all" class="chip chip-zone active text-[10px]">All</button>
          <button onclick="setNBFilter('status','Vacant')" data-nf="status-Vacant" class="chip chip-zone text-[10px]">Vacant Only</button>
        </div>
        <div class="flex items-center gap-1 ml-auto">
          <span class="text-[10px] text-white/25 mr-1">Sort:</span>
          <select id="nbSort" onchange="applyNBFilters()" class="text-[11px] px-2 py-1 rounded-lg">
            <option value="score">Score (HOT first)</option>
            <option value="rent_asc">Rent (lowest)</option>
            <option value="rent_desc">Rent (highest)</option>
            <option value="sqft">Size (largest)</option>
            <option value="recent">Recently Listed</option>
          </select>
        </div>
        <button onclick="exportNBCSV()" class="btn-ghost text-[11px] px-3 py-1.5 rounded-lg flex items-center gap-1.5">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
          Export CSV
        </button>
      </div>
    </div>

    <!-- Google Filters (hidden by default) -->
    <div id="gFilters" class="glass rounded-xl p-3 hidden">
      <div class="flex flex-wrap items-center gap-3">
        <div class="flex items-center gap-1">
          <span class="text-[10px] text-white/25 mr-1">Score:</span>
          <button onclick="setGFilter('score','all')" data-gf="score-all" class="chip chip-zone active text-[10px]">All</button>
          <button onclick="setGFilter('score','HOT')" data-gf="score-HOT" class="chip chip-zone text-[10px]">HOT</button>
          <button onclick="setGFilter('score','WARM')" data-gf="score-WARM" class="chip chip-zone text-[10px]">WARM</button>
        </div>
        <div class="flex items-center gap-1">
          <span class="text-[10px] text-white/25 mr-1">Space:</span>
          <button onclick="setGFilter('avail','all')" data-gf="avail-all" class="chip chip-zone active text-[10px]">All</button>
          <button onclick="setGFilter('avail','available')" data-gf="avail-available" class="chip chip-zone text-[10px]">Available</button>
          <button onclick="setGFilter('avail','replaced')" data-gf="avail-replaced" class="chip chip-zone text-[10px]">Replaced</button>
        </div>
        <button onclick="exportGCSV()" class="btn-ghost text-[11px] px-3 py-1.5 rounded-lg flex items-center gap-1.5 ml-auto">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
          Export CSV
        </button>
      </div>
    </div>

    <!-- Results Grid -->
    <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-3"></div>
    <div id="emptyState" class="hidden glass rounded-xl p-12 text-center">
      <p class="text-white/30 text-sm" id="emptyMsg">No results</p>
    </div>
  </div>
</main>

<script>
const API = '/api/expansion-scan';
let resolved = null;
let nbLeads = [], gLeads = [];
let nbFiltered = [], gFiltered = [];
let nbFilters = { score:'all', brand:'all', rent:'all', status:'all' };
let gFilters = { score:'all', avail:'all' };
let activeTab = 'nobroker';
let presetZones = [];

// ─── Init ───────────────────────────
async function init() {
  try {
    const r = await fetch(`${API}?action=presets`);
    const d = await r.json();
    if (d.ok) presetZones = d.zones;
  } catch {}
  const el = document.getElementById('zoneChips');
  el.innerHTML = presetZones.map(z =>
    `<button onclick="selectZone('${z.name}',${z.lat},${z.lng})" class="chip chip-zone" data-zone="${z.name}">${z.name}</button>`
  ).join('');
}

// ─── Location ───────────────────────
function selectZone(name, lat, lng) {
  document.getElementById('locInput').value = name;
  document.querySelectorAll('[data-zone]').forEach(e => e.classList.remove('active'));
  document.querySelector(`[data-zone="${name}"]`)?.classList.add('active');
  resolved = { lat, lng, name };
  showGeo(`${lat.toFixed(4)}, ${lng.toFixed(4)}`, true);
  enableScan();
}

async function resolveLocation() {
  const q = document.getElementById('locInput').value.trim();
  if (!q) return;
  showGeo('Locating...', false);
  document.querySelectorAll('[data-zone]').forEach(e => e.classList.toggle('active', e.dataset.zone.toLowerCase() === q.toLowerCase()));
  try {
    const r = await fetch(`${API}?action=geocode&q=${encodeURIComponent(q)}`);
    const d = await r.json();
    if (d.ok) { resolved = { lat: d.lat, lng: d.lng, name: d.name || q }; showGeo(`${d.lat.toFixed(4)}, ${d.lng.toFixed(4)}`, true); enableScan(); }
    else { showGeo('Not found', false); resolved = null; }
  } catch { showGeo('Error', false); }
}

function showGeo(t, ok) { const e = document.getElementById('geoStatus'); e.textContent = t; e.className = `absolute right-2 top-1/2 -translate-y-1/2 text-[10px] ${ok ? 'text-emerald-400' : 'text-white/30'}`; }
function enableScan() { document.getElementById('scanBtn').disabled = false; document.getElementById('scanHint').textContent = `Ready — ${resolved.name}`; document.getElementById('scanHint').className = 'text-xs text-emerald-400/50'; }

// ─── Scan ───────────────────────────
async function startScan() {
  if (!resolved) return;
  const prog = document.getElementById('progressPanel');
  prog.classList.remove('hidden');
  document.getElementById('resultsSection').classList.add('hidden');
  document.getElementById('scanBtn').disabled = true;
  setProgress(5, 'Scanning NoBroker rental listings...');

  let pct = 5;
  const tick = setInterval(() => { pct = Math.min(pct + 3, 85); setProgress(pct, pct < 40 ? 'Fetching commercial rental listings from NoBroker...' : pct < 70 ? 'Scanning Google Places for closed businesses...' : 'Checking replacement status...'); }, 700);

  // Run both scans in parallel
  const [nbRes, gRes] = await Promise.all([
    fetch(API, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'scan_nobroker', lat:resolved.lat, lng:resolved.lng, location_name:resolved.name }) }).then(r=>r.json()).catch(()=>({ok:false})),
    fetch(API, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'scan', lat:resolved.lat, lng:resolved.lng, radius:3000, types:['restaurant','cafe','bakery','bar','meal_takeaway','meal_delivery'], location_name:resolved.name }) }).then(r=>r.json()).catch(()=>({ok:false})),
  ]);

  clearInterval(tick);
  setProgress(100, 'Done!');

  nbLeads = nbRes.ok ? nbRes.leads : [];
  gLeads = gRes.ok ? gRes.leads : [];

  // Update tab counts
  document.getElementById('tabNBCount').textContent = `(${nbLeads.length})`;
  document.getElementById('tabGCount').textContent = `(${gLeads.length})`;

  // NoBroker summary
  if (nbRes.ok && nbRes.summary) {
    const s = nbRes.summary;
    document.getElementById('sTotal').textContent = s.total;
    document.getElementById('sVacant').textContent = s.vacant_count;
    document.getElementById('sHot').textContent = s.by_score.HOT || 0;
    document.getElementById('sAvgRent').textContent = s.avg_rent ? `${Math.round(s.avg_rent/1000)}K` : '—';
    document.getElementById('sHE').textContent = s.by_brand['HE Fit'] || 0;
    document.getElementById('sNCH').textContent = s.by_brand['NCH Fit'] || 0;
    document.getElementById('sBoth').textContent = s.by_brand['HE + NCH'] || 0;
  }

  // Google summary
  if (gRes.ok && gRes.summary) {
    const s = gRes.summary;
    document.getElementById('gTotal').textContent = s.total;
    document.getElementById('gAvail').textContent = s.space_available;
    document.getElementById('gHot').textContent = s.by_score.HOT || 0;
    document.getElementById('gReplaced').textContent = s.replaced;
  }

  document.getElementById('resultsSection').classList.remove('hidden');
  setTimeout(() => prog.classList.add('hidden'), 500);
  document.getElementById('scanBtn').disabled = false;

  switchTab('nobroker');
  applyNBFilters();
}

function setProgress(p, l) { document.getElementById('progressBar').style.width = p+'%'; document.getElementById('progressLabel').textContent = l; }

// ─── Tabs ───────────────────────────
function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tabNB').classList.toggle('active', tab === 'nobroker');
  document.getElementById('tabG').classList.toggle('active', tab === 'google');
  document.getElementById('nbSummary').classList.toggle('hidden', tab !== 'nobroker');
  document.getElementById('gSummary').classList.toggle('hidden', tab !== 'google');
  document.getElementById('nbFilters').classList.toggle('hidden', tab !== 'nobroker');
  document.getElementById('gFilters').classList.toggle('hidden', tab !== 'google');
  if (tab === 'nobroker') applyNBFilters();
  else applyGFilters();
}

// ─── NoBroker Filters ───────────────
function setNBFilter(g, v) {
  nbFilters[g] = v;
  document.querySelectorAll(`[data-nf^="${g}-"]`).forEach(b => b.classList.toggle('active', b.dataset.nf === `${g}-${v}`));
  applyNBFilters();
}

function applyNBFilters() {
  let l = [...nbLeads];
  if (nbFilters.score !== 'all') l = l.filter(x => x.score === nbFilters.score);
  if (nbFilters.brand === 'HE') l = l.filter(x => x.brand_fit.includes('HE'));
  if (nbFilters.brand === 'NCH') l = l.filter(x => x.brand_fit.includes('NCH'));
  if (nbFilters.rent === '25k') l = l.filter(x => x.rent <= 25000);
  if (nbFilters.rent === '50k') l = l.filter(x => x.rent > 25000 && x.rent <= 50000);
  if (nbFilters.rent === '1l') l = l.filter(x => x.rent > 50000 && x.rent <= 100000);
  if (nbFilters.rent === '1l+') l = l.filter(x => x.rent > 100000);
  if (nbFilters.status === 'Vacant') l = l.filter(x => x.situation === 'Vacant');

  const sort = document.getElementById('nbSort').value;
  const so = { HOT:0, WARM:1, COLD:2 };
  if (sort === 'score') l.sort((a,b) => (so[a.score]-so[b.score]) || (a.rent-b.rent));
  else if (sort === 'rent_asc') l.sort((a,b) => a.rent-b.rent);
  else if (sort === 'rent_desc') l.sort((a,b) => b.rent-a.rent);
  else if (sort === 'sqft') l.sort((a,b) => (b.sqft||0)-(a.sqft||0));
  else if (sort === 'recent') l.sort((a,b) => (b.last_updated||'').localeCompare(a.last_updated||''));

  nbFiltered = l;
  renderCards(l, 'nb');
}

// ─── Google Filters ─────────────────
function setGFilter(g, v) {
  gFilters[g] = v;
  document.querySelectorAll(`[data-gf^="${g}-"]`).forEach(b => b.classList.toggle('active', b.dataset.gf === `${g}-${v}`));
  applyGFilters();
}

function applyGFilters() {
  let l = [...gLeads];
  if (gFilters.score !== 'all') l = l.filter(x => x.score === gFilters.score);
  if (gFilters.avail === 'available') l = l.filter(x => x.space_available);
  if (gFilters.avail === 'replaced') l = l.filter(x => !x.space_available);
  gFiltered = l;
  renderCards(l, 'google');
}

// ─── Card Rendering ─────────────────
function renderCards(leads, type) {
  const grid = document.getElementById('resultsGrid');
  const empty = document.getElementById('emptyState');
  if (!leads.length) { grid.innerHTML = ''; empty.classList.remove('hidden'); document.getElementById('emptyMsg').textContent = type === 'nb' ? 'No rental listings match filters' : 'No closed businesses found'; return; }
  empty.classList.add('hidden');
  grid.innerHTML = leads.map(l => type === 'nb' ? nbCard(l) : gCard(l)).join('');
}

function nbCard(l) {
  const scoreBadge = `<span class="badge badge-${l.score.toLowerCase()}">${l.score}</span>`;
  const brandBadge = l.brand_fit.includes('NCH') ? `<span class="badge badge-nch">${l.brand_fit}</span>` : `<span class="badge badge-he">${l.brand_fit}</span>`;
  const vacantBadge = l.situation === 'Vacant' ? `<span class="badge badge-vacant">Vacant</span>` : l.situation === 'Own Business' ? `<span class="badge badge-occupied">Occupied</span>` : '';
  const negBadge = l.negotiable ? `<span class="badge badge-neg">Negotiable</span>` : '';
  const typeBadge = `<span class="badge" style="background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.5)">${l.property_type_label}</span>`;
  const photos = l.photos.length ? l.photos.slice(0,3).map(u => `<img src="${esc(u)}" class="photo-thumb" loading="lazy" onerror="this.style.display='none'">`).join('') : '';
  const zones = (l.nearby_zones||[]).map(z => `<span class="text-[9px] px-1.5 py-0.5 rounded bg-white/[.04] text-white/30">${z}</span>`).join(' ');

  return `<div class="lead-card glass rounded-xl p-4 space-y-3 border border-transparent">
    <div class="flex flex-wrap items-center gap-1.5">${scoreBadge} ${brandBadge} ${typeBadge} ${vacantBadge} ${negBadge}</div>
    <div>
      <h3 class="text-sm font-bold text-white leading-tight">${esc(l.title || l.property_type_label + ' for Rent')}</h3>
      <p class="text-xs text-white/35 mt-1">${esc(l.address)}, ${esc(l.locality)}</p>
    </div>
    ${photos ? `<div class="flex gap-2 overflow-x-auto">${photos}</div>` : ''}
    <div class="grid grid-cols-3 gap-2 text-center">
      <div class="p-2 rounded-lg bg-white/[.02]"><div class="text-sm font-bold text-brand-400">${l.rent ? '\u20B9'+l.rent.toLocaleString('en-IN') : '—'}</div><div class="text-[9px] text-white/25">Rent/mo</div></div>
      <div class="p-2 rounded-lg bg-white/[.02]"><div class="text-sm font-bold text-white">${l.sqft ? l.sqft+' sqft' : 'Ask'}</div><div class="text-[9px] text-white/25">Built-up</div></div>
      <div class="p-2 rounded-lg bg-white/[.02]"><div class="text-sm font-bold text-white">${l.deposit ? '\u20B9'+l.deposit.toLocaleString('en-IN') : '—'}</div><div class="text-[9px] text-white/25">Deposit</div></div>
    </div>
    <div class="flex flex-wrap gap-x-4 gap-y-1 text-[11px] text-white/40">
      ${l.floor != null ? `<span>Floor: ${l.floor === 0 ? 'Ground' : l.floor}${l.total_floor ? '/'+l.total_floor : ''}</span>` : ''}
      ${l.furnishing ? `<span>Furnishing: ${l.furnishing}</span>` : ''}
      ${l.parking ? `<span>Parking: ${l.parking}</span>` : ''}
      ${l.available_from ? `<span>Available: ${l.available_from}</span>` : ''}
      ${l.last_updated ? `<span>Listed: ${l.last_updated}</span>` : ''}
    </div>
    ${l.owner_name ? `<div class="text-xs text-white/40">Owner: <span class="text-white/60 font-medium">${esc(l.owner_name)}</span></div>` : ''}
    ${zones ? `<div class="flex flex-wrap gap-1">${zones}</div>` : ''}
    <div class="flex flex-wrap gap-2 pt-1 border-t border-white/[.04]">
      <a href="${l.nobroker_url}" target="_blank" rel="noopener" class="btn-ghost text-[10px] px-2.5 py-1.5 rounded-lg flex items-center gap-1 no-underline">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 21h19.5m-18-18v18m10.5-18v18m6-13.5V21M6.75 6.75h.75m-.75 3h.75m-.75 3h.75m3-6h.75m-.75 3h.75m-.75 3h.75M6.75 21v-3.375c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21M3 3h12m-.75 4.5H21m-3.75 4.5H21"/></svg>
        View on NoBroker</a>
      <a href="${l.google_maps_url}" target="_blank" rel="noopener" class="btn-ghost text-[10px] px-2.5 py-1.5 rounded-lg flex items-center gap-1 no-underline">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/></svg>
        Maps</a>
    </div>
  </div>`;
}

function gCard(l) {
  const scoreBadge = `<span class="badge badge-${l.score.toLowerCase()}">${l.score}</span>`;
  const brandBadge = l.brand_fit.includes('NCH') ? `<span class="badge badge-nch">${l.brand_fit}</span>` : `<span class="badge badge-he">${l.brand_fit}</span>`;
  const statusBadge = l.business_status === 'CLOSED_TEMPORARILY' ? `<span class="badge badge-temp">Temporarily Closed</span>` : `<span class="badge badge-perm">Permanently Closed</span>`;
  const availBadge = l.space_available ? `<span class="badge badge-available">Space Likely Available</span>` : `<span class="badge badge-replaced">Replaced</span>`;
  const days = l.days_closed;
  const closureInfo = days ? (days > 30 ? `~${Math.floor(days/30)}mo ago` : `${days}d ago`) : '—';
  const stars = l.rating ? '\u2605'.repeat(Math.round(l.rating)) + '\u2606'.repeat(5-Math.round(l.rating)) : '';
  let replacedHTML = '';
  if (l.replaced_by) { replacedHTML = `<div class="mt-2 p-2 rounded-lg bg-amber-500/[.06] border border-amber-500/10"><div class="text-[10px] text-amber-400/60 font-medium mb-0.5">New Business Here</div><div class="text-xs text-amber-300">${esc(l.replaced_by.name)}</div>${l.replaced_by.rating ? `<div class="text-[10px] text-white/30">Rating: ${l.replaced_by.rating}</div>` : ''}</div>`; }
  return `<div class="lead-card glass rounded-xl p-4 space-y-3 border border-transparent">
    <div class="flex flex-wrap items-center gap-1.5">${scoreBadge} ${brandBadge} ${statusBadge} ${availBadge}</div>
    <div><h3 class="text-sm font-bold text-white leading-tight">${esc(l.name)}</h3><p class="text-xs text-white/35 mt-1">${esc(l.address)}</p></div>
    <div class="grid grid-cols-3 gap-2 text-center">
      <div class="p-1.5 rounded-lg bg-white/[.02]"><div class="text-xs font-bold text-white">${l.rating||'—'}</div><div class="text-[9px] text-white/25">${stars}</div></div>
      <div class="p-1.5 rounded-lg bg-white/[.02]"><div class="text-xs font-bold text-white">${(l.user_ratings_total||0).toLocaleString()}</div><div class="text-[9px] text-white/25">Reviews</div></div>
      <div class="p-1.5 rounded-lg bg-white/[.02]"><div class="text-xs font-bold text-white">${closureInfo}</div><div class="text-[9px] text-white/25">Last Active</div></div>
    </div>
    ${l.phone ? `<div class="text-xs text-white/40 flex items-center gap-2"><svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z"/></svg><a href="tel:${l.phone}" class="link">${l.phone}</a></div>` : ''}
    ${replacedHTML}
    <div class="flex flex-wrap gap-2 pt-1 border-t border-white/[.04]">
      <a href="${l.google_maps_url}" target="_blank" rel="noopener" class="btn-ghost text-[10px] px-2.5 py-1.5 rounded-lg flex items-center gap-1 no-underline">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/></svg>
        View on Maps</a>
      <a href="${l.nobroker_url}" target="_blank" rel="noopener" class="btn-ghost text-[10px] px-2.5 py-1.5 rounded-lg flex items-center gap-1 no-underline">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 21h19.5m-18-18v18m10.5-18v18m6-13.5V21M6.75 6.75h.75m-.75 3h.75m-.75 3h.75m3-6h.75m-.75 3h.75m-.75 3h.75M6.75 21v-3.375c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21M3 3h12m-.75 4.5H21m-3.75 4.5H21"/></svg>
        NoBroker</a>
      ${l.phone ? `<a href="https://wa.me/91${l.phone.replace(/\\D/g,'').replace(/^91/,'')}" target="_blank" rel="noopener" class="btn-ghost text-[10px] px-2.5 py-1.5 rounded-lg no-underline">WhatsApp</a>` : ''}
    </div>
  </div>`;
}

function esc(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }

// ─── CSV Exports ────────────────────
function exportNBCSV() {
  if (!nbFiltered.length) return;
  const h = ['Title','Type','Rent','Deposit','Sqft','Brand Fit','Score','Situation','Address','Locality','Owner','Floor','Furnishing','Available From','Listed','NoBroker URL','Google Maps'];
  const q = s => `"${String(s||'').replace(/"/g,'""')}"`;
  const rows = nbFiltered.map(l => [q(l.title),l.property_type_label,l.rent,l.deposit,l.sqft||'',l.brand_fit,l.score,l.situation,q(l.address),q(l.locality),q(l.owner_name),l.floor!=null?l.floor:'',l.furnishing,l.available_from||'',l.last_updated||'',l.nobroker_url,l.google_maps_url].join(','));
  dl([h.join(','),...rows].join('\n'), `nobroker_leads_${new Date().toISOString().slice(0,10)}.csv`);
}

function exportGCSV() {
  if (!gFiltered.length) return;
  const h = ['Name','Status','Score','Brand Fit','Space Available','Address','Rating','Reviews','Phone','Last Active','Replaced By','Google Maps','NoBroker'];
  const q = s => `"${String(s||'').replace(/"/g,'""')}"`;
  const rows = gFiltered.map(l => [q(l.name),l.business_status,l.score,l.brand_fit,l.space_available?'Yes':'No',q(l.address),l.rating||'',l.user_ratings_total,l.phone||'',l.last_review_date||'',l.replaced_by?q(l.replaced_by.name):'',l.google_maps_url,l.nobroker_url].join(','));
  dl([h.join(','),...rows].join('\n'), `closed_places_${new Date().toISOString().slice(0,10)}.csv`);
}

function dl(csv, name) { const b = new Blob([csv],{type:'text/csv'}); const u = URL.createObjectURL(b); const a = document.createElement('a'); a.href=u; a.download=name; a.click(); URL.revokeObjectURL(u); }

init();
</script>
