name = "hn-razorpay-webhook"
main = "index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
account_id = "3d506f78b08b3d95c667b82ef6ee7ab8"

# Event-driven — Razorpay POSTs to our public URL. No cron.
# Set webhook URL in Razorpay Dashboard → Settings → Webhooks:
#   https://hn-razorpay-webhook.<account>.workers.dev/
# Events to subscribe:
#   - payment.captured        (customer paid; money in Razorpay balance)
#   - payment.failed          (log only)
#   - payout.processed        (money leaving Razorpay balance to a payee)
#   - payout.reversed         (reversal credit)
#   - settlement.processed    (Razorpay → HDFC transfer; reconciles to IMPS credit)
#   - refund.processed        (money returned to customer)

[[d1_databases]]
binding = "DB"
database_name = "hn-hiring"
database_id = "a0107321-790a-4d46-ac3c-a54a676c6bcb"

# Secrets (wrangler secret put <NAME> --config workers/razorpay-webhook/wrangler.toml):
#   RAZORPAY_WEBHOOK_SECRET   — shared secret copied from Razorpay Dashboard
#                               when creating the webhook. Used for HMAC-SHA256
#                               verification of every POST.
#   DASHBOARD_KEY             — reused auth key for GET /status.
