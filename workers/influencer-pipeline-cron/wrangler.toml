name = "hn-influencer-pipeline-cron"
main = "src/index.js"
compatibility_date = "2024-09-23"

# Cost-conscious daily-only schedule (pay-as-you-go Apify, ~$25-30/mo).
# All 4 triggers fire ONCE per day, 30 min apart so each completes cleanly.
#
# 22:00 UTC = 03:30 IST  · discovery (today's vector: hashtag | geotag | tagged | comments)
# 22:30 UTC = 04:00 IST  · enrichment (single 100-profile batch — drains queue)
# 23:00 UTC = 04:30 IST  · scoring (no-op, reserved for future cached scoring)
# 04:30 UTC = 10:00 IST  · outreach-wave (50 unique creators across channels)
[triggers]
crons = [
  "0 22 * * *",
  "30 22 * * *",
  "0 23 * * *",
  "30 4 * * *"
]

# Secrets (set via `wrangler secret put`):
#   CRON_TOKEN — must match Pages env CRON_TOKEN (same as hr-cron uses)
