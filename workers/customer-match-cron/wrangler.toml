name = "hn-customer-match-cron"
main = "src/index.js"
compatibility_date = "2024-09-23"

# Cron schedule (UTC). IST = UTC + 5:30
# Daily upload after the WABA inflow window closes.
# 23:30 UTC = 05:00 IST  (after hr-cron 03:00 IST run, after keyword-cron 04:00 IST)
[triggers]
crons = ["30 23 * * *"]

# Required secret (paste contents of ~/.hn-data-manager-sa.json):
#   npx wrangler secret put DATA_MANAGER_SA_JSON
