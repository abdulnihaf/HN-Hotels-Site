name = "hn-spend-sync-cron"
main = "index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
account_id = "3d506f78b08b3d95c667b82ef6ee7ab8"

# NOTE: No cron trigger on this worker. CF free-tier cap is 5 crons per
# ACCOUNT (not per worker) and we're at the limit. Instead the
# attendance-cron worker (runs every 15 min anyway) pings this worker's
# fetch handler with DASHBOARD_KEY. 15-min freshness is plenty for
# spend data. To self-host the trigger, uncomment:
# [triggers]
# crons = ["*/5 * * * *"]

# D1 binding — same database as the Pages project (hn-hiring).
[[d1_databases]]
binding = "DB"
database_name = "hn-hiring"
database_id = "a0107321-790a-4d46-ac3c-a54a676c6bcb"

# Secrets (wrangler secret put <NAME> --config workers/spend-sync-cron/wrangler.toml):
#   ODOO_KEY_HNHOTELS   — API key for odoo.hnhotels.in (admin uid=2)
#   ODOO_KEY_OPS_HAMZA  — API key for ops.hamzahotel.com (admin uid=2, legacy NCH v2 expenses)
#   DASHBOARD_KEY       — for manual /?key=... trigger
[vars]
# No non-secret vars needed
