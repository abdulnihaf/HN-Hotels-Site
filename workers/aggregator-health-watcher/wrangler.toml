name = "hn-aggregator-health-watcher"
main = "src/index.js"
compatibility_date = "2024-09-23"

# Cron: every 5 min, year-round.
# Operating-hours suppression (02:00–09:00 IST for delivery health) is enforced
# in the Pages Function, not here. Dine-health alerts fire any time.
[triggers]
crons = ["*/5 * * * *"]

# Secrets (set via `wrangler secret put`):
#   WATCHER_TOKEN — must match hnhotels.in Pages env WATCHER_TOKEN
#                   (separate from shared CRON_TOKEN to keep this lane's auth isolated)
