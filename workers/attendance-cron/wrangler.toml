name = "hn-attendance-cron"
main = "index.js"
compatibility_date = "2024-09-23"
account_id = "3d506f78b08b3d95c667b82ef6ee7ab8"

# Every 15 min, all UTC hours. Worker internally skips the IST 03:00–04:59
# idle window. Full-hour schedule is needed because HE shift-day runs until
# 09:00 IST next day — post-midnight check-outs must be processed.
[triggers]
crons = ["*/15 * * * *"]

# Secrets (set via: wrangler secret put <NAME> --config workers/attendance-cron/wrangler.toml)
# ADMIN_PIN       — HR Ops dashboard admin PIN (4 digits, Nihaf)
# SPEND_SYNC_KEY  — DASHBOARD_KEY of hn-spend-sync-cron (piggyback sync every 15 min)
# PAGES_URL       — set as plain var below; override via secret if domain changes
[vars]
PAGES_URL = "https://hnhotels.in"
SPEND_SYNC_URL = "https://hn-spend-sync-cron.nihafwork.workers.dev"
