name = "hn-bank-feed-email"
main = "index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
account_id = "3d506f78b08b3d95c667b82ef6ee7ab8"

# No cron trigger — this Worker is invoked by Cloudflare Email Routing
# whenever an email arrives at hdfc-alerts@hnhotels.in. CF Email Workers
# are free and don't count against the 5-cron account cap.
#
# Email Routing → Destinations → "Send to a Worker" → pick this worker.

[[d1_databases]]
binding = "DB"
database_name = "hn-hiring"
database_id = "a0107321-790a-4d46-ac3c-a54a676c6bcb"

# Trigger fetch handler for manual reparse of raw_body rows (useful when
# regex is updated). GET /?key=<DASHBOARD_KEY>&mode=reparse
# Secrets:
#   DASHBOARD_KEY   — shared secret, reuse from other workers.
