name = "hn-bank-feed-email"
main = "index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
account_id = "3d506f78b08b3d95c667b82ef6ee7ab8"

# Cron: re-parse any partial/quarantined rows (from email format changes,
# base64 bodies, etc.) every 4 hours. Promotes rows to parse_status='parsed'
# so they flow into balance and rollup queries automatically.
[triggers]
crons = ["0 */4 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "hn-hiring"
database_id = "a0107321-790a-4d46-ac3c-a54a676c6bcb"

# Re-create Gmail inbox visibility after HDFC InstaAlerts is repointed to
# hdfc-alerts@alerts.hnhotels.in directly. Uncomment AFTER verifying the
# destination in CF Email Routing → Destination addresses (CF emails a
# confirmation link; click it on Gmail). Without that verification,
# message.forward() throws and the warning lands in worker logs (the
# DB insert still succeeds — forward is best-effort).
# [vars]
# FORWARD_TO = "nihafwork@gmail.com"

# Trigger fetch handler for manual reparse of raw_body rows (useful when
# regex is updated). GET /?key=<DASHBOARD_KEY>&mode=reparse
# Secrets:
#   DASHBOARD_KEY   — shared secret, reuse from other workers.
