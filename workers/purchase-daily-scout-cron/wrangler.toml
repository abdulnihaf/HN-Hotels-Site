name = "hn-purchase-daily-scout-cron"
main = "src/index.js"
compatibility_date = "2024-09-01"
compatibility_flags = ["nodejs_compat"]

# 03:30 UTC = 09:00 IST every day (production schedule).
# Plus a temporary "every 5 minutes" entry so we can validate the
# scheduled() code path TODAY without waiting for 09:00 IST tomorrow.
# Free-tier scheduled events have a 15-minute wall-clock budget — plenty
# for the 76-material × concurrency-2 loop (~10 min). The /trigger fetch
# handler hit a 30-second waitUntil ceiling earlier; scheduled() does not.
# REMOVE the "*/5 * * * *" entry after validation.
[triggers]
crons = ["30 3 * * *", "*/5 * * * *"]

[vars]
HN_API_BASE = "https://hnhotels.in"
# Empty scope = all categories. Cron now covers every RM with an Odoo product_code.
DEFAULT_SCOPE = ""
DEFAULT_PIN = "0305"  # Nihaf admin — Worker-only call, not exposed externally.
DEFAULT_SOURCES = "HYPERPURE,BIGBASKET,JIOMART,BLINKIT,FLIPKART_MINUTES"
# Concurrency 2: each refresh-material call internally spawns 5 parallel VPS
# Playwright contexts (~100MB each). Concurrency 3 OOMed the VPS earlier today;
# 2 holds peak memory at ~750MB. 76 materials at concurrency 2 take ~10 min,
# fits CF's 15-min scheduled-event budget.
DEFAULT_CONCURRENCY = "2"
STAGGER_MS = "0"
MAX_MATERIALS = "200"
