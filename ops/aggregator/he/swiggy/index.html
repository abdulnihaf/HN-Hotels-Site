<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HE · Swiggy — HN Aggregator</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08080f;--surface:#0f0f1e;--surface2:#13132a;--surface3:#1a1a35;
  --border:#1d1d38;--border2:#28284a;
  --text:#e0e0e0;--dim:#888;--faint:#555;
  --sw:#fc8019;--zm:#e23744;
  --he:#ff7043;--accent:#ff6b35;
  --green:#4caf50;--orange:#ff9800;--red:#f44336;--yellow:#ffd54f;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.45;min-height:100vh}
.wrap{max-width:1600px;margin:0 auto;padding:0 18px 60px}
a{color:var(--dim);text-decoration:none}a:hover{color:var(--accent)}

/* HEADER */
.hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border)}
.hdr-l{display:flex;align-items:center;gap:14px}
.back{font-size:12px;color:var(--dim)}.back:hover{color:var(--accent)}
.title{font-size:16px;font-weight:700;color:var(--he);letter-spacing:-0.3px}
.title .plat{color:var(--sw);margin-left:6px}
.title small{display:block;font-size:10px;color:var(--dim);font-weight:400;margin-top:2px;letter-spacing:0}
.hdr-r{display:flex;align-items:center;gap:12px;font-size:11px;color:var(--dim)}
.hdr-r .upd{font-size:11px}
.btn{background:transparent;border:1px solid var(--border2);color:var(--dim);padding:5px 12px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:500;transition:all .15s;font-family:inherit}
.btn:hover{border-color:var(--accent);color:var(--accent)}

/* PERIOD FILTER */
.dbar{display:flex;gap:6px;padding:14px 0 12px;flex-wrap:wrap}
.dfbtn{padding:6px 16px;background:var(--surface);border:1px solid var(--border);border-radius:18px;color:var(--dim);cursor:pointer;font-size:11px;font-weight:500;transition:all .15s;white-space:nowrap;font-family:inherit}
.dfbtn:hover{border-color:var(--border2);color:var(--text)}
.dfbtn.active{background:rgba(255,107,53,.14);border-color:var(--accent);color:var(--accent);font-weight:600}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px;overflow-x:auto}
.tab{padding:11px 18px;cursor:pointer;font-size:12px;font-weight:600;color:var(--dim);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;user-select:none;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* PANES */
.pane{display:none}.pane.active{display:block}

/* SCOPE BAR */
.scope-bar{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-bottom:14px;font-size:11px}
.scope{font-size:10px;font-weight:700;padding:3px 9px;border-radius:3px;letter-spacing:.4px;text-transform:uppercase}
.scope.good{background:rgba(76,175,80,.14);color:var(--green)}
.scope.warn{background:rgba(255,213,79,.14);color:var(--yellow)}
.scope.bad{background:rgba(244,67,54,.14);color:var(--red)}
.scope-note{color:var(--dim);font-size:11px}

/* GRIDS */
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(max-width:1100px){.grid4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:700px){.grid4,.grid3,.grid2{grid-template-columns:1fr}}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px;display:flex;flex-direction:column;gap:8px;transition:border-color .15s}
.card:hover{border-color:var(--border2)}
.card-h{font-size:10px;font-weight:700;color:var(--dim);letter-spacing:.6px}
.card-b{display:flex;flex-direction:column;gap:5px}
.kv{display:flex;justify-content:space-between;align-items:baseline;font-size:12px;border-bottom:1px solid var(--very-faint, #1a1a30);padding:3px 0}
.kv:last-child{border-bottom:none}
.kv .k{color:var(--dim);font-size:11px}
.kv .v{font-weight:600;font-size:13px;color:var(--text)}
.kv .v small{font-size:10px;color:var(--dim);font-weight:400;margin-left:6px}
.kv .v.warn{color:var(--orange)}.kv .v.bad{color:var(--red)}.kv .v.good{color:var(--green)}
.big-num{font-size:28px;font-weight:700;letter-spacing:-0.6px;color:var(--text)}
.big-status{font-size:18px;font-weight:700;padding:6px 0;letter-spacing:.4px}
.big-status.good{color:var(--green)}.big-status.bad{color:var(--red)}
.diag{margin-top:4px;font-size:10px;padding:5px 8px;border-radius:4px;font-weight:500}
.diag-good{color:var(--green)}.diag-bad{background:rgba(255,152,0,.1);color:var(--orange);padding:5px 8px;border-radius:4px;display:inline-block}
.not-cap{color:var(--faint);font-size:11px;font-style:italic;padding:6px 0}

/* EMPTY / ERROR STATES */
.empty,.err{padding:32px;text-align:center;background:var(--surface);border:1px dashed var(--border2);border-radius:8px;color:var(--dim)}
.empty h3{color:var(--text);font-size:14px;margin-bottom:6px;font-weight:600}
.empty p{font-size:12px}
.err{color:var(--red);border-color:var(--red)}

/* ORDERS TABLE */
.orders-table{width:100%;border-collapse:collapse;font-size:11px;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.orders-table thead{background:var(--surface2)}
.orders-table th{text-align:left;padding:10px 8px;font-size:10px;font-weight:700;color:var(--dim);letter-spacing:.4px;border-bottom:1px solid var(--border)}
.orders-table th.num{text-align:right}
.orders-table td{padding:8px;border-bottom:1px solid var(--very-faint, #1a1a30);vertical-align:middle}
.orders-table td.num{text-align:right;font-weight:600}
.orders-table tbody tr:hover{background:var(--surface2)}
.status{font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px}
.status.good{background:rgba(76,175,80,.14);color:var(--green)}
.status.warn{background:rgba(255,152,0,.14);color:var(--orange)}
.status.bad{background:rgba(244,67,54,.14);color:var(--red)}
.issues{color:var(--orange);font-size:10px;font-weight:600}

/* PIPELINE DOT */
.pipeline{display:flex;align-items:center;gap:5px;font-size:11px}
.pdot{width:7px;height:7px;border-radius:50%;background:var(--green)}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-l">
      <a href="/ops/aggregator/" class="back">← all aggregator</a>
      <div class="title">
        <span id="brand">HE</span> · <span class="plat" id="platform">Swiggy</span>
        <small>delivery operations · period: <span id="period-display">today</span></small>
      </div>
    </div>
    <div class="hdr-r">
      <div class="pipeline"><span class="pdot"></span><span>updated <span id="updated" class="upd">—</span></span></div>
      <button class="btn" id="refresh">↻ Refresh</button>
    </div>
  </div>

  <div class="dbar" id="period-bar">
    <button class="dfbtn" data-period="today">Today</button>
    <button class="dfbtn" data-period="yesterday">Yesterday</button>
    <button class="dfbtn" data-period="thisweek">This Week</button>
    <button class="dfbtn" data-period="lastweek">Last Week</button>
    <button class="dfbtn" data-period="month">Month</button>
  </div>

  <div class="tabs">
    <div class="tab" data-tab="growth">Growth &amp; Listing</div>
    <div class="tab" data-tab="ops">Ops Health</div>
    <div class="tab" data-tab="sales">Sales</div>
    <div class="tab" data-tab="finance">Finance</div>
    <div class="tab" data-tab="reviews">Reviews</div>
    <div class="tab" data-tab="orders">Orders</div>
  </div>

  <div id="main">
    <div class="pane" id="pane-growth"></div>
    <div class="pane" id="pane-ops"></div>
    <div class="pane" id="pane-sales"></div>
    <div class="pane" id="pane-finance"></div>
    <div class="pane" id="pane-reviews"></div>
    <div class="pane" id="pane-orders"></div>
  </div>
</div>

<script>window.HN_AGG = { brand: 'he', platform: 'swiggy' };</script>
<script src="/ops/aggregator/he/_shared.js"></script>
</body>
</html>
