<!DOCTYPE html>
<!-- HE Chicken Price Entry — Phase 1 — daily rate × delivered model, build 2026-05-23 -->
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MN Broilers — Daily Cost Entry</title>
<style>
:root{
  --bg:#0a0a0f;--card:#14141f;--card2:#1a1a2e;--border:#2a2a3e;
  --text:#e0e0f0;--text2:#8888aa;--text3:#5a5a72;
  --accent:#6366f1;--green:#22c55e;--red:#ef4444;--orange:#f59e0b;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.ctr{max-width:560px;margin:0 auto;padding:12px}

.hdr{padding:10px 0 14px;border-bottom:1px solid var(--border);margin-bottom:14px}
.hdr h1{font-size:18px;font-weight:700;margin-bottom:2px}
.hdr .sub{font-size:11px;color:var(--text2)}

/* PIN gate */
.pin-gate{padding:40px 20px;text-align:center}
.pin-gate input{font-size:24px;text-align:center;width:160px;padding:12px;background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:8px;font-family:inherit;letter-spacing:8px;min-height:44px}
.pin-gate button{margin-top:14px;background:var(--accent);color:#fff;border:none;padding:12px 32px;font-size:14px;font-weight:600;border-radius:8px;cursor:pointer;font-family:inherit;min-height:44px}
.pin-gate .err{color:var(--red);margin-top:10px;font-size:12px}

/* Progress strip */
.progress{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px}
.progress .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.progress .stat{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums}
.progress .stat .done{color:var(--green)}
.progress .bar{height:6px;background:var(--card2);border-radius:3px;overflow:hidden}
.progress .bar .fill{height:100%;background:linear-gradient(90deg,var(--green),var(--accent));transition:width .3s}

/* Day cards */
.day{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;transition:border .15s}
.day.complete{border-color:rgba(34,197,94,.4)}
.day .head{padding:12px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none}
.day .head:hover{background:rgba(255,255,255,.02)}
.day .head .label{font-size:14px;font-weight:700}
.day .head .label .day-name{color:var(--text2);font-weight:400;font-size:12px;margin-left:6px}
.day .head .badge{font-size:11px;padding:3px 8px;border-radius:10px;background:rgba(245,158,11,.15);color:var(--orange);font-weight:600}
.day .head .badge.done{background:rgba(34,197,94,.15);color:var(--green)}
.day .head::after{content:'▾';font-size:10px;color:var(--text2);margin-left:8px;transition:transform .15s}
.day.open .head::after{transform:rotate(180deg)}
.day .body{display:none;padding:0 14px 14px;border-top:1px solid var(--border)}
.day.open .body{display:block}

/* Daily rate input — prominent at top of day */
.rate-row{background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.25);border-radius:8px;padding:10px 12px;margin:10px 0 12px}
.rate-row label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px}
.rate-row .rate-input-wrap{display:flex;align-items:center;gap:6px}
.rate-row .rate-input-wrap .pre{color:var(--text2);font-size:13px}
.rate-row .rate-input-wrap .suf{color:var(--text2);font-size:11px;margin-left:auto}
.rate-row input{flex:1;padding:8px 10px;background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:6px;font-family:inherit;font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;min-height:40px;text-align:right;max-width:120px}
.rate-row input:focus{outline:none;border-color:var(--accent)}

/* Cut rows */
.line{padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.line:last-of-type{border-bottom:none}
.line .row1{display:grid;grid-template-columns:1fr 80px 80px;gap:8px;align-items:center}
.line .row2{display:flex;justify-content:space-between;margin-top:4px;font-size:11px;color:var(--text2);font-variant-numeric:tabular-nums}
.line .row2 .effective{color:var(--text);font-weight:600}
.line .cut{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;text-transform:capitalize}
.line .cut::before{content:'';width:7px;height:7px;border-radius:2px;background:var(--text2);flex-shrink:0}
.line.shawarma .cut::before{background:#f59e0b}
.line.boneless .cut::before{background:#6366f1}
.line.grill .cut::before{background:#ef4444}
.line.kebab .cut::before{background:#22c55e}
.line.tandoori .cut::before{background:#ec4899}
.line.tangdi .cut::before{background:#a855f7}
.line.lollipop .cut::before{background:#06b6d4}
.line .yielded-disp{font-size:11px;color:var(--text3);text-align:right}
.line .yielded-disp .v{color:var(--text2);font-weight:600;font-variant-numeric:tabular-nums}
.line input{padding:7px 8px;font-size:13px;text-align:right;background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:6px;font-family:inherit;min-height:36px;width:100%;font-variant-numeric:tabular-nums}
.line input:focus{outline:none;border-color:var(--accent);background:rgba(99,102,241,.08)}
.line input.kg-yielded{background:transparent;border-color:transparent;color:var(--text2);text-align:right;font-weight:600}

/* Add-cut row */
.add-row{background:rgba(255,255,255,.02);border:1px dashed var(--border);border-radius:8px;padding:10px;margin-top:12px}
.add-row .add-label{font-size:10px;text-transform:uppercase;color:var(--text2);letter-spacing:.5px;margin-bottom:6px}
.add-row .add-grid{display:grid;grid-template-columns:1fr 70px 80px 38px;gap:6px;align-items:center}
.add-row select, .add-row input{padding:8px;font-size:12px;background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:6px;font-family:inherit;min-height:36px}
.add-row select{cursor:pointer}
.add-row input{text-align:right}
.add-btn{background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:18px;font-weight:700;cursor:pointer;min-height:36px}
.add-btn:hover{opacity:.85}

/* Day footer */
.day-totals{margin-top:12px;padding-top:10px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:13px}
.day-totals .v{font-weight:800;font-variant-numeric:tabular-nums}
.day-totals .v.big{color:var(--accent);font-size:16px}

.day-actions{display:flex;gap:8px;margin-top:12px}
.day-actions button{flex:1;padding:10px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:12px;font-weight:600;border-radius:8px;cursor:pointer;font-family:inherit;min-height:40px}
.day-actions button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.day-actions button:hover{opacity:.9}

.banner{padding:10px 14px;border-radius:8px;margin-bottom:12px;font-size:12px;font-weight:500}
.banner.ok{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.banner.err{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.3)}

.help-bar{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:11px;line-height:1.5;color:var(--text2)}
.help-bar strong{color:var(--text)}

.loading{text-align:center;padding:40px;color:var(--text2);font-size:13px}

@media(max-width:480px){
  .line .row1{grid-template-columns:1fr 65px 70px;gap:6px}
  .add-row .add-grid{grid-template-columns:1fr 55px 65px 36px;gap:4px}
}
</style>
</head><body>
<div class="ctr">

<div class="hdr">
  <h1>MN Broilers — Daily Cost Entry</h1>
  <div class="sub">Hamza Express</div>
</div>

<div id="app">
  <div class="loading">Loading…</div>
</div>

</div>

<script>
const API = '/api/chicken-ops';
const CUTS = ['boneless','shawarma','kebab','tandoori','grill','tangdi','lollipop'];
let PIN = sessionStorage.getItem('chickenPriceEntryPIN') || '';
let DATA = null;

async function init() {
  if (!PIN) return renderPinGate();
  await loadQueue();
}

function renderPinGate(err = '') {
  document.getElementById('app').innerHTML = `
    <div class="pin-gate">
      <h2 style="font-size:14px;margin-bottom:14px;color:var(--text2)">Enter your PIN</h2>
      <input type="password" inputmode="numeric" pattern="[0-9]*" maxlength="4" id="pinIn" autofocus>
      <br>
      <button onclick="trySubmitPin()">Continue</button>
      ${err ? `<div class="err">${err}</div>` : ''}
    </div>`;
  document.getElementById('pinIn').addEventListener('keydown', e => {
    if (e.key === 'Enter') trySubmitPin();
  });
}

window.trySubmitPin = function() {
  const pin = document.getElementById('pinIn').value;
  if (pin.length !== 4) return renderPinGate('PIN must be 4 digits');
  PIN = pin;
  sessionStorage.setItem('chickenPriceEntryPIN', pin);
  loadQueue();
};

async function loadQueue() {
  try {
    const r = await fetch(`${API}?action=price-backfill-queue&brand=HE`);
    DATA = await r.json();
    if (!DATA.success) throw new Error(DATA.error || 'Load failed');
    renderApp();
  } catch (e) {
    document.getElementById('app').innerHTML = `<div class="banner err">Could not load: ${e.message}</div>`;
  }
}

function renderApp() {
  const days = DATA.days || [];
  const totalDays = days.length;
  const completeDays = days.filter(d => d.complete).length;
  const pct = totalDays > 0 ? Math.round(completeDays / totalDays * 100) : 0;

  let html = '';

  html += `<div class="progress">
    <div class="top">
      <div class="stat"><span class="done">${completeDays}</span><span style="color:var(--text3)">/${totalDays}</span> days priced</div>
      <div style="font-size:11px;color:var(--text2)">${totalDays - completeDays} pending</div>
    </div>
    <div class="bar"><div class="fill" style="width:${pct}%"></div></div>
  </div>`;

  html += `<div class="help-bar">
    Per day: enter the <strong>daily rate ₹/kg</strong> from MN's bill, then <strong>delivered kg</strong> per cut (the kg MN weighed, not the yielded usable kg).
    Cost = delivered × rate. Effective ₹/kg of usable meat = cost ÷ yielded kg. Saved on tap.
  </div>`;

  html += days.map((d, idx) => renderDay(d, idx === 0 && !d.complete)).join('');

  document.getElementById('app').innerHTML = html;
}

function renderDay(day, openByDefault) {
  const dayLabel = formatDateLabel(day.date);
  const isComplete = day.complete;
  const openCls = openByDefault ? 'open' : '';
  const completeCls = isComplete ? 'complete' : '';
  const dailyRateRupees = day.daily_rate_paise ? (day.daily_rate_paise / 100).toFixed(2) : '';
  const pendingCount = day.lines.filter(l => !l.delivered_kg).length;
  const badgeText = isComplete ? '✓ done' : `${pendingCount} pending`;
  const badgeCls = isComplete ? 'badge done' : 'badge';

  const lineRows = day.lines.map(line => {
    const yielded = (line.purchased_kg || 0).toFixed(2);
    const deliveredVal = line.delivered_kg ?? '';
    const cost = line.cost_paise ? Math.round(line.cost_paise/100) : null;
    const effective = line.price_per_kg_paise ? Math.round(line.price_per_kg_paise/100) : null;
    return `<div class="line ${line.cut}" data-cut="${line.cut}">
      <div class="row1">
        <span class="cut">${line.cut}</span>
        <span class="yielded-disp">yielded<br><span class="v">${yielded} kg</span></span>
        <input type="number" inputmode="decimal" class="delivered-input"
               placeholder="delivered" value="${deliveredVal}"
               data-date="${day.date}" data-cut="${line.cut}" min="0" step="0.1">
      </div>
      <div class="row2" id="calc-${day.date}-${line.cut}">
        <span>Cost: <span class="effective">${cost!==null ? '₹'+cost : '—'}</span></span>
        <span>Effective: <span class="effective">${effective!==null ? '₹'+effective+'/kg' : '—'}</span></span>
      </div>
    </div>`;
  }).join('');

  const usedCuts = day.lines.map(l => l.cut);
  const availableCuts = CUTS.filter(c => !usedCuts.includes(c));
  const addRow = availableCuts.length > 0 ? `
    <div class="add-row">
      <div class="add-label">Add a cut MN delivered but Odoo missed</div>
      <div class="add-grid">
        <select id="add-${day.date}">
          <option value="">— pick cut —</option>
          ${availableCuts.map(c => `<option value="${c}">${c}</option>`).join('')}
        </select>
        <input type="number" inputmode="decimal" id="addy-${day.date}" placeholder="yielded" min="0" step="0.1">
        <input type="number" inputmode="decimal" id="addd-${day.date}" placeholder="delivered" min="0" step="0.1">
        <button class="add-btn" onclick="stageAddCut('${day.date}')">+</button>
      </div>
    </div>` : '';

  return `<div class="day ${openCls} ${completeCls}" id="day-${day.date}">
    <div class="head" onclick="this.parentElement.classList.toggle('open')">
      <div class="label">${dayLabel} <span class="day-name">${day.lines.length} cut${day.lines.length === 1 ? '' : 's'}</span></div>
      <div class="${badgeCls}">${badgeText}</div>
    </div>
    <div class="body">
      <div class="rate-row">
        <label>MN daily rate (from cash bill)</label>
        <div class="rate-input-wrap">
          <span class="pre">₹</span>
          <input type="number" inputmode="decimal" id="rate-${day.date}" placeholder="e.g. 117"
                 value="${dailyRateRupees}" min="0" step="0.1">
          <span class="suf">per kg</span>
        </div>
      </div>
      ${lineRows}
      ${addRow}
      <div class="day-totals">
        <span>Day total cost: <span class="v big" id="total-${day.date}">—</span></span>
        <span>Delivered: <span class="v" id="totkg-${day.date}">—</span></span>
      </div>
      <div class="day-actions">
        ${!isComplete ? `<button onclick="copyYesterdayRate('${day.date}')">Use yesterday's rate</button>` : ''}
        <button class="primary" onclick="saveDay('${day.date}')">Save Day</button>
      </div>
      <div id="msg-${day.date}"></div>
    </div>
  </div>`;
}

function formatDateLabel(s) {
  const d = new Date(s + 'T12:00:00');
  return d.toLocaleDateString('en-IN', {weekday:'short', day:'numeric', month:'short'});
}

// Live-update the per-cut cost/effective display as user types
document.addEventListener('input', e => {
  if (!e.target.matches('.delivered-input, input[id^="rate-"]')) return;
  const date = e.target.dataset.date || e.target.id.replace('rate-', '');
  recomputeDay(date);
});

function recomputeDay(date) {
  const day = DATA?.days.find(d => d.date === date);
  if (!day) return;
  const rateInput = document.getElementById(`rate-${date}`);
  const rate = parseFloat(rateInput?.value || 0);
  let totalCost = 0, totalKg = 0;
  for (const line of day.lines) {
    const delInp = document.querySelector(`.delivered-input[data-date="${date}"][data-cut="${line.cut}"]`);
    const delivered = parseFloat(delInp?.value || 0);
    const yielded = line.purchased_kg || 0;
    const calcEl = document.getElementById(`calc-${date}-${line.cut}`);
    if (rate > 0 && delivered > 0 && yielded > 0) {
      const cost = delivered * rate;
      const effective = cost / yielded;
      totalCost += cost;
      totalKg += delivered;
      if (calcEl) {
        calcEl.innerHTML = `<span>Cost: <span class="effective">₹${Math.round(cost).toLocaleString('en-IN')}</span></span><span>Effective: <span class="effective">₹${Math.round(effective)}/kg</span></span>`;
      }
    } else if (calcEl) {
      calcEl.innerHTML = `<span>Cost: <span class="effective">—</span></span><span>Effective: <span class="effective">—</span></span>`;
    }
  }
  const totEl = document.getElementById(`total-${date}`);
  const kgEl = document.getElementById(`totkg-${date}`);
  if (totEl) totEl.textContent = totalCost > 0 ? '₹' + Math.round(totalCost).toLocaleString('en-IN') : '—';
  if (kgEl) kgEl.textContent = totalKg > 0 ? totalKg.toFixed(1) + ' kg' : '—';
}

window.copyYesterdayRate = function(date) {
  const prev = shiftDate(date, -1);
  const yest = DATA.days.find(d => d.date === prev);
  if (!yest?.daily_rate_paise) return showMsg(date, 'err', `No rate set on ${formatDateLabel(prev)}`);
  document.getElementById(`rate-${date}`).value = (yest.daily_rate_paise/100).toFixed(2);
  recomputeDay(date);
  showMsg(date, 'ok', `Copied rate ₹${(yest.daily_rate_paise/100).toFixed(2)}/kg from ${formatDateLabel(prev)}`);
};

window.stageAddCut = function(date) {
  const cut = document.getElementById(`add-${date}`).value;
  const yielded = document.getElementById(`addy-${date}`).value.trim();
  const delivered = document.getElementById(`addd-${date}`).value.trim();
  if (!cut) return showMsg(date, 'err', 'Pick a cut');
  if (!yielded || !delivered) return showMsg(date, 'err', 'Enter both yielded and delivered kg');
  // Add to in-memory DATA, re-render this day, scroll to the new line
  const day = DATA.days.find(d => d.date === date);
  day.lines.push({
    cut, purchased_kg: Number(yielded), delivered_kg: Number(delivered),
    price_per_kg_paise: null, daily_rate_paise: day.daily_rate_paise || null, cost_paise: null
  });
  // Re-render
  const open = document.getElementById(`day-${date}`)?.classList.contains('open');
  renderApp();
  if (open) document.getElementById(`day-${date}`)?.classList.add('open');
  recomputeDay(date);
};

window.saveDay = async function(date) {
  const rate = parseFloat(document.getElementById(`rate-${date}`)?.value || 0);
  if (!(rate > 0)) return showMsg(date, 'err', 'Enter the daily rate first');

  const day = DATA.days.find(d => d.date === date);
  const cuts = [];
  for (const line of day.lines) {
    const delInp = document.querySelector(`.delivered-input[data-date="${date}"][data-cut="${line.cut}"]`);
    const delivered = parseFloat(delInp?.value || 0);
    // Include yielded if it was staged (new cut) — backend uses existing yielded otherwise
    const yielded = line.purchased_kg;
    if (delivered > 0) {
      cuts.push({ cut: line.cut, yielded_kg: yielded, delivered_kg: delivered });
    }
  }
  if (cuts.length === 0) return showMsg(date, 'err', 'Fill at least one delivered kg');

  showMsg(date, 'ok', `Saving ${cuts.length} cuts at ₹${rate}/kg…`);
  try {
    const r = await fetch(`${API}?action=save-day-prices&pin=${PIN}`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ date, daily_rate: rate, cuts }),
    }).then(x => x.json());
    if (!r.success) throw new Error(r.error || 'save failed');
    const okCount = r.results.filter(x => x.ok).length;
    const failCount = r.results.length - okCount;
    showMsg(date, failCount === 0 ? 'ok' : 'err',
      `Saved ${okCount}/${r.results.length}` + (failCount > 0 ? ` · errors: ${r.results.filter(x=>!x.ok).map(x=>x.cut+': '+x.error).join(', ')}` : ''));
    setTimeout(loadQueue, 1200);
  } catch (e) { showMsg(date, 'err', 'Save failed: ' + e.message); }
};

function shiftDate(s, d) {
  const dt = new Date(s + 'T12:00:00Z');
  dt.setUTCDate(dt.getUTCDate() + d);
  return dt.toISOString().slice(0, 10);
}

function showMsg(date, type, text) {
  const el = document.getElementById('msg-' + date);
  if (el) el.innerHTML = `<div class="banner ${type}" style="margin-top:10px;margin-bottom:0">${text}</div>`;
}

init();
</script>
</body></html>
