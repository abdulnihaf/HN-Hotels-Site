<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0c0c14">
<title>HN Marketing Control</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/ops-ui.css">
<style>
  body { min-height: 100vh; }
  .wrap { max-width: 1480px; margin: 0 auto; padding: 16px 14px 72px; }
  .topbar { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
  .titleblock h1 { font-size: 23px; font-weight: 800; margin-bottom: 2px; }
  .titleblock .sub { max-width: 780px; }
  .actions, .links, .filters { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .btn, .links a, .links button, .filter { min-height: 44px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface-2); color: var(--text); padding: 10px 12px; font-size: 12px; font-weight: 700; text-decoration: none; cursor: pointer; display: inline-flex; align-items: center; }
  .btn-primary, .links .primary-link, .filter.active { background: var(--brand); color: #0c0c14; border-color: var(--brand); }
  .btn-code, .command code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
  .summary-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-bottom: 14px; }
  .summary, .memory, .lane, .activity { border: 1px solid var(--border); background: var(--surface); border-radius: 8px; }
  .summary { padding: 12px; min-height: 74px; }
  .summary .v { font-size: 22px; font-weight: 800; line-height: 1.1; font-variant-numeric: tabular-nums; }
  .summary .l { margin-top: 5px; color: var(--text-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; font-weight: 700; }
  .memory, .activity { margin-bottom: 12px; padding: 13px; }
  .memory-head, .lane-head { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; flex-wrap: wrap; }
  .memory h2, .lane h2 { font-size: 16px; line-height: 1.2; margin-bottom: 4px; }
  .scope, .updated, .activity-row { color: var(--text-dim); font-size: 12px; line-height: 1.45; }
  .memory-list { display: grid; gap: 8px; margin-top: 10px; }
  .memory-row { border: 1px solid var(--border); background: rgba(255,255,255,0.025); border-radius: 8px; padding: 10px; }
  .memory-row strong { display: block; font-size: 12px; }
  .memory-row span { display: block; color: var(--text-dim); font-size: 12px; margin-top: 3px; }
  .toolbar { display: flex; justify-content: space-between; gap: 10px; align-items: center; flex-wrap: wrap; margin: 8px 0 12px; }
  .filter { color: var(--text-dim); border-radius: 999px; }
  .lane-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
  .lane { padding: 14px; display: grid; gap: 12px; }
  .lane-title { min-width: 0; }
  .badges { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
  .badge { border-radius: 999px; background: rgba(255,255,255,0.07); color: var(--text-dim); padding: 5px 8px; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.35px; }
  .badge-live { background: rgba(59,130,246,0.16); color: #93c5fd; }
  .badge-gated { background: rgba(245,158,11,0.16); color: #fbbf24; }
  .badge-creative { background: rgba(16,185,129,0.14); color: #34d399; }
  .badge-mutation, .badge-required { background: rgba(239,68,68,0.14); color: #f87171; }
  .badge-control { background: rgba(251,191,36,0.16); color: #fbbf24; }
  .facts { display: grid; grid-template-columns: 1fr; gap: 8px; }
  .fact { border: 1px solid var(--border); background: rgba(255,255,255,0.025); border-radius: 8px; padding: 10px; }
  .fact .k { color: var(--text-mute); font-size: 10px; text-transform: uppercase; letter-spacing: 0.4px; font-weight: 800; margin-bottom: 4px; }
  .fact .v { color: var(--text); font-size: 13px; line-height: 1.45; }
  .command { border: 1px solid var(--border); background: #101018; border-radius: 8px; padding: 10px; }
  .command code { display: block; color: #cbd5e1; font-size: 11px; line-height: 1.45; overflow-wrap: anywhere; }
  .toast { position: fixed; left: 50%; bottom: calc(18px + var(--safe-bottom)); transform: translateX(-50%); padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; display: none; z-index: 20; }
  @media (min-width: 720px) {
    .summary-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .facts { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  }
  @media (min-width: 1080px) {
    .lane-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .lane-master { grid-column: 1 / -1; }
  }
</style>
</head>
<body>
<main class="wrap">
  <div class="topbar">
    <div class="titleblock">
      <h1>Marketing Control</h1>
      <div class="sub">Graph-rendered execution cockpit for HE/NCH marketing lanes, live UIs, Codex terminal routing, and latest lane memory.</div>
    </div>
    <div class="actions">
      <button id="open-all" class="btn btn-primary btn-code">Copy open-all command</button>
      <a class="btn" href="/marketing/">Marketing index</a>
    </div>
  </div>

  <section id="summary" class="summary-grid" aria-label="Marketing execution summary"></section>
  <section id="memory" class="memory"></section>
  <section id="activity" class="activity"></section>

  <div class="toolbar">
    <div class="filters" role="tablist" aria-label="Lane filters">
      <button class="filter active" data-filter="all">All</button>
      <button class="filter" data-filter="live">Live</button>
      <button class="filter" data-filter="gated">Gated</button>
      <button class="filter" data-filter="creative">Creative</button>
      <button class="filter" data-filter="mutation">Mutation risk</button>
      <button class="filter" data-filter="writeback">Writeback required</button>
    </div>
    <div id="source" class="updated">Loading graph...</div>
  </div>

  <section id="lane-grid" class="lane-grid"></section>
</main>
<div id="toast" class="toast"></div>

<script>
const GRAPH_URL = './graph.json';
const STATE_URL = './state.json';
const STATE_LOG_URL = './state.jsonl';
let GRAPH = null;
let STATE = null;
let STATE_LOG = [];
let currentFilter = 'all';

const grid = document.getElementById('lane-grid');
const toast = document.getElementById('toast');
const esc = value => {
  const div = document.createElement('div');
  div.textContent = value == null ? '' : String(value);
  return div.innerHTML;
};

function showToast(text) {
  toast.textContent = text;
  toast.style.display = 'block';
  clearTimeout(showToast.timer);
  showToast.timer = setTimeout(() => { toast.style.display = 'none'; }, 2200);
}

async function copyText(text) {
  try {
    await navigator.clipboard.writeText(text);
  } catch (err) {
    const area = document.createElement('textarea');
    area.value = text;
    document.body.appendChild(area);
    area.select();
    document.execCommand('copy');
    area.remove();
  }
  showToast('Copied');
}

function badgeFor(tag) {
  const label = {
    live: 'Live UI',
    gated: 'Gated',
    creative: 'Creative',
    mutation: 'Mutation risk',
    writeback: 'Writeback'
  }[tag] || tag;
  return `<span class="badge badge-${esc(tag)}">${esc(label)}</span>`;
}

function stateFor(slug) {
  return STATE && STATE.lanes ? STATE.lanes[slug] : null;
}

function latestLogFor(slug) {
  return STATE_LOG.find(row => row.lane === slug);
}

function laneView(lane) {
  const state = stateFor(lane.slug);
  const latest = latestLogFor(lane.slug);
  return {
    current: state ? state.last_summary : lane.summary,
    next: state ? state.next_action : lane.next_action,
    guardrail: state ? state.mutation_status : lane.guardrail,
    status: state ? state.status : lane.status,
    latest
  };
}

function renderSummary() {
  const lanes = GRAPH.lanes || [];
  const mutation = lanes.filter(l => (l.tags || []).includes('mutation')).length;
  const writeback = lanes.filter(l => l.writeback_required).length;
  const brands = [...new Set(lanes.map(l => l.brand).filter(Boolean))].join('/');
  document.getElementById('summary').innerHTML = [
    ['Lanes', lanes.length],
    ['Mutation lanes', mutation],
    ['Writeback required', writeback],
    ['Brand scope', brands || 'HE/NCH']
  ].map(([label, value]) => `<div class="summary"><div class="v">${esc(value)}</div><div class="l">${esc(label)}</div></div>`).join('');
}

function renderMemory() {
  const events = (STATE && STATE.events ? STATE.events : []).slice(0, 4);
  document.getElementById('memory').innerHTML = `
    <div class="memory-head">
      <div>
        <h2>Execution Memory</h2>
        <div class="scope">${STATE ? 'Live state loaded from /ops/marketing-control/state.json' : 'State JSON not available yet. Graph still controls lane mapping.'}</div>
        <div class="updated">Graph: ${esc(GRAPH.version || 'unknown')} · State: ${esc(STATE && STATE.updated_at ? STATE.updated_at : 'not loaded')}</div>
      </div>
      <div class="badges"><span class="badge badge-control">Memory</span></div>
    </div>
    <div class="memory-list">
      ${events.length ? events.map(e => `<div class="memory-row"><strong>${esc(e.lane)} · ${esc(e.status)}</strong><span>${esc(e.task)} - ${esc(e.summary)}</span></div>`).join('') : '<div class="memory-row"><strong>No state events yet</strong><span>Terminal commands still open from graph.json.</span></div>'}
    </div>`;
}

function renderActivity() {
  document.getElementById('activity').innerHTML = `
    <div class="memory-head">
      <div>
        <h2>Latest Writeback</h2>
        <div class="scope">Append-only execution trail from /ops/marketing-control/state.jsonl.</div>
      </div>
      <div class="badges"><span class="badge badge-required">Audit</span></div>
    </div>
    <div class="memory-list">
      ${STATE_LOG.length ? STATE_LOG.slice(0, 5).map(row => `<div class="activity-row"><strong>${esc((row.ts || '').slice(0, 16).replace('T', ' '))} · ${esc(row.lane)}</strong> ${esc(row.event || '')}${row.note ? ' - ' + esc(row.note) : ''}</div>`).join('') : '<div class="activity-row">No writeback rows loaded yet.</div>'}
    </div>`;
}

function renderLanes() {
  const lanes = (GRAPH.lanes || []).filter(lane => {
    if (currentFilter === 'all') return true;
    if (currentFilter === 'writeback') return lane.writeback_required;
    return (lane.tags || []).includes(currentFilter);
  });
  grid.innerHTML = lanes.map(lane => {
    const view = laneView(lane);
    const tags = [...(lane.tags || []), ...(lane.writeback_required ? ['writeback'] : [])];
    return `<article class="lane ${lane.slug === 'master' ? 'lane-master' : ''}">
      <div class="lane-head">
        <div class="lane-title">
          <h2>${esc(lane.title)}</h2>
          <div class="scope">${esc(lane.group)} · ${esc(lane.subgroup)} · ${esc(lane.scope)}</div>
        </div>
        <div class="badges">
          <span class="badge">${esc(lane.brand)}</span>
          ${tags.map(badgeFor).join('')}
        </div>
      </div>
      <div class="facts">
        <div class="fact"><div class="k">Current state</div><div class="v">${esc(view.current)}</div></div>
        <div class="fact"><div class="k">Open this when</div><div class="v">${esc(view.next)}</div></div>
        <div class="fact"><div class="k">Guardrail</div><div class="v">${esc(view.guardrail)}</div></div>
      </div>
      ${view.latest ? `<div class="activity-row">Last writeback: ${esc(view.latest.event || '')}${view.latest.note ? ' - ' + esc(view.latest.note) : ''}</div>` : ''}
      <div class="links">
        <button class="primary-link" data-copy="${esc(lane.command)}">Copy terminal command</button>
        ${(lane.links || []).map(([label, href]) => `<a href="${esc(href)}" ${String(href).startsWith('http') ? 'target="_blank" rel="noopener"' : ''}>${esc(label)}</a>`).join('')}
      </div>
      <div class="command"><code>${esc(lane.command)}</code></div>
    </article>`;
  }).join('');
}

function render() {
  renderSummary();
  renderMemory();
  renderActivity();
  renderLanes();
  document.getElementById('source').textContent = `Source: graph.json · ${GRAPH.version || 'unknown'}`;
  document.getElementById('open-all').dataset.copy = GRAPH.open_all_command || '';
}

function parseLog(text) {
  return text.trim().split('\n').filter(Boolean).map(line => {
    try { return JSON.parse(line); } catch (err) { return null; }
  }).filter(Boolean).sort((a, b) => String(b.ts || '').localeCompare(String(a.ts || '')));
}

async function load() {
  try {
    const graphRes = await fetch(`${GRAPH_URL}?v=${Date.now()}`, { cache: 'no-store' });
    if (!graphRes.ok) throw new Error(`graph ${graphRes.status}`);
    GRAPH = await graphRes.json();
    try {
      const stateRes = await fetch(`${STATE_URL}?v=${Date.now()}`, { cache: 'no-store' });
      if (stateRes.ok) STATE = await stateRes.json();
    } catch (err) {}
    try {
      const logRes = await fetch(`${STATE_LOG_URL}?v=${Date.now()}`, { cache: 'no-store' });
      if (logRes.ok) STATE_LOG = parseLog(await logRes.text());
    } catch (err) {}
    render();
  } catch (err) {
    document.getElementById('source').textContent = `Could not load graph.json: ${err.message}`;
    grid.innerHTML = '<article class="lane"><h2>Marketing Control unavailable</h2><div class="scope">graph.json could not be loaded. Terminal commands are intentionally not hardcoded here.</div></article>';
  }
}

document.addEventListener('click', event => {
  const copyTarget = event.target.closest('[data-copy]');
  if (copyTarget) copyText(copyTarget.dataset.copy);
  const filterTarget = event.target.closest('[data-filter]');
  if (filterTarget) {
    currentFilter = filterTarget.dataset.filter;
    document.querySelectorAll('.filter').forEach(button => button.classList.remove('active'));
    filterTarget.classList.add('active');
    renderLanes();
  }
});

load();
</script>
</body>
</html>
