  .fact { border: 1px solid var(--border); background: rgba(255,255,255,0.025); border-radius: 8px; padding: 10px; }

  .links { display: flex; flex-wrap: wrap; gap: 6px; }
  .links a, .links button { min-height: 44px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface-2); color: var(--text); padding: 10px 11px; font-size: 12px; font-weight: 700; text-decoration: none; cursor: pointer; display: inline-flex; align-items: center; }

  .toast { position: fixed; left: 50%; bottom: calc(18px + var(--safe-bottom)); transform: translateX(-50%); padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; display: none; z-index: 20; }

const grid = document.getElementById('lane-grid');
const toast = document.getElementById('toast');

function commandFor(slug) {
  return `${OPEN_ONE} ${slug}`;
}

function showToast(text) {
  toast.textContent = text;
  toast.style.display = 'block';
  clearTimeout(showToast.timer);
  showToast.timer = setTimeout(() => { toast.style.display = 'none'; }, 2200);
}

async function copyText(text) {
  try {
    await navigator.clipboard.writeText(text);
    showToast('Copied');
  } catch (err) {
    const area = document.createElement('textarea');
    area.value = text;
    document.body.appendChild(area);
    area.select();
    document.execCommand('copy');
    area.remove();
    showToast('Copied');
  }
}

function badgeFor(tag) {
  const label = {
    live: 'Live UI',
    gated: 'Gated',
    creative: 'Creative',
    mutation: 'Mutation risk'
  }[tag] || tag;
  return `<span class="badge badge-${tag}">${label}</span>`;
}

function render(filter = 'all') {
  grid.innerHTML = '';
  lanes
    .filter(lane => filter === 'all' || lane.tags.includes(filter))
    .forEach(lane => {
      const article = document.createElement('article');
      article.className = `lane ${lane.slug === 'master' ? 'lane-master' : ''}`;
      article.innerHTML = `
        <div class="lane-head">
          <div class="lane-title">
            <h2>${lane.title}</h2>
            <div class="scope">${lane.scope}</div>
          </div>
          <div class="lane-badges">
            <span class="badge badge-neutral">${lane.brand}</span>
            ${lane.status.map(badgeFor).join('')}
          </div>
        </div>
        <div class="lane-main">
          <div class="facts">
            <div class="fact"><div class="k">Current state</div><div class="v">${lane.current}</div></div>
            <div class="fact"><div class="k">Open this when</div><div class="v">${lane.next}</div></div>
            <div class="fact"><div class="k">Guardrail</div><div class="v">${lane.guardrail}</div></div>
          </div>
          <div class="links">
            <button class="primary-link" data-copy="${commandFor(lane.slug)}">Copy terminal command</button>
            ${lane.links.map(([label, href]) => `<a href="${href}" ${href.startsWith('http') ? 'target="_blank" rel="noopener"' : ''}>${label}</a>`).join('')}
          </div>
          <div class="command"><code>${commandFor(lane.slug)}</code></div>
        </div>
      `;
      grid.appendChild(article);
    });
}

document.addEventListener('click', event => {
  const copyTarget = event.target.closest('[data-copy]');
  if (copyTarget) copyText(copyTarget.dataset.copy);
  const filterTarget = event.target.closest('[data-filter]');
  if (filterTarget) {
    document.querySelectorAll('.filter').forEach(button => button.classList.remove('active'));
    filterTarget.classList.add('active');
    render(filterTarget.dataset.filter);
  }
});

render();
