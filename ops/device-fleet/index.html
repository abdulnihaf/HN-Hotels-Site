<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Device Fleet — HN Hotels</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box} body{background:#0c0c14;color:#e4e4ed;font-family:Inter,system-ui,sans-serif}
.glass{background:rgba(22,22,31,.7);border:1px solid rgba(255,255,255,.05)}
.badge{font-size:.6rem;padding:2px 7px;border-radius:999px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:left;color:rgba(255,255,255,.35);font-weight:600;text-transform:uppercase;letter-spacing:.04em;padding:6px 8px;font-size:9.5px;border-bottom:1px solid rgba(255,255,255,.06)}
td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.03);white-space:nowrap}
tr:hover td{background:rgba(255,255,255,.02)}
.mono{font-family:ui-monospace,Menlo,monospace}
a{color:#f0a944}
</style>
</head>
<body class="min-h-screen antialiased">
<nav class="sticky top-0 z-40 glass border-b border-white/[.04] px-4 sm:px-6 py-3 flex items-center justify-between" style="backdrop-filter:blur(20px)">
  <div class="flex items-center gap-3">
    <div class="w-9 h-9 rounded-xl bg-amber-500/15 flex items-center justify-center text-amber-400 font-extrabold">DF</div>
    <div><h1 class="text-sm font-bold leading-none">Device Fleet</h1>
    <p class="text-[10px] text-white/30 leading-none mt-1">HN Hotels — CCTV + endpoints · <span id="gen">…</span></p></div>
  </div>
  <button onclick="load()" class="text-xs px-3 py-2 rounded-lg bg-white/5 text-white/60">↻ Refresh</button>
</nav>
<div class="max-w-[1400px] mx-auto px-4 sm:px-6 py-5 space-y-6">
  <section id="rollup" class="grid grid-cols-3 sm:grid-cols-6 gap-2.5"></section>
  <div id="body" class="space-y-6"></div>
  <div id="err" class="hidden glass rounded-xl p-6 text-center text-sm text-white/50"></div>
</div>
<script>
const esc=s=>{const d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML};
const card=(title,sub,inner)=>`<section class="glass rounded-xl overflow-hidden"><div class="px-4 py-2.5 border-b border-white/[.05] flex items-center gap-2"><span class="text-xs font-semibold text-white/70">${esc(title)}</span>${sub?`<span class="text-[10px] text-white/25">— ${esc(sub)}</span>`:''}</div><div class="p-4">${inner}</div></section>`;
async function load(){
 try{
  const r=await fetch('./assets.json',{cache:'no-store'}); if(!r.ok)throw new Error('assets.json '+r.status);
  const d=await r.json(); render(d);
 }catch(e){document.getElementById('err').classList.remove('hidden');document.getElementById('err').textContent='Could not load assets.json ('+e.message+')';}
}
function render(d){
 document.getElementById('gen').textContent='as of '+(d.generated||'');
 const he=d.cameras.filter(c=>c.brand==='HE'), nch=d.cameras.filter(c=>c.brand==='NCH');
 const cells=[['Cameras',d.cameras.length,'text-white'],['Hamza Express',he.length,'text-orange-400'],['Nawabi CH',nch.length,'text-emerald-400'],['Switches',d.switches.length,'text-sky-400'],['Networks',d.networks.length,'text-violet-400'],['AI cams',d.cameras.filter(c=>c.detect_priority).length,'text-amber-400']];
 document.getElementById('rollup').innerHTML=cells.map(m=>`<div class="glass rounded-xl px-3 py-2.5"><p class="text-[10px] text-white/25 uppercase tracking-wider">${m[0]}</p><p class="text-xl font-bold ${m[2]}">${m[1]}</p></div>`).join('');
 const n=d.nvr;
 const nvrHtml=`<div class="grid grid-cols-2 sm:grid-cols-4 gap-3 text-[11px]">
   ${[['Model',n.model],['IP',`<span class="mono">${n.ip}</span> · ${n.ip_mode}`],['Serial',`<span class="mono">${n.serial}</span>`],['Firmware',n.firmware],['Channels',n.channels],['Disk',n.disk],['MAC',`<span class="mono">${n.mac}</span>`],['Time',n.ntp]].map(x=>`<div><p class="text-white/30 uppercase tracking-wider text-[9px]">${x[0]}</p><p class="text-white/75 mt-0.5">${x[1]}</p></div>`).join('')}
   </div><p class="text-[10px] text-white/30 mt-3">Login → ${esc(n.login_ref)}</p>`;
 const camRows=arr=>`<div class="overflow-x-auto"><table><thead><tr><th>CH</th><th>IP</th><th>Type</th><th>Model</th><th>MAC</th><th>Serial</th><th>Operation</th></tr></thead><tbody>${arr.map(c=>`<tr><td class="font-bold ${c.detect_priority?'text-amber-400':'text-white/70'}">CH${String(c.ch).padStart(2,'0')}${c.detect_priority?' ⭐':''}</td><td class="mono text-white/60">${c.ip}</td><td><span class="badge ${c.type==='dome'?'bg-sky-500/15 text-sky-300':'bg-orange-500/15 text-orange-300'}">${c.type}</span></td><td class="text-white/50">${esc(c.model)}</td><td class="mono text-white/40">${c.mac}</td><td class="mono text-white/40">${esc(c.serial)}</td><td class="text-white/75">${esc(c.operation)}</td></tr>`).join('')}</tbody></table></div>`;
 const sw=`<div class="space-y-2">${d.switches.map(s=>`<div class="flex items-center gap-2 text-[11px]"><span class="badge bg-white/10 text-white/50">${esc(s.location)}</span><span class="text-white/70">${esc(s.model)}</span>${s.model_confirmed===false?'<span class="badge bg-red-500/15 text-red-400">confirm model</span>':''}</div>`).join('')}</div>`;
 const net=`<div class="grid sm:grid-cols-2 gap-3 text-[11px]">${d.networks.map(x=>`<div class="glass rounded-lg p-3"><p class="font-semibold text-white/80">${esc(x.name)}</p><p class="mono text-amber-300/80 mt-1">${x.cidr} · gw ${x.gateway}</p><p class="text-white/45 mt-1">${esc(x.holds)}</p></div>`).join('')}</div>`;
 const pr=`<div class="space-y-1.5 text-[11px]">${d.printers.map(p=>`<div><span class="mono text-emerald-300">${esc(p.ip)}</span> <span class="text-white/70">${esc(p.name)}</span> <span class="text-white/35">${esc(p.note||'')}</span></div>`).join('')}</div>`;
 const cp=`<div class="grid sm:grid-cols-3 gap-3 text-[11px]">${d.compute.map(c=>`<div class="glass rounded-lg p-3"><p class="font-semibold text-white/80">${esc(c.name)}</p><p class="text-white/45 mt-1">${esc(c.model)}</p><p class="text-white/55 mt-1">${esc(c.role)}</p>${c.status?`<p class="text-amber-300/70 mt-1">${esc(c.status)}</p>`:''}${c.tailnet?`<p class="mono text-white/30 mt-1">ts: ${esc(c.tailnet)}</p>`:''}</div>`).join('')}</div>`;
 const risks=`<ul class="text-[11px] text-white/45 space-y-1">${d.risks.map(r=>`<li>• ${esc(r)}</li>`).join('')}</ul>`;
 document.getElementById('body').innerHTML=
   card('NVR — Office','the recorder',nvrHtml)+
   card('Cameras · Hamza Express','CH01–09 ('+he.length+')',camRows(he))+
   card('Cameras · Nawabi Chai House','CH10–16 ('+nch.length+')',camRows(nch))+
   card('PoE Switches',d.switches.length+' across office + 2 outlets',sw)+
   card('Networks','2 separate LANs',net)+
   card('Printers','',pr)+
   card('Compute / Appliances','',cp)+
   card('Open items / risks','',risks);
}
load();
</script>
</body>
</html>
