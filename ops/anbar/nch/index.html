<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Anbar — Nawabi Chai House</title>
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NCH Anbar">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="/ops/anbar/icon-192.png">
</head>
<body style="margin:0;background:#000;color:#f7f7fa;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
<main style="min-height:100vh;display:grid;place-items:center;text-align:center;padding:24px">
  <div>
    <div style="font-size:13px;color:#d4a24c;text-transform:uppercase;letter-spacing:.08em">Anbar · Nawabi Chai House</div>
    <h1 style="font-size:28px;margin:10px 0 4px">Live Inventory</h1>
    <p style="margin:0;color:#9a9aa3">Counter · Store · movement board</p>
  </div>
</main>
<script>
(async function loadAnbarShell() {
  try {
    const response = await fetch('/ops/anbar/index.html', { cache: 'no-store' });
    if (!response.ok) throw new Error('Anbar shell failed');
    const html = await response.text();
    document.open();
    document.write(html);
    document.close();
  } catch (error) {
    document.body.insertAdjacentHTML('beforeend', '<div style="position:fixed;left:16px;right:16px;bottom:16px;color:#ff5c5c;text-align:center">Unable to load Anbar. Reopen this link.</div>');
  }
})();
</script>
</body>
</html>
