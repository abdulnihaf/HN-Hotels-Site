<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Sauda">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a10">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>Sauda</title>
<style>
  :root{--gold:#c9a14a;--bg:#08080d;--elev:#15151f;--elev2:#1d1d2a;--line:rgba(201,161,74,.22);--ok:#3ba776;--wa:#25d366;--blue:#5e9eff;--amber:#e3bd72;--txt:#f3f3f6;--dim:#8a8a99}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(130% 80% at 50% 0%,#13131e,#06060a);color:var(--txt);min-height:100dvh;padding:env(safe-area-inset-top) 14px calc(env(safe-area-inset-bottom) + 30px)}
  .wrap{max-width:540px;margin:0 auto}
  h1{font-family:"Cormorant Garamond",Georgia,serif;font-weight:600;font-size:28px;margin:20px 0 1px}
  .sub{color:var(--gold);font-size:12px;font-style:italic;margin:0 0 12px}
  .clock{text-align:center;font-size:12px;color:var(--dim);margin:6px 0 10px;font-variant-numeric:tabular-nums}
  .clock b{color:var(--txt);font-weight:600}
  .brandtog{display:flex;gap:7px;margin-bottom:6px}
  .brandtog button{flex:1;background:var(--elev);border:1px solid var(--line);color:var(--dim);border-radius:12px;padding:11px 0;font-size:14px;font-weight:700}
  .brandtog button.on{background:var(--gold);color:#1a1408;border-color:var(--gold)}
  .daypills{display:flex;gap:8px;justify-content:center;margin:8px 0 4px}
  .daypills button{flex:1;max-width:160px;background:var(--elev);border:1px solid var(--line);color:var(--dim);border-radius:11px;padding:9px 10px;font-size:13px;font-weight:700}
  .daypills button small{display:block;font-size:10px;opacity:.7;font-weight:500;margin-top:1px}
  .daypills button.on{background:rgba(201,161,74,.16);border-color:var(--gold);color:var(--gold)}
  .tally{text-align:center;font-size:11.5px;color:var(--dim);margin:8px 0 14px}
  .vcard{background:var(--elev);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px;transition:opacity .2s}
  .vcard.done{border-color:var(--ok);box-shadow:inset 0 0 0 1px var(--ok)}
  .vcard.done .items,.vcard.done .actwrap{opacity:.5}
  .vhead{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:7px}
  .vname{font-size:16px;font-weight:700;line-height:1.2}
  .vname .ok{color:var(--ok);font-size:12px;margin-left:6px}
  .badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
  .b{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:7px;white-space:nowrap}
  .b.deliver{background:rgba(59,167,118,.16);color:#6bd6a3}
  .b.collect{background:rgba(94,158,255,.16);color:var(--blue)}
  .b.porter{background:rgba(201,161,74,.16);color:var(--amber)}
  .b.bus{background:rgba(167,139,250,.16);color:#b9a3fb}
  .b.standing{background:rgba(37,211,102,.14);color:#67e29a}
  .b.pay{background:rgba(255,255,255,.07);color:var(--dim)}
  .b.legs{background:rgba(207,91,78,.14);color:#e08b80}
  .vnote{font-size:11px;color:var(--dim);margin:1px 0 10px;line-height:1.4}
  .items{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}
  .row{display:flex;align-items:center;gap:8px}
  .row .nm{flex:1;font-size:13.5px;line-height:1.25}
  .row .nm small{display:block;font-size:10.5px;margin-top:1px;color:var(--amber)}
  .step{display:flex;align-items:center;background:#0b0b13;border:1px solid var(--line);border-radius:9px;overflow:hidden;flex:none}
  .step button{background:transparent;border:none;color:var(--gold);width:30px;height:32px;font-size:17px}
  .step input{width:44px;height:32px;background:transparent;border:none;color:var(--txt);text-align:center;font-size:14px;font-weight:700;outline:none}
  .step .u{font-size:10px;color:var(--dim);padding:0 7px 0 2px}
  .actwrap{}
  .act{display:block;width:100%;border:none;border-radius:12px;padding:13px;font-size:14.5px;font-weight:700;text-align:center;text-decoration:none;cursor:pointer}
  .act.wa{background:var(--wa);color:#06310f}
  .act.col{background:rgba(94,158,255,.13);color:var(--blue);border:1px solid rgba(94,158,255,.32)}
  .act.info{background:var(--elev2);color:var(--amber);border:1px solid var(--line)}
  .act.ghost{background:transparent;color:var(--dim);border:1px solid var(--line);font-weight:600;font-size:12.5px;padding:8px;margin-top:8px}
  .pay{font-size:11px;color:var(--dim);text-align:center;margin-top:8px}
  .grphd{font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin:18px 2px 10px;font-weight:700}
  .exp{width:100%;background:var(--elev);border:1px dashed var(--line);color:var(--dim);border-radius:12px;padding:13px;font-size:13px;font-weight:600;margin-bottom:12px}
  .gate{background:var(--elev);border:1px solid var(--line);border-radius:18px;padding:18px;margin-top:32px}
  .gate label{display:block;font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.7px;margin:0 0 7px}
  .gate input{width:100%;background:#0b0b13;border:1px solid var(--line);border-radius:12px;color:var(--txt);font-size:21px;padding:13px;outline:none}
  .gate button{width:100%;background:var(--gold);color:#1a1408;border:none;border-radius:12px;padding:15px;font-size:16px;font-weight:700;margin-top:12px}
  .hide{display:none!important}.small{font-size:11.5px;color:var(--dim);text-align:center;margin-top:14px}
  a.back{color:var(--dim);font-size:13px;text-decoration:none;display:inline-block;margin-top:20px}
  body{padding-bottom:calc(env(safe-area-inset-bottom) + 78px)}
  .snav{position:fixed;left:0;right:0;bottom:0;display:flex;background:rgba(11,11,17,.97);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:6px 0 calc(env(safe-area-inset-bottom) + 6px);z-index:60}
  .snav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--dim);text-decoration:none;font-size:10.5px;font-weight:700;padding:4px 0}
  .snav a .ic{font-size:19px;line-height:1}
  .snav a.on{color:var(--gold)}
  .addbtn{width:100%;background:rgba(201,161,74,.12);border:1px dashed var(--gold);color:var(--gold);border-radius:13px;padding:13px;font-size:14.5px;font-weight:700;margin-bottom:14px}
  .row .rm{background:none;border:none;color:#cf5b4e;font-size:20px;line-height:1;padding:0 4px 0 8px;flex:none}
  .ovl{position:fixed;inset:0;background:rgba(6,6,10,.94);backdrop-filter:blur(8px);display:none;flex-direction:column;z-index:80;padding:env(safe-area-inset-top) 14px calc(env(safe-area-inset-bottom) + 14px)}
  .ovl.on{display:flex}
  .ovl .obar{display:flex;gap:8px;align-items:center;margin:14px 0 12px}
  .ovl input{flex:1;background:#0b0b13;border:1px solid var(--line);border-radius:12px;color:var(--txt);font-size:16px;padding:13px;outline:none}
  .ovl .ox{background:var(--elev);border:1px solid var(--line);color:var(--txt);border-radius:12px;padding:13px 15px;font-size:15px;font-weight:700}
  .ovl .results{overflow-y:auto;flex:1}
  .ores{display:flex;justify-content:space-between;align-items:center;gap:10px;background:var(--elev);border:1px solid var(--line);border-radius:12px;padding:13px;margin-bottom:8px}
  .ores .on{font-size:14px;font-weight:600}
  .ores .om{font-size:11px;color:var(--dim);margin-top:2px}
  .ores .add{background:var(--gold);color:#1a1408;border:none;border-radius:9px;padding:9px 14px;font-weight:700;font-size:13px;flex:none}
</style>
</head>
<body>
<div class="wrap">
  <h1 id="ohead">Order</h1>
  <div class="sub">Sauda · by vendor</div>
  <div id="gate" class="gate">
    <label>PIN</label>
    <input id="pin" type="password" inputmode="numeric" maxlength="6" placeholder="••••" autocomplete="off">
    <button id="pinBtn">Unlock</button>
    <div id="pinErr" class="small" style="color:#cf5b4e"></div>
  </div>
  <div id="app" class="hide">
    <div class="clock" id="clock"></div>
    <div class="brandtog"><button data-b="NCH" class="on">Nawabi</button><button data-b="HE">Hamza Express</button></div>
    <div class="daypills" id="daypills"></div>
    <div class="tally" id="tally"></div>
    <button class="addbtn" id="addBtn">＋ Add item to this order</button>
    <div id="groups"></div>
  </div>
</div>
<script>
const API='/api/purchase-control';const FLOW='/api/sauda-flow';let PIN='',BRAND='NCH',DATA=[],CATALOG=[],PODATES=[];const $=id=>document.getElementById(id);
const QTY={};
// the order is YOURS to build: added items + removed items, saved per day+brand so it survives a reload
let ADDED=new Set(), REMOVED=new Set();
function ordKey(){return `sauda_ord_${VIEWDATE}_${BRAND}`;}
function loadOrderState(){try{const s=JSON.parse(localStorage.getItem(ordKey())||'{}');ADDED=new Set(s.added||[]);REMOVED=new Set(s.removed||[]);}catch(_){ADDED=new Set();REMOVED=new Set();}}
function saveOrderState(){try{localStorage.setItem(ordKey(),JSON.stringify({added:[...ADDED],removed:[...REMOVED]}));}catch(_){}}
function istNow(){return new Date(Date.now()+5.5*3600e3);}
function istDate(){return istNow().toISOString().slice(0,10);}
function ymd(d){return d.toISOString().slice(0,10);}
function addDays(base,n){const d=new Date(base.getTime()+n*86400000);return d;}
// open on TODAY (populated with the real order); tap Tomorrow to build the next day
let VIEWDATE=istDate();
function fmtDate(s){const d=new Date(s+'T00:00:00Z');return d.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short',timeZone:'UTC'});}
function tick(){const t=istNow();const c=$('clock');if(c)c.innerHTML=t.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',timeZone:'UTC'})+' · <b>'+t.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true,timeZone:'UTC'})+'</b> IST';}
setInterval(tick,30000);
// "ordered today" memory
function doneKey(v){return `sauda_done_${VIEWDATE}_${BRAND}_${v}`;}
function isDone(v){return localStorage.getItem(doneKey(v))==='1';}
function setDone(v,x){x?localStorage.setItem(doneKey(v),'1'):localStorage.removeItem(doneKey(v));}

$('pinBtn').onclick=async()=>{const p=$('pin').value.trim();if(!p)return;
  const r=await fetch(`${API}?action=verify-pin&pin=${encodeURIComponent(p)}`).then(r=>r.json()).catch(()=>({}));
  if(r&&r.success){PIN=p;$('gate').classList.add('hide');$('app').classList.remove('hide');tick();load();}else $('pinErr').textContent='Wrong PIN';};
$('pin').addEventListener('keydown',e=>{if(e.key==='Enter')$('pinBtn').click();});
window.addEventListener('DOMContentLoaded',()=>{
  const a=$('addBtn');if(a)a.onclick=openAdd;
  const c=$('oclose');if(c)c.onclick=closeAdd;
  const s=$('osearch');if(s)s.addEventListener('input',e=>renderResults(e.target.value));
});
document.querySelectorAll('.brandtog button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.brandtog button').forEach(x=>x.classList.remove('on'));b.classList.add('on');BRAND=b.dataset.b;SHOWALL=false;load();});
// Date strip — your real PO days (ingested) + today + tomorrow to build
function renderDateStrip(){
  const today=istDate(), tmr=ymd(addDays(istNow(),1));
  const set=[...new Set([...PODATES, today, tmr])].sort(); // oldest→newest
  $('daypills').innerHTML=set.map(d=>{
    const lbl = d===today?'Today' : d===tmr?'Tomorrow' : d===ymd(addDays(istNow(),-1))?'Yesterday' : new Date(d+'T00:00:00Z').toLocaleDateString('en-IN',{weekday:'short',timeZone:'UTC'});
    return `<button data-d="${d}" class="${VIEWDATE===d?'on':''}">${lbl}<small>${d.slice(8)} ${new Date(d+'T00:00:00Z').toLocaleDateString('en-IN',{month:'short',timeZone:'UTC'})}</small></button>`;
  }).join('');
  $('daypills').querySelectorAll('button').forEach(b=>b.onclick=()=>{VIEWDATE=b.dataset.d;load();});
}
function setHead(){
  const today=istDate(), tmr=ymd(addDays(istNow(),1)), yst=ymd(addDays(istNow(),-1));
  $('ohead').textContent = VIEWDATE===today?"Today's Order" : VIEWDATE===tmr?"Tomorrow's Order" : VIEWDATE===yst?"Yesterday's Order" : "Order — "+fmtDate(VIEWDATE);
}

const FULFIL={deliver:'They deliver',collect:'Collect at shop',porter:'Book a porter',bus:'Comes by bus',standing:'Standing order'};
const PAY={per:'Pay on delivery — cash if you’re there, else UPI',khata_roll:'Khata — clear yesterday’s bill today',khata_periodic:'Standing khata — settle periodically'};
function daysAgo(d){if(!d)return 9999;const t=istNow();const p=new Date(d.slice(0,10)+'T00:00:00Z');return Math.round((t-p)/86400000);}
function isRegular(it){return daysAgo(it.last_purchase_date)<=2;} // only the truly-daily pre-fill; add the rest with ＋ Add
function waPhone(p){let d=(p||'').replace(/[^0-9]/g,'');if(d.length===10)d='91'+d;return d;}
function mid(it){return it.product_code||it.id;}
function qtyOf(it){const k=mid(it);if(QTY[k]!=null)return QTY[k];const q=Number(it.last_qty||it.suggested_qty||0);return q>0?Math.round(q*100)/100:0;}
function isMilk(v,it){return /buffalo milk|^milk$/i.test(v)||/^milk$|buffalo milk/i.test(it.name||'');}
function isChicken(v){return /broiler/i.test(v);}

// turn a day-PO line into the item shape the cards use
let PHONES={};
// price intelligence: normalized name → cheapest-online quote (from materials feed)
let BEST={};
const norm=s=>String(s||'').toLowerCase().replace(/[^a-z0-9]/g,'');
// strip "(3 kg total)" / "200 gm" qualifiers so "Butter (3 kg total)" matches "Butter",
// but keep it EXACT after stripping so "Butter Paper" never grabs a butter price.
const stripQ=s=>String(s||'').replace(/\([^)]*\)/g,' ').replace(/\b\d+(?:\.\d+)?\s*(?:kg|g|gm|gms|ml|l|ltr|pcs?|pkt|packets?|grams?|total)\b/gi,' ');
const BEST_ALIAS={milkmaid:'condensedmilk',dalda:'vanaspatigheedalda',saunf:'fennelseedssaunf',kaju:'cashewnutskaju',sooji:'semolinasoojirawa',rava:'semolinasoojirawa'};
function bestFor(name){const n=norm(stripQ(name)); if(BEST[n])return BEST[n]; if(BEST_ALIAS[n]&&BEST[BEST_ALIAS[n]])return BEST[BEST_ALIAS[n]]; const n2=norm(name); return BEST[n2]||null;}
function lineToItem(l){const ph=PHONES[l.vendor_name]||{};const b=bestFor(l.item_name)||{};
  return {name:l.item_name,product_code:l.item_name,id:l.item_name,uom:l.unit||'',
  last_qty:parseFloat(l.qty)||0,suggested_qty:parseFloat(l.qty)||0,
  primary_vendor:l.vendor_name?{name:l.vendor_name,vendor_id:l.vendor_id||ph.id,whatsapp_phone:ph.phone||''}:null,
  journey:l.fulfilment?{fulfil:l.fulfilment,pay:l.pay_timing}:{fulfil:'collect',pay:'per'},
  best_src:b.src||null,best_price:b.price||null,best_unit_price:b.unit_price||null,best_unit:b.unit||null,best_pack:b.pack||null,best_sku:b.sku||null,comparable:!!b.src,
  category:l.category,lane:l.vendor_name?'VENDOR':'MARKET'};}
async function load(){
  $('groups').innerHTML='<div class="small">Loading your order…</div>';
  const [po,cat,pd,vn]=await Promise.all([
    fetch(`${FLOW}?action=day-po&brand=${BRAND}&date=${VIEWDATE}`).then(r=>r.json()).catch(()=>({})),
    fetch(`${API}?action=materials&brand=${BRAND}&days=120&pin=${encodeURIComponent(PIN)}`).then(r=>r.json()).catch(()=>({})),
    fetch(`${FLOW}?action=po-dates&brand=${BRAND}`).then(r=>r.json()).catch(()=>({})),
    fetch(`${API}?action=list-vendors&pin=${encodeURIComponent(PIN)}`).then(r=>r.json()).catch(()=>({}))
  ]);
  CATALOG=(cat&&cat.items)||[];
  PODATES=(pd&&pd.dates)||[];
  // vendor → phone map (so Send works) — from vendor records + catalog fallback
  PHONES={};
  for(const v of (vn.vendors||[])) PHONES[v.name]={phone:v.whatsapp_phone||v.phone||'',id:v.id};
  for(const it of CATALOG){const pv=it.primary_vendor; if(pv&&pv.whatsapp_phone&&!PHONES[pv.name])PHONES[pv.name]={phone:pv.whatsapp_phone,id:pv.vendor_id};}
  // build cheapest-online map from the materials feed (only comparable items carry best_src)
  BEST={};
  for(const it of CATALOG){ if(it.best_src){ BEST[norm(it.name)]={src:it.best_src,price:it.best_price,unit_price:it.best_unit_price,unit:it.best_unit,pack:it.best_pack,sku:it.best_sku}; } }
  DATA=((po&&po.items)||[]).map(lineToItem);
  loadOrderState();
  render();
}
function render(){
  setHead(); renderDateStrip();
  // working order = your PO items (minus removed) + items you added from the catalog
  const work=[];
  for(const it of DATA){ if(!REMOVED.has(mid(it))) work.push(it); }
  for(const code of ADDED){ if(REMOVED.has(code))continue; if(work.find(w=>mid(w)===code))continue; const c=CATALOG.find(x=>mid(x)===code); if(c)work.push(c); }
  const byVendor={}, collect=[];
  for(const it of work){ const v=it.primary_vendor; if(v){(byVendor[v.name]=byVendor[v.name]||{v,j:it.journey,items:[]}).items.push(it);} else collect.push(it); }
  const cards=Object.values(byVendor);
  let html=cards.map(c=>vendorCard(c,c.items)).join('');
  if(collect.length) html+=collectCard(collect);
  $('tally').textContent=`${cards.length+(collect.length?1:0)} groups · ${work.length} items · ${fmtDate(VIEWDATE)}`;
  if(html) $('groups').innerHTML=html;
  else {
    const last=PODATES.filter(d=>d!==VIEWDATE)[0];
    $('groups').innerHTML = last
      ? `<div class="small" style="margin-bottom:12px">No order for this day yet.</div><button class="addbtn" id="copyBtn">⧉ Copy ${fmtDate(last)} order into this day</button>`
      : '<div class="small">No order yet — tap “＋ Add item” to build it.</div>';
    const cb=$('copyBtn'); if(cb)cb.onclick=()=>copyFrom(last);
  }
  bind();
}
async function copyFrom(date){
  const po=await fetch(`${FLOW}?action=day-po&brand=${BRAND}&date=${date}`).then(r=>r.json()).catch(()=>({}));
  const items=(po.items||[]).map(l=>({item:l.item_name,qty:l.qty,unit:l.unit,cat:l.category,vendor_name:l.vendor_name,vendor_id:l.vendor_id,fulfilment:l.fulfilment,pay_timing:l.pay_timing}));
  if(!items.length)return;
  await fetch(`${FLOW}?action=import-po`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin:PIN,brand:BRAND,for_date:VIEWDATE,replace:true,items})}).catch(()=>{});
  ADDED=new Set();REMOVED=new Set();saveOrderState();load();
}
// commodity / departmental items with no delivery vendor = a buy-at-shop checklist
function collectCard(items){
  const rows=items.map(it=>{const k=mid(it);const q=qtyOf(it);
    return `<div class="row"><div class="nm">${esc(it.name)}${it.category?`<small style="color:var(--dim)">${esc(it.category)}</small>`:''}</div>
      <div class="step"><button data-dec="${k}">−</button><input data-q="${k}" inputmode="decimal" value="${q}"><span class="u">${esc(it.uom||'')}</span><button data-inc="${k}">+</button></div><button class="rm" data-rm="${k}">×</button></div>`;}).join('');
  return `<div class="vcard"><div class="vhead"><div><div class="vname">🛒 Buy / collect</div>
    <div class="badges"><span class="b collect">Departmental & market</span></div></div></div>
    <div class="vnote">Commodities — buy at Ashrafiya / market, compare where cheaper.</div>
    <div class="items">${rows}</div></div>`;
}
function vendorCard(c, items){
  const j=c.j||{fulfil:'deliver',pay:'per'};
  const name=c.v.name; const done=isDone(name);
  const phone=waPhone(c.v.whatsapp_phone||c.v.phone);
  const milk=items.some(it=>isMilk(name,it))||isMilk(name,{});
  const chick=isChicken(name);
  const legs=(j.legs||[]).length?`<span class="b legs">+ ${j.legs.join(' + ')}</span>`:'';
  const itemsHtml=items.map(it=>{
    const k=mid(it);const q=qtyOf(it);const unit=it.uom||'';
    const cheap=it.best_src?`<small class="cheap">⚡ ${it.best_src.replace(/_/g,' ').toLowerCase()} · ₹${it.best_unit_price||it.best_price}${it.best_unit?'/'+it.best_unit:''}${it.best_pack?` (${it.best_pack})`:''}</small>`:'';
    return `<div class="row"><div class="nm">${esc(it.name)}${cheap}</div>
      <div class="step"><button data-dec="${k}">−</button><input data-q="${k}" inputmode="decimal" value="${q}"><span class="u">${esc(unit)}</span><button data-inc="${k}">+</button></div><button class="rm" data-rm="${k}" title="remove">×</button></div>`;
  }).join('');
  let action='';
  if(milk){ action=`<a class="act info" href="/milk">🥛 Open milk flow — standing order & weigh</a>`; }
  else if(chick){ action=`<a class="act wa" data-wa="${esc(name)}" data-phone="${phone}" href="#">📲 Send chicken order</a><a class="act ghost" href="/ops/chicken-price-entry/">Rate & receive → chicken engine</a>`; }
  else if(['deliver','porter','bus','standing'].includes(j.fulfil)&&phone){ action=`<a class="act wa" data-wa="${esc(name)}" data-phone="${phone}" href="#">📲 Send order on WhatsApp</a>`; }
  else if(j.fulfil==='collect'){ action=`<div class="act col">🛒 Collect list — buy at shop</div>`; }
  else { action=`<div class="act col">Order — no number yet</div>`; }
  const note = chick ? 'Counts for tandoori/kebab · kg for boneless/shawarma · rate settles via your engine' : (j.note||'');
  return `<div class="vcard ${done?'done':''}" data-vendor="${esc(name)}">
    <div class="vhead"><div><div class="vname">${esc(name.split('(')[0].trim())}${done?'<span class="ok">✓ ordered</span>':''}</div>
      <div class="badges"><span class="b ${j.fulfil}">${FULFIL[j.fulfil]||'Order'}</span><span class="b pay">${(PAY[j.pay]||'').split('—')[0].trim()}</span>${legs}</div></div></div>
    ${note?`<div class="vnote">${esc(note)}</div>`:''}
    <div class="items">${itemsHtml}</div>
    <div class="actwrap">${action}</div>
    <div class="pay">${PAY[j.pay]||''}</div>
    ${!milk?`<button class="act ghost" data-toggle="${esc(name)}">${done?'↩ mark not ordered':'✓ mark ordered'}</button>`:''}
  </div>`;
}
function bind(){
  document.querySelectorAll('[data-inc]').forEach(b=>b.onclick=()=>nudge(b.dataset.inc,1));
  document.querySelectorAll('[data-dec]').forEach(b=>b.onclick=()=>nudge(b.dataset.dec,-1));
  document.querySelectorAll('[data-q]').forEach(i=>i.onchange=()=>{QTY[i.dataset.q]=Math.max(0,Number(i.value)||0);});
  document.querySelectorAll('[data-wa]').forEach(a=>a.onclick=e=>{e.preventDefault();sendWa(a.dataset.wa,a.dataset.phone);});
  document.querySelectorAll('[data-toggle]').forEach(b=>b.onclick=()=>{const v=b.dataset.toggle;setDone(v,!isDone(v));render();});
  document.querySelectorAll('[data-rm]').forEach(b=>b.onclick=()=>removeItem(b.dataset.rm));
}
function removeItem(k){ADDED.delete(k);REMOVED.add(k);saveOrderState();render();}
// ── Add item: search your catalog, tap to add it (with its vendor) to the order ──
function openAdd(){$('ovl').classList.add('on');$('osearch').value='';renderResults('');setTimeout(()=>$('osearch').focus(),100);}
function closeAdd(){$('ovl').classList.remove('on');}
function inThisOrder(code){ if(REMOVED.has(code))return false; if(ADDED.has(code))return true; return DATA.some(it=>mid(it)===code); }
function renderResults(q){
  q=(q||'').toLowerCase().trim();
  const pool=CATALOG.filter(it=>!inThisOrder(mid(it)));
  const list=(q?pool.filter(it=>(it.name+' '+((it.primary_vendor&&it.primary_vendor.name)||'')).toLowerCase().includes(q)):pool).slice(0,60);
  $('oresults').innerHTML=list.map(it=>{
    const k=mid(it);const v=it.primary_vendor?it.primary_vendor.name.split('(')[0].trim():'Buy / collect';
    return `<div class="ores"><div><div class="on">${esc(it.name)}</div><div class="om">${esc(v)} · ${esc(it.uom||'')}</div></div><button class="add" data-addk="${esc(k)}">＋ Add</button></div>`;
  }).join('')||'<div class="small">No match. Try another word.</div>';
  $('oresults').querySelectorAll('[data-addk]').forEach(b=>b.onclick=()=>{ADDED.add(b.dataset.addk);REMOVED.delete(b.dataset.addk);saveOrderState();renderResults($('osearch').value);render();});
}
function nudge(k,dir){const i=document.querySelector(`[data-q="${CSS.escape(k)}"]`);if(!i)return;let v=Math.max(0,Math.round(((Number(i.value)||0)+dir)*100)/100);i.value=v;QTY[k]=v;}
function sendWa(vendor,phone){
  const card=[...document.querySelectorAll('.vcard')].find(c=>c.dataset.vendor===vendor);if(!card)return;
  const lines=[];
  card.querySelectorAll('.row').forEach(r=>{const nm=r.querySelector('.nm');const q=r.querySelector('[data-q]');
    if(nm&&q){const qty=Number(q.value)||0;if(qty>0){const u=r.querySelector('.u');lines.push(`- ${nm.childNodes[0].textContent.trim()} × ${qty}${u?' '+u.textContent.trim():''}`);}}});
  if(!lines.length){alert('Set a quantity on at least one item first.');return;}
  const brand=BRAND==='NCH'?'Nawabi Chai House':'Hamza Express';
  const date=istNow().toLocaleDateString('en-IN',{day:'numeric',month:'short',timeZone:'UTC'});
  const msg=`${brand} — order for ${date}\n\n${lines.join('\n')}\n\nKindly confirm. — via Sauda`;
  if(!phone){alert('No WhatsApp number saved for this vendor yet.');return;}
  // log the order server-side so it flows into the receive queue (zero manual entry)
  const items=[];
  card.querySelectorAll('.row').forEach(r=>{const nm=r.querySelector('.nm');const q=r.querySelector('[data-q]');
    if(nm&&q){const qty=Number(q.value)||0;if(qty>0){const u=r.querySelector('.u');items.push({name:nm.childNodes[0].textContent.trim(),qty,unit:u?u.textContent.trim():''});}}});
  const j=(DATA.find(it=>it.primary_vendor&&it.primary_vendor.name===vendor)||{}).journey||{};
  fetch('/api/sauda-flow?action=order-create',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({pin:PIN,brand:BRAND,vendor_name:vendor,items,for_date:VIEWDATE,fulfilment:j.fulfil||null,pay_timing:j.pay||null,by:'owner'})}).catch(()=>{});
  setDone(vendor,true);
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,'_blank');
  setTimeout(render,400);
}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
</script>
<div class="ovl" id="ovl">
  <div class="obar"><input id="osearch" placeholder="Search item to add…" inputmode="search"><button class="ox" id="oclose">Done</button></div>
  <div class="results" id="oresults"></div>
</div>

  <a href="/pay"><span class="ic">💸</span>Pay</a>
  <a href="/browse"><span class="ic">🛒</span>Browse</a>
</nav>
