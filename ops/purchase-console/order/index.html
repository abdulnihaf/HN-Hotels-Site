<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Order · Sauda</title>
<style>
  :root{ --gold:#c9a14a; --bg:#08080d; --elev:#15151f; --line:rgba(201,161,74,.22); --ok:#3ba776; --wa:#25d366; --blue:#5e9eff; --txt:#f3f3f6; --dim:#8a8a99; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(130% 80% at 50% 0%,#13131e,#06060a);color:var(--txt);min-height:100dvh;padding:env(safe-area-inset-top) 16px calc(env(safe-area-inset-bottom) + 28px)}
  .wrap{max-width:520px;margin:0 auto}
  h1{font-family:"Cormorant Garamond",Georgia,serif;font-weight:600;font-size:30px;margin:22px 0 2px;letter-spacing:.4px}
  .sub{color:var(--gold);font-size:12.5px;font-style:italic;margin:0 0 16px}
  .brandtog{display:flex;gap:8px;margin-bottom:8px}
  .brandtog button{flex:1;background:var(--elev);border:1px solid var(--line);color:var(--dim);border-radius:13px;padding:13px 0;font-size:15px;font-weight:700}
  .brandtog button.on{background:var(--gold);color:#1a1408;border-color:var(--gold)}
  .clock{text-align:center;font-size:12.5px;color:var(--dim);margin:8px 0 10px;font-variant-numeric:tabular-nums}
  .clock b{color:var(--txt);font-weight:600}
  .daypills{display:flex;gap:8px;justify-content:center;margin:0 0 6px}
  .daypills button{background:var(--elev);border:1px solid var(--line);color:var(--dim);border-radius:11px;padding:9px 16px;font-size:13px;font-weight:600;min-width:96px}
  .daypills button.on{background:rgba(201,161,74,.16);border-color:var(--gold);color:var(--gold)}
  .daypills button small{display:block;font-size:10px;opacity:.7;font-weight:500;margin-top:1px}
  .draftbar{background:rgba(94,158,255,.1);border:1px solid rgba(94,158,255,.3);color:var(--blue);border-radius:12px;padding:10px 12px;font-size:12px;text-align:center;margin:0 0 14px;line-height:1.4}
  .datebar{font-size:12.5px;color:var(--dim);text-align:center;margin:6px 0 16px}
  .grp{margin-bottom:8px}
  .grp h2{font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin:18px 2px 10px;font-weight:700}
  .grp h2 .ic{margin-right:6px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .card{background:var(--elev);border:1px solid var(--line);border-radius:16px;padding:14px;text-decoration:none;color:var(--txt);position:relative;min-height:92px;display:flex;flex-direction:column;justify-content:space-between}
  .card .em{font-size:26px}
  .card .nm{font-size:14px;font-weight:600;line-height:1.25;margin-top:8px}
  .card .qty{font-size:13px;color:var(--gold);font-weight:700;margin-top:4px}
  .card .meta{font-size:11px;color:var(--dim);margin-top:3px}
  .card .cheap{font-size:11px;color:var(--ok);margin-top:5px;font-weight:600}
  .card.done{border-color:var(--ok);box-shadow:inset 0 0 0 1px var(--ok)}
  .card .badge{position:absolute;top:10px;right:10px;font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px}
  .card .badge.ord{background:rgba(59,167,118,.18);color:var(--ok)}
  .card .badge.list{background:rgba(94,158,255,.18);color:var(--blue)}
  .gate{background:var(--elev);border:1px solid var(--line);border-radius:18px;padding:18px;margin-top:30px}
  .gate label{display:block;font-size:11.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.7px;margin:0 0 7px}
  .gate input{width:100%;background:#0b0b13;border:1px solid var(--line);border-radius:12px;color:var(--txt);font-size:21px;padding:13px;outline:none}
  .gate button{width:100%;background:var(--gold);color:#1a1408;border:none;border-radius:12px;padding:15px;font-size:16px;font-weight:700;margin-top:12px}
  .hide{display:none!important}.small{font-size:11.5px;color:var(--dim);text-align:center;margin-top:14px}
  a.back{color:var(--dim);font-size:13px;text-decoration:none;display:inline-block;margin-top:22px}
</style>
</head>
<body>
<div class="wrap">
  <h1 id="ohead">Order</h1>
  <div class="sub">Sauda · purchase</div>

  <div id="gate" class="gate">
    <label>PIN</label>
    <input id="pin" type="password" inputmode="numeric" maxlength="6" placeholder="••••" autocomplete="off">
    <button id="pinBtn">Unlock</button>
    <div id="pinErr" class="small" style="color:#cf5b4e"></div>
  </div>

  <div id="app" class="hide">
    <div class="brandtog"><button data-b="NCH" class="on">Nawabi</button><button data-b="HE">Hamza Express</button></div>
    <div class="clock" id="clock"></div>
    <div class="daypills" id="daypills"></div>
    <div class="datebar" id="datebar"></div>
    <div id="draftbar"></div>
    <button id="refreshAll" style="width:100%;background:transparent;border:1px solid var(--line);color:var(--gold);border-radius:12px;padding:13px;font-size:14px;font-weight:600;margin-bottom:14px">⚡ Refresh all prices</button>
    <div id="groups"></div>
    <a class="back" href="/portals/">⚙ Portals & cookie health</a>
    <a class="back" href="/ops/purchase-console/" style="margin-left:16px">← Sauda</a>
  </div>
</div>
<script>
const API='/api/purchase-item';let PIN='',BRAND='NCH',VIEWDATE=null;const $=id=>document.getElementById(id);
// live IST clock — owner always knows the exact moment he's buying in
function istNow(){return new Date(Date.now()+5.5*3600e3);}
function tickClock(){const t=istNow();const day=t.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',timeZone:'UTC'});const tm=t.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true,timeZone:'UTC'});const c=$('clock');if(c)c.innerHTML=`${day} · <b>${tm}</b> IST`;}
setInterval(tickClock,1000);
function ymd(d){return d.toISOString().slice(0,10);}
document.addEventListener('click',async e=>{ if(e.target&&e.target.id==='refreshAll'){
  const b=e.target;b.disabled=true;let total=0;
  for(let i=0;i<12;i++){ b.textContent=`⚡ Scanning portals… (${total} done)`;
    let d; try{ d=await fetch(`${API}?action=snapshot-run&brand=${BRAND}&all=1`).then(r=>r.json()); }catch(_){ break; }
    if(!d||!d.success) break; total+=(d.items||[]).filter(x=>x.best_src).length; if(!d.more) break; }
  b.disabled=false;b.textContent=`✓ ${total} priced · tap to refresh`;load();
}});
$('pinBtn').onclick=async()=>{const p=$('pin').value.trim();if(!p)return;
  const r=await fetch(`${API}?action=verify-pin&pin=${encodeURIComponent(p)}`).then(r=>r.json()).catch(()=>({success:false}));
  if(r.success){PIN=p;$('gate').classList.add('hide');$('app').classList.remove('hide');load();}else $('pinErr').textContent='Wrong PIN';};
$('pin').addEventListener('keydown',e=>{if(e.key==='Enter')$('pinBtn').click();});
document.querySelectorAll('.brandtog button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.brandtog button').forEach(x=>x.classList.remove('on'));b.classList.add('on');BRAND=b.dataset.b;load();});
// each item routes to its right flow page
function hrefFor(it){
  const q=encodeURIComponent(it.qty_text||'');
  if(it.code==='MILK') return `/milk?qty=${q}`;                 // milk has its own weigh/slot flow
  if(it.channel==='ration') return `/ration/?item=${it.code}&qty=${q}`;
  return `/item/?item=${it.code}&qty=${q}`;                     // vendor WhatsApp order
}
function groupOf(it){
  if(it.channel==='ration') return 'ration';
  return 'vendor';
}
async function load(){
  tickClock();
  $('datebar').textContent='Loading…';
  const q=VIEWDATE?`&date=${VIEWDATE}`:'';
  const d=await fetch(`${API}?action=home&brand=${BRAND}${q}`).then(r=>r.json()).catch(()=>({success:false,items:[]}));
  // Today / Tomorrow pills — stand in either day, place tomorrow's order now
  const ist=d.ist_today||ymd(istNow());
  const tmr=ymd(new Date(new Date(ist+'T00:00:00Z').getTime()+86400000));
  const pills=[['Today',ist,ist.slice(8)+' '+new Date(ist+'T00:00:00Z').toLocaleDateString('en-IN',{month:'short',timeZone:'UTC'})],
               ['Tomorrow',tmr,tmr.slice(8)+' '+new Date(tmr+'T00:00:00Z').toLocaleDateString('en-IN',{month:'short',timeZone:'UTC'})]];
  $('daypills').innerHTML=pills.map(([lbl,dd,sub])=>`<button data-d="${dd}" class="${d.date===dd?'on':''}">${lbl}<small>${sub}</small></button>`).join('');
  $('daypills').querySelectorAll('button').forEach(b=>b.onclick=()=>{VIEWDATE=b.dataset.d;load();});
  // timezone-proof: build from UTC parts + format in UTC so the weekday always matches the calendar date
  const mkUTC=s=>{const[y,m,da]=s.split('-').map(Number);return new Date(Date.UTC(y,m-1,da));};
  const dt=mkUTC(d.date);
  const prep=mkUTC(d.date);prep.setUTCDate(prep.getUTCDate()-1);
  const fmt=x=>x.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short',timeZone:'UTC'});
  const tag=d.day_kind==='today'?'TODAY':d.day_kind==='upcoming'?'UPCOMING':'PAST';
  // headline speaks the same truth as the brain — today/tomorrow/weekday, never hardcoded
  const todayUTC=mkUTC(new Date(Date.now()+5.5*3600e3).toISOString().slice(0,10));
  const dayDelta=Math.round((dt-todayUTC)/86400000);
  const wd=dt.toLocaleDateString('en-IN',{weekday:'long',timeZone:'UTC'});
  $('ohead').textContent = dayDelta===0?"Today's Order" : dayDelta===1?"Tomorrow's Order" : dayDelta===-1?"Yesterday's Order" : (dayDelta>0?`${wd}'s Order`:`${wd} (past)`);
  $('datebar').innerHTML=`<div style="font-size:11px;letter-spacing:1px;color:var(--gold);font-weight:700">PURCHASE ORDER · ${tag}</div>`+
    `<div style="font-size:17px;font-weight:700;margin-top:2px">For ${fmt(dt)}</div>`+
    `<div style="font-size:11px;color:var(--dim);margin-top:1px">prepared ${fmt(prep)} · ${(d.items||[]).length} items</div>`;
  // carried-over draft notice — tomorrow seeded from the last order, owner adjusts
  if(d.is_draft&&d.source_date){const sd=mkUTC(d.source_date);$('draftbar').innerHTML=`📋 Carried over from your ${fmt(sd)} order — adjust quantities or skip what you don't need.`;}
  else $('draftbar').innerHTML='';
  const groups={vendor:[],ration:[]};
  (d.items||[]).forEach(it=>groups[groupOf(it)].push(it));
  const titles={vendor:['📲','Order from vendor (WhatsApp)'],ration:['🛒','Ration — departmental / quick-commerce']};
  let html='';
  for(const g of ['vendor','ration']){
    if(!groups[g].length)continue;
    html+=`<div class="grp"><h2><span class="ic">${titles[g][0]}</span>${titles[g][1]}</h2><div class="grid">`;
    html+=groups[g].map(it=>{
      const done=it.is_ordered||it.on_pickup_list;
      const badge=it.is_ordered?'<span class="badge ord">✓ ordered</span>':it.on_pickup_list?'<span class="badge list">on list</span>':'';
      const meta=it.channel==='ration'?(it.last_dept_store||'departmental'):(it.vendor||'');
      const qtxt=(it.qty_text&&it.qty_text!=='—')?`${it.qty_text} ${it.demand_unit||''}`:(it.qty_text==='—'?'qty at counter':'');
      const qline=qtxt?`<div class="qty">${qtxt}</div>`:'';
      const note=it.note?`<div class="meta">${it.note}</div>`:'';
      // pre-computed cheapest source (snapshot) shown right on the card — the "from where" pre-answered
      const cheap=it.best_src?`<div class="cheap">⚡ ${it.best_src} · ₹${it.best_price}${it.best_unit_price?' <span style="opacity:.7">(₹'+it.best_unit_price+'/'+it.best_unit+')</span>':''}</div>`:'';
      return `<a class="card ${done?'done':''}" href="${hrefFor(it)}">${badge}<div class="em">${it.emoji||'📦'}</div><div><div class="nm">${it.name}</div>${qline}<div class="meta">${meta}</div>${cheap}${note}</div></a>`;
    }).join('');
    html+=`</div></div>`;
  }
  $('groups').innerHTML=html||'<div class="small">No items for this brand yet.</div>';
}
</script>
</body>
</html>
