<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Purchase Console - HN Hotels</title>
  <meta name="theme-color" content="#0c0c14">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/ops-ui.css">
  <style>
    :root {
      --pc-line: rgba(255,255,255,0.08);
      --pc-soft: rgba(255,255,255,0.04);
      --pc-soft-2: rgba(255,255,255,0.07);
      --pc-green: #34d399;
      --pc-blue: #60a5fa;
      --pc-yellow: #fbbf24;
      --pc-red: #f87171;
      --pc-purple: #a78bfa;
    }
    * { box-sizing: border-box; }
    body { min-height: 100vh; padding-bottom: 88px; }
    .shell { width: min(1280px, 100%); margin: 0 auto; padding: 10px 12px; }

    /* ━━━ Header ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .topbar {
      position: sticky; top: 0; z-index: 30;
      background: rgba(12,12,20,0.96);
      border-bottom: 1px solid var(--pc-line);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
    }
    .topbar-inner {
      display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: center;
      padding: 10px 12px; width: min(1280px, 100%); margin: 0 auto;
    }
    .title-block h1 { font-size: 16px; margin: 0; }
    .title-block p { margin: 2px 0 0; color: var(--text-dim); font-size: 11px; }

    /* ━━━ PIN gate ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .pin-wrap { display: flex; align-items: center; justify-content: center; min-height: 70vh; padding: 16px; }
    .pin-card { width: min(360px, 100%); padding: 24px; text-align: center; }

    /* ━━━ Filter bar ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .filter-bar {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 8px; align-items: center;
      padding: 10px 0;
      position: sticky; top: 62px; z-index: 20;
      background: rgba(12,12,20,0.94);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--pc-line);
      margin-bottom: 12px;
    }
    .filter-bar input[type="search"], .filter-bar select {
      min-height: 40px;
      padding: 0 12px;
      border: 1px solid var(--pc-line);
      background: var(--pc-soft);
      color: var(--text);
      border-radius: 8px; font-size: 13px; font-weight: 600;
    }
    .filter-bar input[type="search"] { width: 100%; }
    .filter-bar .stat {
      font-size: 11px; color: var(--text-dim); white-space: nowrap;
      padding: 0 10px;
    }
    .btn-ghost-sm {
      min-height: 40px; padding: 0 12px;
      border: 1px solid var(--pc-line); background: var(--pc-soft);
      color: var(--text); font-weight: 700; font-size: 12px;
      border-radius: 8px; cursor: pointer;
    }
    .btn-ghost-sm:hover { background: var(--pc-soft-2); }

    /* ━━━ Category section ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .cat-section { margin-bottom: 20px; }
    .cat-head {
      display: grid; grid-template-columns: 1fr auto; align-items: center;
      gap: 8px; margin: 14px 0 8px;
      padding-bottom: 6px; border-bottom: 1px solid var(--pc-line);
    }
    .cat-head h2 { margin: 0; font-size: 13px; letter-spacing: 0.4px; text-transform: uppercase; color: var(--text-dim); }
    .cat-head .cat-count { font-size: 11px; color: var(--text-dim); }

    /* ━━━ Material row ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .mat-row {
      border: 1px solid var(--pc-line);
      background: rgba(255,255,255,.03);
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 8px;
      display: grid;
      gap: 8px;
    }
    .mat-row.has-best { border-color: rgba(52,211,153,.15); }
    .mat-row.in-cart { border-color: rgba(96,165,250,.4); background: rgba(96,165,250,.05); }
    .mat-row-head {
      display: grid;
      grid-template-columns: 24px 1fr auto;
      gap: 10px; align-items: center;
    }
    .mat-row-name {
      font-size: 14px; font-weight: 800; line-height: 1.2;
    }
    .mat-row-meta {
      font-size: 11px; color: var(--text-dim); margin-top: 2px;
    }
    .mat-qty {
      display: inline-flex; align-items: center; gap: 4px;
      border: 1px solid var(--pc-line); border-radius: 6px;
      background: var(--pc-soft); padding: 2px;
    }
    .mat-qty button {
      width: 24px; height: 24px;
      border: none; background: transparent; color: var(--text);
      font-weight: 800; font-size: 14px; cursor: pointer;
      border-radius: 4px;
    }
    .mat-qty button:hover { background: var(--pc-soft-2); }
    .mat-qty input {
      width: 48px; min-height: 24px;
      border: none; background: transparent; color: var(--text);
      text-align: center; font-weight: 800; font-size: 13px;
    }
    .mat-qty .uom { font-size: 10px; color: var(--text-dim); padding: 0 4px; }

    /* Best deal card */
    .best-deal {
      display: grid;
      grid-template-columns: 32px 1fr auto auto;
      gap: 10px; align-items: center;
      padding: 8px 10px;
      border-radius: 8px;
      background: rgba(52,211,153,.08);
      border: 1px solid rgba(52,211,153,.25);
    }
    .best-deal.no-best {
      background: rgba(255,255,255,.04);
      border-color: var(--pc-line);
    }
    .best-portal-logo {
      width: 32px; height: 32px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 900; color: white;
      text-shadow: 0 1px 1px rgba(0,0,0,.4);
    }
    .best-deal-body {
      display: grid; gap: 1px; min-width: 0;
    }
    .best-deal-portal { font-size: 12px; font-weight: 800; line-height: 1.2; }
    .best-deal-sku {
      font-size: 11px; color: var(--text-dim); line-height: 1.25;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .best-deal-price {
      font-size: 15px; font-weight: 900; text-align: right;
    }
    .best-deal-rate {
      font-size: 10px; color: var(--text-dim); text-align: right;
    }
    .best-deal-actions {
      display: flex; gap: 6px;
    }
    .action-btn {
      min-height: 32px; padding: 0 10px;
      border: 1px solid var(--pc-line); background: var(--pc-soft);
      color: var(--text); font-weight: 800; font-size: 11px;
      border-radius: 6px; cursor: pointer;
      text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
      white-space: nowrap;
    }
    .action-btn:hover { background: var(--pc-soft-2); }
    .action-btn.add { background: rgba(52,211,153,.15); border-color: rgba(52,211,153,.4); color: var(--pc-green); }
    .action-btn.in-cart { background: rgba(96,165,250,.2); border-color: rgba(96,165,250,.5); color: var(--pc-blue); }

    /* Alternatives row */
    .alts-row {
      display: flex; gap: 6px; flex-wrap: wrap;
      padding-left: 34px;
    }
    .alt-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 8px;
      border: 1px solid var(--pc-line);
      background: rgba(255,255,255,.025);
      border-radius: 14px;
      font-size: 11px;
      cursor: pointer; text-decoration: none; color: var(--text);
    }
    .alt-chip:hover { background: var(--pc-soft-2); }
    .alt-chip.disabled { opacity: 0.4; cursor: default; }
    .alt-chip-logo {
      width: 16px; height: 16px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 8px; font-weight: 900; color: white;
    }
    .alt-chip-name { font-weight: 700; }
    .alt-chip-price { color: var(--text-dim); font-weight: 600; }
    .alt-chip.lv { background: rgba(255,255,255,.06); }

    /* Baseline line */
    .baseline-line {
      font-size: 11px; color: var(--text-dim);
      padding-left: 34px;
    }
    .baseline-line strong { color: var(--text); font-weight: 800; }

    /* Refresh button per row */
    .row-refresh {
      width: 26px; height: 26px;
      border: 1px solid var(--pc-line); background: var(--pc-soft);
      color: var(--text); border-radius: 6px;
      cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
      font-size: 12px;
    }
    .row-refresh:hover { background: var(--pc-soft-2); }
    .row-refresh:disabled { opacity: 0.4; cursor: wait; animation: pulse 1s infinite; }
    @keyframes pulse { 50% { opacity: 0.65; } }

    /* Portal logos (CSS) */
    .pl-hp { background: #dc2c2e; }
    .pl-bb { background: #82bc18; }
    .pl-bk { background: #ffcc28; color: #1a1300; text-shadow: none; }
    .pl-jm { background: #0079c8; }
    .pl-fm { background: #2874f0; }
    .pl-zp { background: #c81e85; }
    .pl-is { background: #fc8019; }
    .pl-an { background: #ff9900; }
    .pl-lv { background: rgba(255,255,255,.18); color: var(--text); text-shadow: none; }

    /* ━━━ Sticky cart bar ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .cart-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(12,12,20,0.98);
      border-top: 1px solid var(--pc-line);
      padding: 10px 12px;
      display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center;
      z-index: 40;
    }
    .cart-bar.empty { background: rgba(12,12,20,0.9); }
    .cart-summary {
      font-size: 12px; font-weight: 700;
      overflow-x: auto; white-space: nowrap;
      scrollbar-width: none;
    }
    .cart-summary::-webkit-scrollbar { display: none; }
    .cart-summary .empty-msg { color: var(--text-dim); font-weight: 600; }
    .cart-summary .portal-pill {
      display: inline-flex; align-items: center; gap: 4px;
      margin-right: 6px; padding: 2px 8px;
      border-radius: 12px;
      background: rgba(96,165,250,.15); border: 1px solid rgba(96,165,250,.3);
      font-size: 11px; font-weight: 800;
    }
    .cart-summary .pill-total { font-weight: 700; color: var(--text-dim); }
    .btn-view-carts {
      min-height: 36px; padding: 0 12px;
      background: var(--pc-blue); border: none; color: #0c0c14;
      font-weight: 900; font-size: 12px; border-radius: 6px;
      cursor: pointer; white-space: nowrap;
    }
    .btn-view-carts:disabled { opacity: 0.5; background: var(--pc-soft); color: var(--text-dim); cursor: not-allowed; }

    /* ━━━ Cart modal ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 50;
      background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .modal-backdrop.hide { display: none; }
    .modal-card {
      width: min(760px, 100%); max-height: 90vh; overflow-y: auto;
      background: #14141f; border: 1px solid var(--pc-line); border-radius: 12px;
      padding: 16px; display: grid; gap: 14px;
    }
    .modal-head {
      display: grid; grid-template-columns: 1fr auto; align-items: center;
    }
    .modal-close {
      width: 36px; height: 36px;
      border: 1px solid var(--pc-line); background: var(--pc-soft);
      color: var(--text); border-radius: 8px;
      font-size: 16px; cursor: pointer;
    }
    .cart-portal-section {
      border: 1px solid var(--pc-line); border-radius: 8px;
      padding: 12px;
    }
    .cart-portal-head {
      display: grid; grid-template-columns: 32px 1fr auto auto; gap: 10px;
      align-items: center; margin-bottom: 8px;
    }
    .cart-portal-name { font-weight: 900; font-size: 14px; }
    .cart-portal-total { font-weight: 900; font-size: 14px; }
    .cart-portal-open {
      min-height: 32px; padding: 0 12px;
      background: var(--pc-blue); color: #0c0c14;
      border: none; font-weight: 800; font-size: 12px; border-radius: 6px;
      cursor: pointer; text-decoration: none;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .cart-line {
      display: grid; grid-template-columns: 1fr auto auto auto; gap: 8px;
      align-items: center; padding: 6px 0; font-size: 12px;
      border-top: 1px dashed var(--pc-line);
    }
    .cart-line:first-of-type { border-top: none; }
    .cart-line-name { font-weight: 700; }
    .cart-line-meta { font-size: 10px; color: var(--text-dim); }
    .cart-line-price { font-weight: 800; }
    .cart-line-remove {
      width: 26px; height: 26px;
      border: 1px solid var(--pc-line); background: transparent;
      color: var(--pc-red); border-radius: 6px;
      cursor: pointer; font-size: 12px;
    }
    .empty-state {
      text-align: center; padding: 28px 12px;
      color: var(--text-dim); font-size: 13px;
    }

    /* ━━━ Custom SKU search results ━━━━━━━━━━━━━━━━━━━━ */
    .custom-search-results {
      padding: 12px; background: var(--pc-soft); border-radius: 8px;
      border: 1px solid var(--pc-line); margin-bottom: 12px;
    }
    .custom-search-head {
      display: grid; grid-template-columns: 1fr auto; align-items: center;
      margin-bottom: 8px;
    }
    .custom-search-head h3 { margin: 0; font-size: 13px; }

    @media (max-width: 720px) {
      .filter-bar { grid-template-columns: 1fr; }
      .filter-bar .stat { display: none; }
      .best-deal { grid-template-columns: 28px 1fr; row-gap: 6px; }
      .best-deal-price, .best-deal-rate { grid-column: 1 / -1; text-align: left; padding-left: 0; }
      .best-deal-actions { grid-column: 1 / -1; }
    }

    .hide { display: none !important; }
    .toast {
      position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%);
      background: var(--pc-blue); color: #0c0c14;
      padding: 10px 16px; border-radius: 8px;
      font-weight: 800; font-size: 12px;
      z-index: 60; box-shadow: 0 6px 20px rgba(0,0,0,.4);
    }
  </style>
</head>
<body class="bg">
  <header class="topbar">
    <div class="topbar-inner">
      <div class="title-block">
        <h1>Purchase Console</h1>
        <p id="subtitle">Cheapest scout across 8 portals</p>
      </div>
      <div style="display:flex;gap:6px;align-items:center;">
        <a class="btn btn-ghost btn-sm" href="/ops/purchase/">PO ledger</a>
      </div>
    </div>
  </header>

  <main>
    <!-- PIN gate -->
    <section id="pinGate" class="pin-wrap">
      <div class="card pin-card">
        <h2>Enter PIN</h2>
        <p class="sub" style="margin:6px 0 16px;">Purchase console access</p>
        <input id="pinInput" class="pin-input" type="password" maxlength="4" inputmode="numeric" autocomplete="one-time-code" placeholder="----">
        <button id="unlockBtn" class="btn btn-primary btn-full" type="button" style="margin-top:12px;">Unlock</button>
        <p id="pinError" class="mute hide" style="margin-top:10px;color:#f87171;">Invalid PIN.</p>
      </div>
    </section>

    <!-- App -->
    <section id="app" class="hide">
      <div class="shell">

        <div class="filter-bar">
          <input id="searchInput" type="search" placeholder="🔎 Search material or SKU…" autocomplete="off">
          <select id="categoryFilter" aria-label="Category"></select>
          <span id="stat" class="stat">— materials</span>
          <button id="reloadBtn" class="btn-ghost-sm" type="button">↻ Refresh data</button>
        </div>

        <div id="customSearchPanel" class="hide custom-search-results">
          <div class="custom-search-head">
            <h3 id="customSearchTitle">Custom SKU search</h3>
            <button id="customSearchClose" class="btn-ghost-sm" type="button">✕ Close</button>
          </div>
          <div id="customSearchGrid"></div>
        </div>

        <div id="listGrid"></div>
      </div>
    </section>
  </main>

  <!-- Sticky cart bar -->
  <div id="cartBar" class="cart-bar empty hide">
    <div id="cartSummary" class="cart-summary"><span class="empty-msg">🛒 No items added yet</span></div>
    <button id="viewCartsBtn" class="btn-view-carts" type="button" disabled>View carts</button>
  </div>

  <!-- Cart modal -->
  <div id="cartModal" class="modal-backdrop hide">
    <div class="modal-card">
      <div class="modal-head">
        <div>
          <h2 style="margin:0;font-size:18px;">My Carts</h2>
          <p class="sub" style="margin:4px 0 0;color:var(--text-dim);font-size:11px;">
            Open each portal to add these items to its real cart. We track your selection here; the portals' cart API isn't public.
          </p>
        </div>
        <button id="cartModalClose" class="modal-close" type="button">✕</button>
      </div>
      <div id="cartContent"></div>
    </div>
  </div>

  <script>
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Constants
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    const PORTAL_ORDER = ['LOCAL_VENDOR', 'HYPERPURE', 'BIGBASKET', 'BLINKIT', 'ZEPTO', 'FLIPKART_MINUTES', 'AMAZON_NOW', 'JIOMART', 'INSTAMART'];
    const PORTAL_SOURCE_KEYS = PORTAL_ORDER.filter((k) => k !== 'LOCAL_VENDOR');

    const SOURCE_LABELS = {
      LOCAL_VENDOR: 'Local Vendor',
      HYPERPURE: 'Hyperpure', BIGBASKET: 'BigBasket', BLINKIT: 'Blinkit',
      ZEPTO: 'Zepto', FLIPKART_MINUTES: 'Flipkart Minutes', AMAZON_NOW: 'Amazon Now',
      JIOMART: 'JioMart', INSTAMART: 'Instamart',
    };
    const SOURCE_SHORT = {
      LOCAL_VENDOR: 'LV', HYPERPURE: 'HP', BIGBASKET: 'BB', BLINKIT: 'BLK',
      ZEPTO: 'ZPT', FLIPKART_MINUTES: 'FK', AMAZON_NOW: 'AMZ',
      JIOMART: 'JM', INSTAMART: 'IM',
    };
    const LOGO_CLASS = {
      LOCAL_VENDOR: 'pl-lv', HYPERPURE: 'pl-hp', BIGBASKET: 'pl-bb', BLINKIT: 'pl-bk',
      ZEPTO: 'pl-zp', FLIPKART_MINUTES: 'pl-fm', AMAZON_NOW: 'pl-an',
      JIOMART: 'pl-jm', INSTAMART: 'pl-is',
    };
    const LOGO_LETTER = {
      LOCAL_VENDOR: 'LV', HYPERPURE: 'H', BIGBASKET: 'BB', BLINKIT: 'B',
      ZEPTO: 'Z', FLIPKART_MINUTES: 'FK', AMAZON_NOW: 'A',
      JIOMART: 'J', INSTAMART: 'I',
    };
    const PORTAL_SEARCH_URL = {
      HYPERPURE: (q) => `https://www.hyperpure.com/in/search/${encodeURIComponent(String(q || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '') || 'search')}?type=SEARCH&query=${encodeURIComponent(q)}`,
      BIGBASKET: (q) => `https://www.bigbasket.com/ps/?q=${encodeURIComponent(q)}`,
      BLINKIT: (q) => `https://blinkit.com/s/?q=${encodeURIComponent(q)}`,
      FLIPKART_MINUTES: (q) => `https://www.flipkart.com/search?q=${encodeURIComponent(q)}&marketplace=HYPERLOCAL`,
      AMAZON_NOW: (q) => `https://www.amazon.in/s?k=${encodeURIComponent(q)}&i=nowstore`,
      ZEPTO: (q) => `https://www.zepto.com/search?query=${encodeURIComponent(q)}`,
      JIOMART: (q) => `https://www.jiomart.com/search?text=${encodeURIComponent(q)}`,
      INSTAMART: (q) => `https://www.swiggy.com/instamart/search?custom_back=true&query=${encodeURIComponent(q)}`,
    };
    const PORTAL_CART_URL = {
      HYPERPURE: 'https://www.hyperpure.com/in/cart',
      BIGBASKET: 'https://www.bigbasket.com/basket/',
      BLINKIT: 'https://blinkit.com/cart',
      FLIPKART_MINUTES: 'https://www.flipkart.com/viewcart',
      AMAZON_NOW: 'https://www.amazon.in/gp/cart/view.html',
      ZEPTO: 'https://www.zepto.com/cart',
      JIOMART: 'https://www.jiomart.com/cart',
      INSTAMART: 'https://www.swiggy.com/instamart/checkout',
    };

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // State
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    const state = {
      pin: localStorage.getItem('purchaseConsolePin') || '',
      user: null,
      snapshot: { date: '', materials: [], loading: false },
      materialsMeta: {},  // material_id -> { last_vendor_price, last_vendor_name, uom, category, vendors }
      query: '',
      category: localStorage.getItem('purchaseConsoleCategory') || 'ALL',
      refreshing: new Set(),
      cart: JSON.parse(localStorage.getItem('purchaseConsoleCart') || '{}'),  // sourceKey -> [{material_id,name,qty,uom,price_paise,sku_url,sku_title,added_at}]
      customSearchQuery: '',
      customSearchResults: null,
      customSearchRunning: false,
    };

    const els = {
      pinGate: document.getElementById('pinGate'),
      pinInput: document.getElementById('pinInput'),
      pinError: document.getElementById('pinError'),
      unlockBtn: document.getElementById('unlockBtn'),
      app: document.getElementById('app'),
      subtitle: document.getElementById('subtitle'),
      searchInput: document.getElementById('searchInput'),
      categoryFilter: document.getElementById('categoryFilter'),
      stat: document.getElementById('stat'),
      reloadBtn: document.getElementById('reloadBtn'),
      listGrid: document.getElementById('listGrid'),
      cartBar: document.getElementById('cartBar'),
      cartSummary: document.getElementById('cartSummary'),
      viewCartsBtn: document.getElementById('viewCartsBtn'),
      cartModal: document.getElementById('cartModal'),
      cartModalClose: document.getElementById('cartModalClose'),
      cartContent: document.getElementById('cartContent'),
      customSearchPanel: document.getElementById('customSearchPanel'),
      customSearchTitle: document.getElementById('customSearchTitle'),
      customSearchClose: document.getElementById('customSearchClose'),
      customSearchGrid: document.getElementById('customSearchGrid'),
    };

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Helpers
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    function escapeHtml(v) {
      return String(v ?? '').replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }
    function escapeAttr(v) { return escapeHtml(v).replace(/`/g, '&#096;'); }
    function money(n) {
      const v = Number(n);
      if (!Number.isFinite(v) || v <= 0) return '—';
      return '₹' + new Intl.NumberFormat('en-IN', { minimumFractionDigits: v >= 100 ? 0 : 2, maximumFractionDigits: v >= 100 ? 0 : 2 }).format(v);
    }
    function moneyPaise(p) { return money(Number(p || 0) / 100); }
    function toast(msg, ms = 2200) {
      const el = document.createElement('div');
      el.className = 'toast'; el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), ms);
    }
    async function fetchJson(path, opts) {
      const res = await fetch(path, opts);
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `Request failed (${res.status})`);
      return data;
    }
    function persistCart() {
      localStorage.setItem('purchaseConsoleCart', JSON.stringify(state.cart));
    }
    function freshnessLabel(iso) {
      if (!iso) return '';
      try {
        const d = new Date(iso);
        const ageMs = Date.now() - d.getTime();
        if (ageMs < 60_000) return 'just now';
        if (ageMs < 3_600_000) return `${Math.round(ageMs / 60_000)}m ago`;
        if (ageMs < 86_400_000) return d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
        return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short' });
      } catch (_) { return ''; }
    }
    function portalSearchUrlFor(sourceKey, query) {
      const fn = PORTAL_SEARCH_URL[sourceKey];
      return fn ? fn(query || '') : '';
    }
    function bestUrlFor(source, materialQuery) {
      const raw = source?.sku_url || source?.raw?.sku_url || '';
      if (/^https?:\/\//i.test(raw)) return raw;
      return portalSearchUrlFor(source?.source_key, materialQuery);
    }
    function isPortalSourceQuoted(s) {
      return s && s.stock_status === 'QUOTED' && (Number(s.unit_price_paise) || Number(s.price_paise) || 0) > 0;
    }
    function sourcePrice(s) { return Number(s?.unit_price_paise || s?.price_paise || 0); }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Auth + data loading
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    async function verifyPin() {
      const pin = (els.pinInput.value || state.pin).trim();
      if (!pin || pin.length !== 4) { els.pinError.classList.remove('hide'); return; }
      els.unlockBtn.disabled = true;
      try {
        const d = await fetchJson(`/api/purchase-control?action=verify-pin&pin=${encodeURIComponent(pin)}`);
        state.pin = pin; state.user = d.user;
        localStorage.setItem('purchaseConsolePin', pin);
        els.pinGate.classList.add('hide');
        els.app.classList.remove('hide');
        els.subtitle.textContent = `${d.user.name} · ${d.user.role}`;
        await Promise.all([loadMaterialsMeta(), loadSnapshot()]);
        renderCartBar();
      } catch (e) {
        els.pinError.textContent = e.message || 'Invalid PIN.';
        els.pinError.classList.remove('hide');
      } finally {
        els.unlockBtn.disabled = false;
      }
    }

    async function loadMaterialsMeta() {
      try {
        const d = await fetchJson(`/api/purchase-control?action=materials&pin=${encodeURIComponent(state.pin)}&brand=BOTH&days=30`);
        const map = {};
        for (const it of (d.items || [])) {
          const id = (it.product_code || (it.item_id || '').replace(/^code:/, '') || '').toString();
          if (!id) continue;
          map[id] = {
            name: it.name, uom: it.uom || 'unit', category: it.category || '—',
            last_vendor_price: Number(it.last_vendor_price || 0),
            last_vendor_name: it.last_vendor_name || (it.vendors || [])[0]?.name || '',
          };
        }
        state.materialsMeta = map;
      } catch (_) {}
    }

    async function loadSnapshot() {
      if (!state.pin) return;
      state.snapshot.loading = true;
      els.listGrid.innerHTML = `<div class="empty-state">Loading today's snapshot…</div>`;
      try {
        const d = await fetchJson(`/api/purchase-control?action=daily-snapshot&pin=${encodeURIComponent(state.pin)}&brand=BOTH`);
        state.snapshot.date = d.date;
        state.snapshot.materials = d.materials || [];
        // Build category dropdown options based on the data we have
        const cats = new Set(state.snapshot.materials.map((m) => m.category || '—').filter(Boolean));
        const opts = ['<option value="ALL">All categories</option>',
          ...[...cats].sort().map((c) => `<option value="${escapeAttr(c)}">${escapeHtml(c)}</option>`)];
        els.categoryFilter.innerHTML = opts.join('');
        if ([...cats].includes(state.category) || state.category === 'ALL') {
          els.categoryFilter.value = state.category;
        } else {
          state.category = 'ALL'; els.categoryFilter.value = 'ALL';
        }
      } catch (err) {
        toast(err.message || 'Snapshot load failed');
      } finally {
        state.snapshot.loading = false;
        renderList();
      }
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Cart logic
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    function cartItemIndex(sourceKey, materialId) {
      const lines = state.cart[sourceKey] || [];
      return lines.findIndex((l) => l.material_id === materialId);
    }
    function isInCart(sourceKey, materialId) { return cartItemIndex(sourceKey, materialId) >= 0; }
    function addToCart(material, source, qty) {
      const sourceKey = source.source_key;
      if (!state.cart[sourceKey]) state.cart[sourceKey] = [];
      const line = {
        material_id: material.material_id,
        name: material.name,
        qty: Number(qty) || 1,
        uom: material.uom || state.materialsMeta[material.material_id]?.uom || 'unit',
        price_paise: Number(source.unit_price_paise || source.price_paise || 0),
        sku_url: bestUrlFor(source, material.name),
        sku_title: source.sku_title || material.name,
        portal_label: SOURCE_LABELS[sourceKey] || sourceKey,
        added_at: new Date().toISOString(),
      };
      const idx = cartItemIndex(sourceKey, material.material_id);
      if (idx >= 0) { state.cart[sourceKey][idx] = line; } else { state.cart[sourceKey].push(line); }
      persistCart();
      renderCartBar(); renderList();
      toast(`Added ${material.name} · ${line.portal_label}`);
    }
    function removeFromCart(sourceKey, materialId) {
      const lines = state.cart[sourceKey] || [];
      state.cart[sourceKey] = lines.filter((l) => l.material_id !== materialId);
      if (!state.cart[sourceKey].length) delete state.cart[sourceKey];
      persistCart();
      renderCartBar(); renderCartModal(); renderList();
    }
    function setCartQty(sourceKey, materialId, qty) {
      const lines = state.cart[sourceKey] || [];
      const line = lines.find((l) => l.material_id === materialId);
      if (line) { line.qty = Math.max(0.01, Number(qty) || 1); persistCart(); renderCartBar(); renderCartModal(); }
    }

    function cartTotals() {
      const totals = {};
      let grand = 0;
      for (const [src, lines] of Object.entries(state.cart)) {
        let portalTotal = 0; let portalCount = 0;
        for (const l of lines) {
          portalTotal += (l.price_paise / 100) * (l.qty || 1);
          portalCount += 1;
        }
        totals[src] = { count: portalCount, total: portalTotal };
        grand += portalTotal;
      }
      return { byPortal: totals, grand };
    }

    function renderCartBar() {
      const { byPortal, grand } = cartTotals();
      const portalKeys = Object.keys(byPortal);
      els.cartBar.classList.remove('hide');
      if (!portalKeys.length) {
        els.cartBar.classList.add('empty');
        els.cartSummary.innerHTML = `<span class="empty-msg">🛒 No items added yet — tap [➕ Add] on any deal to start a cart</span>`;
        els.viewCartsBtn.disabled = true;
        return;
      }
      els.cartBar.classList.remove('empty');
      const pills = portalKeys.sort().map((sk) => {
        const t = byPortal[sk];
        return `<span class="portal-pill" title="${escapeAttr(SOURCE_LABELS[sk] || sk)}">
          <span class="alt-chip-logo ${LOGO_CLASS[sk] || ''}">${escapeHtml(LOGO_LETTER[sk] || '?')}</span>
          ${escapeHtml(SOURCE_SHORT[sk] || sk)}·${t.count}
          <span class="pill-total">${money(t.total)}</span>
        </span>`;
      }).join('');
      els.cartSummary.innerHTML = `🛒 ${pills} <span class="pill-total" style="margin-left:8px;">Total ${money(grand)}</span>`;
      els.viewCartsBtn.disabled = false;
    }

    function renderCartModal() {
      const { byPortal, grand } = cartTotals();
      const portalKeys = Object.keys(byPortal).sort();
      if (!portalKeys.length) {
        els.cartContent.innerHTML = `<div class="empty-state">Your carts are empty. Tap [➕ Add] on any best-deal card to start a cart.</div>`;
        return;
      }
      const sections = portalKeys.map((sk) => {
        const lines = state.cart[sk] || [];
        const t = byPortal[sk];
        const linesHtml = lines.map((l) => `
          <div class="cart-line">
            <div>
              <div class="cart-line-name">${escapeHtml(l.name)}</div>
              <div class="cart-line-meta">${escapeHtml(l.sku_title || '')}</div>
            </div>
            <div class="mat-qty" style="border:1px solid var(--pc-line);">
              <button type="button" data-qty-dec="${escapeAttr(sk)}|${escapeAttr(l.material_id)}">−</button>
              <input type="number" min="0.01" step="0.25" value="${escapeAttr(l.qty)}" data-qty-input="${escapeAttr(sk)}|${escapeAttr(l.material_id)}">
              <span class="uom">${escapeHtml(l.uom)}</span>
              <button type="button" data-qty-inc="${escapeAttr(sk)}|${escapeAttr(l.material_id)}">+</button>
            </div>
            <div class="cart-line-price">${moneyPaise(l.price_paise * (l.qty || 1))}</div>
            <button class="cart-line-remove" type="button" data-cart-remove="${escapeAttr(sk)}|${escapeAttr(l.material_id)}" title="Remove">✕</button>
          </div>
        `).join('');
        const cartHref = PORTAL_CART_URL[sk] || portalSearchUrlFor(sk, '');
        return `
          <div class="cart-portal-section">
            <div class="cart-portal-head">
              <div class="best-portal-logo ${LOGO_CLASS[sk]}">${escapeHtml(LOGO_LETTER[sk])}</div>
              <div>
                <div class="cart-portal-name">${escapeHtml(SOURCE_LABELS[sk])}</div>
                <div class="cart-line-meta">${t.count} item${t.count === 1 ? '' : 's'}</div>
              </div>
              <div class="cart-portal-total">${money(t.total)}</div>
              <a class="cart-portal-open" href="${escapeAttr(cartHref)}" target="_blank" rel="noopener">Open ${escapeHtml(SOURCE_SHORT[sk])} cart ↗</a>
            </div>
            ${linesHtml}
          </div>
        `;
      }).join('');
      const grandHtml = `<div style="text-align:right;font-size:14px;font-weight:900;padding:8px;border-top:1px solid var(--pc-line);">Grand total: ${money(grand)}</div>`;
      els.cartContent.innerHTML = sections + grandHtml;
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Material list rendering
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    function bestSourceFor(material) {
      const portals = (material.sources || []).filter((s) => s.source_key !== 'LOCAL_VENDOR' && isPortalSourceQuoted(s));
      portals.sort((a, b) => sourcePrice(a) - sourcePrice(b));
      return portals[0] || null;
    }
    function quotedSourcesSortedFor(material) {
      const portals = (material.sources || []).filter((s) => s.source_key !== 'LOCAL_VENDOR' && isPortalSourceQuoted(s));
      portals.sort((a, b) => sourcePrice(a) - sourcePrice(b));
      return portals;
    }
    function baselineFor(material) {
      const meta = state.materialsMeta[material.material_id] || {};
      const lvSource = (material.sources || []).find((s) => s.source_key === 'LOCAL_VENDOR' && isPortalSourceQuoted(s));
      if (lvSource) return { paise: sourcePrice(lvSource), name: lvSource.sku_title || meta.last_vendor_name || 'Local Vendor' };
      if (meta.last_vendor_price > 0) return { paise: Math.round(meta.last_vendor_price * 100), name: meta.last_vendor_name || 'Local Vendor' };
      return null;
    }
    function deltaVsBase(price, base) {
      if (!base || !base.paise) return '';
      const d = Math.round(((price - base.paise) / base.paise) * 100);
      if (!Number.isFinite(d)) return '';
      const sign = d > 0 ? '+' : '';
      const cls = d > 2 ? 'up' : d < -2 ? 'down' : 'flat';
      const color = cls === 'up' ? 'color:var(--pc-red);' : cls === 'down' ? 'color:var(--pc-green);' : 'color:var(--text-dim);';
      return `<span style="${color}font-size:10px;font-weight:700;">${sign}${d}%</span>`;
    }

    function renderQuantityControl(material, currentQty) {
      const uom = material.uom || state.materialsMeta[material.material_id]?.uom || 'unit';
      return `
        <div class="mat-qty">
          <button type="button" data-mat-qty-dec="${escapeAttr(material.material_id)}">−</button>
          <input type="number" min="0.01" step="0.25" value="${escapeAttr(currentQty)}" data-mat-qty-input="${escapeAttr(material.material_id)}">
          <span class="uom">${escapeHtml(uom)}</span>
          <button type="button" data-mat-qty-inc="${escapeAttr(material.material_id)}">+</button>
        </div>
      `;
    }

    function renderMaterialRow(material) {
      const meta = state.materialsMeta[material.material_id] || {};
      const uom = material.uom || meta.uom || 'unit';
      const best = bestSourceFor(material);
      const allQuoted = quotedSourcesSortedFor(material);
      const baseline = baselineFor(material);
      const qty = (material._qty == null ? 1 : material._qty);
      const inCartSourceKey = best ? (isInCart(best.source_key, material.material_id) ? best.source_key : null) : null;
      const inCartAnywhere = Object.entries(state.cart).some(([sk, lines]) => lines.some((l) => l.material_id === material.material_id));
      const rowCls = `mat-row ${best ? 'has-best' : ''} ${inCartAnywhere ? 'in-cart' : ''}`;

      let bestHtml = '';
      if (best) {
        const price = sourcePrice(best);
        const sk = best.source_key;
        const sku = (best.sku_title || '').slice(0, 60);
        const delta = baseline ? deltaVsBase(price, baseline) : '';
        const openHref = bestUrlFor(best, material.name);
        const inCart = inCartSourceKey != null;
        const actionLabel = inCart ? '✓ In cart' : '➕ Add';
        const actionCls = inCart ? 'in-cart' : 'add';
        const rateText = `${moneyPaise(price)}/${uom}`;
        bestHtml = `
          <div class="best-deal">
            <div class="best-portal-logo ${LOGO_CLASS[sk]}">${escapeHtml(LOGO_LETTER[sk])}</div>
            <div class="best-deal-body">
              <div class="best-deal-portal">⭐ ${escapeHtml(SOURCE_LABELS[sk])} · 🏆 cheapest</div>
              <div class="best-deal-sku" title="${escapeAttr(best.sku_title || '')}">${escapeHtml(sku)}</div>
            </div>
            <div>
              <div class="best-deal-price">${moneyPaise(price)}</div>
              <div class="best-deal-rate">${rateText} ${delta}</div>
            </div>
            <div class="best-deal-actions">
              <a class="action-btn" href="${escapeAttr(openHref)}" target="_blank" rel="noopener" title="Open ${escapeAttr(SOURCE_LABELS[sk])}">Open ↗</a>
              <button class="action-btn ${actionCls}" type="button" data-add-mat="${escapeAttr(material.material_id)}" data-add-source="${escapeAttr(sk)}">${actionLabel}</button>
            </div>
          </div>
        `;
      } else {
        bestHtml = `
          <div class="best-deal no-best">
            <div class="best-portal-logo pl-lv">—</div>
            <div class="best-deal-body">
              <div class="best-deal-portal" style="color:var(--text-dim);">No portal price available</div>
              <div class="best-deal-sku">Tap 🔄 to rescout, or use Local Vendor</div>
            </div>
            <div></div>
            <div class="best-deal-actions"><button class="row-refresh" data-row-refresh="${escapeAttr(material.material_id)}" type="button" title="Rescout this material">🔄</button></div>
          </div>
        `;
      }

      // Alternatives chips — all non-best portals (sorted by price asc, unavailable last)
      const altsHtml = PORTAL_SOURCE_KEYS.map((sk) => {
        if (best && sk === best.source_key) return '';
        const s = (material.sources || []).find((x) => x.source_key === sk);
        if (!s) {
          // No row — show as unavailable but still allow click → portal search
          const url = portalSearchUrlFor(sk, material.name);
          return url
            ? `<a class="alt-chip disabled" href="${escapeAttr(url)}" target="_blank" rel="noopener" title="Search on ${escapeAttr(SOURCE_LABELS[sk])}">
              <span class="alt-chip-logo ${LOGO_CLASS[sk]}">${escapeHtml(LOGO_LETTER[sk])}</span>
              <span class="alt-chip-name">${escapeHtml(SOURCE_SHORT[sk])}</span>
              <span class="alt-chip-price">—</span>
            </a>` : '';
        }
        const quoted = isPortalSourceQuoted(s);
        const url = bestUrlFor(s, material.name);
        const price = quoted ? moneyPaise(sourcePrice(s)) : (s.stock_status === 'ERROR' ? 'err' : '—');
        return `
          <a class="alt-chip ${quoted ? '' : 'disabled'}" href="${escapeAttr(url)}" target="_blank" rel="noopener" title="${escapeAttr(s.sku_title || SOURCE_LABELS[sk])}">
            <span class="alt-chip-logo ${LOGO_CLASS[sk]}">${escapeHtml(LOGO_LETTER[sk])}</span>
            <span class="alt-chip-name">${escapeHtml(SOURCE_SHORT[sk])}</span>
            <span class="alt-chip-price">${escapeHtml(price)}</span>
          </a>
        `;
      }).filter(Boolean).join('');

      // Local-vendor baseline line
      let baselineHtml = '';
      if (baseline) {
        baselineHtml = `<div class="baseline-line">📍 Local Vendor (${escapeHtml(baseline.name)}): <strong>${moneyPaise(baseline.paise)}/${escapeHtml(uom)}</strong></div>`;
      }

      const refreshDisabled = state.refreshing.has(material.material_id);

      return `
        <div class="${rowCls}" data-mat-id="${escapeAttr(material.material_id)}">
          <div class="mat-row-head">
            <div></div>
            <div>
              <div class="mat-row-name">${escapeHtml(material.name)}</div>
              <div class="mat-row-meta">${escapeHtml(meta.category || material.category || '—')} · ${escapeHtml(uom)}</div>
            </div>
            <div style="display:flex;gap:6px;align-items:center;">
              ${renderQuantityControl(material, qty)}
              <button class="row-refresh" type="button" data-row-refresh="${escapeAttr(material.material_id)}" title="Rescout this material" ${refreshDisabled ? 'disabled' : ''}>${refreshDisabled ? '⟳' : '🔄'}</button>
            </div>
          </div>
          ${bestHtml}
          ${baselineHtml}
          <div class="alts-row">${altsHtml}</div>
        </div>
      `;
    }

    function renderList() {
      const mats = state.snapshot.materials || [];
      const q = (state.query || '').trim().toLowerCase();
      // Cross-reference materials meta to fill missing data
      const filtered = mats.filter((m) => {
        if (state.category !== 'ALL' && (m.category || '—') !== state.category) return false;
        if (!q) return true;
        const meta = state.materialsMeta[m.material_id] || {};
        const hay = (m.name + ' ' + (meta.category || '') + ' ' + (m.material_id || '')).toLowerCase();
        if (hay.includes(q)) return true;
        // Also search inside SKU titles
        for (const s of (m.sources || [])) {
          if ((s.sku_title || '').toLowerCase().includes(q)) return true;
        }
        return false;
      });

      // Group by category
      const groups = new Map();
      for (const m of filtered) {
        const c = m.category || '—';
        if (!groups.has(c)) groups.set(c, []);
        groups.get(c).push(m);
      }

      // Update stat
      const totalQuotes = filtered.reduce((acc, m) => acc + (m.sources || []).filter((s) => isPortalSourceQuoted(s)).length, 0);
      els.stat.textContent = `${filtered.length} materials · ${totalQuotes} live quotes`;

      if (!filtered.length) {
        els.listGrid.innerHTML = `<div class="empty-state">${q ? `No materials match "${escapeHtml(q)}"` : 'No materials available'}</div>`;
        return;
      }

      const ordered = [...groups.entries()].sort((a, b) => a[0].localeCompare(b[0]));
      const html = ordered.map(([cat, items]) => {
        items.sort((a, b) => a.name.localeCompare(b.name));
        const rows = items.map(renderMaterialRow).join('');
        return `
          <section class="cat-section">
            <div class="cat-head">
              <h2>${escapeHtml(cat)}</h2>
              <span class="cat-count">${items.length} item${items.length === 1 ? '' : 's'}</span>
            </div>
            ${rows}
          </section>
        `;
      }).join('');
      els.listGrid.innerHTML = html;
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // On-demand refresh
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    async function refreshOneMaterial(materialId) {
      if (!state.pin || state.refreshing.has(materialId)) return;
      state.refreshing.add(materialId);
      renderList();
      try {
        const d = await fetchJson('/api/purchase-control?action=refresh-material', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pin: state.pin, material_id: materialId, sources: PORTAL_SOURCE_KEYS }),
        });
        const updated = (d.snapshot || []);
        const idx = state.snapshot.materials.findIndex((m) => m.material_id === d.material_id);
        if (idx >= 0) state.snapshot.materials[idx].sources = updated;
        const c = d.counts || {};
        toast(`${d.material_name}: ${c.ok || 0} ok · ${c.error || 0} err`);
      } catch (err) {
        toast(err.message || 'Refresh failed');
      } finally {
        state.refreshing.delete(materialId);
        renderList();
      }
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Custom SKU search
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    async function runCustomSearch(rawQuery) {
      const q = (rawQuery || '').trim();
      if (!q) { els.customSearchPanel.classList.add('hide'); return; }
      state.customSearchQuery = q;
      state.customSearchRunning = true;
      els.customSearchPanel.classList.remove('hide');
      els.customSearchTitle.textContent = `Custom search: "${q}"`;
      els.customSearchGrid.innerHTML = `<div class="empty-state">Scouting across 8 portals for "${escapeHtml(q)}"…</div>`;
      // Use the first material's id as a placeholder; refresh-material requires a material_id.
      // We fake a scoutable material by submitting via a special "search" path.
      // We use the EXACT-SKU search via refresh-material on the first available material id, but custom query
      // — actually we'll iterate through portal search URLs directly (open new tabs is the fallback).
      // Simpler approach: present per-portal search links the user can open in new tabs.
      const chips = PORTAL_SOURCE_KEYS.map((sk) => {
        const url = portalSearchUrlFor(sk, q);
        return `
          <a class="alt-chip" href="${escapeAttr(url)}" target="_blank" rel="noopener" style="font-size:13px;padding:8px 12px;">
            <span class="alt-chip-logo ${LOGO_CLASS[sk]}" style="width:22px;height:22px;font-size:10px;">${escapeHtml(LOGO_LETTER[sk])}</span>
            <span class="alt-chip-name">${escapeHtml(SOURCE_LABELS[sk])} ↗</span>
          </a>
        `;
      }).join('');
      els.customSearchGrid.innerHTML = `
        <div style="margin-bottom:8px;font-size:11px;color:var(--text-dim);">
          Open this exact SKU on each portal. Compare manually — our scout works against materials in your purchase list, not arbitrary queries.
        </div>
        <div class="alts-row" style="padding-left:0;">${chips}</div>
      `;
      state.customSearchRunning = false;
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Event wiring
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    els.unlockBtn.addEventListener('click', verifyPin);
    els.pinInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') verifyPin(); });
    els.reloadBtn.addEventListener('click', loadSnapshot);
    els.categoryFilter.addEventListener('change', (e) => {
      state.category = e.target.value;
      localStorage.setItem('purchaseConsoleCategory', state.category);
      renderList();
    });

    let searchTimer;
    els.searchInput.addEventListener('input', (e) => {
      state.query = e.target.value;
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        renderList();
        // If the query is 3+ chars and doesn't match anything, show custom search panel as a hint
        const q = (state.query || '').trim();
        if (q.length >= 3) {
          const matches = (state.snapshot.materials || []).some((m) =>
            (m.name || '').toLowerCase().includes(q.toLowerCase()) ||
            (m.sources || []).some((s) => (s.sku_title || '').toLowerCase().includes(q.toLowerCase()))
          );
          if (!matches) runCustomSearch(q);
          else els.customSearchPanel.classList.add('hide');
        } else {
          els.customSearchPanel.classList.add('hide');
        }
      }, 250);
    });

    els.customSearchClose.addEventListener('click', () => {
      els.customSearchPanel.classList.add('hide');
    });

    els.viewCartsBtn.addEventListener('click', () => {
      renderCartModal();
      els.cartModal.classList.remove('hide');
    });
    els.cartModalClose.addEventListener('click', () => els.cartModal.classList.add('hide'));
    els.cartModal.addEventListener('click', (e) => { if (e.target === els.cartModal) els.cartModal.classList.add('hide'); });

    // Delegated row actions
    document.addEventListener('click', (event) => {
      const t = event.target;
      const addBtn = t.closest('[data-add-mat]');
      if (addBtn) {
        const matId = addBtn.dataset.addMat;
        const sourceKey = addBtn.dataset.addSource;
        const material = state.snapshot.materials.find((m) => m.material_id === matId);
        if (!material) return;
        const source = (material.sources || []).find((s) => s.source_key === sourceKey);
        if (!source) return;
        const qty = parseFloat(document.querySelector(`[data-mat-qty-input="${matId}"]`)?.value || '1') || 1;
        // Toggle: if already in cart at this portal, remove
        if (isInCart(sourceKey, matId)) {
          removeFromCart(sourceKey, matId);
          toast(`Removed ${material.name}`);
        } else {
          addToCart(material, source, qty);
        }
        return;
      }

      const refBtn = t.closest('[data-row-refresh]');
      if (refBtn) {
        const matId = refBtn.dataset.rowRefresh;
        refreshOneMaterial(matId);
        return;
      }

      const inc = t.closest('[data-mat-qty-inc]');
      if (inc) {
        const id = inc.dataset.matQtyInc;
        const input = document.querySelector(`[data-mat-qty-input="${id}"]`);
        if (input) { input.value = (parseFloat(input.value) || 0) + 1; input.dispatchEvent(new Event('change', { bubbles: true })); }
        return;
      }
      const dec = t.closest('[data-mat-qty-dec]');
      if (dec) {
        const id = dec.dataset.matQtyDec;
        const input = document.querySelector(`[data-mat-qty-input="${id}"]`);
        if (input) { input.value = Math.max(0.25, (parseFloat(input.value) || 0) - 1); input.dispatchEvent(new Event('change', { bubbles: true })); }
        return;
      }

      // Cart modal quantity controls
      const cInc = t.closest('[data-qty-inc]');
      if (cInc) {
        const [sk, mid] = cInc.dataset.qtyInc.split('|');
        const input = document.querySelector(`[data-qty-input="${sk}|${mid}"]`);
        if (input) { const v = (parseFloat(input.value) || 0) + 1; input.value = v; setCartQty(sk, mid, v); }
        return;
      }
      const cDec = t.closest('[data-qty-dec]');
      if (cDec) {
        const [sk, mid] = cDec.dataset.qtyDec.split('|');
        const input = document.querySelector(`[data-qty-input="${sk}|${mid}"]`);
        if (input) { const v = Math.max(0.25, (parseFloat(input.value) || 0) - 1); input.value = v; setCartQty(sk, mid, v); }
        return;
      }
      const cRm = t.closest('[data-cart-remove]');
      if (cRm) {
        const [sk, mid] = cRm.dataset.cartRemove.split('|');
        removeFromCart(sk, mid);
        return;
      }
    });

    document.addEventListener('change', (event) => {
      const inp = event.target.closest('[data-mat-qty-input]');
      if (inp) {
        const id = inp.dataset.matQtyInput;
        const v = Math.max(0.25, parseFloat(inp.value) || 1);
        inp.value = v;
        // Store qty on the material for next render
        const mat = state.snapshot.materials.find((m) => m.material_id === id);
        if (mat) mat._qty = v;
        return;
      }
      const cInp = event.target.closest('[data-qty-input]');
      if (cInp) {
        const [sk, mid] = cInp.dataset.qtyInput.split('|');
        const v = Math.max(0.25, parseFloat(cInp.value) || 1);
        setCartQty(sk, mid, v);
        return;
      }
    });

    // Boot
    if (state.pin) {
      els.pinInput.value = state.pin;
      verifyPin();
    }
  </script>
</body>
</html>
