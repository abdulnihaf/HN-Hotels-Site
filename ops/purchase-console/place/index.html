<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Sauda · Place Order</title>
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#000; --card:#13131a; --card2:#1b1b24; --border:rgba(255,255,255,.09);
    --text:#f7f7fa; --muted:#9a9aa3; --gold:#d4a24c; --gold-dim:rgba(212,162,76,.16);
    --gold-bd:rgba(212,162,76,.42); --green:#37d399; --green-dim:rgba(55,211,153,.14);
    --red:#ff5c5c; --serif:'Cormorant Garamond', Georgia, serif;
    --safe-top:env(safe-area-inset-top,0px); --safe-bot:env(safe-area-inset-bottom,0px);
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif; font-size:14px; }
  .screen { display:none; flex-direction:column; height:100vh; height:100dvh; overflow:hidden; }
  .screen.active { display:flex; }
  .scroll { overflow-y:auto; flex:1; padding:0 16px calc(24px + var(--safe-bot)); }
  .nav { padding:calc(14px + var(--safe-top)) 16px 12px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
  .nav-back { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:20px; cursor:pointer; flex-shrink:0; }
  .nav-title { font-size:16px; font-weight:800; flex:1; }
  .nav-sub { font-size:11px; color:var(--muted); margin-top:2px; }
  .gate { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; padding:24px; }
  .tile { width:72px; height:72px; border-radius:16px; background:var(--card); border:1px solid var(--gold-bd); display:flex; align-items:center; justify-content:center; font-size:28px; color:var(--gold); margin-bottom:18px; font-family:var(--serif); }
  .brand { font-family:var(--serif); font-size:48px; font-weight:700; }
  .brand-sub { font-family:var(--serif); font-style:italic; font-size:15px; color:var(--gold); margin:2px 0 26px; text-align:center; }
  .pin-dots { display:flex; gap:14px; margin:4px 0 22px; }
  .pin-dot { width:12px; height:12px; border-radius:50%; border:1.5px solid rgba(212,162,76,.6); }
  .pin-dot.filled { background:var(--gold); border-color:var(--gold); }
  .pad { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; justify-items:center; width:100%; max-width:280px; }
  .key { background:var(--card2); border:1px solid var(--border); border-radius:50%; width:66px; height:66px; display:flex; align-items:center; justify-content:center; font-size:24px; cursor:pointer; }
  .key:active { background:var(--gold-dim); border-color:var(--gold); transform:scale(.96); }
  .key.del { color:var(--red); font-size:18px; }
  .err { color:var(--red); font-size:13px; min-height:18px; margin-top:12px; }
  .datechips { display:flex; gap:8px; padding:12px 16px 2px; }
  .chip { flex:1; text-align:center; padding:11px; border-radius:11px; background:var(--card); border:1px solid var(--border); font-weight:800; font-size:13px; cursor:pointer; color:var(--muted); }
  .chip.on { color:var(--gold); border-color:var(--gold-bd); background:var(--gold-dim); }
  .sect { font-size:11px; font-weight:800; letter-spacing:.07em; color:var(--muted); text-transform:uppercase; margin:20px 4px 2px; }
  .vcard { display:flex; align-items:center; gap:12px; background:var(--card); border:1px solid var(--border); border-radius:14px; padding:15px 14px; margin-top:9px; cursor:pointer; }
  .vcard:active { background:var(--card2); }
  .vico { width:46px; height:46px; border-radius:12px; background:var(--card2); display:flex; align-items:center; justify-content:center; font-size:21px; flex-shrink:0; }
  .vname { font-size:15px; font-weight:800; }
  .vmeta { font-size:11px; color:var(--muted); margin-top:3px; }
  .vbadge { font-size:11px; font-weight:800; color:var(--green); }
  .varrow { color:var(--gold); font-size:19px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:13px; padding:13px; margin-top:10px; }
  .row { display:flex; align-items:center; gap:11px; }
  .iname { font-size:15px; font-weight:700; }
  .imeta { font-size:11px; color:var(--muted); margin-top:2px; }
  .qin { width:88px; background:var(--card2); border:1px solid var(--border); border-radius:10px; padding:11px 8px; color:var(--text); font-size:20px; font-weight:800; text-align:center; outline:none; }
  .qin:focus { border-color:var(--gold); }
  .placed { font-size:12px; color:var(--green); margin-top:6px; }
  .actions { padding:10px 16px calc(12px + var(--safe-bot)); border-top:1px solid var(--border); }
  .btn { width:100%; border:none; border-radius:12px; padding:16px; font-size:15px; font-weight:800; cursor:pointer; background:var(--gold); color:#1a1206; font-family:inherit; }
  .btn:disabled { opacity:.35; }
  .toast { position:fixed; bottom:calc(28px + var(--safe-bot)); left:50%; transform:translateX(-50%); padding:12px 22px; border-radius:12px; font-size:14px; font-weight:700; z-index:999; opacity:0; transition:opacity .3s; pointer-events:none; background:var(--green-dim); color:var(--green); border:1px solid rgba(55,211,153,.4); white-space:nowrap; }
  .toast.show { opacity:1; }
</style>
</head>
<body>

<!-- GATE -->
<div id="s-gate" class="screen active">
  <div class="gate">
    <div class="tile">سودا</div>
    <div class="brand">Sauda</div>
    <div class="brand-sub">Pick the vendor. Fill the plan. Done.</div>
    <div class="pin-dots"><div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div><div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div></div>
    <div class="pad">
      <div class="key" onclick="key('1')">1</div><div class="key" onclick="key('2')">2</div><div class="key" onclick="key('3')">3</div>
      <div class="key" onclick="key('4')">4</div><div class="key" onclick="key('5')">5</div><div class="key" onclick="key('6')">6</div>
      <div class="key" onclick="key('7')">7</div><div class="key" onclick="key('8')">8</div><div class="key" onclick="key('9')">9</div>
      <div class="key" style="opacity:0"></div><div class="key" onclick="key('0')">0</div><div class="key del" onclick="del()">⌫</div>
    </div>
    <div class="err" id="gate-err"></div>
  </div>
</div>

<!-- STEP 1: PICK THE VENDOR -->
<div id="s-vendors" class="screen">
  <div class="nav"><div style="flex:1"><div class="nav-title" id="navTitle">Place Order</div><div class="nav-sub" id="who"></div></div></div>
  <div class="datechips">
    <div class="chip" id="b-nch" onclick="setBrand('NCH')">☕ Nawabi Chai House</div>
    <div class="chip" id="b-he" onclick="setBrand('HE')">🍗 Hamza Express</div>
  </div>
  <div class="datechips">
    <div class="chip" id="chip-today" onclick="setDate(0)">For TODAY</div>
    <div class="chip on" id="chip-tmrw" onclick="setDate(1)">For TOMORROW</div>
  </div>
  <div class="scroll" id="vlist"></div>
</div>

<!-- STEP 2: THE VENDOR'S PLAN -->
<div id="s-basket" class="screen">
  <div class="nav">
    <div class="nav-back" onclick="goVendors()">‹</div>
    <div style="flex:1"><div class="nav-title" id="bTitle"></div><div class="nav-sub" id="bSub"></div></div>
  </div>
  <div class="scroll" id="bBody"></div>
  <div class="actions"><button class="btn" id="bPlace" onclick="placeBasket()">Place this plan →</button></div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api/anbar';
/* THE ORDER'S UNIT IS THE VENDOR. Step 1: tap the vendor. Step 2: fill the plan.
   channel 'delivers' = Zoya orders, vendor delivers · 'pickup' = Bashir go-collects.
   Every vendor plan takes ad-hoc extra items; whole new vendors via 'Someone else'.
   NOTHING is ever pushed from the backend — people create every line. */
const VENDORS = [
  /* ── NAWABI CHAI HOUSE ── */
  { brand:'NCH', key:'ganga',   ch:'delivers', icon:'🍞', name:'Ganga Bakery',        meta:'buns · PREPAID · WE book the Porter',
    items:[{code:'NCH-BUN',name:'Buns',unit:'no',counter:true}] },
  { brand:'NCH', key:'suhail',  ch:'delivers', icon:'🍗', name:'Abdul Suhail',        meta:'cutlets · order → delivers',
    items:[{code:'NCH-CC',name:'Chicken Cutlet',unit:'box (30 pcs)',counter:true}] },
  { brand:'NCH', key:'nazeer',  ch:'delivers', icon:'💧', name:'Nazeer Nadeem',       meta:'Bisleri water · delivers fresh',
    items:[{code:'NCH-WTR',name:'Water (Bisleri)',unit:'case',counter:true}] },
  { brand:'NCH', key:'bootha',  ch:'delivers', icon:'🥛', name:'Bootha Narayana',     meta:'buffalo milk · AM + PM',
    items:[{code:'PO-MILK-AM',name:'Milk — morning',unit:'L'},{code:'PO-MILK-PM',name:'Milk — evening',unit:'L'}] },
  { brand:'NCH', key:'farooq',  ch:'delivers', icon:'🍪', name:'M Farooq Siddique',   meta:'Osmania ONLY · bulk → store room',
    items:[{code:'NCH-OB',name:'Osmania Biscuit',unit:'box (480 pcs)',counter:true}] },
  { brand:'NCH', key:'jayjay',  ch:'delivers', icon:'🥛', name:'Jay & Jay',           meta:'milk powder (SMP) · bulk → store room · NEFT',
    items:[{code:'HN-RM-201',name:'Skimmed Milk Powder',unit:'kg'}] },
  { brand:'NCH', key:'bharat',  ch:'delivers', icon:'🔥', name:'A M Ruba Bharat Gas', meta:'LPG cylinder',
    items:[{code:'PO-LPG',name:'LPG cylinder',unit:'no'}] },
  { brand:'NCH', key:'krishna', ch:'pickup',   icon:'🥟', name:'Krishnamoorthi',      meta:'samosa · go-collect',
    items:[{code:'NCH-PS',name:'Pyaaz Samosa',unit:'no',counter:true}] },
  { brand:'NCH', key:'ashrafia-nch', ch:'pickup', icon:'🏪', name:'Ashrafia',         meta:'departmental — butter, Milkmaid, khajoor raw materials (khajoor is MADE IN HOUSE)',
    items:[{code:'PO-BUTTER',name:'Butter',unit:'pkt'},{code:'PO-MILKMAID',name:'Milkmaid',unit:'kg'},{code:'PO-KHAJOOR-RM',name:'Khajoor raw materials',unit:'kg'}] },
  { brand:'NCH', key:'market',  ch:'pickup',   icon:'🛒', name:'Market run',          meta:'fresh — lemon, pudina',
    items:[{code:'PO-LEMON',name:'Lemon',unit:'no'},{code:'PO-PUDINA',name:'Pudina (mint)',unit:'bundle'}] },
  { brand:'NCH', key:'rupnath', ch:'pickup',   icon:'📦', name:'Rupnath Traders',     meta:'cups · tissue · packaging · go-collect',
    items:[{code:'PO-CUPS',name:'Use-&-throw cups',unit:'no'},{code:'PO-TISSUE',name:'Tissue paper',unit:'bundle'}] },

  /* ── HAMZA EXPRESS (PO source: Azeem chef; Zoya/Bashir place) ── */
  { brand:'HE', key:'manjunath', ch:'delivers', icon:'🥬', name:'Manjunath N',  meta:'fresh vegetables',
    items:[{code:'HEPO-TOMATO',name:'Tomato',unit:'kg'},{code:'HEPO-ALOO',name:'Potato (aloo)',unit:'kg'},{code:'HEPO-GREENCHILLI',name:'Green chilli',unit:'kg'},{code:'HEPO-GOBI',name:'Gobi',unit:'kg'},{code:'HEPO-BEANS',name:'Beans',unit:'gm'},{code:'HEPO-CUCUMBER',name:'Cucumber',unit:'kg'},{code:'HEPO-KADDU',name:'Pumpkin (kaddu)',unit:'kg'},{code:'HEPO-LEMON',name:'Lemon',unit:'pc'},{code:'HEPO-PUDINA',name:'Pudina patta',unit:'bunch'},{code:'HEPO-DHANIA',name:'Dhania patta',unit:'bunch'},{code:'HEPO-SPRINGONION',name:'Spring onion',unit:'bunch'},{code:'HEPO-STAFFSABJI',name:'Staff sabji (mixed veg)',unit:'kg'}] },
  { brand:'HE', key:'mn-chicken', ch:'delivers', icon:'🐔', name:'MN — chicken', meta:'shawarma kg · tandoori birds',
    items:[{code:'HEPO-SHAWARMA-CHK',name:'Shawarma chicken',unit:'kg'},{code:'HEPO-TANDOORI-CHK',name:'Tandoori chicken',unit:'birds'}] },
  { brand:'HE', key:'ashrafia-he', ch:'pickup', icon:'🏪', name:'Ashrafia', meta:'dry goods · spices · dahi · butter · go-collect',
    items:[{code:'HEPO-OIL-GOLD',name:'Oil (Gold)',unit:'L'},{code:'HEPO-SALADOIL',name:'Salad oil',unit:'L'},{code:'HEPO-VINEGAR',name:'Vinegar',unit:'L'},{code:'HEPO-HALDI',name:'Turmeric powder',unit:'kg'},{code:'HEPO-WHITEPEPPER',name:'White pepper',unit:'gm'},{code:'HEPO-BLACKPEPPER',name:'Whole black pepper',unit:'gm'},{code:'HEPO-REDCHILLI',name:'Whole red chilli',unit:'kg'},{code:'HEPO-NOODLES',name:'Noodles',unit:'pc'},{code:'HEPO-KISAN',name:'Tomato sauce (Kisan)',unit:'L'},{code:'HEPO-STAFFRICE',name:'Staff rice',unit:'bora'},{code:'HEPO-DAHI',name:'Dahi',unit:'L'},{code:'HEPO-BUTTER',name:'Butter',unit:'kg'}] },
  { brand:'HE', key:'siraj-eggs', ch:'pickup', icon:'🥚', name:'Syed Siraj', meta:'eggs · go-collect',
    items:[{code:'HEPO-EGG',name:'Eggs',unit:'crate'}] },
  { brand:'HE', key:'tabrez', ch:'delivers', icon:'🫓', name:'MD Tabrez', meta:'rumali roti',
    items:[{code:'HEPO-RUMALI',name:'Rumali roti',unit:'pc'}] },
  { brand:'HE', key:'irshad', ch:'delivers', icon:'🥩', name:'Irshad — mutton', meta:'mutton',
    items:[{code:'HEPO-MUTTON',name:'Mutton',unit:'kg'}] },
  { brand:'HE', key:'sajid', ch:'delivers', icon:'🧠', name:'Sajid — bheja', meta:'brain (bheja)',
    items:[{code:'HEPO-BHEJA',name:'Bheja (brain)',unit:'set'}] },
  { brand:'HE', key:'mudassir', ch:'delivers', icon:'🪵', name:'Mudassir Pasha', meta:'charcoal',
    items:[{code:'HEPO-CHARCOAL',name:'Charcoal',unit:'bag'}] },
  { brand:'HE', key:'nazeer-he', ch:'delivers', icon:'💧', name:'Nazeer Nadeem', meta:'water + beverages',
    items:[{code:'HEPO-WATER',name:'Water (Bisleri)',unit:'case'},{code:'HEPO-BEVERAGES',name:'Beverages (soft drinks)',unit:'case'}] },
  { brand:'HE', key:'bharat-he', ch:'delivers', icon:'🔥', name:'A M Ruba Bharat Gas', meta:'LPG · serves BOTH outlets',
    items:[{code:'HEPO-LPG',name:'LPG cylinder',unit:'no'}] },
  { brand:'HE', key:'rupnath-he', ch:'pickup', icon:'📦', name:'Rupnath Traders', meta:'tissue · foil · packaging',
    items:[{code:'HEPO-TISSUE',name:'Tissue paper',unit:'bundle'},{code:'HEPO-WRAPFOIL',name:'Wrap foil',unit:'pc'}] },

  { brand:'both', key:'other', ch:'both', icon:'➕', name:'Someone else', meta:'any vendor, any item', items:[] },
];
const S = { pin: localStorage.getItem('sauda_pin')||'', person:'', entry:'', dayOffset:1, vendor:null, placed:[], brand: localStorage.getItem('sauda_brand')||'NCH' };
function el(id){return document.getElementById(id);}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));el(id).classList.add('active');}
function toast(m,bad){const t=el('toast');t.textContent=m;t.style.color=bad?'var(--red)':'var(--green)';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}
function istDate(off){return new Date(Date.now()+5.5*3600e3+off*86400e3).toISOString().slice(0,10);}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function key(k){if(S.entry.length>=4)return;S.entry+=k;dots();if(S.entry.length===4)verify();}
function del(){S.entry=S.entry.slice(0,-1);dots();el('gate-err').textContent='';}
function dots(){for(let i=0;i<4;i++)el('d'+i).classList.toggle('filled',i<S.entry.length);}
async function verify(){
  const r=await fetch(`/api/sauda-pay?action=verify-pin&pin=${S.entry}`).then(x=>x.json()).catch(()=>({}));
  if(!r.success){el('gate-err').textContent='Wrong PIN';S.entry='';dots();return;}
  S.pin=S.entry;S.person=r.person;S.entry='';localStorage.setItem('sauda_pin',S.pin);
  goVendors();
}

function setDate(off){S.dayOffset=off;el('chip-today').classList.toggle('on',off===0);el('chip-tmrw').classList.toggle('on',off===1);goVendors();}
function setBrand(b){S.brand=b;localStorage.setItem('sauda_brand',b);goVendors();}

/* ── STEP 1: vendor grid (brand → the person's channel first, the other below) ── */
async function goVendors(){
  el('who').textContent=`${S.person} · tap a vendor, fill the plan`;
  el('navTitle').textContent=`Place Order · ${S.brand}`;
  el('b-nch').classList.toggle('on',S.brand==='NCH');el('b-he').classList.toggle('on',S.brand==='HE');
  show('s-vendors');
  const date=istDate(S.dayOffset);
  const r=await fetch(`${API}?action=orders&date=${date}&brand=${S.brand}`).then(x=>x.json()).catch(()=>({lines:[]}));
  S.placed=r.lines||[];
  const BV=VENDORS.filter(v=>v.brand===S.brand||v.brand==='both');
  const mine=(S.person==='Bashir')?'pickup':'delivers';
  const sections=[[mine==='pickup'?'🛵 Your go-collect rounds':'📦 You order, they deliver',mine],
                  [mine==='pickup'?'📦 Ordered & delivered (Zoya)':'🛵 Go-collect (Bashir)',mine==='pickup'?'delivers':'pickup']];
  const codeVendor={};BV.forEach(v=>v.items.forEach(i=>codeVendor[i.code]=v.key));
  el('vlist').innerHTML=sections.map(([title,ch])=>
    `<div class="sect">${title}</div>`+
    BV.filter(v=>v.ch===ch||v.ch==='both').map(v=>{
      const lines=S.placed.filter(p=>p.status==='pending'&&(codeVendor[p.item_code]===v.key||(v.key==='other'&&!codeVendor[p.item_code])));
      return `<div class="vcard" onclick="openVendor('${v.key}')">
        <div class="vico">${v.icon}</div>
        <div style="flex:1"><div class="vname">${v.name}</div><div class="vmeta">${v.meta}</div>
        ${lines.length?`<div class="vbadge">✓ ${lines.length} line${lines.length>1?'s':''} placed</div>`:''}</div>
        <div class="varrow">›</div>
      </div>`;
    }).join('')
  ).join('');
}

/* ── STEP 2: the vendor's plan ── */
function openVendor(key){
  S.vendor=VENDORS.find(v=>v.key===key);
  el('bTitle').textContent=S.vendor.name;
  el('bSub').textContent=`${S.vendor.meta} · for ${istDate(S.dayOffset)===istDate(0)?'TODAY':'TOMORROW'}`;
  const codeSet=new Set(S.vendor.items.map(i=>i.code));
  const mineLines=S.placed.filter(p=>codeSet.has(p.item_code)||(S.vendor.key==='other'&&!VENDORS.some(v=>v.items.some(i=>i.code===p.item_code))));
  let h='';
  h+=S.vendor.items.map(it=>{
    const prev=mineLines.filter(p=>p.item_code===it.code);
    return `<div class="card"><div class="row">
      <div style="flex:1"><div class="iname">${it.name}${it.counter?' <span style="font-size:9px;color:var(--gold);font-weight:800">· COUNTER CHECK</span>':''}</div>
      <div class="imeta">unit: ${it.unit}</div>
      ${prev.map(p=>`<div class="placed">${p.status==='pending'?`✓ placed: ${p.ordered_qty} ${p.ordered_unit} <span style="color:var(--red);font-weight:800;margin-left:8px;cursor:pointer" onclick="cancelLine(${p.id})">✕</span>`:`${p.ordered_qty} ${p.ordered_unit} · ${p.status}`}</div>`).join('')}</div>
      <input class="qin" type="number" inputmode="numeric" placeholder="—" data-code="${it.code}" data-name="${esc(it.name)}" data-unit="${esc(it.unit)}">
    </div></div>`;
  }).join('');
  // every vendor takes an extra line — zero rigidity
  h+=`<div class="sect">Anything extra from ${esc(S.vendor.name)}</div>
    <div class="card"><div class="row" style="flex-wrap:wrap;gap:8px">
      <input class="qin" style="flex:2;min-width:140px;text-align:left;font-size:14px;font-weight:600" id="x-name" placeholder="item name">
      <input class="qin" style="width:70px" id="x-qty" type="number" inputmode="numeric" placeholder="qty">
      <input class="qin" style="width:80px;font-size:13px;font-weight:600" id="x-unit" placeholder="unit">
    </div></div>`;
  el('bBody').innerHTML=h;
  show('s-basket');
}

async function placeBasket(){
  const date=istDate(S.dayOffset);
  const lines=[...document.querySelectorAll('#bBody .qin[data-code]')]
    .map(i=>({code:i.dataset.code,name:i.dataset.name,unit:i.dataset.unit,qty:parseFloat(i.value||'0')}))
    .filter(l=>l.qty>0);
  const xn=(el('x-name')?.value||'').trim(), xq=parseFloat(el('x-qty')?.value||'0');
  if(xn&&xq>0){
    lines.push({code:'PO-'+xn.toUpperCase().replace(/[^A-Z0-9]+/g,'-').slice(0,28),name:`${xn} — ${S.vendor.name}`,unit:(el('x-unit').value||'unit').trim(),qty:xq});
  }
  if(!lines.length){toast('Nothing entered',true);return;}
  el('bPlace').disabled=true;
  try{
    const r=await fetch(`${API}?action=place-order`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({pin:S.pin,po_date:date,brand:S.brand,lines})}).then(x=>x.json());
    if(!r.success)throw new Error(r.error);
    toast(`✓ ${r.placed} line${r.placed>1?'s':''} placed with ${S.vendor.name}`);
    const dr=await fetch(`${API}?action=orders&date=${date}&brand=${S.brand}`).then(x=>x.json());S.placed=dr.lines||[];
    openVendor(S.vendor.key);
  }catch(e){toast(e.message||'failed',true);}
  finally{el('bPlace').disabled=false;}
}

async function cancelLine(id){
  if(!confirm('Cancel this placed line?'))return;
  const r=await fetch(`${API}?action=cancel-line`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin:S.pin,id})}).then(x=>x.json());
  if(!r.success||!r.cancelled){toast(r.error||'could not cancel',true);return;}
  toast('✕ cancelled');
  const dr=await fetch(`${API}?action=orders&date=${istDate(S.dayOffset)}&brand=${S.brand}`).then(x=>x.json());S.placed=dr.lines||[];
  openVendor(S.vendor.key);
}

if(S.pin){fetch(`/api/sauda-pay?action=verify-pin&pin=${S.pin}`).then(x=>x.json()).then(r=>{if(r.success){S.person=r.person;goVendors();}});}
</script>
</body>
