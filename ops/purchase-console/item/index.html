<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Order · Nawabi · Sauda</title>
<style>
  :root{ --gold:#c9a14a; --elev:#15151f; --line:rgba(201,161,74,.22); --ok:#3ba776; --okbg:rgba(59,167,118,.13); --warn:#d8923a; --bad:#cf5b4e; --wa:#25d366; --txt:#f3f3f6; --dim:#8a8a99; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(130% 80% at 50% 0%,#13131e,#06060a);color:var(--txt);min-height:100dvh;padding:env(safe-area-inset-top) 16px calc(env(safe-area-inset-bottom) + 28px)}
  .wrap{max-width:480px;margin:0 auto}
  .top{display:flex;align-items:center;gap:10px;margin:22px 0 2px}
  .top .glyph{width:42px;height:42px;border-radius:12px;background:var(--elev);border:1px solid var(--line);display:grid;place-items:center;font-size:22px}
  h1{font-family:"Cormorant Garamond",Georgia,serif;font-weight:600;font-size:28px;margin:0}
  .sub{color:var(--gold);font-size:12.5px;font-style:italic;margin:2px 0 18px 52px}
  .tabs{display:flex;gap:6px;background:var(--elev);border:1px solid var(--line);border-radius:14px;padding:5px;margin-bottom:18px}
  .tabs button{flex:1;background:transparent;border:none;color:var(--dim);border-radius:10px;padding:11px 0;font-size:14px;font-weight:600}
  .tabs button.on{background:var(--gold);color:#1a1408}
  .card{background:var(--elev);border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:14px}
  .vrow{display:flex;justify-content:space-between;align-items:center}.vrow .nm{font-size:16px;font-weight:600}.vrow .ph{font-size:12.5px;color:var(--dim);margin-top:2px}
  label{display:block;font-size:11.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.7px;margin:0 0 7px}
  input[type=number],input[type=password]{width:100%;background:#0b0b13;border:1px solid var(--line);border-radius:12px;color:var(--txt);font-size:22px;padding:14px;outline:none;font-variant-numeric:tabular-nums}
  select{width:100%;background:#0b0b13;border:1px solid var(--line);border-radius:12px;color:var(--txt);font-size:17px;padding:13px;outline:none;-webkit-appearance:none;appearance:none}
  .preview{background:#0b0b13;border:1px dashed var(--line);border-radius:12px;padding:13px;font-size:13.5px;line-height:1.55;white-space:pre-wrap;margin-top:4px;min-height:38px}
  .packhint{font-size:12.5px;color:var(--dim);margin:8px 2px 0}.packhint b{color:var(--txt)}
  .send{display:block;width:100%;background:var(--wa);color:#06351a;border:none;border-radius:13px;padding:17px;font-size:17px;font-weight:700;margin-top:8px;text-align:center;text-decoration:none}
  .send.off{pointer-events:none;opacity:.4}
  .confirm{margin-top:12px;display:none}.confirm.show{display:block}.confirm p{font-size:13.5px;margin:0 0 10px;text-align:center}
  .confirm .yes{width:100%;background:var(--gold);color:#1a1408;border:none;border-radius:12px;padding:15px;font-size:16px;font-weight:700}
  .confirm .no{width:100%;background:transparent;color:var(--dim);border:none;padding:10px;font-size:12.5px;margin-top:4px}
  .placed{display:none;margin-top:10px;padding:15px;border-radius:13px;background:var(--okbg);border:1px solid var(--ok);font-size:14px}.placed.show{display:block}.placed b{color:var(--ok)}
  .go{width:100%;background:var(--gold);color:#1a1408;border:none;border-radius:13px;padding:17px;font-size:17px;font-weight:700}
  .hide{display:none!important}.small{font-size:11.5px;color:var(--dim);text-align:center;margin-top:16px}
  .led{font-size:13px}.led .day{font-weight:700;color:var(--gold);margin:14px 0 6px}
  .led .ln{display:flex;justify-content:space-between;padding:9px 11px;background:#0b0b13;border:1px solid var(--line);border-radius:10px;margin-bottom:6px}
  .led .v.ok{color:var(--ok)}.led .v.warn{color:var(--warn)}.led .v.dim{color:var(--dim)}
  a.back{color:var(--dim);font-size:13px;text-decoration:none;display:inline-block;margin-top:18px}
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><div class="glyph" id="glyph">📦</div><h1 id="title">Order</h1></div>
  <div class="sub" id="sub">Nawabi · vendor</div>

  <div id="gate" class="card">
    <label>PIN</label>
    <input id="pin" type="password" inputmode="numeric" maxlength="6" placeholder="••••" autocomplete="off">
    <button class="go" id="pinBtn" style="margin-top:12px">Unlock</button>
    <div id="pinErr" class="small" style="color:var(--bad)"></div>
  </div>

  <div id="app" class="hide">
    <div class="tabs"><button data-t="order" class="on">Order</button><button data-t="ledger">Record</button></div>

    <section id="t-order">
      <div class="card vrow"><div><div class="nm" id="vname">—</div><div class="ph" id="vph">—</div></div><div style="font-size:24px">📲</div></div>
      <div class="card"><label>Delivery date</label><select id="forDate"></select></div>
      <div class="card">
        <label id="qtyLabel">Quantity</label>
        <input id="qty" type="number" inputmode="numeric" placeholder="100">
        <div class="packhint" id="packhint"></div>
      </div>
      <div class="card"><label id="msgVendorLabel">Message</label><div class="preview" id="preview"></div>
        <a class="send off" id="send" target="_blank" rel="noopener">Send on WhatsApp</a>
        <div class="confirm" id="confirm"><p id="confirmQ">Did you send the order?</p>
          <button class="yes" id="confirmYes">✓ Yes, order sent</button><button class="no" id="confirmNo">Not yet — go back</button></div>
        <div class="placed" id="placed"></div>
      </div>
      <div class="small">Tap Send → WhatsApp opens → come back and confirm. Only then is the order logged.</div>
    </section>

    <section id="t-ledger" class="hide"><div class="card led" id="ledBox"><div class="small">Loading…</div></div>
      <div class="small">Ordered (you) vs received (staff). Tracking only.</div></section>

    <a class="back" href="/ops/purchase-console/">← Back to Sauda</a>
  </div>
</div>
<script>
const API='/api/purchase-item';
const CODE=new URLSearchParams(location.search).get('item')||'BUNS';
let PIN='',NAME='',ITEM=null;const $=id=>document.getElementById(id);
$('pinBtn').onclick=async()=>{const pin=$('pin').value.trim();if(!pin)return;
  const r=await fetch(`${API}?action=verify-pin&pin=${encodeURIComponent(pin)}`).then(r=>r.json()).catch(()=>({success:false}));
  if(r.success){PIN=pin;NAME=r.name;$('gate').classList.add('hide');$('app').classList.remove('hide');await loadItem();initOrder();}else $('pinErr').textContent='Wrong PIN';};
$('pin').addEventListener('keydown',e=>{if(e.key==='Enter')$('pinBtn').click();});
document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('on'));b.classList.add('on');['order','ledger'].forEach(t=>$('t-'+t).classList.toggle('hide',t!==b.dataset.t));if(b.dataset.t==='ledger')loadLedger();});
async function loadItem(){const r=await fetch(`${API}?action=item&code=${encodeURIComponent(CODE)}`).then(r=>r.json());ITEM=r.item;
  $('glyph').textContent=ITEM.emoji||'📦';$('title').textContent=ITEM.name;$('sub').textContent='Nawabi · '+ITEM.vendor;
  $('vname').textContent=ITEM.vendor;$('vph').textContent='+'+ITEM.vendor_phone.replace(/^(\d{2})(\d{5})(\d{5})$/,'$1 $2 $3');
  $('qtyLabel').textContent=ITEM.order_unit.charAt(0).toUpperCase()+ITEM.order_unit.slice(1);$('qty').placeholder='100';
  $('msgVendorLabel').textContent='Message to '+ITEM.vendor;}
function initOrder(){const sel=$('forDate'),dn=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  for(let i=0;i<3;i++){const d=new Date();d.setDate(d.getDate()+i);const iso=d.toISOString().slice(0,10);const o=document.createElement('option');o.value=iso;o.textContent=(i===0?'Today':i===1?'Tomorrow':'')+' · '+dn[(d.getDay()+6)%7]+' '+d.getDate()+' '+mn[d.getMonth()];o.dataset.disp=d.getDate()+' '+mn[d.getMonth()];sel.appendChild(o);}sel.selectedIndex=1;
  ['qty','forDate'].forEach(id=>{$(id).addEventListener('input',onEdit);$(id).addEventListener('change',onEdit);});buildMsg();}
function dateDisp(){return $('forDate').selectedOptions[0].dataset.disp;}
function onEdit(){$('confirm').classList.remove('show');$('placed').classList.remove('show');buildMsg();}
function buildMsg(){const q=parseInt($('qty').value)||0;
  // pack hint: vendor bills in packs (buying unit ≠ counting unit)
  if(q>0&&ITEM.pack_qty>1){const packs=Math.ceil(q/ITEM.pack_qty);$('packhint').innerHTML=`≈ <b>${packs}</b> × ${ITEM.pack_label} (vendor bills in packs · ₹${ITEM.pack_rate}/pack)`;}else $('packhint').textContent='';
  const lines=['Nawabi Chai House',`${ITEM.name} order — ${dateDisp()}`,'',`${q} ${ITEM.order_unit}`];
  const valid=q>0,msg=lines.join('\n');$('preview').textContent=valid?msg:`Enter ${ITEM.order_unit} to build the order…`;
  const s=$('send');if(valid){s.classList.remove('off');s.href=`https://wa.me/${ITEM.vendor_phone}?text=${encodeURIComponent(msg)}`;}else s.classList.add('off');}
$('send').addEventListener('click',()=>{setTimeout(()=>$('confirm').classList.add('show'),400);});
$('confirmNo').onclick=()=>$('confirm').classList.remove('show');
$('confirmYes').onclick=async()=>{$('confirmYes').disabled=true;$('confirmYes').textContent='Saving…';
  const r=await fetch(`${API}?action=log-order`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin:PIN,item_code:CODE,qty:parseInt($('qty').value),for_date:$('forDate').value,message:$('preview').textContent})}).then(r=>r.json()).catch(()=>({success:false}));
  $('confirm').classList.remove('show');const p=$('placed');
  if(r.success){const when=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});p.innerHTML=`<b>✓ Order placed</b> &nbsp;<span style="opacity:.7">logged ${when}</span><br><span style="opacity:.85">${parseInt($('qty').value)} ${ITEM.order_unit} · ${ITEM.vendor}</span>`;p.classList.add('show');}
  else{p.innerHTML='<span style="color:var(--warn)">⚠ Could not log — your WhatsApp still went. Try again.</span>';p.classList.add('show');$('confirmYes').disabled=false;$('confirmYes').textContent='✓ Yes, order sent';$('confirm').classList.add('show');}};
async function loadLedger(){const r=await fetch(`${API}?action=ledger&code=${encodeURIComponent(CODE)}`).then(r=>r.json()).catch(()=>({success:false}));if(!r.success){$('ledBox').innerHTML='<div class="small">Could not load.</div>';return;}
  const byDate={};(r.orders||[]).forEach(o=>{byDate[o.for_date]=byDate[o.for_date]||{};byDate[o.for_date].ordered=o.qty;});
  (r.receipts||[]).forEach(o=>{byDate[o.for_date]=byDate[o.for_date]||{};byDate[o.for_date].recv=o.qty_received;});
  const dates=Object.keys(byDate).sort().reverse();if(!dates.length){$('ledBox').innerHTML='<div class="small">No orders yet.</div>';return;}
  $('ledBox').innerHTML=dates.map(d=>{const v=byDate[d];const ord=v.ordered!=null?v.ordered+' '+ITEM.order_unit:'—',rec=v.recv!=null?v.recv+' '+ITEM.receive_unit:'—';let cls='dim',note='';if(v.ordered!=null&&v.recv!=null){const diff=Math.round((v.ordered-v.recv)*100)/100;cls=diff!==0?'warn':'ok';note=diff===0?' · exact':diff>0?` · short ${diff}`:` · over ${-diff}`;}return `<div class="day">${d}</div><div class="ln"><span>${ITEM.name}</span><span class="v ${cls}">ordered ${ord} → got ${rec}${note}</span></div>`;}).join('');}
</script>
</body>
</html>
