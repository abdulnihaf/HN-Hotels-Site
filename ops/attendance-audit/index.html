<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Attendance Audit — HN Hotels</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e8eaf0;
    --muted: #6b7280;
    --green: #22c55e;
    --orange: #f97316;
    --red: #ef4444;
    --blue: #3b82f6;
    --yellow: #eab308;
    --purple: #a855f7;
    --he: #f59e0b;
    --nch: #06b6d4;
    --hq: #8b5cf6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; }
  #app { display: none; }
  /* PIN SCREEN */
  #pin-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; padding: 20px; }
  #pin-screen h1 { font-size: 18px; color: var(--text); }
  #pin-screen input { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 8px; font-size: 16px; width: 180px; text-align: center; letter-spacing: 4px; }
  #pin-screen button { background: var(--blue); color: #fff; border: none; padding: 10px 28px; border-radius: 8px; cursor: pointer; font-size: 14px; }
  #pin-error { color: var(--red); font-size: 12px; }
  /* TOP BAR */
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .topbar h1 { font-size: 15px; font-weight: 700; flex: 1; }
  .topbar label { color: var(--muted); font-size: 12px; }
  .topbar input[type=date] { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 5px 8px; border-radius: 6px; font-size: 12px; }
  .topbar button { background: var(--blue); color: #fff; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; }
  .topbar .refresh-ts { color: var(--muted); font-size: 11px; }
  /* TABS */
  .tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); }
  .tab { padding: 10px 20px; cursor: pointer; font-size: 13px; color: var(--muted); border-bottom: 2px solid transparent; transition: all .15s; }
  .tab.active { color: var(--text); border-bottom-color: var(--blue); }
  /* SUMMARY ROW */
  .summary { display: flex; gap: 8px; padding: 10px 16px; flex-wrap: wrap; border-bottom: 1px solid var(--border); background: var(--bg); }
  .chip { padding: 4px 10px; border-radius: 99px; font-size: 11px; font-weight: 600; }
  .chip.present { background: rgba(34,197,94,.15); color: var(--green); }
  .chip.pending { background: rgba(249,115,22,.15); color: var(--orange); }
  .chip.absent  { background: rgba(239,68,68,.15); color: var(--red); }
  .chip.ghost   { background: rgba(239,68,68,.10); color: #f87171; }
  .chip.half    { background: rgba(234,179,8,.15); color: var(--yellow); }
  .chip.info    { background: rgba(59,130,246,.1); color: var(--blue); }
  .chip.total   { background: rgba(255,255,255,.07); color: var(--muted); }
  /* PANEL */
  .panel { display: none; padding: 12px 16px; overflow-x: auto; }
  .panel.active { display: block; }
  /* TABLE */
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 8px 10px; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 1; }
  td { padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,.04); vertical-align: top; }
  tr:hover td { background: rgba(255,255,255,.02); }
  .emp-name { font-weight: 600; }
  .emp-sub  { color: var(--muted); font-size: 11px; }
  .brand-badge { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 700; }
  .brand-HE  { background: rgba(245,158,11,.2); color: var(--he); }
  .brand-NCH { background: rgba(6,182,212,.2); color: var(--nch); }
  .brand-HQ  { background: rgba(139,92,246,.2); color: var(--hq); }
  .status-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .s-present { background: rgba(34,197,94,.15); color: var(--green); }
  .s-pending { background: rgba(249,115,22,.15); color: var(--orange); }
  .s-absent  { background: rgba(239,68,68,.15); color: var(--red); }
  .s-ghost   { background: rgba(239,68,68,.10); color: #f87171; }
  .s-half    { background: rgba(234,179,8,.15); color: var(--yellow); }
  .ptype-in  { color: var(--green); font-weight: 700; }
  .ptype-out { color: var(--red); font-weight: 700; }
  .ts { font-family: monospace; font-size: 12px; }
  .day-badge { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 10px; font-weight: 600; }
  .day-today    { background: rgba(59,130,246,.2); color: var(--blue); }
  .day-prev     { background: rgba(107,114,128,.2); color: var(--muted); }
  .shift-day-tag { font-size: 10px; color: var(--muted); }
  .punch-row { display: flex; gap: 4px; align-items: baseline; }
  .no-data { color: var(--muted); text-align: center; padding: 40px; }
  .mismatch-row td { background: rgba(239,68,68,.04); }
  .alert-row { font-size: 11px; color: var(--red); }
  /* CAMS view: punch timeline per employee */
  .emp-block { margin-bottom: 14px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .emp-header { background: var(--surface); padding: 8px 12px; display: flex; align-items: center; gap: 8px; }
  .emp-punches { padding: 8px 12px; }
  .punch-line { display: flex; gap: 10px; align-items: center; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,.03); }
  .punch-line:last-child { border-bottom: none; }
  .punch-idx { color: var(--muted); font-size: 10px; width: 16px; }
  .session-pair { display: flex; gap: 6px; align-items: center; font-size: 11px; padding: 2px 0; }
  .session-arrow { color: var(--muted); }
  .session-hrs { color: var(--blue); font-weight: 600; }
  /* Group dividers */
  .group-header td { background: rgba(255,255,255,.03); color: var(--muted); font-size: 11px; font-weight: 700; padding: 6px 10px; text-transform: uppercase; letter-spacing: .5px; }
  /* Loading */
  .loading { color: var(--muted); text-align: center; padding: 40px; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  /* Mobile */
  @media(max-width:600px) {
    .topbar { gap: 8px; }
    th, td { padding: 6px 8px; }
    .hide-mobile { display: none; }
  }
</style>
</head>
<body>

<!-- PIN Gate -->
<div id="pin-screen">
  <h1>Attendance Audit</h1>
  <p style="color:var(--muted);font-size:12px">HN Hotels — Internal Tool</p>
  <input type="password" id="pin-input" placeholder="PIN" maxlength="6"
    onkeydown="if(event.key==='Enter')checkPin()">
  <button onclick="checkPin()">Enter</button>
  <span id="pin-error"></span>
</div>

<div id="app">
  <!-- Top bar -->
  <div class="topbar">
    <h1>Attendance Audit</h1>
    <label>Date</label>
    <input type="date" id="date-pick" onchange="loadAll()">
    <button onclick="loadAll()">Refresh</button>
    <span class="refresh-ts" id="refresh-ts"></span>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" id="tab-cams" onclick="switchTab('cams')">
      CAMS Biometric Log
    </div>
    <div class="tab" id="tab-dash" onclick="switchTab('dash')">
      Dashboard (hr_attendance_daily)
    </div>
  </div>

  <!-- Summary chips -->
  <div class="summary" id="summary-bar"></div>

  <!-- CAMS panel -->
  <div class="panel active" id="panel-cams">
    <div class="loading" id="cams-loading">Loading…</div>
    <div id="cams-content" style="display:none"></div>
  </div>

  <!-- Dashboard panel -->
  <div class="panel" id="panel-dash">
    <div class="loading" id="dash-loading">Loading…</div>
    <div id="dash-content" style="display:none"></div>
  </div>
</div>

<script>
const VALID_PINS = ['0305','8523','2026','1111'];
let gDate = todayIST();
let gCams = null, gDash = null, gShiftHours = {};

function todayIST() {
  const now = new Date(Date.now() + 5.5*60*60*1000);
  return now.toISOString().slice(0,10);
}

function checkPin() {
  const v = document.getElementById('pin-input').value;
  if (VALID_PINS.includes(v)) {
    document.getElementById('pin-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    const dp = document.getElementById('date-pick');
    dp.value = gDate;
    loadAll();
  } else {
    document.getElementById('pin-error').textContent = 'Invalid PIN';
  }
}

function switchTab(t) {
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  document.getElementById('panel-'+t).classList.add('active');
}

async function loadAll() {
  gDate = document.getElementById('date-pick').value || todayIST();
  document.getElementById('refresh-ts').textContent = '';
  // Show loaders
  ['cams','dash'].forEach(p => {
    document.getElementById(p+'-loading').style.display = 'block';
    document.getElementById(p+'-content').style.display = 'none';
  });
  const [cams, dash] = await Promise.all([
    fetch(`/api/hr-admin?action=cams-punches&date=${gDate}&days=2`).then(r=>r.json()),
    fetch(`/api/hr-admin?action=attendance-daily&date=${gDate}`).then(r=>r.json()),
  ]);
  gCams = cams; gDash = dash;
  if (cams.shiftHours) gShiftHours = cams.shiftHours;
  renderSummary();
  renderCams();
  renderDash();
  document.getElementById('refresh-ts').textContent = 'Updated ' + new Date().toLocaleTimeString('en-IN');
}

/* ── Shift-day helper ── */
function shiftDayFor(punchTimeStr, brand) {
  const startHour = gShiftHours[brand] ?? 0;
  const [d, t] = (punchTimeStr||'').split(' ');
  if (!d) return null;
  const hr = parseInt((t||'00').slice(0,2), 10) || 0;
  if (hr < startHour) {
    const dt = new Date(d + 'T12:00:00Z');
    dt.setUTCDate(dt.getUTCDate() - 1);
    return dt.toISOString().slice(0,10);
  }
  return d;
}

function fmtTime(ts) {
  if (!ts) return '—';
  const t = ts.split(' ')[1] || ts;
  return t.slice(0,5);
}
function fmtDate(ts) {
  if (!ts) return '';
  return ts.slice(0,10);
}
function hoursBetween(a, b) {
  if (!a || !b) return null;
  const ms = new Date(b.replace(' ','T')+'Z') - new Date(a.replace(' ','T')+'Z');
  return ms/3600000;
}
function fmtHrs(h) {
  if (h == null) return '';
  const hh = Math.floor(Math.abs(h)), mm = Math.round((Math.abs(h)-hh)*60);
  return `${hh}h${mm > 0 ? mm+'m' : ''}`;
}

/* ── Summary bar ── */
function renderSummary() {
  const dash = gDash?.rows || gDash?.attendance || [];
  const camsCount = gCams?.count || 0;
  const counts = {};
  for (const r of dash) counts[r.status] = (counts[r.status]||0)+1;
  const chips = [];
  chips.push(`<span class="chip total">${dash.length} employees</span>`);
  if (counts.present) chips.push(`<span class="chip present">✓ ${counts.present} present</span>`);
  if (counts.pending) chips.push(`<span class="chip pending">⋯ ${counts.pending} pending</span>`);
  if (counts.absent)  chips.push(`<span class="chip absent">✗ ${counts.absent} absent</span>`);
  if (counts.ghost)   chips.push(`<span class="chip ghost">👻 ${counts.ghost} ghost</span>`);
  if (counts.half)    chips.push(`<span class="chip half">½ ${counts.half} half-day</span>`);
  chips.push(`<span class="chip info">📷 ${camsCount} biometric punches</span>`);
  document.getElementById('summary-bar').innerHTML = chips.join('');
}

/* ── CAMS view ── */
function renderCams() {
  const el = document.getElementById('cams-content');
  const loading = document.getElementById('cams-loading');
  const punches = gCams?.punches || [];
  loading.style.display = 'none';
  el.style.display = 'block';

  if (!punches.length) {
    el.innerHTML = '<div class="no-data">No CAMS punches found for this date range.</div>';
    return;
  }

  // Group by employee (pin)
  const byPin = {};
  for (const p of punches) {
    const key = p.pin;
    if (!byPin[key]) byPin[key] = { pin: p.pin, name: p.name||('PIN '+p.pin), brand: p.brand_label||'?', punches: [] };
    byPin[key].punches.push(p);
  }

  // Sort employees: brand order HE→NCH→HQ, then name
  const brandOrder = {HE:0, NCH:1, HQ:2};
  const emps = Object.values(byPin).sort((a,b) => {
    const bo = (brandOrder[a.brand]??9) - (brandOrder[b.brand]??9);
    if (bo !== 0) return bo;
    return (a.name||'').localeCompare(b.name||'');
  });

  // Table view
  let html = `<table>
    <thead><tr>
      <th>Employee</th>
      <th>Time</th>
      <th>Type</th>
      <th>Shift-Day</th>
      <th class="hide-mobile">Session</th>
    </tr></thead><tbody>`;

  let lastBrand = null;
  for (const emp of emps) {
    if (emp.brand !== lastBrand) {
      lastBrand = emp.brand;
      html += `<tr><td class="group-header" colspan="5">${emp.brand}</td></tr>`;
    }
    // Build sessions (pair IN→OUT)
    const sessions = buildSessions(emp.punches, emp.brand);
    const pCount = emp.punches.length;

    emp.punches.forEach((p, i) => {
      const sd = shiftDayFor(p.punch_time, emp.brand);
      const isToday = sd === gDate;
      const sdLabel = isToday
        ? `<span class="day-badge day-today">${gDate}</span>`
        : `<span class="day-badge day-prev">${sd||'?'}</span>`;
      const typeHtml = p.punch_type==='CheckIn'
        ? '<span class="ptype-in">IN</span>'
        : '<span class="ptype-out">OUT</span>';

      // Find session for this punch
      let sessionHtml = '—';
      for (const s of sessions) {
        if (s.inPunch === p) {
          sessionHtml = s.out
            ? `<span class="session-hrs">${fmtHrs(hoursBetween(s.in, s.out))}</span>`
            : '<span style="color:var(--orange)">open</span>';
          break;
        }
      }

      if (i === 0) {
        html += `<tr>
          <td rowspan="${pCount}">
            <div class="emp-name">${emp.name}</div>
            <div class="emp-sub">
              <span class="brand-badge brand-${emp.brand}">${emp.brand}</span>
              PIN ${emp.pin} · ${pCount} punch${pCount>1?'es':''}
            </div>
          </td>
          <td class="ts">${fmtTime(p.punch_time)}<br><span style="font-size:10px;color:var(--muted)">${fmtDate(p.punch_time)}</span></td>
          <td>${typeHtml}</td>
          <td>${sdLabel}</td>
          <td class="hide-mobile">${p.punch_type==='CheckIn' ? sessionHtml : ''}</td>
        </tr>`;
      } else {
        html += `<tr>
          <td class="ts">${fmtTime(p.punch_time)}<br><span style="font-size:10px;color:var(--muted)">${fmtDate(p.punch_time)}</span></td>
          <td>${typeHtml}</td>
          <td>${sdLabel}</td>
          <td class="hide-mobile">${p.punch_type==='CheckIn' ? sessionHtml : ''}</td>
        </tr>`;
      }
    });
  }
  html += '</tbody></table>';
  el.innerHTML = html;
}

function buildSessions(punches, brand) {
  const sessions = [];
  let openIn = null;
  for (const p of punches) {
    if (p.punch_type === 'CheckIn') {
      openIn = p;
      sessions.push({ inPunch: p, outPunch: null, in: p.punch_time, out: null, sd: shiftDayFor(p.punch_time, brand) });
    } else if (openIn) {
      const last = sessions[sessions.length-1];
      if (last && !last.out) { last.outPunch = p; last.out = p.punch_time; }
      openIn = null;
    }
  }
  return sessions;
}

/* ── Dashboard view ── */
function renderDash() {
  const el = document.getElementById('dash-content');
  const loading = document.getElementById('dash-loading');
  loading.style.display = 'none';
  el.style.display = 'block';

  // attendance-daily returns enriched rows
  const rows = gDash?.attendance || gDash?.rows || [];
  if (!rows.length) {
    el.innerHTML = '<div class="no-data">No attendance records for this date.</div>';
    return;
  }

  // Filter out ghost-pin rows (pins not matching any real employee pin)
  const realRows = rows.filter(r => r.emp_pin === r.pin || !r.emp_pin);

  const brandOrder = {HE:0, NCH:1, HQ:2};
  realRows.sort((a,b) => {
    const bo = (brandOrder[a.brand_label]??9) - (brandOrder[b.brand_label]??9);
    return bo !== 0 ? bo : (a.name||'').localeCompare(b.name||'');
  });

  let html = `<table>
    <thead><tr>
      <th>Employee</th>
      <th>Status</th>
      <th>First IN</th>
      <th>Last OUT</th>
      <th class="hide-mobile">Hours</th>
      <th class="hide-mobile">Punches</th>
      <th>Note</th>
    </tr></thead><tbody>`;

  let lastBrand = null;
  for (const r of realRows) {
    if (r.brand_label !== lastBrand) {
      lastBrand = r.brand_label;
      html += `<tr><td class="group-header" colspan="7">${r.brand_label}</td></tr>`;
    }

    const sBadge = `<span class="status-badge s-${r.status}">${r.status}</span>`;
    const hrs = r.total_hours ? fmtHrs(r.total_hours) : '—';

    // Cross-check: punch_count in daily vs raw punches in CAMS for this pin
    const camsPunchesToday = (gCams?.punches||[]).filter(p => p.pin === r.pin && fmtDate(p.punch_time) === gDate).length;
    const mismatch = r.punch_count === 0 && camsPunchesToday > 0;
    const rowClass = mismatch ? 'mismatch-row' : '';

    let note = '';
    if (mismatch) note = `<span class="alert-row">⚠️ ${camsPunchesToday} CAMS punch${camsPunchesToday>1?'es':''} on this calendar date — assigned to prev shift-day</span>`;
    if (r.status === 'ghost') note += '<span class="alert-row"> Missing checkout</span>';

    html += `<tr class="${rowClass}">
      <td>
        <div class="emp-name">${r.name || r.known_as || ('PIN '+r.pin)}</div>
        <div class="emp-sub">
          <span class="brand-badge brand-${r.brand_label}">${r.brand_label}</span>
          ${r.job_name ? ' · '+r.job_name : ''}
        </div>
      </td>
      <td>${sBadge}</td>
      <td class="ts">${r.first_in_at ? fmtTime(r.first_in_at) : '—'}</td>
      <td class="ts">${r.last_out_at ? fmtTime(r.last_out_at) : '—'}</td>
      <td class="hide-mobile">${hrs}</td>
      <td class="hide-mobile">${r.punch_count || 0}</td>
      <td>${note}</td>
    </tr>`;
  }
  html += '</tbody></table>';
  el.innerHTML = html;
}
</script>
</body>
</html>
