<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RM Sourcing Editor · NCH</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c14;
    --panel: rgba(22,22,31,0.7);
    --panel-solid: #16161f;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.16);
    --ink: #e4e4ed;
    --ink-dim: #94a3b8;
    --ink-faint: #64748b;
    --accent: #e8930c;
    --good: #34d399;
    --warn: #fbbf24;
    --bad: #f87171;
    --info: #60a5fa;
    --purple: #c084fc;
    --teal: #2dd4bf;
    --pink: #f472b6;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif; line-height: 1.55;
    -webkit-font-smoothing: antialiased; min-height: 100vh;
  }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .glass { background: var(--panel); border: 1px solid var(--border); backdrop-filter: blur(20px); border-radius: 14px; }
  .grad-fade { background: linear-gradient(180deg, rgba(15,15,26,0.85) 0%, rgba(12,12,20,1) 100%); }
  a { color: inherit; text-decoration: none; }

  /* Layout */
  header.app-header { border-bottom: 1px solid var(--border); padding: 16px 20px; position: sticky; top: 0; z-index: 30; background: rgba(12,12,20,0.92); backdrop-filter: blur(14px); }
  main { max-width: 1400px; margin: 0 auto; padding: 18px 20px 120px; }

  /* PIN gate */
  .gate { max-width: 380px; margin: 80px auto; padding: 32px; }
  .gate h2 { margin: 0 0 8px; font-size: 22px; }
  .gate p { color: var(--ink-dim); font-size: 13px; margin: 0 0 18px; }
  .gate input { width: 100%; padding: 14px; font-size: 18px; background: rgba(0,0,0,0.4); color: var(--ink); border: 1px solid var(--border-strong); border-radius: 10px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.3em; text-align: center; }
  .gate button { width: 100%; padding: 12px; margin-top: 12px; background: var(--accent); color: #0c0c14; font-weight: 700; border: 0; border-radius: 10px; font-size: 15px; cursor: pointer; }
  .gate .err { color: var(--bad); font-size: 13px; margin-top: 8px; min-height: 18px; }

  /* Stats strip */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 14px; }
  .stat-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; }
  .stat-card .label { font-size: 10px; color: var(--ink-dim); text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-card .value { font-size: 22px; font-weight: 700; margin-top: 2px; font-family: 'JetBrains Mono', monospace; }
  .stat-card .meta { font-size: 11px; color: var(--ink-faint); }

  /* Filter bar */
  .filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; align-items: center; }
  .filters input, .filters select {
    padding: 9px 12px; background: rgba(0,0,0,0.4); color: var(--ink);
    border: 1px solid var(--border); border-radius: 9px; font-size: 13px;
    font-family: inherit; min-height: 44px;
  }
  .filters input { flex: 1; min-width: 180px; }
  .btn { padding: 9px 14px; background: rgba(255,255,255,0.06); color: var(--ink); border: 1px solid var(--border); border-radius: 9px; font-size: 13px; font-weight: 600; cursor: pointer; min-height: 44px; }
  .btn:hover { background: rgba(255,255,255,0.10); }
  .btn-primary { background: var(--accent); color: #0c0c14; border-color: var(--accent); }
  .btn-primary:hover { background: #ffa928; }
  .btn-danger { background: rgba(248,113,113,0.10); color: var(--bad); border-color: rgba(248,113,113,0.3); }
  .btn-danger:hover { background: rgba(248,113,113,0.18); }
  .btn-sm { padding: 6px 10px; font-size: 12px; min-height: 32px; }

  /* RM list */
  .rm-grid { display: grid; gap: 8px; }
  .rm-row {
    background: rgba(255,255,255,0.02); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; cursor: pointer;
    display: grid; grid-template-columns: 200px 1fr auto auto auto auto auto;
    gap: 14px; align-items: center; transition: all 0.12s;
  }
  .rm-row:hover { background: rgba(255,255,255,0.04); border-color: var(--border-strong); }
  .rm-row.empty { border-left: 3px solid var(--ink-faint); }
  .rm-row.has-data { border-left: 3px solid var(--good); }
  .rm-row .code { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--accent); font-weight: 600; }
  .rm-row .name { font-size: 14px; font-weight: 500; }
  .rm-row .profile { font-family: 'JetBrains Mono', monospace; font-size: 12px; }
  .rm-row .stat { font-size: 11px; color: var(--ink-dim); text-align: center; }
  .rm-row .stat .n { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: var(--ink); display: block; font-size: 14px; }
  .rm-row .updated { font-size: 11px; color: var(--ink-faint); white-space: nowrap; }

  .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; letter-spacing: 0.04em; }
  .pill-l { background: rgba(96,165,250,0.15); color: var(--info); }
  .pill-b { background: rgba(192,132,252,0.15); color: var(--purple); }
  .pill-i { background: rgba(45,212,191,0.15); color: var(--teal); }
  .pill-rm { background: rgba(232,147,12,0.15); color: var(--accent); }
  .pill-mixed { background: rgba(255,255,255,0.08); color: var(--ink); }
  .pill-unsaved { background: rgba(251,191,36,0.20); color: var(--warn); animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1 } 50% { opacity: 0.55 } }

  /* Editor side panel */
  .editor-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 40; display: none; }
  .editor-overlay.open { display: block; }
  .editor-panel { position: fixed; top: 0; right: 0; bottom: 0; width: min(840px, 100vw); background: var(--panel-solid); z-index: 41; transform: translateX(100%); transition: transform 0.22s ease; box-shadow: -10px 0 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
  .editor-panel.open { transform: translateX(0); }
  .editor-head { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .editor-head h2 { margin: 0; font-size: 16px; font-weight: 700; }
  .editor-head .sub { font-size: 12px; color: var(--ink-dim); }
  .editor-body { flex: 1; overflow-y: auto; padding: 18px 20px 20px; }
  .editor-foot { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; align-items: center; background: rgba(0,0,0,0.3); }

  /* Editor sections */
  .field-row { margin-bottom: 14px; }
  .field-row > label { display: block; font-size: 11px; color: var(--ink-dim); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; font-weight: 600; }
  input.txt, select.txt, textarea.txt {
    width: 100%; padding: 9px 11px; background: rgba(0,0,0,0.45); color: var(--ink);
    border: 1px solid var(--border); border-radius: 8px; font-size: 13px; font-family: inherit;
    min-height: 38px;
  }
  input.txt.mono, select.txt.mono { font-family: 'JetBrains Mono', monospace; }
  textarea.txt { min-height: 60px; resize: vertical; }
  input.txt:focus, select.txt:focus, textarea.txt:focus { outline: none; border-color: var(--accent); }

  .section { border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 14px; background: rgba(255,255,255,0.015); }
  .section.l { border-top: 3px solid var(--info); }
  .section.b { border-top: 3px solid var(--purple); }
  .section.i { border-top: 3px solid var(--teal); }
  .section h3 { margin: 0 0 10px; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; display: flex; align-items: center; gap: 8px; }
  .section.l h3 { color: var(--info); }
  .section.b h3 { color: var(--purple); }
  .section.i h3 { color: var(--teal); }

  .item-card { background: rgba(0,0,0,0.25); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; }
  .item-card .row { display: grid; grid-template-columns: 1.5fr 1fr 0.9fr 0.6fr auto; gap: 8px; align-items: center; }
  .item-card .row-2 { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; margin-top: 8px; }
  .item-card.brand { border-left: 3px solid var(--purple); }
  .item-card.sku { background: rgba(192,132,252,0.04); border: 1px dashed rgba(192,132,252,0.3); margin-left: 14px; }
  .item-card.supplier { background: rgba(96,165,250,0.05); border: 1px solid rgba(96,165,250,0.18); margin-left: 14px; }
  .item-card.recipe { border-left: 3px solid var(--teal); }
  .icon-btn { background: transparent; border: 1px solid var(--border); color: var(--ink-dim); padding: 6px 8px; border-radius: 6px; cursor: pointer; font-size: 12px; min-height: 32px; min-width: 32px; }
  .icon-btn:hover { color: var(--bad); border-color: rgba(248,113,113,0.3); }
  .add-btn { width: 100%; padding: 9px; background: rgba(255,255,255,0.04); color: var(--ink-dim); border: 1px dashed var(--border-strong); border-radius: 8px; font-size: 12px; cursor: pointer; margin-top: 6px; min-height: 38px; }
  .add-btn:hover { color: var(--ink); background: rgba(255,255,255,0.08); }
  .primary-flag { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--ink-dim); }
  .primary-flag input[type="radio"] { width: 16px; height: 16px; accent-color: var(--accent); }

  /* Identity / structured input form */
  .id-form { background: rgba(0,0,0,0.25); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 14px; }
  .id-form .grp { margin-bottom: 12px; }
  .id-form .grp:last-child { margin-bottom: 0; }
  .id-form .grp-label { font-size: 11px; color: var(--ink-dim); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; margin-bottom: 6px; display: block; }
  .id-form .help { font-size: 11px; color: var(--ink-faint); margin-top: 4px; }
  .chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { display: inline-flex; align-items: center; gap: 5px; padding: 8px 12px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 8px; font-size: 12px; cursor: pointer; user-select: none; min-height: 38px; font-weight: 500; }
  .chip input { width: 14px; height: 14px; accent-color: var(--accent); cursor: pointer; }
  .chip:hover { background: rgba(255,255,255,0.07); border-color: var(--border-strong); }
  .chip.checked { background: rgba(232,147,12,0.12); border-color: var(--accent); color: var(--accent); }
  .chip.checked.l { background: rgba(96,165,250,0.12); border-color: var(--info); color: var(--info); }
  .chip.checked.b { background: rgba(192,132,252,0.12); border-color: var(--purple); color: var(--purple); }
  .chip.checked.i { background: rgba(45,212,191,0.12); border-color: var(--teal); color: var(--teal); }
  .id-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .id-grid > div { min-width: 0; }

  /* Computed-code display */
  .code-display { background: linear-gradient(135deg, rgba(232,147,12,0.06), rgba(96,165,250,0.04)); border: 1px solid var(--border-strong); border-radius: 12px; padding: 16px; margin-bottom: 14px; text-align: center; }
  .code-display .computed { font-family: 'JetBrains Mono', monospace; font-size: 26px; font-weight: 700; letter-spacing: 0.04em; line-height: 1.3; word-break: break-all; }
  .code-display .computed .seg-brand { color: var(--accent); }
  .code-display .computed .seg-type { color: var(--info); }
  .code-display .computed .seg-src-l { color: var(--info); }
  .code-display .computed .seg-src-b { color: var(--purple); }
  .code-display .computed .seg-src-i { color: var(--teal); }
  .code-display .computed .seg-item { color: var(--ink); }
  .code-display .computed .dash { color: var(--ink-faint); }
  .code-display .computed.incomplete { color: var(--ink-faint); }
  .code-display .badge { display: inline-flex; align-items: center; gap: 5px; margin-top: 8px; font-size: 12px; padding: 4px 10px; border-radius: 999px; font-weight: 600; }
  .code-display .badge.ok { background: rgba(52,211,153,0.12); color: var(--good); border: 1px solid rgba(52,211,153,0.3); }
  .code-display .badge.warn { background: rgba(251,191,36,0.12); color: var(--warn); border: 1px solid rgba(251,191,36,0.3); }
  .code-display .label-tiny { font-size: 10px; color: var(--ink-dim); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .ed-foot-extra { margin-right: auto; }

  /* Toasts */
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--panel-solid); border: 1px solid var(--border-strong); padding: 10px 18px; border-radius: 10px; font-size: 13px; z-index: 60; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  .toast.success { border-color: var(--good); color: var(--good); }
  .toast.error { border-color: var(--bad); color: var(--bad); }

  @media (max-width: 720px) {
    .rm-row { grid-template-columns: 1fr auto; }
    .rm-row .code, .rm-row .name { grid-column: 1; }
    .rm-row .profile { grid-column: 2; grid-row: 1; }
    .rm-row .stat, .rm-row .updated { display: none; }
    .item-card .row { grid-template-columns: 1fr 1fr; }
    .editor-panel { width: 100vw; }
  }
</style>
</head>
<body>

<!-- PIN gate -->
<div id="gate" class="glass gate" style="display:none;">
  <h2>RM Sourcing Editor</h2>
  <p>Enter your PIN to load the 31 NCH raw-material sourcing profiles.</p>
  <input id="pin-input" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="PIN" autocomplete="off">
  <button id="pin-submit">Unlock</button>
  <div class="err" id="pin-err"></div>
</div>

<!-- App -->
<div id="app" style="display:none;">
  <header class="app-header">
    <div style="max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
      <div>
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:20px;">⚙</span>
          <h1 style="margin:0;font-size:18px;font-weight:700;">RM Sourcing Editor</h1>
          <span class="pill pill-rm" id="user-pill">user</span>
        </div>
        <p style="margin:2px 0 0;font-size:12px;color:var(--ink-dim);">Walk through every RM. Add Loose vendors / Branded brands→SKUs→suppliers / In-house recipes. Persist to D1.</p>
      </div>
      <div style="display:flex;gap:8px;">
        <a href="/ops/visual/nch-l2-canonical/" class="btn">↗ Canonical Map</a>
        <a href="/ops/visual/nch-rm-map/" class="btn">↗ RM Mindmap</a>
        <button class="btn btn-danger" id="logout-btn" style="display:none;">Logout</button>
      </div>
    </div>
  </header>

  <main>
    <section class="stats" id="stats"></section>

    <section class="filters">
      <input type="text" id="filter-q" placeholder="Search RM code or name…">
      <select id="filter-brand">
        <option value="">All brands</option>
        <option value="HN">HN (cross)</option>
        <option value="NCH">NCH only</option>
        <option value="HE">HE only</option>
      </select>
      <select id="filter-profile">
        <option value="">All profiles</option>
        <option value="L">L only</option>
        <option value="B">B only</option>
        <option value="I">I only</option>
        <option value="Lb">Lb</option>
        <option value="Bl">Bl</option>
        <option value="Lbi">Lbi</option>
      </select>
      <select id="filter-status">
        <option value="">All statuses</option>
        <option value="empty">Empty (untouched)</option>
        <option value="filled">Has data</option>
      </select>
      <button class="btn btn-primary" id="add-rm-btn">+ Add New RM</button>
      <button class="btn" id="seed-btn" title="Seed only runs if table is empty">Seed</button>
      <button class="btn" id="reload-btn">Reload</button>
    </section>

    <section class="rm-grid" id="rm-list"></section>
  </main>
</div>

<!-- Editor side panel -->
<div class="editor-overlay" id="editor-overlay"></div>
<div class="editor-panel" id="editor-panel">
  <div class="editor-head">
    <div style="flex:1;min-width:200px;">
      <h2 id="ed-title">RM</h2>
      <div class="sub" id="ed-sub"></div>
    </div>
    <span class="pill pill-unsaved" id="ed-unsaved" style="display:none;">unsaved</span>
    <button class="btn btn-sm" id="ed-close">Close</button>
  </div>
  <div class="editor-body" id="editor-body"></div>
  <div class="editor-foot">
    <span class="sub ed-foot-extra" id="ed-foot-status"></span>
    <button class="btn btn-sm btn-danger" id="ed-delete" style="display:none;">Delete</button>
    <button class="btn btn-sm" id="ed-revert">Revert</button>
    <button class="btn btn-sm btn-primary" id="ed-save">Save</button>
  </div>
</div>

<script>
(function () {
  'use strict';

  // ---------- State ----------
  const State = {
    pin: localStorage.getItem('rm_sourcing_pin') || '',
    user: null,
    rms: [],          // light list rows
    open: null,       // { rm_code, ... , data: {...} } currently open
    openOriginal: null,
    identity: null,   // structured identity for the open RM (brand/approximation/useScope/itemAbbr/sourcing/primary/rm_name)
    isNew: false,     // true when open RM is unsaved (Add New flow)
    dirty: false,
    filter: { q: '', brand: '', profile: '', status: '' },
  };

  const API = '/api/rm-sourcing';
  const V_SHAPES = ['V1a', 'V1b', 'V2', 'V3', 'V4', 'V5'];
  const PROFILE_OPTIONS = ['L', 'B', 'I', 'Lb', 'Bl', 'Li', 'Il', 'Bi', 'Ib', 'Lbi', 'Bli', 'Ilb'];
  const BRANDS = [
    { value: 'NCH', label: 'NCH-only' },
    { value: 'HE',  label: 'HE-only' },
    { value: 'HN',  label: 'Cross-brand (HN-)' },
  ];
  const APPROXIMATIONS = [
    { value: 'A', label: 'Approximate (A)' },
    { value: 'D', label: 'Definitive (D)' },
  ];
  const USE_SCOPES = [
    { value: 'M', label: 'Multi-use (M)' },
    { value: 'S', label: 'Single-use (S)' },
  ];
  const SOURCING_LETTERS = [
    { value: 'L', label: 'Loose-purchased (L)', cls: 'l' },
    { value: 'B', label: 'Branded SKU (B)',     cls: 'b' },
    { value: 'I', label: 'In-house produced (I)', cls: 'i' },
  ];

  // ---------- Canonical-code derivation ----------
  function autoAbbr(name) {
    const clean = (name || '').toUpperCase().replace(/[^A-Z0-9 ]/g, '');
    if (!clean) return '';
    const compact = clean.replace(/\s+/g, '');
    if (compact.length <= 3) return compact;
    // First-3-consonants strategy, deduplicating adjacent dupes (so "Butter" -> BTR not BTT).
    const consonants = compact.replace(/[AEIOU]/g, '');
    const dedup = consonants.replace(/(.)\1+/g, '$1');
    if (dedup.length >= 3) return dedup.slice(0, 3);
    if (consonants.length >= 3) return consonants.slice(0, 3);
    return compact.slice(0, 3);
  }

  function deriveSourcingSlot(letters, primary) {
    if (!letters || letters.length === 0) return null;
    const set = Array.from(new Set(letters)).filter(l => 'LBI'.includes(l));
    if (set.length === 0) return null;
    const p = (primary && set.includes(primary)) ? primary : set[0];
    const alts = set.filter(l => l !== p).sort();
    return p + alts.map(a => a.toLowerCase()).join('');
  }

  function deriveCode(parts) {
    const { brand, approximation, useScope, itemAbbr, sourcing, primary } = parts;
    if (!brand || !approximation || !useScope || !itemAbbr || !sourcing || sourcing.length === 0) return null;
    if (!/^[A-Z0-9]{2,4}$/.test(itemAbbr)) return null;
    const slot = deriveSourcingSlot(sourcing, primary);
    if (!slot) return null;
    return `${brand}-${approximation}${useScope}-${slot}-${itemAbbr}`;
  }

  function renderCodeHTML(parts) {
    const { brand, approximation, useScope, itemAbbr, sourcing, primary } = parts;
    const code = deriveCode(parts);
    if (!code) return '<span class="incomplete">?</span>';
    const slot = deriveSourcingSlot(sourcing, primary);
    // Color the sourcing slot per primary letter
    let srcHtml = '';
    if (slot) {
      const prim = slot[0];
      const cls = prim === 'L' ? 'seg-src-l' : prim === 'B' ? 'seg-src-b' : 'seg-src-i';
      srcHtml = `<span class="${cls}">${slot}</span>`;
    }
    return `<span class="seg-brand">${brand}</span><span class="dash">-</span>` +
           `<span class="seg-type">${approximation}${useScope}</span><span class="dash">-</span>` +
           `${srcHtml}<span class="dash">-</span>` +
           `<span class="seg-item">${itemAbbr}</span>`;
  }

  /* Parse an existing rm_code into structured identity parts. */
  function parseCodeToIdentity(code) {
    const parts = (code || '').split('-');
    if (parts.length !== 4) return null;
    const [brand, type, slot, item] = parts;
    if (!/^[A-Z]{2,3}$/.test(brand) || type.length !== 2) return null;
    const approximation = type[0];
    const useScope = type[1];
    // Parse sourcing slot: first char primary uppercase, rest lowercase alts
    const primary = slot[0];
    const alts = slot.slice(1).toUpperCase().split('').filter(c => 'LBI'.includes(c));
    const sourcing = [primary, ...alts];
    return {
      brand, approximation, useScope,
      itemAbbr: item,
      sourcing,
      primary,
      itemAbbrTouched: true, // existing code → preserve abbr unless user changes it
    };
  }

  // ---------- Helpers ----------
  const $ = sel => document.querySelector(sel);
  const $$ = sel => Array.from(document.querySelectorAll(sel));
  const fmtTime = ts => ts ? new Date(ts).toLocaleString('en-IN', { dateStyle: 'short', timeStyle: 'short' }) : '—';
  const uuid = () => 'id-' + Math.random().toString(36).slice(2, 11) + Date.now().toString(36).slice(-4);
  const escapeHtml = s => String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));

  function toast(msg, kind = '') {
    const el = document.createElement('div');
    el.className = 'toast ' + kind;
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2400);
  }

  async function api(path, opts = {}) {
    const url = new URL(window.location.origin + API + path);
    url.searchParams.set('pin', State.pin);
    const r = await fetch(url.toString(), {
      method: opts.method || 'GET',
      headers: { 'Content-Type': 'application/json' },
      body: opts.body ? JSON.stringify(opts.body) : undefined,
    });
    const txt = await r.text();
    let data; try { data = JSON.parse(txt); } catch { data = { error: 'Bad JSON: ' + txt.slice(0, 200) }; }
    if (!r.ok) throw new Error(data.error || ('HTTP ' + r.status));
    return data;
  }

  // ---------- PIN gate ----------
  async function tryAuth(pin) {
    const url = new URL(window.location.origin + API);
    url.searchParams.set('pin', pin);
    const r = await fetch(url.toString());
    const data = await r.json();
    if (r.status === 401) throw new Error('Invalid PIN');
    if (!r.ok) throw new Error(data.error || 'Failed');
    return data;
  }

  function showApp() {
    $('#gate').style.display = 'none';
    $('#app').style.display = 'block';
    $('#logout-btn').style.display = 'inline-block';
  }
  function showGate() {
    $('#gate').style.display = 'block';
    $('#app').style.display = 'none';
  }

  $('#pin-submit').onclick = async () => {
    const pin = $('#pin-input').value.trim();
    if (!pin) return;
    $('#pin-err').textContent = '';
    try {
      State.pin = pin;
      const data = await tryAuth(pin);
      localStorage.setItem('rm_sourcing_pin', pin);
      State.rms = data.rms || [];
      $('#user-pill').textContent = 'pin: ' + pin;
      showApp();
      render();
    } catch (e) {
      $('#pin-err').textContent = e.message;
      State.pin = '';
    }
  };
  $('#pin-input').addEventListener('keydown', e => { if (e.key === 'Enter') $('#pin-submit').click(); });
  $('#logout-btn').onclick = () => {
    localStorage.removeItem('rm_sourcing_pin');
    State.pin = '';
    State.rms = [];
    $('#pin-input').value = '';
    showGate();
  };

  // ---------- List render ----------
  function statusOf(rm) {
    const c = rm.counts || {};
    return (c.vendors + c.brands + c.skus + c.recipes) > 0 ? 'filled' : 'empty';
  }
  function profilePills(profile) {
    const lower = (profile || '').toLowerCase();
    const pills = [];
    if (lower.includes('l')) pills.push('<span class="pill pill-l">L</span>');
    if (lower.includes('b')) pills.push('<span class="pill pill-b">B</span>');
    if (lower.includes('i')) pills.push('<span class="pill pill-i">I</span>');
    return pills.join(' ');
  }

  function renderStats() {
    const total = State.rms.length;
    const filled = State.rms.filter(r => statusOf(r) === 'filled').length;
    const empty = total - filled;
    const totalVendors = State.rms.reduce((s, r) => s + (r.counts?.vendors || 0), 0);
    const totalBrands = State.rms.reduce((s, r) => s + (r.counts?.brands || 0), 0);
    const totalSkus = State.rms.reduce((s, r) => s + (r.counts?.skus || 0), 0);
    $('#stats').innerHTML = `
      <div class="stat-card"><div class="label">RMs</div><div class="value">${total}</div><div class="meta">canonical seed</div></div>
      <div class="stat-card"><div class="label">Filled</div><div class="value" style="color:var(--good)">${filled}</div><div class="meta">${total ? Math.round(filled/total*100) : 0}% done</div></div>
      <div class="stat-card"><div class="label">Empty</div><div class="value" style="color:var(--ink-faint)">${empty}</div><div class="meta">awaiting input</div></div>
      <div class="stat-card"><div class="label">Vendors (L)</div><div class="value" style="color:var(--info)">${totalVendors}</div><div class="meta">across all RMs</div></div>
      <div class="stat-card"><div class="label">Brands (B)</div><div class="value" style="color:var(--purple)">${totalBrands}</div><div class="meta">${totalSkus} SKUs</div></div>
    `;
  }

  function renderList() {
    const f = State.filter;
    const q = (f.q || '').toLowerCase();
    const rows = State.rms.filter(r => {
      if (f.brand && r.brand_prefix !== f.brand) return false;
      if (f.profile && r.sourcing_profile !== f.profile) return false;
      if (f.status && statusOf(r) !== f.status) return false;
      if (q && !(r.rm_code.toLowerCase().includes(q) || r.rm_name.toLowerCase().includes(q))) return false;
      return true;
    });
    if (rows.length === 0) {
      $('#rm-list').innerHTML = `<div style="padding:30px;text-align:center;color:var(--ink-dim);">No RMs match. ${State.rms.length === 0 ? 'Click <strong>Seed</strong> to populate the 31 NCH RMs.' : ''}</div>`;
      return;
    }
    $('#rm-list').innerHTML = rows.map(r => {
      const c = r.counts || {};
      const stat = statusOf(r);
      return `
        <div class="rm-row ${stat === 'filled' ? 'has-data' : 'empty'}" data-code="${r.rm_code}">
          <div class="code">${escapeHtml(r.rm_code)}</div>
          <div class="name">${escapeHtml(r.rm_name)}</div>
          <div class="profile">${profilePills(r.sourcing_profile)}</div>
          <div class="stat" title="Loose vendors"><span class="n" style="color:var(--info)">${c.vendors || 0}</span>L</div>
          <div class="stat" title="Brands · SKUs · Suppliers"><span class="n" style="color:var(--purple)">${c.brands || 0}·${c.skus || 0}·${c.suppliers || 0}</span>B</div>
          <div class="stat" title="In-house recipes"><span class="n" style="color:var(--teal)">${c.recipes || 0}</span>I</div>
          <div class="updated">${fmtTime(r.updated_at)}<br><span style="color:var(--ink-faint)">${escapeHtml(r.updated_by || '')}</span></div>
        </div>`;
    }).join('');
    $$('.rm-row').forEach(el => {
      el.onclick = () => openEditor(el.dataset.code);
    });
  }

  function render() {
    renderStats();
    renderList();
  }

  $('#filter-q').oninput = e => { State.filter.q = e.target.value; renderList(); };
  $('#filter-brand').onchange = e => { State.filter.brand = e.target.value; renderList(); };
  $('#filter-profile').onchange = e => { State.filter.profile = e.target.value; renderList(); };
  $('#filter-status').onchange = e => { State.filter.status = e.target.value; renderList(); };

  $('#reload-btn').onclick = async () => {
    try {
      const data = await api('');
      State.rms = data.rms || [];
      render();
      toast('Reloaded ' + State.rms.length + ' RMs');
    } catch (e) { toast(e.message, 'error'); }
  };

  $('#seed-btn').onclick = async () => {
    if (!confirm('Seed 31 RMs? (Only inserts if table is empty.)')) return;
    try {
      const r = await api('?action=seed', { method: 'POST' });
      if (r.skipped) toast('Already seeded (' + r.existing_count + ' rows). Skipped.');
      else toast('Inserted ' + r.inserted + ' RMs', 'success');
      const data = await api('');
      State.rms = data.rms || [];
      render();
    } catch (e) { toast(e.message, 'error'); }
  };

  // ---------- Editor ----------
  async function openEditor(rmCode) {
    if (State.dirty && !confirm('Discard unsaved changes?')) return;
    try {
      const data = await api('?rm_code=' + encodeURIComponent(rmCode));
      State.open = data;
      // ensure data shape
      State.open.data = data.data || {};
      const idn = parseCodeToIdentity(data.rm_code) || {
        brand: data.brand_prefix, approximation: 'A', useScope: 'M',
        itemAbbr: data.item_abbr || '', sourcing: ['L'], primary: 'L', itemAbbrTouched: true,
      };
      idn.rm_name = data.rm_name || '';
      State.identity = idn;
      State.isNew = false;
      State.openOriginal = JSON.parse(JSON.stringify({ open: State.open, identity: State.identity }));
      State.dirty = false;
      $('#ed-unsaved').style.display = 'none';
      $('#ed-title').textContent = data.rm_name;
      $('#ed-sub').innerHTML = `<span class="mono" style="color:var(--accent)">${escapeHtml(data.rm_code)}</span> · ${escapeHtml(data.brand_prefix)} · ${escapeHtml(data.rm_type)}`;
      $('#ed-foot-status').textContent = 'Last saved: ' + fmtTime(data.updated_at) + (data.updated_by ? ' by ' + data.updated_by : '');
      $('#ed-delete').style.display = 'inline-block';
      renderEditor();
      $('#editor-overlay').classList.add('open');
      $('#editor-panel').classList.add('open');
    } catch (e) { toast(e.message, 'error'); }
  }

  function openNewEditor() {
    if (State.dirty && !confirm('Discard unsaved changes?')) return;
    State.open = {
      rm_code: '',
      rm_name: '',
      brand_prefix: '',
      rm_type: '',
      sourcing_profile: '',
      item_abbr: '',
      data: { loose: { vendors: [] } },
      updated_at: null,
      updated_by: null,
    };
    State.identity = {
      brand: '', approximation: '', useScope: '',
      itemAbbr: '', sourcing: [], primary: '',
      rm_name: '', itemAbbrTouched: false,
    };
    State.isNew = true;
    State.openOriginal = JSON.parse(JSON.stringify({ open: State.open, identity: State.identity }));
    State.dirty = false;
    $('#ed-unsaved').style.display = 'none';
    $('#ed-title').textContent = 'New RM';
    $('#ed-sub').innerHTML = '<span class="mono" style="color:var(--ink-faint)">code derives from inputs below</span>';
    $('#ed-foot-status').textContent = 'New record — fill identity fields, then Save';
    $('#ed-delete').style.display = 'none';
    renderEditor();
    $('#editor-overlay').classList.add('open');
    $('#editor-panel').classList.add('open');
  }

  function closeEditor() {
    if (State.dirty && !confirm('Discard unsaved changes?')) return;
    $('#editor-overlay').classList.remove('open');
    $('#editor-panel').classList.remove('open');
    State.open = null;
    State.openOriginal = null;
    State.identity = null;
    State.isNew = false;
    State.dirty = false;
  }
  $('#ed-close').onclick = closeEditor;
  $('#editor-overlay').onclick = closeEditor;
  $('#add-rm-btn').onclick = openNewEditor;

  function markDirty() {
    State.dirty = true;
    $('#ed-unsaved').style.display = 'inline-block';
  }

  function renderEditor() {
    const o = State.open;
    const idn = State.identity;
    if (!o || !idn) return;

    // Sync sourcing profile into open from identity (so derived data sections match)
    const slot = deriveSourcingSlot(idn.sourcing, idn.primary);
    const profile = slot || '';
    o.sourcing_profile = profile;

    const lower = profile.toLowerCase();
    const showL = lower.includes('l');
    const showB = lower.includes('b');
    const showI = lower.includes('i');

    // Ensure data shape for visible sections
    if (showL && !o.data.loose)    o.data.loose = { vendors: [] };
    if (showB && !o.data.branded)  o.data.branded = { brands: [] };
    if (showI && !o.data.in_house) o.data.in_house = { recipes: [] };

    // ---- Identity form ----
    const brandRadios = BRANDS.map(b =>
      `<label class="chip ${idn.brand === b.value ? 'checked' : ''}">
        <input type="radio" name="id-brand" value="${b.value}" ${idn.brand === b.value ? 'checked' : ''}>
        ${escapeHtml(b.label)}
      </label>`
    ).join('');

    const apxRadios = APPROXIMATIONS.map(a =>
      `<label class="chip ${idn.approximation === a.value ? 'checked' : ''}">
        <input type="radio" name="id-apx" value="${a.value}" ${idn.approximation === a.value ? 'checked' : ''}>
        ${escapeHtml(a.label)}
      </label>`
    ).join('');

    const useRadios = USE_SCOPES.map(u =>
      `<label class="chip ${idn.useScope === u.value ? 'checked' : ''}">
        <input type="radio" name="id-use" value="${u.value}" ${idn.useScope === u.value ? 'checked' : ''}>
        ${escapeHtml(u.label)}
      </label>`
    ).join('');

    const sourcingChips = SOURCING_LETTERS.map(s => {
      const checked = (idn.sourcing || []).includes(s.value);
      return `<label class="chip ${s.cls} ${checked ? 'checked' : ''}">
        <input type="checkbox" name="id-src" value="${s.value}" ${checked ? 'checked' : ''}>
        ${escapeHtml(s.label)}
      </label>`;
    }).join('');

    let primaryHtml = '';
    if ((idn.sourcing || []).length >= 2) {
      primaryHtml = `<div class="grp">
        <label class="grp-label">Currently primary</label>
        <div class="chip-row">
          ${idn.sourcing.map(letter => {
            const meta = SOURCING_LETTERS.find(s => s.value === letter);
            return `<label class="chip ${meta.cls} ${idn.primary === letter ? 'checked' : ''}">
              <input type="radio" name="id-primary" value="${letter}" ${idn.primary === letter ? 'checked' : ''}>
              ${escapeHtml(meta.label.split(' (')[0])}
            </label>`;
          }).join('')}
        </div>
        <div class="help">Sets the uppercase letter in the sourcing slot. Alternates fall to lowercase.</div>
      </div>`;
    }

    // ---- Computed code panel ----
    const codeOk = deriveCode(idn) !== null;
    const codeHtml = renderCodeHTML(idn);
    const badge = codeOk
      ? '<span class="badge ok">&#10003; Canonical code complete</span>'
      : '<span class="badge warn">&#9888; Code incomplete &mdash; fill missing fields</span>';

    let html = `
      <div class="id-form">
        <div class="grp">
          <label class="grp-label">Brand scope</label>
          <div class="chip-row">${brandRadios}</div>
          <div class="help">Cross-brand uses HN-, single-brand uses NCH- or HE-.</div>
        </div>
        <div class="id-grid">
          <div class="grp">
            <label class="grp-label">Approximation</label>
            <div class="chip-row">${apxRadios}</div>
            <div class="help">Portioned approximately (A) or counted exactly 1=1 (D).</div>
          </div>
          <div class="grp">
            <label class="grp-label">Use scope</label>
            <div class="chip-row">${useRadios}</div>
            <div class="help">Consumed by multiple POS products (M) or just one (S).</div>
          </div>
        </div>
        <div class="grp">
          <label class="grp-label">RM name</label>
          <input class="txt" id="id-rmname" value="${escapeHtml(idn.rm_name || '')}" placeholder="e.g. Sugar, Buffalo Milk, Saffron">
        </div>
        <div class="grp">
          <label class="grp-label">Item abbreviation (3 chars)</label>
          <input class="txt mono" id="id-itemabbr" value="${escapeHtml(idn.itemAbbr || '')}" maxlength="4" placeholder="auto" style="text-transform:uppercase;max-width:140px;">
          <div class="help">Auto-derived from name (consonants, vowel-stripped). Override anytime.</div>
        </div>
        <div class="grp">
          <label class="grp-label">Sourcing possibilities</label>
          <div class="chip-row">${sourcingChips}</div>
          <div class="help">Tick every channel this RM could come from. At least one required.</div>
        </div>
        ${primaryHtml}
      </div>

      <div class="code-display">
        <div class="label-tiny">Auto-derived canonical code</div>
        <div class="computed ${codeOk ? '' : 'incomplete'}">${codeHtml}</div>
        ${badge}
      </div>
    `;

    if (showL) html += renderLooseSection(o.data.loose);
    if (showB) html += renderBrandedSection(o.data.branded);
    if (showI) html += renderInHouseSection(o.data.in_house);

    if (!showL && !showB && !showI) {
      html += `<div style="text-align:center;color:var(--ink-faint);padding:30px;font-size:13px;">Tick a sourcing channel above to start adding vendors / brands / recipes.</div>`;
    }

    $('#editor-body').innerHTML = html;
    bindEditor();
  }

  function vshapeOpts(selected) {
    return V_SHAPES.map(v => `<option value="${v}" ${v === selected ? 'selected' : ''}>${v}</option>`).join('');
  }

  function renderLooseSection(loose) {
    const vendors = loose.vendors || [];
    return `
      <div class="section l">
        <h3><span class="pill pill-l">L</span> Loose Vendors <span style="color:var(--ink-faint);font-weight:400;">· ${vendors.length}</span></h3>
        <div id="loose-list">
          ${vendors.map((v, i) => looseVendorCard(v, i)).join('')}
        </div>
        <button class="add-btn" data-action="add-vendor">+ Add Loose Vendor</button>
      </div>
    `;
  }

  function looseVendorCard(v, i) {
    return `
      <div class="item-card" data-i="${i}">
        <div class="row">
          <input class="txt" placeholder="Vendor name" data-field="name" value="${escapeHtml(v.name || '')}">
          <input class="txt mono" placeholder="ABBR" data-field="abbr" value="${escapeHtml(v.abbr || '')}" style="text-transform:uppercase;">
          <select class="txt mono" data-field="v_shape">${vshapeOpts(v.v_shape || 'V1a')}</select>
          <label class="primary-flag"><input type="radio" name="loose-primary" data-field="primary" ${v.primary ? 'checked' : ''}>primary</label>
          <button class="icon-btn" data-action="del-vendor">✕</button>
        </div>
        <div class="row-2">
          <textarea class="txt" placeholder="Notes (optional)" data-field="notes">${escapeHtml(v.notes || '')}</textarea>
        </div>
      </div>
    `;
  }

  function renderBrandedSection(branded) {
    const brands = branded.brands || [];
    return `
      <div class="section b">
        <h3><span class="pill pill-b">B</span> Branded · Brands &rarr; SKUs &rarr; Suppliers <span style="color:var(--ink-faint);font-weight:400;">· ${brands.length} brand(s)</span></h3>
        <div id="branded-list">
          ${brands.map((br, bi) => brandCard(br, bi)).join('')}
        </div>
        <button class="add-btn" data-action="add-brand">+ Add Brand</button>
      </div>
    `;
  }

  function brandCard(br, bi) {
    const skus = br.skus || [];
    return `
      <div class="item-card brand" data-bi="${bi}">
        <div class="row" style="grid-template-columns:1.5fr 1fr 0.6fr auto;">
          <input class="txt" placeholder="Brand name (e.g. Amul)" data-field="brand-name" value="${escapeHtml(br.name || '')}">
          <input class="txt mono" placeholder="ABBR" data-field="brand-abbr" value="${escapeHtml(br.abbr || '')}" style="text-transform:uppercase;">
          <label class="primary-flag"><input type="radio" name="brand-primary" data-field="brand-primary" ${br.primary ? 'checked' : ''}>primary</label>
          <button class="icon-btn" data-action="del-brand">✕</button>
        </div>
        <div style="margin-top:10px;">
          ${skus.map((sk, si) => skuCard(sk, bi, si)).join('')}
          <button class="add-btn" data-action="add-sku">+ Add SKU to ${escapeHtml(br.name || 'brand')}</button>
        </div>
      </div>
    `;
  }

  function skuCard(sk, bi, si) {
    const sup = sk.suppliers || [];
    return `
      <div class="item-card sku" data-bi="${bi}" data-si="${si}">
        <div class="row" style="grid-template-columns:1fr auto;">
          <input class="txt" placeholder="SKU description (e.g. 500G or 1L pouch)" data-field="sku-desc" value="${escapeHtml(sk.description || '')}">
          <button class="icon-btn" data-action="del-sku">✕</button>
        </div>
        <div style="margin-top:8px;">
          ${sup.map((s, ssi) => supplierCard(s, bi, si, ssi)).join('')}
          <button class="add-btn" data-action="add-supplier">+ Add Supplier for SKU</button>
        </div>
      </div>
    `;
  }

  function supplierCard(s, bi, si, ssi) {
    const radioName = `sku-primary-${bi}-${si}`;
    return `
      <div class="item-card supplier" data-bi="${bi}" data-si="${si}" data-ssi="${ssi}">
        <div class="row">
          <input class="txt" placeholder="Supplier name" data-field="sup-name" value="${escapeHtml(s.name || '')}">
          <input class="txt mono" placeholder="ABBR" data-field="sup-abbr" value="${escapeHtml(s.abbr || '')}" style="text-transform:uppercase;">
          <select class="txt mono" data-field="sup-vshape">${vshapeOpts(s.v_shape || 'V1a')}</select>
          <label class="primary-flag"><input type="radio" name="${radioName}" data-field="sup-primary" ${s.primary ? 'checked' : ''}>primary</label>
          <button class="icon-btn" data-action="del-supplier">✕</button>
        </div>
        <div class="row-2"><textarea class="txt" placeholder="Notes (optional)" data-field="sup-notes">${escapeHtml(s.notes || '')}</textarea></div>
      </div>
    `;
  }

  function renderInHouseSection(inHouse) {
    const recipes = inHouse.recipes || [];
    return `
      <div class="section i">
        <h3><span class="pill pill-i">I</span> In-house Recipes <span style="color:var(--ink-faint);font-weight:400;">· ${recipes.length}</span></h3>
        <div id="recipe-list">
          ${recipes.map((r, i) => recipeCard(r, i)).join('')}
        </div>
        <button class="add-btn" data-action="add-recipe">+ Add Recipe</button>
      </div>
    `;
  }

  function recipeCard(r, i) {
    return `
      <div class="item-card recipe" data-i="${i}">
        <div class="row" style="grid-template-columns:1.5fr 1fr auto;">
          <input class="txt" placeholder="Recipe name (e.g. Malai prep)" data-field="recipe-name" value="${escapeHtml(r.name || '')}">
          <input class="txt mono" placeholder="Identifier (R-MDA+YST)" data-field="recipe-id" value="${escapeHtml(r.identifier || '')}">
          <button class="icon-btn" data-action="del-recipe">✕</button>
        </div>
        <div class="row-2"><textarea class="txt" placeholder="Upstream RMs (comma-separated codes)" data-field="recipe-upstream">${escapeHtml(r.upstream || '')}</textarea></div>
      </div>
    `;
  }

  // ---------- Editor binding ----------
  function bindEditor() {
    const body = $('#editor-body');
    const idn = State.identity;

    // Identity radio groups
    body.querySelectorAll('input[name="id-brand"]').forEach(el => {
      el.onchange = () => { idn.brand = el.value; markDirty(); renderEditor(); };
    });
    body.querySelectorAll('input[name="id-apx"]').forEach(el => {
      el.onchange = () => { idn.approximation = el.value; markDirty(); renderEditor(); };
    });
    body.querySelectorAll('input[name="id-use"]').forEach(el => {
      el.onchange = () => { idn.useScope = el.value; markDirty(); renderEditor(); };
    });
    body.querySelectorAll('input[name="id-src"]').forEach(el => {
      el.onchange = () => {
        const val = el.value;
        const set = new Set(idn.sourcing || []);
        if (el.checked) {
          set.add(val);
        } else {
          // Confirm if this letter has data attached.
          const hasData =
            (val === 'L' && (State.open.data.loose?.vendors || []).length > 0) ||
            (val === 'B' && (State.open.data.branded?.brands || []).length > 0) ||
            (val === 'I' && (State.open.data.in_house?.recipes || []).length > 0);
          if (hasData && !confirm(`Section "${val}" has data. Unchecking will remove it from this RM. Continue?`)) {
            el.checked = true;
            return;
          }
          set.delete(val);
          // Drop the data section so it doesn't sneak back in.
          if (val === 'L') delete State.open.data.loose;
          if (val === 'B') delete State.open.data.branded;
          if (val === 'I') delete State.open.data.in_house;
        }
        idn.sourcing = Array.from(set).filter(l => 'LBI'.includes(l));
        // If primary no longer in sourcing, reset to first.
        if (!idn.sourcing.includes(idn.primary)) idn.primary = idn.sourcing[0] || '';
        markDirty(); renderEditor();
      };
    });
    body.querySelectorAll('input[name="id-primary"]').forEach(el => {
      el.onchange = () => { idn.primary = el.value; markDirty(); renderEditor(); };
    });

    // RM name (free text)
    const rmNameEl = $('#id-rmname');
    if (rmNameEl) {
      rmNameEl.oninput = () => {
        idn.rm_name = rmNameEl.value;
        // Auto-suggest item abbr if user hasn't manually overridden
        if (!idn.itemAbbrTouched) {
          idn.itemAbbr = autoAbbr(rmNameEl.value);
          const aEl = $('#id-itemabbr');
          if (aEl) aEl.value = idn.itemAbbr;
        }
        // Update header title
        $('#ed-title').textContent = rmNameEl.value || 'New RM';
        // Update computed-code panel only (no full re-render — preserves cursor)
        updateComputedCode();
        markDirty();
      };
    }

    // Item abbr override
    const abbrEl = $('#id-itemabbr');
    if (abbrEl) {
      abbrEl.oninput = () => {
        idn.itemAbbr = abbrEl.value.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 4);
        abbrEl.value = idn.itemAbbr;
        idn.itemAbbrTouched = true;
        updateComputedCode();
        markDirty();
      };
    }

    // Field-level inputs (delegation) for vendor/brand/sku/supplier/recipe cards.
    // Direct property assignment so re-rendering replaces (not stacks) handlers.
    body.oninput = handleEditorInput;
    body.onchange = handleEditorInput;
    body.onclick = handleEditorClick;
  }

  function updateComputedCode() {
    const idn = State.identity;
    const display = document.querySelector('.code-display .computed');
    const badge = document.querySelector('.code-display .badge');
    if (!display || !idn) return;
    const codeOk = deriveCode(idn) !== null;
    display.innerHTML = renderCodeHTML(idn);
    display.classList.toggle('incomplete', !codeOk);
    if (badge) {
      badge.outerHTML = codeOk
        ? '<span class="badge ok">&#10003; Canonical code complete</span>'
        : '<span class="badge warn">&#9888; Code incomplete &mdash; fill missing fields</span>';
    }
  }

  function autoUpper(name) {
    return (name || '').replace(/[^A-Za-z0-9]/g, '').slice(0, 8).toUpperCase();
  }

  function handleEditorInput(e) {
    const t = e.target;
    const f = t.dataset.field;
    if (!f) return;
    const card = t.closest('.item-card');
    if (!card) return;
    const o = State.open;

    // Loose vendor
    if (card.parentElement?.id === 'loose-list') {
      const i = +card.dataset.i;
      const v = o.data.loose.vendors[i];
      if (f === 'name') {
        v.name = t.value;
        const ab = card.querySelector('[data-field="abbr"]');
        if (ab && !v.abbrTouched) ab.value = autoUpper(t.value);
        v.abbr = ab.value;
      } else if (f === 'abbr') {
        v.abbr = t.value.toUpperCase();
        v.abbrTouched = true;
      } else if (f === 'v_shape') v.v_shape = t.value;
      else if (f === 'primary') {
        if (t.checked) o.data.loose.vendors.forEach((vv, j) => vv.primary = (j === i));
      } else if (f === 'notes') v.notes = t.value;
      markDirty();
      return;
    }

    // Recipe
    if (card.parentElement?.id === 'recipe-list') {
      const i = +card.dataset.i;
      const r = o.data.in_house.recipes[i];
      if (f === 'recipe-name') r.name = t.value;
      else if (f === 'recipe-id') r.identifier = t.value;
      else if (f === 'recipe-upstream') r.upstream = t.value;
      markDirty();
      return;
    }

    // Brand level
    if (card.classList.contains('brand')) {
      const bi = +card.dataset.bi;
      const br = o.data.branded.brands[bi];
      if (f === 'brand-name') {
        br.name = t.value;
        const ab = card.querySelector('[data-field="brand-abbr"]');
        if (ab && !br.abbrTouched) ab.value = autoUpper(t.value);
        br.abbr = ab.value;
      } else if (f === 'brand-abbr') {
        br.abbr = t.value.toUpperCase();
        br.abbrTouched = true;
      } else if (f === 'brand-primary') {
        if (t.checked) o.data.branded.brands.forEach((bb, j) => bb.primary = (j === bi));
      }
      markDirty();
      return;
    }

    // SKU level
    if (card.classList.contains('sku')) {
      const bi = +card.dataset.bi;
      const si = +card.dataset.si;
      const sk = o.data.branded.brands[bi].skus[si];
      if (f === 'sku-desc') sk.description = t.value;
      markDirty();
      return;
    }

    // Supplier level
    if (card.classList.contains('supplier')) {
      const bi = +card.dataset.bi;
      const si = +card.dataset.si;
      const ssi = +card.dataset.ssi;
      const sup = o.data.branded.brands[bi].skus[si].suppliers[ssi];
      if (f === 'sup-name') {
        sup.name = t.value;
        const ab = card.querySelector('[data-field="sup-abbr"]');
        if (ab && !sup.abbrTouched) ab.value = autoUpper(t.value);
        sup.abbr = ab.value;
      } else if (f === 'sup-abbr') {
        sup.abbr = t.value.toUpperCase();
        sup.abbrTouched = true;
      } else if (f === 'sup-vshape') sup.v_shape = t.value;
      else if (f === 'sup-primary') {
        if (t.checked) o.data.branded.brands[bi].skus[si].suppliers.forEach((s, j) => s.primary = (j === ssi));
      } else if (f === 'sup-notes') sup.notes = t.value;
      markDirty();
      return;
    }
  }

  function handleEditorClick(e) {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const a = btn.dataset.action;
    const o = State.open;

    if (a === 'add-vendor') {
      o.data.loose.vendors.push({ id: uuid(), name: '', abbr: '', v_shape: 'V1a', primary: o.data.loose.vendors.length === 0, notes: '' });
      markDirty(); renderEditor(); return;
    }
    if (a === 'del-vendor') {
      const i = +btn.closest('.item-card').dataset.i;
      o.data.loose.vendors.splice(i, 1);
      markDirty(); renderEditor(); return;
    }
    if (a === 'add-brand') {
      o.data.branded.brands.push({ id: uuid(), name: '', abbr: '', primary: o.data.branded.brands.length === 0, skus: [] });
      markDirty(); renderEditor(); return;
    }
    if (a === 'del-brand') {
      const bi = +btn.closest('.item-card.brand').dataset.bi;
      o.data.branded.brands.splice(bi, 1);
      markDirty(); renderEditor(); return;
    }
    if (a === 'add-sku') {
      const bi = +btn.closest('.item-card.brand').dataset.bi;
      o.data.branded.brands[bi].skus.push({ id: uuid(), description: '', suppliers: [] });
      markDirty(); renderEditor(); return;
    }
    if (a === 'del-sku') {
      const card = btn.closest('.item-card.sku');
      const bi = +card.dataset.bi, si = +card.dataset.si;
      o.data.branded.brands[bi].skus.splice(si, 1);
      markDirty(); renderEditor(); return;
    }
    if (a === 'add-supplier') {
      const skuCard = btn.closest('.item-card.sku');
      const bi = +skuCard.dataset.bi, si = +skuCard.dataset.si;
      const arr = o.data.branded.brands[bi].skus[si].suppliers;
      arr.push({ id: uuid(), name: '', abbr: '', v_shape: 'V1a', primary: arr.length === 0, notes: '' });
      markDirty(); renderEditor(); return;
    }
    if (a === 'del-supplier') {
      const card = btn.closest('.item-card.supplier');
      const bi = +card.dataset.bi, si = +card.dataset.si, ssi = +card.dataset.ssi;
      o.data.branded.brands[bi].skus[si].suppliers.splice(ssi, 1);
      markDirty(); renderEditor(); return;
    }
    if (a === 'add-recipe') {
      o.data.in_house.recipes.push({ id: uuid(), name: '', identifier: '', upstream: '' });
      markDirty(); renderEditor(); return;
    }
    if (a === 'del-recipe') {
      const i = +btn.closest('.item-card.recipe').dataset.i;
      o.data.in_house.recipes.splice(i, 1);
      markDirty(); renderEditor(); return;
    }
  }

  $('#ed-revert').onclick = () => {
    if (!State.open) return;
    if (!confirm('Revert all unsaved changes?')) return;
    const snap = JSON.parse(JSON.stringify(State.openOriginal));
    State.open = snap.open;
    State.identity = snap.identity;
    State.dirty = false;
    $('#ed-unsaved').style.display = 'none';
    renderEditor();
  };

  $('#ed-delete').onclick = async () => {
    if (!State.open || State.isNew) return;
    const code = State.open.rm_code;
    if (!confirm(`Delete ${code} permanently? This cannot be undone.`)) return;
    try {
      await api('?rm_code=' + encodeURIComponent(code), { method: 'DELETE' });
      toast('Deleted ' + code, 'success');
      $('#editor-overlay').classList.remove('open');
      $('#editor-panel').classList.remove('open');
      State.open = null; State.identity = null; State.dirty = false;
      const list = await api('');
      State.rms = list.rms || [];
      render();
    } catch (e) { toast(e.message, 'error'); }
  };

  $('#ed-save').onclick = async () => {
    if (!State.open || !State.identity) return;
    const idn = State.identity;
    const newCode = deriveCode(idn);
    if (!newCode) {
      toast('Cannot save — canonical code is incomplete', 'error');
      return;
    }
    if (!idn.rm_name || !idn.rm_name.trim()) {
      toast('RM name is required', 'error');
      return;
    }

    const sourcing_profile = deriveSourcingSlot(idn.sourcing, idn.primary);
    const rm_type = idn.approximation + idn.useScope;
    const payload = {
      brand_prefix: idn.brand,
      rm_type,
      sourcing_profile,
      item_abbr: idn.itemAbbr,
      rm_name: idn.rm_name.trim(),
      data: State.open.data,
    };

    try {
      let r;
      if (State.isNew) {
        r = await api('?action=create', { method: 'POST', body: payload });
      } else {
        const oldCode = State.open.rm_code;
        r = await api('?rm_code=' + encodeURIComponent(oldCode), {
          method: 'PUT',
          body: payload,
        });
      }
      // Update open state with returned code
      State.open.rm_code = r.rm_code;
      State.open.brand_prefix = idn.brand;
      State.open.rm_type = rm_type;
      State.open.sourcing_profile = sourcing_profile;
      State.open.item_abbr = idn.itemAbbr;
      State.open.rm_name = idn.rm_name.trim();
      State.isNew = false;
      State.dirty = false;
      State.openOriginal = JSON.parse(JSON.stringify({ open: State.open, identity: State.identity }));
      $('#ed-unsaved').style.display = 'none';
      $('#ed-foot-status').textContent = 'Saved · ' + fmtTime(r.updated_at) + ' by ' + r.updated_by;
      $('#ed-sub').innerHTML = `<span class="mono" style="color:var(--accent)">${escapeHtml(r.rm_code)}</span> · ${escapeHtml(idn.brand)} · ${escapeHtml(rm_type)}`;
      $('#ed-delete').style.display = 'inline-block';
      const verb = r.migrated_from ? `Migrated ${r.migrated_from} → ${r.rm_code}` : 'Saved ' + r.rm_code;
      toast(verb, 'success');
      // refresh list
      const list = await api('');
      State.rms = list.rms || [];
      render();
    } catch (e) {
      toast(e.message, 'error');
    }
  };

  // ---------- Bootstrap ----------
  async function bootstrap() {
    if (State.pin) {
      try {
        const data = await tryAuth(State.pin);
        State.rms = data.rms || [];
        $('#user-pill').textContent = 'pin: ' + State.pin;
        showApp();
        render();
        return;
      } catch (e) {
        localStorage.removeItem('rm_sourcing_pin');
        State.pin = '';
      }
    }
    showGate();
    setTimeout(() => $('#pin-input').focus(), 100);
  }
  bootstrap();
})();
</script>
</body>
