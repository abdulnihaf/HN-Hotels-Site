  <!-- End-point dot -->
  <circle cx="438" cy="138" r="24" fill="#2ecc71"/>
  <circle cx="438" cy="138" r="13" fill="#0a0f1c"/>
  <!-- Wealth label -->
  <text x="256" y="475" font-family="-apple-system, system-ui, sans-serif"
