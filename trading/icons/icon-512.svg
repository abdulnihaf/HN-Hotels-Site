  </defs>
  <rect width="512" height="512" rx="112" fill="#0a0f1c"/>
  <rect x="6" y="6" width="500" height="500" rx="106" fill="url(#bg)" opacity="0.12"/>
  <!-- Upward chart line -->
  <polyline points="74,374 148,316 224,342 298,202 374,228 438,138"
