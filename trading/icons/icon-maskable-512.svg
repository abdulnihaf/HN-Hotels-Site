<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Maskable: 80% safe zone (centered 410x410). Bleed solid color to edges. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#4fa3ff"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2ecc71"/>
      <stop offset="100%" stop-color="#27ae60"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed background (maskable allows 0 padding) -->
  <rect width="512" height="512" fill="#0a0f1c"/>
  <rect width="512" height="512" fill="url(#bg)" opacity="0.18"/>
  <!-- Content kept inside 80% safe zone (51px-461px) -->
  <polyline points="120,344 184,302 248,322 308,222 372,242 432,176"
            fill="none" stroke="url(#green)" stroke-width="14"
            stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="432" cy="176" r="22" fill="#2ecc71"/>
  <circle cx="432" cy="176" r="11" fill="#0a0f1c"/>
  <text x="256" y="430" font-family="-apple-system, system-ui, sans-serif"
        font-size="56" font-weight="700" fill="#e6ecff" text-anchor="middle" letter-spacing="2">WEALTH</text>
</svg>
