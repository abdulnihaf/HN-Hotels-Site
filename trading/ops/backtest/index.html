<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Wealth · Backtested Edge</title>
<style>
  :root{--bg:#140A07;--card:#241310;--cardhi:#2E1A14;--line:#3A201A;--text:#F4E9E2;--dim:#B79A8D;--faint:#836A5D;--acc:#C8642D;--green:#7FDC8A;--amber:#E0A33C;--red:#FFB4A0}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--text);font:16px/1.5 -apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;padding:20px 16px 48px;max-width:560px;margin:0 auto}
  h1{font-size:22px;font-weight:800;margin:0 0 2px}
  .sub{color:var(--faint);font-size:12px;margin-bottom:18px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px}
  .lbl{color:var(--faint);font-size:11px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px}
  .big{font-size:30px;font-weight:800;letter-spacing:-.5px}
  .row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;font-size:14px}
  .row .k{color:var(--dim)} .row .v{font-weight:700;font-variant-numeric:tabular-nums}
  table{width:100%;border-collapse:collapse;font-size:13px;font-variant-numeric:tabular-nums}
  td{padding:7px 0;border-bottom:1px solid var(--line)} tr:last-child td{border-bottom:none}
  td.n{text-align:right;font-weight:700} .neg{color:var(--red)} .pos{color:var(--green)} .muted{color:var(--faint)}
  .note{color:var(--dim);font-size:12.5px;margin-top:8px}
  .pill{display:inline-block;font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;border:1px solid}
  .pill.no{color:var(--red);border-color:rgba(255,180,160,.5);background:rgba(255,180,160,.12)}
  .pill.yes{color:var(--green);border-color:rgba(127,220,138,.5);background:rgba(127,220,138,.12)}
  .foot{color:var(--faint);font-size:11px;text-align:center;margin-top:18px;line-height:1.6}
  #err{color:var(--red);font-size:13px}
</style>
</head>
<body>
  <h1>Wealth · Backtested Edge</h1>
  <div class="sub">Derived from a year of 5-min history on the RTX engine · live from D1</div>
  <div id="app"><div class="card"><div class="muted">Loading the verdict…</div></div></div>
  <div class="foot">Walk-forward out-of-sample · significance-tested · random-pick null control.<br>Price/volume strategy only — live signals (flow/options/news) have no history to backtest.</div>
<script>
const fmtPct=x=>x==null?"—":(x>0?"+":"")+Number(x).toFixed(3)+"%";
const cls=x=>x==null?"muted":(x>0?"pos":"neg");
const MODE_NAMES={orb_long:"Opening-range breakout",openclose_long:"Hold to close",openclose_stop:"Hold to close + stop",meanrev_long:"Mean-reversion (buy dips)",gapgo_long:"Gap-and-go (look-ahead!)",short_weak:"Short the weak",gapgo_fbclose_nolookahead:"Gap-and-go (no look-ahead)",gapgo_nofb_clean:"Gap-up only (clean)",gapgo_largecap:"Gap-and-go (mega-cap)"};
function esc(s){return (s||"").replace(/[<>&]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[c]))}
async function load(){
  try{
    const r=await fetch("/api/trading?action=intraday_backtest",{cache:"no-store"});
    const j=await r.json(); const runs=j.runs||[];
    const oos=runs.find(x=>x.mode==="walkforward_oos");
    const es=runs.find(x=>x.mode==="edge_search");
    let html="";
    if(oos){
      const neg=(oos.expectancy_pct||0)<0;
      html+=`<div class="card">
        <div class="lbl">1-Year Walk-Forward · Out-of-Sample</div>
        <div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap">
          <span class="big ${neg?'neg':'pos'}">${neg?'NO EDGE':'EDGE'}</span>
          <span class="${neg?'neg':'pos'}" style="font-weight:700">${fmtPct(oos.expectancy_pct)}/trade</span>
        </div>
        <div class="row"><span class="k">Out-of-sample trades</span><span class="v">${oos.total_trades??'—'}</span></div>
        <div class="row"><span class="k">Win rate</span><span class="v">${oos.win_rate_pct!=null?oos.win_rate_pct.toFixed(0)+'%':'—'}</span></div>
        <div class="note">${esc(oos.notes||"")}</div>
      </div>`;
    }
    if(es){
      let cfg={}; try{cfg=JSON.parse(es.config_json||"{}")}catch(e){}
      const hyp=cfg.hypotheses_oos_expectancy_pct||{};
      const rows=Object.entries(hyp).map(([k,v])=>{
        const leaky=/leaky|look/i.test(k);
        return `<tr><td>${esc(MODE_NAMES[k]||k)}</td><td class="n ${leaky?'muted':cls(v)}">${fmtPct(v)}${leaky?' ⚠':''}</td></tr>`;
      }).join("");
      html+=`<div class="card">
        <div class="lbl">Every Hypothesis Tested (OOS expectancy/trade)</div>
        <table>${rows}</table>
        <div class="note">${esc(es.notes||"")}</div>
      </div>`;
    }
    if(!oos&&!es){ html=`<div class="card"><div class="muted">No backtest runs found in D1 yet.</div></div>`; }
    document.getElementById("app").innerHTML=html;
  }catch(e){
    document.getElementById("app").innerHTML=`<div class="card"><div id="err">Couldn't load: ${esc(e.message)}</div></div>`;
  }
}
load();
</script>
</body>
</html>
