<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Wealth Engine — Today</title>
<link rel="manifest" href="/trading/manifest.json">
<meta name="theme-color" content="#0a0f1c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="color-scheme" content="dark">
<style>
  :root {
    --bg: #0a0f1c; --panel: #121a2e; --panel-2: #1a2540;
    --border: #2a3656; --text: #e6ecff; --muted: #8a96b8;
    --green: #2ecc71; --red: #e74c3c; --yellow: #f5b041; --blue: #4fa3ff;
    --accent: #7c5cff; --orange: #ff8a3c; --purple: #b164ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "SF Pro Text", system-ui, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.5; min-height: 100vh;
    padding: 14px; padding-top: env(safe-area-inset-top, 14px);
    font-variant-numeric: tabular-nums;
  }
  header { margin-bottom: 14px; }
  h1 { font-size: 17px; font-weight: 700; }
  h1 .sub { display: block; font-size: 11px; color: var(--muted); font-weight: 400; margin-top: 3px; }
  .tab-nav { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
  .tab-nav a {
    padding: 4px 9px; border-radius: 14px; font-size: 11px; font-weight: 500;
    text-decoration: none; border: 1px solid var(--border); color: var(--muted);
    background: var(--panel-2);
  }
  .tab-nav a.active { background: rgba(124,92,255,0.18); color: var(--accent); border-color: var(--accent); }

  .pin-gate { max-width: 380px; margin: 80px auto; padding: 28px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px; }
  .pin-gate input { width: 100%; padding: 12px; font-size: 16px; margin: 10px 0;
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); }
  .pin-gate button { width: 100%; padding: 12px; font-size: 15px; font-weight: 600;
    background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; min-height: 44px; }

  .section { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; }
  .section h2 { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .section h2 .meta { margin-left: auto; font-size: 10px; color: var(--muted); text-transform: none; letter-spacing: 0; font-weight: 400; }

  .phase-head { display: flex; align-items: center; gap: 8px; padding: 10px 14px;
    border-radius: 12px; margin-bottom: 12px; font-size: 12px; flex-wrap: wrap; }
  .phase-head .pill { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; }
  .phase-head.PRE_MARKET .pill { background: rgba(245,176,65,0.18); color: var(--yellow); }
  .phase-head.PRE_OPEN .pill   { background: rgba(79,163,255,0.18); color: var(--blue); }
  .phase-head.LIVE .pill       { background: rgba(46,204,113,0.18); color: var(--green); }
  .phase-head.CLOSE .pill      { background: rgba(177,100,255,0.18); color: var(--purple); }
  .phase-head.POST_CLOSE .pill { background: rgba(192,138,91,0.18); color: var(--orange); }
  .phase-head.OFF_HOURS .pill  { background: rgba(138,150,184,0.18); color: var(--muted); }

  .integrity-row { display: flex; gap: 10px; margin-bottom: 8px; }
  @media (max-width: 600px) { .integrity-row { flex-direction: column; } }
  .integrity-card { flex: 1; padding: 10px; background: var(--panel-2); border-radius: 8px;
    border-top: 4px solid var(--border); min-width: 0; }
  .integrity-card.critical { border-top-color: var(--red); }
  .integrity-card.warning  { border-top-color: var(--yellow); }
  .integrity-card.info     { border-top-color: var(--green); }
  .integrity-card .layer-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; }
  .integrity-card .layer-name { font-size: 13px; font-weight: 700; margin-top: 2px; margin-bottom: 8px; }
  .integrity-card .check-row { display: flex; gap: 6px; padding: 3px 0; font-size: 11px; }
  .integrity-card .check-row .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .integrity-card .dot.pass { background: var(--green); }
  .integrity-card .dot.warn { background: var(--yellow); }
  .integrity-card .dot.fail { background: var(--red); }
  .integrity-card .check-name { color: var(--text); flex: 1; min-width: 0; word-wrap: break-word; }
  .integrity-card .check-name .det { color: var(--muted); font-size: 10px; margin-top: 1px; }
  .integrity-card .live-overlay { font-size: 10px; margin-top: 4px; padding: 3px 6px;
    border-radius: 4px; word-wrap: break-word; }
  .integrity-card .live-overlay.resolved  { background: rgba(46,204,113,0.10); color: var(--green); border-left: 2px solid var(--green); }
  .integrity-card .live-overlay.regressed { background: rgba(231,76,60,0.10); color: var(--red); border-left: 2px solid var(--red); }
  .integrity-card .live-overlay.same      { background: rgba(138,150,184,0.08); color: var(--muted); border-left: 2px solid var(--border); }

  .verdict-decision { display: inline-block; padding: 6px 14px; border-radius: 12px;
    font-size: 14px; font-weight: 700; letter-spacing: 0.4px; margin-bottom: 8px; }
  .verdict-decision.TRADE    { background: rgba(46,204,113,0.18); color: var(--green); }
  .verdict-decision.SIT_OUT  { background: rgba(231,76,60,0.18);  color: var(--red); }
  .verdict-decision.OBSERVE  { background: rgba(245,176,65,0.18); color: var(--yellow); }
  .verdict-decision.PENDING  { background: rgba(138,150,184,0.18); color: var(--muted); }
  .verdict-headline { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
  .verdict-narrative { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 12px; padding: 10px; background: var(--panel-2); border-radius: 8px; }
  .pick-card { background: var(--panel-2); border-radius: 8px; padding: 12px; margin-bottom: 10px; border-left: 3px solid var(--border); }
  .pick-card.pick-1 { border-left-color: var(--green); }
  .pick-card.pick-2 { border-left-color: var(--blue); }
  .pick-card.pick-3 { border-left-color: var(--purple); }
  .pick-card .pick-head { display: flex; align-items: baseline; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
  .pick-card .pick-rank { font-size: 10px; color: var(--muted); }
  .pick-card .pick-symbol { font-size: 16px; font-weight: 700; cursor: pointer; }
  .pick-card .pick-weight { padding: 1px 7px; border-radius: 8px; font-size: 9px; background: rgba(124,92,255,0.18); color: var(--accent); font-weight: 700; }
  .pick-card .pick-rationale { font-size: 11px; color: var(--muted); line-height: 1.45; margin-top: 6px; }

  /* Live block on each pick */
  .pick-card .pick-live { margin: 8px 0; padding: 8px 10px; background: var(--bg); border-radius: 6px; border: 1px solid var(--border); }
  .pick-card .live-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 11px; }
  .pick-card .live-ltp { font-size: 14px; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; }
  .pick-card .live-delta { font-size: 11px; font-weight: 600; }
  .pick-card .live-delta.up { color: var(--green); }
  .pick-card .live-delta.down { color: var(--red); }
  .pick-card .live-delta.flat { color: var(--muted); }
  .pick-card .live-stale { font-size: 9px; color: var(--muted); }
  .pick-card .pos-state-pill { padding: 2px 8px; border-radius: 8px; font-size: 9px; font-weight: 700; letter-spacing: 0.3px; }
  .pick-card .pos-state-pill.WATCHING  { background: rgba(245,176,65,0.18); color: var(--yellow); }
  .pick-card .pos-state-pill.ENTERED   { background: rgba(46,204,113,0.18); color: var(--green); }
  .pick-card .pos-state-pill.EXITED    { background: rgba(138,150,184,0.18); color: var(--muted); }
  .pick-card .pos-state-pill.PRE_OPEN  { background: rgba(79,163,255,0.18); color: var(--blue); }
  .pick-card .pos-pnl { font-weight: 700; }
  .pick-card .pos-pnl.positive { color: var(--green); }
  .pick-card .pos-pnl.negative { color: var(--red); }
  .pick-card .lock-badge { padding: 1px 7px; border-radius: 8px; font-size: 9px; font-weight: 700;
    background: rgba(46,204,113,0.18); color: var(--green); }
  .pick-card .extend-badge { padding: 1px 7px; border-radius: 8px; font-size: 9px; font-weight: 700;
    background: rgba(124,92,255,0.18); color: var(--accent); }
  /* Chart classes — de-scoped from .pick-card prefix so they apply inside both
     .pick-card (legacy) and .story-card (new). Without position:relative on the
     container, the SVG's position:absolute escapes to viewport — confirmed bug
     from owner's screenshot at 12:58 IST May 7 2026. */
  .pick-chart { margin-top: 8px; height: 110px; background: var(--panel-2); border-radius: 6px; overflow: hidden; position: relative; }
  .pick-chart svg { display: block; width: 100%; height: 100%; }
  .pick-chart-empty { display: flex; align-items: center; justify-content: center; height: 100%; font-size: 10px; color: var(--muted); }
  .chart-label-layer { position: absolute; inset: 0; pointer-events: none; }
  .chart-label { position: absolute; right: 4px; transform: translateY(-50%);
    font-size: 9px; font-weight: 600; padding: 1px 5px; border-radius: 3px;
    background: rgba(13,20,38,0.85); white-space: nowrap; line-height: 1.3; }
  .chart-label.entry { color: var(--accent); }
  .chart-label.target { color: var(--green); }
  .chart-label.stop { color: var(--red); }
  .chart-label.trail { color: var(--yellow); }
  .chart-label.breakout { color: var(--blue); }
  .chart-label.ltp { color: var(--blue); right: auto; left: auto; transform: translate(-50%, -50%); padding: 2px 7px; background: var(--blue); color: white; font-weight: 700; }
  .chart-x-label { position: absolute; bottom: 2px; font-size: 8px; color: var(--muted); }
  .chart-x-label.left { left: 4px; }
  .chart-x-label.right { right: 4px; }

  .breakout-trigger { padding: 6px 10px; background: rgba(79,163,255,0.10); border-left: 3px solid var(--blue);
    border-radius: 4px; font-size: 11px; margin: 8px 0; }
  .breakout-trigger strong { color: var(--blue); }
  .pick-card .pick-plan { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px 8px; margin-top: 6px; font-size: 10px; }
  .pick-card .pick-plan .cell .lbl { color: var(--muted); display: block; }
  .pick-card .pick-plan .cell .val { color: var(--text); font-weight: 600; }
  .pick-card .pick-plan .cell .val.green { color: var(--green); }
  .pick-card .pick-plan .cell .val.red { color: var(--red); }

  .override-banner { padding: 10px; background: rgba(245,176,65,0.12); border-left: 3px solid var(--yellow); border-radius: 6px; margin-top: 10px; font-size: 11px; }
  .override-banner strong { color: var(--yellow); }

  .pool-list { display: flex; flex-direction: column; gap: 4px; }
  .pool-row { display: grid; grid-template-columns: 22px 1fr auto; gap: 8px; align-items: center;
    padding: 8px 10px; background: var(--panel-2); border-radius: 6px; font-size: 12px; }
  .pool-row.in-picks { background: rgba(46,204,113,0.08); border-left: 2px solid var(--green); }
  .pool-row .rank { color: var(--muted); font-size: 10px; }
  .pool-row .symbol { font-weight: 700; font-size: 13px; }
  .pool-row .scores { display: flex; gap: 6px; flex-wrap: wrap; }
  .pool-row .score-pill { padding: 1px 6px; border-radius: 4px; font-size: 10px; }
  .pool-row .score-pill.high   { background: rgba(46,204,113,0.18); color: var(--green); }
  .pool-row .score-pill.med    { background: rgba(245,176,65,0.18); color: var(--yellow); }
  .pool-row .score-pill.low    { background: rgba(138,150,184,0.18); color: var(--muted); }

  .feed { display: flex; flex-direction: column; gap: 6px; max-height: 280px; overflow-y: auto; }
  .feed-row { display: grid; grid-template-columns: 50px 1fr; gap: 10px; padding: 6px 0; font-size: 11px;
    border-bottom: 1px solid var(--border); }
  .feed-row:last-child { border-bottom: none; }
  .feed-row .ts { color: var(--muted); font-size: 10px; }
  .feed-row .body { min-width: 0; }
  .feed-row.crossasset .label { font-weight: 700; color: var(--text); }
  .feed-row.crossasset .delta.up { color: var(--green); }
  .feed-row.crossasset .delta.down { color: var(--red); }
  .feed-row.crossasset .delta.flat { color: var(--muted); }
  .feed-row.news .headline { color: var(--text); line-height: 1.4; }
  .feed-row.news .src { font-size: 9px; color: var(--muted); margin-top: 2px; }
  .feed-row.news .sent { display: inline-block; width: 4px; height: 14px; border-radius: 2px; margin-right: 6px; vertical-align: middle; }
  .feed-row.news .sent.pos { background: var(--green); }
  .feed-row.news .sent.neg { background: var(--red); }
  .feed-row.news .sent.neu { background: var(--muted); }

  .swing-toggle { display: flex; align-items: center; gap: 8px; padding: 10px 14px; cursor: pointer; user-select: none;
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 12px; font-size: 12px; }
  .swing-toggle .arrow { transition: transform 0.2s; }
  .swing-toggle.open .arrow { transform: rotate(90deg); }
  .swing-toggle .lbl { color: var(--muted); }
  .swing-toggle .lbl strong { color: var(--text); }
  .swing-content { display: none; }
  .swing-content.open { display: block; }

  .loading { text-align: center; padding: 40px; color: var(--muted); }
  .empty { text-align: center; padding: 30px; color: var(--muted); font-size: 12px; }
  .small-meta { font-size: 10px; color: var(--muted); margin-top: 8px; }

  /* ════════════════════════════════════════════════════════════════════════
     STORY-ARC LAYOUT (May 7 2026 PR — phase-aware narrative redesign)
     Two reading modes: LIVE (what's happening now) + RETROSPECTIVE (what
     happened, lessons, tomorrow). Same data, different framing.
     ════════════════════════════════════════════════════════════════════ */

  /* HERO P&L CARD — single-glance "did I make money today?" */
  .hero-pnl { padding: 18px; background: linear-gradient(135deg, rgba(46,204,113,0.12) 0%, rgba(13,20,38,0.7) 100%);
    border: 1px solid var(--border); border-radius: 12px; margin-bottom: 14px; }
  .hero-pnl.loss { background: linear-gradient(135deg, rgba(231,76,60,0.12) 0%, rgba(13,20,38,0.7) 100%); }
  .hero-pnl.flat { background: var(--panel); }
  .hero-pnl-label { font-size: 10px; color: var(--muted); margin-bottom: 4px; letter-spacing: 0.6px; text-transform: uppercase; }
  .hero-pnl-amount { font-size: 34px; font-weight: 800; font-variant-numeric: tabular-nums; line-height: 1; }
  .hero-pnl-amount.positive { color: var(--green); }
  .hero-pnl-amount.negative { color: var(--red); }
  .hero-pnl-amount.flat { color: var(--text); }
  .hero-pnl-pct { font-size: 14px; color: var(--muted); margin-left: 6px; font-weight: 500; }
  .hero-row { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 12px; font-size: 11px; color: var(--muted); }
  .hero-row .seg { display: flex; flex-direction: column; gap: 2px; }
  .hero-row .seg .k { font-size: 9px; letter-spacing: 0.4px; text-transform: uppercase; }
  .hero-row .seg .v { font-size: 12px; color: var(--text); font-weight: 700; font-variant-numeric: tabular-nums; }
  .hero-row .seg .v.win { color: var(--green); }
  .hero-row .seg .v.loss { color: var(--red); }
  .hero-lock { margin-top: 10px; padding: 8px 10px; background: rgba(124,92,255,0.10); border-radius: 6px;
    font-size: 11px; display: flex; align-items: center; gap: 8px; color: var(--muted); }
  .hero-lock .lock-bar-track { flex: 1; height: 4px; background: rgba(124,92,255,0.20); border-radius: 2px; overflow: hidden; min-width: 50px; max-width: 140px; }
  .hero-lock .lock-bar-fill { height: 100%; background: var(--accent); transition: width 0.3s; }
  .hero-lock strong { color: var(--accent); }

  /* PHASE BANNER — context strip below hero */
  .phase-banner { padding: 10px 14px; background: var(--panel-2); border-radius: 8px; margin-bottom: 14px;
    font-size: 11px; display: flex; align-items: center; gap: 10px; line-height: 1.4; }
  .phase-banner .pdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .phase-banner.LIVE .pdot { background: var(--red); animation: livepulse 2s infinite; }
  .phase-banner.PRE_OPEN .pdot, .phase-banner.PRE_MARKET .pdot { background: var(--blue); }
  .phase-banner.POST_CLOSE .pdot, .phase-banner.CLOSE .pdot { background: var(--yellow); }
  .phase-banner.OFF_HOURS .pdot { background: var(--muted); }
  .phase-banner .ptext strong { color: var(--text); }
  @keyframes livepulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.3); } }

  /* STORY-ARC PICK CARD — replaces flat data dump with narrative structure */
  .story-card { margin: 12px 0; padding: 14px; background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    border-left: 3px solid var(--border); }
  .story-card.entered { border-left-color: var(--green); }
  .story-card.exited.win { border-left-color: var(--green); background: linear-gradient(90deg, rgba(46,204,113,0.04) 0%, var(--panel) 50%); }
  .story-card.exited.loss { border-left-color: var(--red); background: linear-gradient(90deg, rgba(231,76,60,0.04) 0%, var(--panel) 50%); }
  .story-card.watching { border-left-color: var(--yellow); }
  .story-card.skipped { border-left-color: var(--muted); opacity: 0.92; }

  .story-head { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
  .story-rank { font-size: 12px; color: var(--muted); font-weight: 700; }
  .story-symbol { font-size: 18px; font-weight: 800; cursor: pointer; letter-spacing: 0.3px; }
  .story-weight { font-size: 11px; color: var(--muted); }
  .story-pill { padding: 3px 10px; border-radius: 10px; font-size: 10px; font-weight: 700; letter-spacing: 0.4px; margin-left: auto; }
  .story-pill.WATCHING { background: rgba(245,176,65,0.18); color: var(--yellow); }
  .story-pill.ENTERED  { background: rgba(46,204,113,0.18); color: var(--green); }
  .story-pill.EXITED   { background: rgba(138,150,184,0.18); color: var(--muted); }
  .story-pill.SKIPPED  { background: rgba(138,150,184,0.10); color: var(--muted); }

  /* Story sections — PLAN / TIMELINE / LIVE / OUTCOME / LESSON */
  .story-sec { margin-top: 12px; padding-top: 10px; border-top: 1px dashed var(--border); }
  .story-sec:first-of-type { margin-top: 8px; padding-top: 0; border-top: none; }
  .story-sec-label { font-size: 9px; letter-spacing: 0.7px; text-transform: uppercase; color: var(--muted); font-weight: 700; margin-bottom: 6px; }
  .story-sec-row { display: flex; flex-wrap: wrap; gap: 4px 14px; font-size: 12px; line-height: 1.5; }
  .story-sec-row .k { color: var(--muted); font-size: 10px; }
  .story-sec-row .v { color: var(--text); font-weight: 600; }
  .story-rationale { font-size: 11px; color: var(--text); line-height: 1.5; margin-top: 4px; padding: 6px 10px;
    background: var(--panel-2); border-radius: 6px; }

  /* OUTCOME (big P&L block for EXITED) */
  .outcome-amount { font-size: 26px; font-weight: 800; font-variant-numeric: tabular-nums; line-height: 1.1; }
  .outcome-amount.win { color: var(--green); }
  .outcome-amount.loss { color: var(--red); }
  .outcome-amount.flat { color: var(--text); }
  .outcome-pct { font-size: 13px; font-weight: 600; color: var(--muted); margin-left: 4px; }
  .outcome-stats { display: flex; gap: 14px; flex-wrap: wrap; font-size: 11px; color: var(--muted); margin-top: 6px; }
  .outcome-stats strong { color: var(--text); }

  /* TIMELINE — vertical event stream per pick */
  .tl-list { display: flex; flex-direction: column; gap: 7px; }
  .tl-row { display: grid; grid-template-columns: 56px 14px 1fr; gap: 8px; align-items: start; font-size: 11px; line-height: 1.4; }
  .tl-time { color: var(--muted); font-variant-numeric: tabular-nums; font-size: 10px; padding-top: 1px; }
  .tl-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; margin-left: 3px; background: var(--muted); }
  .tl-dot.entry { background: var(--green); width: 10px; height: 10px; margin-left: 2px; margin-top: 4px; }
  .tl-dot.partial { background: var(--green); border: 2px solid var(--panel); width: 10px; height: 10px; margin-left: 2px; margin-top: 4px; }
  .tl-dot.exit  { background: var(--red); width: 10px; height: 10px; margin-left: 2px; margin-top: 4px; }
  .tl-dot.skip  { background: var(--muted); }
  .tl-dot.wait, .tl-dot.hold { background: var(--blue); }
  .tl-dot.manual{ background: var(--accent); }
  .tl-dot.range { background: var(--yellow); }
  .tl-body { color: var(--text); }
  .tl-body strong { color: var(--text); font-weight: 700; }
  .tl-body .tl-reason { color: var(--muted); font-size: 10px; margin-top: 2px; line-height: 1.4; }

  /* LIVE-STATUS strip (only WATCHING / ENTERED) */
  .live-status { display: flex; align-items: center; gap: 12px; padding: 10px 12px;
    background: var(--panel-2); border-radius: 8px; font-size: 11px; margin-top: 4px; flex-wrap: wrap; }
  .live-status .ltp-big { font-size: 16px; font-weight: 800; color: var(--text); font-variant-numeric: tabular-nums; }
  .live-status .live-delta-big { font-size: 12px; font-weight: 700; }
  .live-status .live-delta-big.up { color: var(--green); }
  .live-status .live-delta-big.down { color: var(--red); }
  .live-status .next { margin-left: auto; color: var(--muted); font-size: 10px; text-align: right; }

  /* LESSON (post-close only) */
  .lesson { padding: 10px 12px; background: rgba(124,92,255,0.06); border-left: 3px solid var(--accent);
    border-radius: 6px; margin-top: 12px; font-size: 12px; line-height: 1.5; }
  .lesson strong { color: var(--accent); }

  /* TOMORROW SECTION */
  .tomorrow-section { padding: 14px; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; margin-top: 14px; }
  .tomorrow-section h3 { margin: 0 0 10px 0; font-size: 14px; font-weight: 700; }
  .tomorrow-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 6px; }
  .tomorrow-list li { padding: 10px 12px; background: var(--panel-2); border-radius: 6px;
    font-size: 12px; display: flex; align-items: flex-start; gap: 10px; line-height: 1.5; }
  .tomorrow-list li .check { width: 14px; height: 14px; border: 1.5px solid var(--muted); border-radius: 3px;
    margin-top: 1px; flex-shrink: 0; }
  .tomorrow-list li .why { display: block; color: var(--muted); font-size: 10px; margin-top: 3px; }

  /* EXECUTION block — ENTERED state, explicit qty/entry/deployed (May 7 2026 EOD)
     Owner principle: "in a live scenario making it very clear whether entered,
     if entered the total capital deployed the exact timing, how many stocks
     and price at which entered" */
  .exec-block { padding: 12px 14px; background: rgba(46,204,113,0.06);
    border-left: 3px solid var(--green); border-radius: 6px; }
  .exec-headline { font-size: 12px; color: var(--text); margin-bottom: 8px;
    line-height: 1.5; display: flex; flex-wrap: wrap; align-items: center; gap: 4px; }
  .exec-headline strong { color: var(--green); font-size: 13px; letter-spacing: 0.4px; }
  .exec-held { color: var(--muted); font-size: 11px; }
  .exec-math { font-size: 14px; font-variant-numeric: tabular-nums; color: var(--text);
    display: flex; flex-wrap: wrap; align-items: baseline; gap: 4px 8px; line-height: 1.5; }
  .exec-qty { font-weight: 700; color: var(--text); }
  .exec-mul, .exec-eq { color: var(--muted); font-size: 12px; padding: 0 2px; }
  .exec-price { font-weight: 600; color: var(--text); }
  .exec-deployed { font-weight: 800; color: var(--green); font-size: 14px; }
  .exec-stops { display: flex; flex-wrap: wrap; gap: 6px 14px; margin-top: 8px;
    padding-top: 8px; border-top: 1px dashed var(--border); font-size: 11px; }
  .exec-stops .k { color: var(--muted); font-size: 10px; margin-right: 3px; }
  .exec-stop { color: var(--red); font-weight: 600; font-variant-numeric: tabular-nums; }
  .exec-tgt  { color: var(--green); font-weight: 600; font-variant-numeric: tabular-nums; }
  .exec-peak { color: var(--green); font-weight: 600; font-variant-numeric: tabular-nums; }
  .exec-trail { color: var(--yellow); font-weight: 600; font-variant-numeric: tabular-nums; }

  /* OUTCOME explicit rows — entry / partial / exit / total math (May 7 EOD)
     Owner principle: "exactly mention as a win with the entry price, the
     quantity, the total capital deployed, total capital exited, the delta
     profit. now the timing at which entry was done, exit was done." */
  .oc-rows { display: flex; flex-direction: column; gap: 4px; margin-top: 8px;
    padding: 10px 12px; background: var(--panel-2); border-radius: 6px; }
  .oc-row { display: grid; grid-template-columns: 70px 110px 1fr; gap: 8px;
    font-size: 11px; line-height: 1.5; align-items: baseline; font-variant-numeric: tabular-nums; }
  .oc-row.partial { color: var(--green); }
  .oc-row.total { padding-top: 6px; margin-top: 4px; border-top: 1px solid var(--border); font-weight: 600; }
  .oc-label { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; color: var(--muted); }
  .oc-row.partial .oc-label { color: var(--green); }
  .oc-row.total .oc-label { color: var(--text); }
  .oc-time { color: var(--muted); font-size: 10px; }
  .oc-math { color: var(--text); font-size: 12px; }
  .oc-math strong { color: var(--text); font-weight: 700; }
  .oc-win { color: var(--green); font-size: 13px; }
  .oc-loss { color: var(--red); font-size: 13px; }
  .oc-flat { color: var(--text); font-size: 13px; }

  /* AUTO-BRIDGE badge — shows real-money order status on story-arc card */
  .auto-bridge { padding: 2px 8px; border-radius: 8px; font-size: 9px; font-weight: 700;
    letter-spacing: 0.3px; margin-left: 4px; cursor: help; }
  .auto-bridge.placed { background: rgba(46,204,113,0.18); color: var(--green); }
  .auto-bridge.failed { background: rgba(231,76,60,0.18); color: var(--red); }
  .auto-bridge.armed  { background: rgba(124,92,255,0.18); color: var(--accent); }

  /* AUTO-BRIDGE banner in phase strip — owner state-of-real-trading at a glance */
  .auto-banner { padding: 8px 12px; margin-bottom: 14px; border-radius: 8px;
    font-size: 11px; line-height: 1.4; }
  .auto-banner.armed   { background: rgba(46,204,113,0.10); border-left: 3px solid var(--green); color: var(--text); }
  .auto-banner.shadow  { background: rgba(245,176,65,0.10); border-left: 3px solid var(--yellow); color: var(--text); }
  .auto-banner.blocked { background: rgba(138,150,184,0.10); border-left: 3px solid var(--muted); color: var(--text); }
  .auto-banner strong { color: var(--text); }

  /* LESSONS aggregator (system-level findings) */
  .day-lessons { padding: 14px; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; margin-top: 14px; }
  .day-lessons h3 { margin: 0 0 10px 0; font-size: 14px; font-weight: 700; }
  .day-lessons li { font-size: 12px; line-height: 1.5; padding: 8px 10px; background: var(--panel-2); border-radius: 6px; margin-bottom: 4px; list-style: none; }
  .day-lessons li.bug { border-left: 3px solid var(--red); }
  .day-lessons li.win { border-left: 3px solid var(--green); }
  .day-lessons li.note { border-left: 3px solid var(--blue); }
</style>
</head>
<body>
<div id="content"><div class="loading">Loading…</div></div>

<script>
  const STORE_KEY = 'wealth_dashboard_key';
  let DASHBOARD_KEY = localStorage.getItem(STORE_KEY) || '';
  let _data = null;

  function showPinGate(err) {
    document.getElementById('content').innerHTML = `
      <div class="pin-gate">
        <h2 style="margin-bottom: 6px;">Today</h2>
        <p style="font-size: 12px; color: var(--muted); margin-bottom: 14px;">Enter dashboard key</p>
        <input type="password" id="pin-input" placeholder="dashboard key" autofocus>
        <button onclick="loginAndLoad()">Unlock</button>
        ${err ? `<div style="color: var(--red); font-size: 11px; margin-top: 8px;">${err}</div>` : ''}
      </div>`;
    document.getElementById('pin-input').addEventListener('keydown', e => { if (e.key === 'Enter') loginAndLoad(); });
  }

  async function loginAndLoad() {
    const v = document.getElementById('pin-input').value.trim();
    if (!v) return;
    DASHBOARD_KEY = v;
    const ok = await load();
    if (ok) localStorage.setItem(STORE_KEY, v);
  }

  async function load() {
    if (!DASHBOARD_KEY) { showPinGate(); return false; }
    try {
      const res = await fetch('/api/trading?action=today_consolidated&key=' + encodeURIComponent(DASHBOARD_KEY));
      if (res.status === 401) { showPinGate('Wrong key'); return false; }
      if (!res.ok) throw new Error('HTTP ' + res.status);
      _data = await res.json();
      render(_data);
      return true;
    } catch (e) {
      document.getElementById('content').innerHTML = '<div class="loading">Error: ' + e.message + '</div>';
      return false;
    }
  }

  function fmtIstFromMs(ms) {
    if (!ms) return '—';
    const d = new Date(ms + 5.5 * 3600000);
    return ('0' + d.getUTCHours()).slice(-2) + ':' + ('0' + d.getUTCMinutes()).slice(-2);
  }
  function fmtRelative(ms) {
    if (!ms) return '—';
    const diffMin = Math.round((Date.now() - ms) / 60000);
    if (diffMin < 1) return 'now';
    if (diffMin < 60) return diffMin + 'm ago';
    if (diffMin < 1440) return Math.round(diffMin / 60) + 'h ago';
    return Math.round(diffMin / 1440) + 'd ago';
  }
  function fmtPct(v) {
    if (v == null || isNaN(v)) return '—';
    const sign = v > 0 ? '+' : '';
    return sign + Number(v).toFixed(2) + '%';
  }
  function deltaCls(v) {
    if (v == null || isNaN(v)) return 'flat';
    if (v > 0.05) return 'up'; if (v < -0.05) return 'down'; return 'flat';
  }
  function scoreClass(v, thresholds) {
    if (v == null || isNaN(v)) return 'low';
    if (v >= thresholds[0]) return 'high';
    if (v >= thresholds[1]) return 'med';
    return 'low';
  }
  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  const PHASE_DESC = {
    PRE_MARKET:  { lbl: 'Pre-market', help: 'Verdict composes at 08:30 IST.' },
    PRE_OPEN:    { lbl: 'NSE pre-open', help: 'Live opens at 09:15 IST.' },
    LIVE:        { lbl: 'Market live', help: 'Hard exit at 15:10 IST.' },
    CLOSE:       { lbl: 'Closing tick', help: 'Final settlement.' },
    POST_CLOSE:  { lbl: 'Closed', help: 'Tomorrow opens at 09:15 IST.' },
    OFF_HOURS:   { lbl: 'Off-hours', help: 'Market closed.' },
  };

  // Compare a check against current live state. Returns:
  //   { changed: bool, now_status: 'pass'|'fail'|'warn'|null, label: human-readable, detail }
  function liveCompare(checkName, originalStatus, live) {
    if (!live || live.error) return null;
    const c = checkName || '';
    // L1.3 live_feeds_freshness — was 'fail' when feeds stale > 240min
    if (c.includes('live_feeds_freshness')) {
      const f = live.feeds || {};
      const stale = [];
      const fresh = [];
      ['india_vix', 'gift_nifty', 'crossasset', 'breadth'].forEach(k => {
        const v = f[k + '_min_old'];
        if (v == null) return;
        if (v > 240) stale.push(k + ' ' + v + 'm');
        else fresh.push(k + ' ' + v + 'm');
      });
      const now_status = stale.length ? 'warn' : 'pass';
      const detail = (fresh.length ? '✅ ' + fresh.join(', ') : '') +
                     (stale.length ? (fresh.length ? ' · ' : '') + '🔴 still stale: ' + stale.join(', ') : '');
      return {
        changed: now_status !== originalStatus,
        now_status,
        detail: 'NOW (' + fmtIstFromMs(live.checked_at) + '): ' + detail,
      };
    }
    // L2.2 kite_token — was 'fail' when no token
    if (c.includes('kite_token')) {
      const k = live.kite_token || {};
      const now_status = k.active ? 'pass' : 'fail';
      const detail = k.active
        ? '✅ NOW: token id=' + k.token_id + ' active (issued ' + k.hours_old + 'h ago, expires tomorrow 06:00 IST)'
        : '🔴 NOW: still no active token';
      return {
        changed: now_status !== originalStatus,
        now_status,
        detail,
      };
    }
    // L1.1 data_feeds — pool/aw_lw populated
    if (c.includes('data_feeds')) {
      const df = live.data_feeds || {};
      const now_status = df.aw_lw_pct >= 80 ? 'pass' : df.aw_lw_pct >= 50 ? 'warn' : 'fail';
      return {
        changed: now_status !== originalStatus,
        now_status,
        detail: 'NOW: aw_lw ' + df.aw_lw_pct + '% of ' + df.pool_total + ' pool stocks',
      };
    }
    // L1.2 pool_bar_coverage
    if (c.includes('pool_bar_coverage')) {
      const b = live.pool_bar_coverage || {};
      const now_status = b.coverage_pct >= 90 ? 'pass' : b.coverage_pct >= 60 ? 'warn' : 'fail';
      return {
        changed: now_status !== originalStatus,
        now_status,
        detail: 'NOW: ' + b.bars_yest + '/' + b.pool_total + ' = ' + b.coverage_pct + '% (still F-COVER-1)',
      };
    }
    // L1.4 owner_profile
    if (c.includes('owner_profile')) {
      const op = live.owner_profile_rows || 0;
      const now_status = op > 0 ? 'pass' : 'warn';
      return {
        changed: now_status !== originalStatus,
        now_status,
        detail: op > 0 ? 'NOW: ' + op + ' rows' : 'NOW: still empty (F-PERS schema shipped, no rows yet)',
      };
    }
    // L2.1 cron_health_24h — silently failing logs is a known false positive
    if (c.includes('cron_health')) {
      return {
        changed: false,
        now_status: 'warn',
        detail: 'KNOWN ISSUE: orchestrator silent log failure (worker_name NOT NULL bug). Crons ARE firing; just not logging.',
      };
    }
    // L2.3 unresolved critical findings
    if (c.includes('unresolved_critical')) {
      const n = live.unresolved_critical_findings || 0;
      const now_status = n === 0 ? 'pass' : n <= 2 ? 'warn' : 'fail';
      return {
        changed: now_status !== originalStatus,
        now_status,
        detail: 'NOW: ' + n + ' unresolved (excluding pre_market_integrity rows themselves)',
      };
    }
    return null;
  }

  function renderIntegritySection(d) {
    const i = d.pre_market_integrity || {};
    const live = d.live_integrity || null;
    const checkedIst = i.layer1?.detected_at ? fmtIstFromMs(i.layer1.detected_at) : null;
    const checkedRel = i.layer1?.detected_at ? fmtRelative(i.layer1.detected_at) : null;
    const liveIst = live?.checked_at ? fmtIstFromMs(live.checked_at) : null;

    const renderLayer = (label, lay) => {
      if (!lay) {
        return `<div class="integrity-card">
          <div class="layer-lbl">${label}</div>
          <div class="layer-name" style="color: var(--muted)">no check yet today</div>
        </div>`;
      }
      const checks = (lay.checks || []).map(c => {
        const liveDiff = liveCompare(c.check, c.status, live);
        let liveLine = '';
        if (liveDiff) {
          if (liveDiff.changed && (c.status === 'fail' || c.status === 'warn') && (liveDiff.now_status === 'pass')) {
            liveLine = `<div class="live-overlay resolved">${escapeHtml(liveDiff.detail)} · ✅ resolved</div>`;
          } else if (liveDiff.changed && c.status === 'pass' && liveDiff.now_status !== 'pass') {
            liveLine = `<div class="live-overlay regressed">${escapeHtml(liveDiff.detail)} · ⚠ regressed</div>`;
          } else {
            liveLine = `<div class="live-overlay same">${escapeHtml(liveDiff.detail)}</div>`;
          }
        }
        return `<div class="check-row">
          <div class="dot ${c.status}"></div>
          <div class="check-name">${escapeHtml(c.check)}
            <div class="det">${escapeHtml(c.detail || '')}</div>
            ${liveLine}
          </div>
        </div>`;
      }).join('');
      return `<div class="integrity-card ${lay.severity}">
        <div class="layer-lbl">${label} · ${lay.severity.toUpperCase()}</div>
        <div class="layer-name">${escapeHtml(lay.title || label)}</div>
        ${checks}
      </div>`;
    };
    return `<div class="section">
      <h2>🔍 Pre-market integrity check
        <span class="meta">${checkedIst ? `snapshot ${checkedIst} IST · ${checkedRel}` : 'no check today'} · next ${i.next_check_ist || '08:25 IST'} weekday</span>
      </h2>
      ${liveIst ? `<div class="small-meta" style="margin-bottom: 8px; padding: 6px 10px; background: rgba(79,163,255,0.08); border-left: 3px solid var(--blue); border-radius: 4px;">
        Snapshot above is from ${checkedIst} IST. <strong style="color: var(--blue)">Live status as of ${liveIst} IST shown under each check below.</strong> Items marked ✅ resolved have been fixed since the snapshot.
      </div>` : ''}
      <div class="integrity-row">
        ${renderLayer('L1 · Intelligence', i.layer1)}
        ${renderLayer('L2 · Execution', i.layer2)}
      </div>
      <div class="small-meta">
        Each layer must be GREEN for May 11 real-money launch.
      </div>
    </div>`;
  }

  // ─── Helpers for pick-card live block ──────────────────────────────────────
  function fmtPriceRs(paise) {
    if (paise == null) return '—';
    return '₹' + (paise / 100).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  function fmtRupeesShort(paise) {
    if (paise == null) return '—';
    const r = paise / 100;
    if (Math.abs(r) >= 100000) return '₹' + (r / 100000).toFixed(2) + 'L';
    if (Math.abs(r) >= 1000) return '₹' + (r / 1000).toFixed(1) + 'k';
    return '₹' + Math.round(r).toLocaleString('en-IN');
  }
  function fmtPnlShort(paise) {
    if (paise == null) return '—';
    return (paise > 0 ? '+' : '') + fmtRupeesShort(paise);
  }
  function pnlClassFor(v) { if (v == null || v === 0) return 'flat'; return v > 0 ? 'positive' : 'negative'; }
  function fmtRupeesFull(paise) {
    if (paise == null) return '—';
    const r = paise / 100;
    return '₹' + Math.abs(r).toLocaleString('en-IN', { maximumFractionDigits: 0 });
  }
  function fmtPnlBig(paise) {
    if (paise == null) return '₹0';
    const sign = paise > 0 ? '+' : (paise < 0 ? '−' : '');
    return sign + fmtRupeesFull(Math.abs(paise));
  }
  function fmtDuration(ms) {
    if (ms == null || ms <= 0) return '—';
    const min = Math.floor(ms / 60000);
    if (min < 60) return min + 'm';
    const h = Math.floor(min / 60);
    const m = min % 60;
    return m === 0 ? h + 'h' : h + 'h ' + m + 'm';
  }
  // Compute "next cron action" for LIVE phase — what's about to happen
  function nextCronStr(phase) {
    if (phase !== 'LIVE') return null;
    const now = new Date(Date.now() + 5.5 * 3600000);
    const h = now.getUTCHours(), m = now.getUTCMinutes();
    const hm = h * 60 + m;
    // 09:30 range_capture, 09:45 entry_1, 10:00 entry_2, 10:15 entry_3
    if (hm < 570) return '09:30 range_capture';
    if (hm < 585) return '09:45 entry_1 (Opus)';
    if (hm < 600) return '10:00 entry_2 (Opus)';
    if (hm < 615) return '10:15 entry_3 (Opus)';
    // 11:00, 11:30, ... 15:00 = Opus position_mgmt; 11:15, 11:45, ... 14:45 = Sonnet safety; every 5 min = price_monitor
    const next30 = Math.ceil(hm / 30) * 30;
    if (next30 <= 900) {
      const nh = Math.floor(next30 / 60), nm = next30 % 60;
      const isOpus = nm === 0 || nm === 30;
      if (next30 >= 660 && next30 <= 900 && isOpus) {  // 11:00 - 15:00 Opus
        return ('0'+nh).slice(-2)+':'+('0'+nm).slice(-2)+' position_mgmt (Opus)';
      }
    }
    // Otherwise next 5-min mark = price_monitor
    const next5 = Math.ceil(hm / 5) * 5;
    if (next5 < 910) {
      const nh = Math.floor(next5 / 60), nm = next5 % 60;
      return ('0'+nh).slice(-2)+':'+('0'+nm).slice(-2)+' price_monitor';
    }
    return '15:10 hard_exit';
  }

  // ════════════════════════════════════════════════════════════════════
  // STORY-ARC RENDERERS (May 7 2026 phase-aware redesign)
  // Hero P&L → Phase banner → Story cards → (post-close: lessons + tomorrow)
  // ════════════════════════════════════════════════════════════════════

  function renderHeroPnL(d) {
    const v = d.verdict;
    const p = v?.portfolio;
    if (!p) return '';  // no verdict = no portfolio
    const total = p.total_paise || 0;
    const realized = p.realized_paise || 0;
    const unrealized = p.unrealized_paise || 0;
    const counts = p.counts || {};
    const pnlClass = total > 50 ? 'positive' : (total < -50 ? 'negative' : 'flat');
    const cardClass = total > 50 ? '' : (total < -50 ? 'loss' : 'flat');
    const isLive = d.phase === 'LIVE' || d.phase === 'PRE_OPEN';
    const isPost = d.phase === 'POST_CLOSE' || d.phase === 'OFF_HOURS' || d.phase === 'CLOSE';

    // Lock progress (toward +₹30K threshold)
    const lockPct = p.profit_lock_threshold_paise > 0
      ? Math.min(100, Math.max(0, (total / p.profit_lock_threshold_paise) * 100)) : 0;

    // Headline label varies by phase
    const headLabel = isPost ? "Today's final P&L" : (isLive ? "Today's P&L · LIVE" : "Today's P&L");

    // TWO-LAYER capital + EFFECTIVE DENOMINATOR (May 7 2026 EOD fix):
    // - capital_deployable_paise: today's commitment (₹10K, ₹1L, ₹10L per owner)
    // - capital_ceiling_paise: total ceiling (₹10L typical max)
    // - effective_denominator_paise: phase-aware risk denominator
    //   * POST_CLOSE/OFF_HOURS with closed positions → actual deployed (truth)
    //   * Otherwise → today_deployable (forward-looking)
    // - effective_denominator_source: 'actual_deployed' or 'today_deployable'
    const deployable = p.capital_deployable_paise ?? p.capital_total_paise ?? 0;
    const ceiling    = p.capital_ceiling_paise    ?? p.capital_total_paise ?? 0;
    const effDenom   = p.effective_denominator_paise ?? deployable;
    const effSource  = p.effective_denominator_source ?? 'today_deployable';
    const isPartialDeploy = ceiling > 0 && deployable < ceiling;
    // Use effective denominator for the headline % — truthful for both
    // forward-looking (PRE_MARKET / LIVE) and retrospective (POST_CLOSE) phases.
    const pctOfEff = effDenom > 0 ? (total / effDenom) * 100 : 0;
    const denomLabel = effSource === 'actual_deployed' ? 'deployed' : `today's ${fmtRupeesShort(deployable)}`;

    return `<div class="hero-pnl ${cardClass}">
      <div class="hero-pnl-label">${headLabel}</div>
      <div>
        <span class="hero-pnl-amount ${pnlClass}">${fmtPnlBig(total)}</span>
        <span class="hero-pnl-pct">${(pctOfEff >= 0 ? '+' : '')}${pctOfEff.toFixed(2)}% of ${effSource === 'actual_deployed' ? fmtRupeesShort(effDenom) + ' deployed' : denomLabel}</span>
      </div>
      <div class="hero-row">
        <div class="seg"><span class="k">Realized</span>
          <span class="v ${realized > 0 ? 'win' : (realized < 0 ? 'loss' : '')}">${fmtPnlBig(realized)}</span></div>
        <div class="seg"><span class="k">Unrealized</span>
          <span class="v ${unrealized > 0 ? 'win' : (unrealized < 0 ? 'loss' : '')}">${fmtPnlBig(unrealized)}</span></div>
        ${effSource === 'actual_deployed'
          ? `<div class="seg"><span class="k">Deployed today</span>
              <span class="v">${fmtRupeesShort(effDenom)} (${(effDenom / ceiling * 100).toFixed(1)}% of ceiling)</span></div>`
          : `<div class="seg"><span class="k">Today committed</span>
              <span class="v">${fmtRupeesShort(deployable)}${isPartialDeploy ? ` of ${fmtRupeesShort(ceiling)} ceiling` : ''}</span></div>
            <div class="seg"><span class="k">Capital used</span>
              <span class="v">${fmtRupeesShort(p.capital_deployed_paise)} of ${fmtRupeesShort(deployable)}</span></div>`}
        <div class="seg"><span class="k">Trades</span>
          <span class="v">${counts.entered || 0} open · ${(counts.exited_win || 0) + (counts.exited_loss || 0)} closed · ${counts.watching || 0} watching · ${counts.skipped || 0} skipped</span></div>
      </div>
      ${total > 0 && p.distance_to_lock_paise > 0 && effSource !== 'actual_deployed' ? `
        <div class="hero-lock">
          <span><strong>${fmtPnlBig(p.distance_to_lock_paise)}</strong> to F-L4-LOCK at +${fmtPnlBig(p.profit_lock_threshold_paise)} (${(p.profit_lock_pct*100).toFixed(1)}% of today's ${fmtRupeesShort(deployable)})</span>

  function renderPhaseBanner(d) {
    const phase = d.phase || 'OFF_HOURS';
    let text = '';
    if (phase === 'LIVE') {
      const next = nextCronStr(phase);
      const closeMinsLeft = (() => {
        const now = new Date(Date.now() + 5.5 * 3600000);
        const close = 15 * 60 + 30 - (now.getUTCHours() * 60 + now.getUTCMinutes());
        return Math.max(0, close);
      })();
      text = `<strong>Market live</strong> · ${closeMinsLeft >= 60 ? Math.floor(closeMinsLeft/60) + 'h ' + (closeMinsLeft%60) + 'm' : closeMinsLeft + 'm'} to close · next: <strong>${next || 'price_monitor'}</strong>`;
    } else if (phase === 'PRE_OPEN') {
      text = `<strong>NSE pre-open</strong> · live trading from 09:15 IST · range_capture at 09:30`;
    } else if (phase === 'PRE_MARKET') {
      text = `<strong>Pre-market</strong> · verdict composes at 08:30 IST · market opens 09:15`;
    } else if (phase === 'POST_CLOSE' || phase === 'CLOSE') {
      text = `<strong>Market closed</strong> · today is done · summary below`;
    } else {
      text = `<strong>Off-hours</strong> · NSE next opens 09:15 IST tomorrow (Mon–Fri)`;
    }
    return `<div class="phase-banner ${phase}"><span class="pdot"></span><span class="ptext">${text}</span></div>`;
  }

  // AUTO-BRIDGE state banner — visible only when real-money state matters.

      </div>`;

  // ────── timeline event prettifier ──────
  function tlDotClass(decision, state_after) {
    const d = (decision || '').toUpperCase();
    if (d === 'BREAKOUT_ENTER' || d === 'ENTER_NOW') return 'entry';
    if (d === 'PARTIAL_EXIT_50_FIRST_TARGET') return 'partial';
    if (d.startsWith('SKIP') && state_after === 'SKIPPED') return 'skip';
    if (d === 'WAIT' || d === 'HOLD' || d.startsWith('WICK_')) return 'wait';
    if (d === 'MANUAL_REVIVE_TO_WATCHING') return 'manual';
    if (d.includes('TRAIL') && state_after === 'EXITED') return 'exit';
    if (d.includes('STOP_HIT') || d === 'URGENT_EXIT' || d === 'HARD_EXIT_1510' || d === 'PROFIT_LOCK_FORCE_EXIT_30K' || state_after === 'EXITED') return 'exit';
    if (d.startsWith('captured') || d.includes('range_capture')) return 'range';
    return '';
  }
  function tlEventLabel(phase, decision) {
    const p = (phase || '').toLowerCase();
    const d = decision || '';
    if (p === 'range_capture') return '15-min range captured';
    if (p === 'range_capture_fallback') return 'safety-net OR-capture';
    if (p === 'manual_revive') return 'Owner manual revive';
    if (p.startsWith('entry_')) {
      const n = p.split('_')[1];
      if (d === 'WAIT') return `Opus entry attempt ${n} — WAIT`;
      if (d.startsWith('SKIP_GAPPED_BELOW_STOP')) return `Opus entry ${n} — SKIPPED (LTP below stop)`;
      if (d === 'ENTER_NOW') return `Opus entry ${n} — ENTERED`;
      if (d === 'ABANDON') return `Opus entry ${n} — ABANDONED`;
      return `Opus entry ${n} — ${d}`;
    }
    if (p === 'breakout_trigger' && d === 'BREAKOUT_ENTER') return 'Breakout fired — entered';
    if (p === 'price_monitor') {
      if (d === 'PARTIAL_EXIT_50_FIRST_TARGET') return 'First target hit — booked 50%';
      if (d.startsWith('TARGET_LOCKED')) return 'Target locked';
      if (d === 'STOP_HIT' || d === 'TRAILING_STOP_HIT') return 'Exit — trailing stop';
      if (d === 'TARGET_LOCKED_TRAIL_EXIT') return 'Exit — locked target trail';
      if (d.startsWith('WICK_')) return 'Wick (held position)';
      return d;
    }
    if (p === 'sonnet_safety' && d === 'URGENT_EXIT') return 'Sonnet safety — urgent exit';
    if (p === 'position_mgmt') {
      if (d === 'HOLD') return 'Opus mgmt — HOLD';
      if (d === 'TIGHTEN_TRAIL') return 'Opus mgmt — tighten trail';
      if (d === 'PARTIAL_EXIT_50') return 'Opus mgmt — partial 50%';
      if (d === 'FULL_EXIT') return 'Opus mgmt — full exit';
      return 'Opus mgmt — ' + d;
    }
    if (p === 'hard_exit_1510') return 'Hard exit @ 15:10';
    return d;
  }
  function renderTimeline(timeline) {
    if (!timeline?.length) return '<div style="font-size:11px;color:var(--muted)">No events yet.</div>';
    const rows = timeline.map(t => {
      const dot = tlDotClass(t.decision, t.state_after);
      const label = tlEventLabel(t.phase, t.decision);
      const ltp = t.ltp_paise ? ` <span style="color:var(--muted)">@ ${fmtPriceRs(t.ltp_paise)}</span>` : '';
      const reason = t.reason ? `<div class="tl-reason">${escapeHtml(t.reason).slice(0, 220)}${t.reason.length > 220 ? '…' : ''}</div>` : '';
      return `<div class="tl-row">
        <span class="tl-time">${fmtIstFromMs(t.ts)}</span>
        <span class="tl-dot ${dot}"></span>
        <div class="tl-body"><strong>${escapeHtml(label)}</strong>${ltp}${reason}</div>
      </div>`;
    }).join('');
    return `<div class="tl-list">${rows}</div>`;
  }

  // Templated lesson per pick — only shown in POST_CLOSE phase
  function renderLessonForPick(p, phase) {
    if (phase !== 'POST_CLOSE' && phase !== 'OFF_HOURS' && phase !== 'CLOSE') return '';
    const pos = p.live?.position;
    if (!pos) return '';
    if (pos.exit_at && pos.pnl_paise != null) {
      const pnl = pos.pnl_paise;
      const heldMin = Math.round((pos.exit_at - pos.entry_at) / 60000);
      const reason = pos.exit_reason || 'unknown';
      if (pnl > 0) {
        const pct = pos.entry_paise > 0 ? ((pos.exit_paise - pos.entry_paise) / pos.entry_paise * 100) : 0;
        return `<div class="lesson"><strong>Win.</strong> ${fmtPnlBig(pnl)} captured over ${heldMin}min hold (${pct >= 0 ? '+' : ''}${pct.toFixed(2)}% move). Exit rule: <em>${reason}</em>. The pick selection + entry trigger logic worked as designed for this name.</div>`;
      } else {
        const pct = pos.entry_paise > 0 ? ((pos.exit_paise - pos.entry_paise) / pos.entry_paise * 100) : 0;
        return `<div class="lesson"><strong>Loss.</strong> ${fmtPnlBig(pnl)} given back over ${heldMin}min hold (${pct.toFixed(2)}% move). Exit rule: <em>${reason}</em>. Worth checking whether this was a wick (F-EXIT-2 protection) or a real reversal — see timeline.</div>`;
      }
    }
    if (pos.state === 'WATCHING') {
      return `<div class="lesson"><strong>No entry.</strong> Trigger ${fmtPriceRs(pos.or_high_paise)} never confirmed. Capital saved from a forced bad entry. Was the verdict signal real? Cross-check tomorrow's verdict ranking.</div>`;
    }
    if (pos.state === 'SKIPPED') {
      return `<div class="lesson"><strong>Skipped.</strong> LTP dipped below planned stop ${fmtPriceRs(pos.stop_paise)} before breakout fired. With F-EXIT-2 deployed (PR #89), wicks like this won't trigger permanent SKIP — required 2-min sustained breach.</div>`;
    }
    return '';
  }

  // System-level lessons — bugs found, big wins, anomalies (only POST_CLOSE)
  function renderDayLessons(d) {
    const phase = d.phase;
    if (phase !== 'POST_CLOSE' && phase !== 'OFF_HOURS' && phase !== 'CLOSE') return '';
    // Detect notable findings from timeline events across all picks
    const items = [];
    const picks = d.verdict?.picks || [];
    for (const p of picks) {
      const tl = p.live?.timeline || [];
      const hasManual = tl.some(t => t.phase === 'manual_revive');
      const hasWick = tl.some(t => (t.decision || '').startsWith('WICK_'));
      const hasUrgent = tl.some(t => t.decision === 'URGENT_EXIT');
      if (hasManual) items.push({ kind: 'note', text: `<strong>${p.symbol}</strong>: required owner manual revival from SKIPPED state. F-EXIT-2 (PR #89) automates this for tomorrow.` });
      if (hasUrgent) items.push({ kind: 'note', text: `<strong>${p.symbol}</strong>: Sonnet safety fired URGENT_EXIT before scheduled position_mgmt. Net effect was profit lock.` });
      if (hasWick) items.push({ kind: 'win', text: `<strong>${p.symbol}</strong>: F-EXIT-2 wick-confirmation prevented a single-tick stop-out.` });
    }
    if (!items.length) return '';
    return `<div class="day-lessons"><h3>📚 Today's lessons</h3>
      <ul style="padding:0;margin:0">${items.map(i => `<li class="${i.kind}">${i.text}</li>`).join('')}</ul></div>`;
  }

  // ────── main story-arc renderer ──────
  function renderStoryCard(p, idx, phase, portfolio) {
    const live = p.live || {};
    const pos = live.position;
    const ltpPaise = live.ltp_paise;
    const ltpAge = live.ltp_ts ? Math.round((Date.now() - live.ltp_ts) / 1000) : null;
    const ltpFresh = ltpAge != null && ltpAge < 90;

    // Card class derives from final state
    let cardClass = 'story-card';
    let pillClass = 'PRE_OPEN', pillLabel = 'PRE-OPEN';
    if (pos) {
      if (pos.exit_at) {
        const win = (pos.pnl_paise || 0) > 0;
        cardClass += ' exited ' + (win ? 'win' : 'loss');
        pillClass = 'EXITED';
        pillLabel = win ? 'EXITED · WIN' : 'EXITED · LOSS';
      } else if (pos.state === 'ENTERED') {
        cardClass += ' entered';
        pillClass = 'ENTERED';
        pillLabel = 'ENTERED · LIVE';
      } else if (pos.state === 'WATCHING') {
        cardClass += ' watching';
        pillClass = 'WATCHING';
        pillLabel = 'WATCHING';
      } else if (pos.state === 'SKIPPED') {
        cardClass += ' skipped';
        pillClass = 'SKIPPED';
        pillLabel = 'SKIPPED';
      }
    } else if (phase === 'LIVE') {
      cardClass += ' watching';
      pillClass = 'WATCHING';
      pillLabel = 'AWAITING';
    }

    // 1. PLAN section (always)
    const planSection = `<div class="story-sec">
      <div class="story-sec-label">📋 The plan (08:30 IST verdict)</div>
      <div class="story-sec-row">
        <span><span class="k">Entry plan</span> <span class="v">${fmtPriceRs(p.entry_paise || pos?.entry_paise)}</span></span>
        <span><span class="k">Stop</span> <span class="v" style="color:var(--red)">${pos?.stop_paise ? fmtPriceRs(pos.stop_paise) : (p.stop_pct ? '−' + p.stop_pct + '%' : '—')}</span></span>
        <span><span class="k">Target</span> <span class="v" style="color:var(--green)">${pos?.target_paise ? fmtPriceRs(pos.target_paise) : (p.target_pct ? '+' + p.target_pct + '%' : '—')}</span></span>
        <span><span class="k">Weight</span> <span class="v">${p.weight_pct || 0}%</span></span>
      </div>
      ${p.rationale ? `<div class="story-rationale">${escapeHtml(p.rationale)}</div>` : ''}
    </div>`;

    // 2. TIMELINE section (only if timeline has events)
    const timeline = live.timeline || [];
    const timelineSection = timeline.length ? `<div class="story-sec">
      <div class="story-sec-label">⏱ What happened</div>
      ${renderTimeline(timeline)}
    </div>` : '';

    // 3. EXECUTION SECTION — ENTERED state only — explicit qty, entry, deployed
    // Owner principle (May 7 2026 EOD): "specifying the quantity and price of
    // the entry is very important in a very clean way... in a live scenario
    // making it very clear whether entered, if entered the total capital
    // deployed the exact timing, how many stocks and price at which entered."
    let executionSection = '';
    if (pos && pos.state === 'ENTERED' && !pos.exit_at) {
      const deployedPaise = (pos.entry_paise || 0) * (pos.qty || 0);
      const realOrderBadge = pos.kite_bracket_id
        ? `<span class="auto-bridge placed" style="margin-left:6px" title="Real Kite order placed">🟢 Kite #${pos.kite_bracket_id}</span>`
        : ((pos.auto_bridge_status === 'failed')
          ? `<span class="auto-bridge failed" style="margin-left:6px">🔴 auto failed</span>`
          : '<span class="auto-bridge" style="margin-left:6px;background:rgba(138,150,184,0.18);color:var(--muted)">📝 paper only</span>');
      executionSection = `<div class="story-sec"><div class="story-sec-label">✅ Execution</div>
        <div class="exec-block">
          <div class="exec-headline">
            <strong>ENTERED</strong> ${fmtIstFromMs(pos.entry_at)} IST
            <span class="exec-held">· held ${fmtDuration(pos.holding_ms)}</span>
            ${realOrderBadge}
          </div>
          <div class="exec-math">
            <span class="exec-qty">${pos.qty} shares</span>
            <span class="exec-mul">×</span>
            <span class="exec-price">${fmtPriceRs(pos.entry_paise)}</span>
            <span class="exec-eq">=</span>
            <span class="exec-deployed">${fmtRupeesFull(deployedPaise)} deployed</span>
          </div>
          <div class="exec-stops">
            <span class="exec-stop"><span class="k">Stop</span> ${fmtPriceRs(pos.stop_paise)}</span>
            <span class="exec-tgt"><span class="k">Target</span> ${fmtPriceRs(pos.target_paise)}</span>
            ${pos.peak_price_paise ? `<span class="exec-peak"><span class="k">Peak</span> ${fmtPriceRs(pos.peak_price_paise)}</span>` : ''}
            ${pos.trailing_stop_paise ? `<span class="exec-trail"><span class="k">Trail</span> ${fmtPriceRs(pos.trailing_stop_paise)}</span>` : ''}
          </div>
        </div>
      </div>`;
    }

    // 4. LIVE STATUS strip — only WATCHING or ENTERED (and not exited)
    let liveStatusSection = '';
    if (pos && !pos.exit_at && (pos.state === 'WATCHING' || pos.state === 'ENTERED')) {
      const livePnl = pos.live_pnl_paise;
      const livePnlPct = pos.live_pnl_pct;
      let middleHtml = '';
      let nextHtml = '';
      if (pos.state === 'WATCHING') {
        const dist = pos.breakout_distance_pct;
        middleHtml = `<span style="font-size:11px;color:var(--muted)">${dist != null && dist > 0 ? `needs <strong style="color:var(--blue)">+${dist.toFixed(2)}%</strong> to fire entry @ ${fmtPriceRs(pos.or_high_paise)}` : 'breakout zone'}</span>`;
        nextHtml = `<div class="next">price_monitor every 5min</div>`;
      } else {
        // ENTERED state — show explicit P&L math
        const cls = livePnl > 0 ? 'up' : (livePnl < 0 ? 'down' : '');
        const pnlMath = livePnl != null
          ? `<span class="live-delta-big ${cls}">${fmtPnlBig(livePnl)} (${livePnlPct >= 0 ? '+' : ''}${livePnlPct?.toFixed(2)}%)</span>`
          : '<span style="font-size:11px;color:var(--muted)">computing P&L…</span>';
        middleHtml = pnlMath;
        const nextCron = nextCronStr(phase);
        nextHtml = `<div class="next">next: ${nextCron || '—'}</div>`;
      }
      // POST_CLOSE label fix: in retrospective phase the LTP IS the last
      // session tick (not "live"). Rename to "Last LTP at close" + drop the
      // staleness badge (it's session-end snapshot, not stale data).
      const isRetro = ['POST_CLOSE', 'CLOSE', 'OFF_HOURS'].includes(phase);
      const sectionLabel = isRetro
        ? '📊 Last LTP at session close'
        : `📡 Live LTP ${ltpFresh ? '· fresh' : ltpAge ? `· ${Math.round(ltpAge / 60)}m stale` : ''}`;
      liveStatusSection = `<div class="story-sec"><div class="story-sec-label">${sectionLabel}</div>
        <div class="live-status">
          <span class="ltp-big">${fmtPriceRs(ltpPaise)}</span>
          ${middleHtml}
          ${nextHtml}
        </div>
      </div>`;
    }

    // 4. CHART (always for ENTERED / WATCHING; smaller / optional for EXITED)
    let chartSection = '';
    if (pos && (pos.state === 'WATCHING' || pos.state === 'ENTERED' || pos.exit_at)) {
      chartSection = `<div class="story-sec"><div class="story-sec-label">📈 Price action</div>
        <div class="pick-chart">${renderPickChart(p)}</div>
      </div>`;
    }

    // 5. OUTCOME section — only EXITED — explicit entry math + exit math + delta
    // Owner principle (May 7 EOD): "in today's realised profit in the card, you
    // need to exactly mention as a win with the entry price, the quantity, the
    // total capital deployed, total capital exited, the delta profit. now the
    // timing at which entry was done, exit was done all these are good data."
    //
    // Layout per stage:
    //   ENTRY      HH:MM:SS · Q shares × ₹E = ₹D deployed
    //   PARTIAL    HH:MM:SS · q shares × ₹p = ₹r received (+₹n net)   [if applicable]
    //   EXIT       HH:MM:SS · q shares × ₹x = ₹r received (+₹n net)
    //   TOTAL      ₹R received vs ₹D deployed = +₹P net (+%)
    //   HELD Xm · exit_reason
    //
    // Partial breakdown extracted from timeline (PARTIAL_EXIT_50_FIRST_TARGET event).
    // Original qty parsed from BREAKOUT_ENTER rationale ("...qty 160...") with
    // fallback to pos.qty (which is final-runner qty after partial booking).
    let outcomeSection = '';
    if (pos && pos.exit_at) {
      const pnl = pos.pnl_paise || 0;
      const win = pnl > 0 ? 'win' : (pnl < 0 ? 'loss' : 'flat');
      const winLabel = pnl > 0 ? '✅ WIN' : (pnl < 0 ? '❌ LOSS' : '⚪ FLAT');

      // Detect partial booking by scanning timeline
      const tl = live.timeline || [];
      const entryEv  = tl.find(t => ['BREAKOUT_ENTER','ENTER_NOW'].includes(t.decision));
      const partialEv = tl.find(t => t.decision === 'PARTIAL_EXIT_50_FIRST_TARGET');
      const exitEv   = tl.find(t => t.state_after === 'EXITED');

      // Extract original qty from entry rationale ("...qty 160..."). Fallback: pos.qty.
      let origQty = pos.qty;
      if (entryEv && entryEv.reason) {
        const m = entryEv.reason.match(/qty (\d+)/i);
        if (m) origQty = parseInt(m[1]);
      }
      const runnerQty = pos.qty;
      const partialQty = partialEv ? Math.max(0, origQty - runnerQty) : 0;
      const hasPartial = partialQty > 0 && partialEv;
      const partialPrice = partialEv ? partialEv.ltp_paise : null;

      // Math
      const deployed_paise = (pos.entry_paise || 0) * origQty;
      const partialReceived_paise = hasPartial ? partialPrice * partialQty : 0;
      const runnerReceived_paise = (pos.exit_paise || 0) * runnerQty;
      const totalReceived_paise = partialReceived_paise + runnerReceived_paise;
      const grossDelta_paise = totalReceived_paise - deployed_paise;
      const totalCost_paise = (pos.cost_paise || 0);  // not always in API; OK if 0
      const pctOnDeployed = deployed_paise > 0 ? (pnl / deployed_paise * 100) : 0;

      const entryRow = `<div class="oc-row">
        <span class="oc-label">ENTRY</span>
        <span class="oc-time">${fmtIstFromMs(pos.entry_at)} IST</span>
        <span class="oc-math"><strong>${origQty}</strong> shares × ${fmtPriceRs(pos.entry_paise)} = <strong>${fmtRupeesFull(deployed_paise)}</strong> deployed</span>
      </div>`;
      const partialRow = hasPartial ? `<div class="oc-row partial">
        <span class="oc-label">PARTIAL</span>
        <span class="oc-time">${fmtIstFromMs(partialEv.ts)} IST</span>
        <span class="oc-math"><strong>${partialQty}</strong> shares × ${fmtPriceRs(partialPrice)} = <strong>${fmtRupeesFull(partialReceived_paise)}</strong> received</span>
      </div>` : '';
      const exitRow = `<div class="oc-row">
        <span class="oc-label">EXIT</span>
        <span class="oc-time">${fmtIstFromMs(pos.exit_at)} IST</span>
        <span class="oc-math"><strong>${runnerQty}</strong> shares × ${fmtPriceRs(pos.exit_paise)} = <strong>${fmtRupeesFull(runnerReceived_paise)}</strong> received</span>
      </div>`;
      const totalRow = `<div class="oc-row total">
        <span class="oc-label">TOTAL</span>
        <span class="oc-time">net</span>
        <span class="oc-math">${fmtRupeesFull(totalReceived_paise)} received vs ${fmtRupeesFull(deployed_paise)} deployed = <strong class="oc-${win}">${fmtPnlBig(pnl)}</strong> net</span>
      </div>`;

      outcomeSection = `<div class="story-sec">
        <div class="story-sec-label">💰 Final outcome</div>
        <div class="outcome-amount ${win}">${winLabel} ${fmtPnlBig(pnl)}<span class="outcome-pct">${pctOnDeployed >= 0 ? '+' : ''}${pctOnDeployed.toFixed(2)}% on deployed</span></div>
        <div class="oc-rows">
          ${entryRow}
          ${partialRow}
          ${exitRow}
          ${totalRow}
        </div>
        <div class="outcome-stats" style="margin-top:8px">
          <span><strong>Held</strong> ${fmtDuration(pos.holding_ms)}</span>
          <span><strong>Reason</strong> ${escapeHtml(pos.exit_reason || '—')}${hasPartial ? ' (after partial booking)' : ''}</span>
        </div>
      </div>`;
    }

    // 6. LESSON (post-close only, generated from data)
    const lessonSection = renderLessonForPick(p, phase);

    // AUTO-BRIDGE STATUS badge (May 7 2026 PR #96)
    // Shows real-money order state when auto-bridge is armed.
    let autoBridgeBadge = '';
    if (pos) {
      const status = pos.auto_bridge_status;
      const note   = pos.auto_bridge_note || '';
      const kbId   = pos.kite_bracket_id;
      if (status === 'placed' && kbId) {
        autoBridgeBadge = `<span class="auto-bridge placed" title="${escapeHtml(note)}">🟢 REAL ORDER · Kite #${kbId}</span>`;
      } else if (status === 'failed') {
        autoBridgeBadge = `<span class="auto-bridge failed" title="${escapeHtml(note)}">🔴 AUTO-BRIDGE FAILED · click /execute/ manually</span>`;
      }
    }

    // CARD WEIGHT PILL — number sync fix (May 7 EOD).
    // Previous: `weight_pct × 1,000,000 paise` (= weight × ₹10L) — always
    // ceiling-based, so showed "₹4.5L" even when today's session deployed
    // ₹0 (HFCL never entered) — inconsistent with hero "₹4L deployed" total.
    //
    // New logic: prefer ACTUAL deployment if position has real qty + entry.
    //   ENTERED / EXITED → qty × entry_paise (= what was committed)
    //   WATCHING / SKIPPED with qty/entry from rangeCapture → that planned amount
    //   No position yet (PRE_MARKET tomorrow) → weight × today_deployable
    // This way card weight pill ALWAYS sums to the hero "deployed" number.
    const todayDeployable = (portfolio && portfolio.capital_deployable_paise) || 100000000;
    let weightAllocPaise = 0;
    if (pos && pos.entry_paise && pos.qty) {
      // Real position: actual deployment
      weightAllocPaise = pos.entry_paise * pos.qty;
    } else if (p.weight_pct) {
      // No position yet — show planned allocation against today_deployable
      weightAllocPaise = Math.round((todayDeployable * p.weight_pct) / 100);
    }
    return `<div class="${cardClass}">
      <div class="story-head">
        <span class="story-rank">#${idx + 1}</span>
        <span class="story-symbol" data-stock-symbol="${escapeHtml(p.symbol)}">${escapeHtml(p.symbol)}</span>
        <span class="story-weight">${p.weight_pct || 0}% · ${fmtRupeesShort(weightAllocPaise)}</span>
        <span class="story-pill ${pillClass}">${pillLabel}</span>
        ${pos?.target_locked ? '<span class="lock-badge">🔒 LOCKED</span>' : ''}
        ${autoBridgeBadge}
      </div>
      ${planSection}
      ${executionSection}
      ${liveStatusSection}
      ${chartSection}
      ${timelineSection}
      ${outcomeSection}
      ${lessonSection}
    </div>`;
  }

  // Inline SVG chart with HTML label overlay — fixes preserveAspectRatio text-stretching bug.
  // SVG draws lines (which can stretch), HTML overlays draw text labels (which don't).
  function renderPickChart(p) {
    const live = p.live || {};
    const bars = live.bars || [];
    if (bars.length < 2) return '<div class="pick-chart-empty">no ticks yet — populates as market trades come in</div>';
    const W = 600, H = 110;
    const closes = bars.map(b => b.close_paise);
    const lows = bars.map(b => b.low_paise);
    const highs = bars.map(b => b.high_paise);

    const pos = live.position;
    const entryRef = pos?.entry_paise || live.ltp_paise || closes[0];
    const stopPlan = pos?.stop_paise || (entryRef && p.stop_pct ? Math.round(entryRef * (1 - p.stop_pct/100)) : null);
    const targetPlan = pos?.target_paise || (entryRef && p.target_pct ? Math.round(entryRef * (1 + p.target_pct/100)) : null);
    const peak = pos?.peak_price_paise;
    const trail = pos?.trailing_stop_paise;
    const orHigh = pos?.or_high_paise;  // breakout trigger when WATCHING

    const refs = [entryRef, stopPlan, targetPlan, peak, trail, live.ltp_paise, orHigh].filter(v => v != null);
    const allVals = [...closes, ...lows, ...highs, ...refs];
    const minV = Math.min(...allVals);
    const maxV = Math.max(...allVals);
    const range = Math.max(1, maxV - minV);
    const pad = range * 0.10;
    const yMin = minV - pad;
    const yMax = maxV + pad;

    const xStep = (W - 4) / Math.max(1, bars.length - 1);
    const yScale = v => H - ((v - yMin) / (yMax - yMin)) * H;
    const yScalePct = v => 100 - ((v - yMin) / (yMax - yMin)) * 100;  // for HTML overlay (% of container height)
    const points = bars.map((b, i) => `${2 + i * xStep},${yScale(b.close_paise).toFixed(1)}`).join(' ');

    const refLine = (val, color, dash) => {
      if (val == null) return '';
      const y = yScale(val);
      return `<line x1="0" x2="${W}" y1="${y}" y2="${y}" stroke="${color}" stroke-width="1.5" stroke-dasharray="${dash}" opacity="0.55"/>`;
    };

    const lastX = 2 + (bars.length - 1) * xStep;
    const lastXPct = ((lastX) / W) * 100;
    const ltpY = live.ltp_paise != null ? yScale(live.ltp_paise) : yScale(closes[closes.length - 1]);

    const isWatching = pos?.state === 'WATCHING' && !pos?.exit_at;
    const stateEntry = pos?.state === 'ENTERED';

    // SVG lines (no text)
    const svg = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;">
      ${refLine(targetPlan, '#2ecc71', '4 2')}
      ${isWatching && orHigh ? refLine(orHigh, '#4fa3ff', '0') : ''}
      ${refLine(entryRef, '#7c5cff', '0')}
      ${refLine(stopPlan, '#e74c3c', '4 2')}
      ${trail ? refLine(trail, '#f5b041', '2 2') : ''}
      <polyline points="${points}" fill="none" stroke="#e6ecff" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      ${peak ? `<circle cx="${lastX}" cy="${yScale(peak)}" r="3" fill="#2ecc71"/>` : ''}
      <circle cx="${lastX}" cy="${ltpY}" r="3.5" fill="#4fa3ff"/>
    </svg>`;

    // HTML labels (don't stretch)
    const labels = `<div class="chart-label-layer">
      ${targetPlan != null ? `<div class="chart-label target" style="top:${yScalePct(targetPlan).toFixed(1)}%">TGT ${fmtPriceRs(targetPlan)}</div>` : ''}
      ${isWatching && orHigh ? `<div class="chart-label breakout" style="top:${yScalePct(orHigh).toFixed(1)}%">▲ TRIGGER ${fmtPriceRs(orHigh)}</div>` : ''}
      ${entryRef != null ? `<div class="chart-label entry" style="top:${yScalePct(entryRef).toFixed(1)}%">${stateEntry ? 'ENTRY' : 'plan'} ${fmtPriceRs(entryRef)}</div>` : ''}
      ${trail ? `<div class="chart-label trail" style="top:${yScalePct(trail).toFixed(1)}%">trail ${fmtPriceRs(trail)}</div>` : ''}
      ${stopPlan != null ? `<div class="chart-label stop" style="top:${yScalePct(stopPlan).toFixed(1)}%">STOP ${fmtPriceRs(stopPlan)}</div>` : ''}
    </div>`;

    // X-axis time labels
    const firstTs = bars[0].ts;
    const lastTs = bars[bars.length - 1].ts;
    const xAxis = `<span class="chart-x-label left">${fmtIstFromMs(firstTs)} IST</span>
                   <span class="chart-x-label right">${fmtIstFromMs(lastTs)} IST</span>`;

    return svg + labels + xAxis;
  }

  // Render a single pick card with live state
  function renderPickCard(p, idx, phase) {
    const live = p.live || {};
    const ltpPaise = live.ltp_paise;
    const ltpAge = live.ltp_ts ? Math.round((Date.now() - live.ltp_ts) / 1000) : null;
    const ltpFresh = ltpAge != null && ltpAge < 90;

    // Compute live delta vs entry plan (or vs prev close pre-entry)
    const pos = live.position;
    const entryRef = pos?.entry_paise || (live.bars?.length ? live.bars[0].open_paise : null);
    const livePctVsRef = (ltpPaise && entryRef)
      ? +(((ltpPaise - entryRef) / entryRef) * 100).toFixed(2) : null;
    const dCls = livePctVsRef == null ? 'flat' : livePctVsRef > 0.05 ? 'up' : livePctVsRef < -0.05 ? 'down' : 'flat';
    const dArrow = livePctVsRef == null ? '·' : livePctVsRef > 0.05 ? '↑' : livePctVsRef < -0.05 ? '↓' : '·';

    // Position state pill
    let stateLabel = 'PRE_OPEN';
    let stateClass = 'PRE_OPEN';
    let stateNote = '';
    if (pos) {
      if (pos.exit_at) {
        stateLabel = 'EXITED';
        stateClass = 'EXITED';
        stateNote = `${escapeHtml(pos.exit_reason || '?')} @ ${fmtPriceRs(pos.exit_paise)} · ${fmtPnlShort(pos.pnl_paise)}`;
      } else if (pos.state === 'ENTERED') {
        stateLabel = 'ENTERED';
        stateClass = 'ENTERED';
        stateNote = `${pos.qty}sh × ₹${(pos.entry_paise/100).toFixed(2)}`;
      } else {
        stateLabel = 'WATCHING';
        stateClass = 'WATCHING';
        stateNote = 'breakout entry pending';
      }
    } else if (phase === 'PRE_MARKET' || phase === 'PRE_OPEN') {
      stateLabel = phase === 'PRE_OPEN' ? 'PRE-OPEN' : 'PRE-MARKET';
      stateClass = 'PRE_OPEN';
      stateNote = 'awaiting market open';
    } else if (phase === 'LIVE') {
      stateLabel = 'AWAITING ENTRY';
      stateClass = 'WATCHING';
      stateNote = 'range_capture at 09:30 IST creates WATCHING row';
    } else {
      stateLabel = 'NO POSITION';
      stateClass = 'EXITED';
      stateNote = phase === 'POST_CLOSE' ? 'market closed' : '';
    }

    // Live P&L for entered positions
    const livePnl = pos?.live_pnl_paise;
    const livePnlPct = pos?.live_pnl_pct;
    const pnlPaiseClass = pnlClassFor(livePnl);

    // Breakout-trigger banner — only when WATCHING and we have the OR-high level
    const showBreakout = pos && pos.state === 'WATCHING' && !pos.exit_at && pos.or_high_paise != null;
    const bDist = pos?.breakout_distance_pct;  // % gap; positive = LTP below trigger, negative = above
    let breakoutBanner = '';
    if (showBreakout) {
      const triggerPx = fmtPriceRs(pos.or_high_paise);
      let distLabel = '';
      if (bDist != null) {
        if (bDist > 0) {
          distLabel = `LTP needs <strong>+${bDist.toFixed(2)}%</strong> to fire entry`;
        } else if (bDist < 0) {
          distLabel = `LTP is <strong>${Math.abs(bDist).toFixed(2)}% above trigger</strong> — entry should fire next tick`;
        } else {
          distLabel = `LTP at trigger — entry imminent`;
        }
      }
      breakoutBanner = `<div class="breakout-trigger">
        ▲ <strong>Breakout trigger:</strong> ${triggerPx}
        ${distLabel ? `· ${distLabel}` : ''}
      </div>`;
    }

    return `<div class="pick-card pick-${idx + 1}">
      <div class="pick-head">
        <span class="pick-rank">#${idx + 1}</span>
        <span class="pick-symbol" data-stock-symbol="${escapeHtml(p.symbol)}">${escapeHtml(p.symbol)}</span>
        ${p.weight_pct ? `<span class="pick-weight">${p.weight_pct}% capital</span>` : ''}
        <span class="pos-state-pill ${stateClass}">${stateLabel}</span>
        ${pos?.target_locked ? '<span class="lock-badge">🔒 TARGET LOCKED</span>' : ''}
        ${pos?.opus_extension_active ? '<span class="extend-badge">OPUS EXTEND</span>' : ''}
      </div>

      <!-- LIVE BLOCK: LTP + delta + state-note + (P&L if entered) -->
      <div class="pick-live">
        <div class="live-row">
          <span class="live-ltp">${fmtPriceRs(ltpPaise)}</span>
          ${livePctVsRef != null ? `<span class="live-delta ${dCls}">${dArrow} ${(livePctVsRef > 0 ? '+' : '') + livePctVsRef.toFixed(2)}%</span>` : ''}
          ${pos && !pos.exit_at && livePnl != null ? `<span class="pos-pnl ${pnlPaiseClass}">${fmtPnlShort(livePnl)} (${livePnlPct > 0 ? '+' : ''}${livePnlPct?.toFixed(2)}%)</span>` : ''}
          <span class="live-stale" style="margin-left:auto">${
            ltpAge == null ? 'no LTP yet'
            : ltpFresh ? `LTP ${ltpAge}s ago`
            : `LTP ${Math.round(ltpAge / 60)}m ago — stale`
          }</span>
        </div>
        <div style="font-size:10px;color:var(--muted);margin-top:2px">${escapeHtml(stateNote)}</div>
      </div>

      ${breakoutBanner}

      <!-- INLINE SVG CHART with reference lines -->
      <div class="pick-chart">${renderPickChart(p)}</div>

      <!-- PLAN GRID -->
      <div class="pick-plan">
        <div class="cell"><span class="lbl">Stop</span><span class="val red">${pos?.stop_paise ? fmtPriceRs(pos.stop_paise) : (p.stop_pct ? `-${p.stop_pct}%` : '—')}</span></div>
        <div class="cell"><span class="lbl">Target</span><span class="val green">${pos?.target_paise ? fmtPriceRs(pos.target_paise) : (p.target_pct ? `+${p.target_pct}%` : '—')}</span></div>
        <div class="cell"><span class="lbl">${pos ? 'Trail' : 'Trail @'}</span><span class="val">${pos?.trailing_stop_paise ? fmtPriceRs(pos.trailing_stop_paise) : (p.trail_after_pct ? `+${p.trail_after_pct}%` : '—')}</span></div>
        ${p.entry_window ? `<div class="cell" style="grid-column:span 3"><span class="lbl">Entry window</span><span class="val">${escapeHtml(p.entry_window)}${p.hard_exit_ist ? ` · hard exit ${escapeHtml(p.hard_exit_ist)}` : ''}</span></div>` : ''}
      </div>

      ${p.rationale ? `<div class="pick-rationale">${escapeHtml(p.rationale)}</div>` : ''}
    </div>`;
  }

  function renderVerdictSection(d) {
    const v = d.verdict;
    if (!v) {
      const isPreMarket = d.phase === 'PRE_MARKET';
      return `<div class="section">
        <h2>🎯 Today's verdict</h2>
        <div class="empty">
          ${isPreMarket
            ? `Verdict has not composed yet. Opus fires at 08:30 IST (after 07:30 enrichment + 08:25 integrity check).`
            : `No morning verdict for today found.`}
        </div>
      </div>`;
    }

    const decisionClass = v.decision || 'PENDING';
    const composedIst = fmtIstFromMs(v.composed_at);
    const composedRel = fmtRelative(v.composed_at);
    const isOverridden = !!v.override;
    const picksToShow = isOverridden ? v.override.new_picks : (v.picks || []);

    // STORY-ARC PICK CARDS (May 7 redesign) — replaced flat data dump with
    // narrative structure. Each pick reads as plan→timeline→live→outcome→lesson.
    const pickCards = picksToShow.map((p, i) => renderStoryCard(p, i, d.phase, v.portfolio)).join('');

    const overrideBanner = isOverridden ? `
      <div class="override-banner">
        <strong>OWNER OVERRIDE</strong> — composed verdict was ${(v.override.original_picks || []).map(p => escapeHtml(p.symbol)).join(' / ')},
        replaced with ${(v.override.new_picks || []).map(p => escapeHtml(p.symbol)).join(' / ')}.
        <div style="margin-top:4px;color:var(--muted)">${escapeHtml(v.override.reason || '')}</div>
        <div style="margin-top:4px;color:var(--muted);font-size:10px">by ${escapeHtml(v.override.by || '')} at ${fmtIstFromMs(v.override.overridden_at)} IST</div>
      </div>` : '';

    return `<div class="section">
      <h2>🎯 Today's verdict
        <span class="meta">composed ${composedIst} IST · ${composedRel} · ${escapeHtml(v.composed_by_model || '')}</span>
      </h2>
      <span class="verdict-decision ${decisionClass}">${escapeHtml(v.decision)}</span>
      ${v.headline ? `<div class="verdict-headline">${escapeHtml(v.headline)}</div>` : ''}
      ${v.narrative ? `<div class="verdict-narrative">${escapeHtml(v.narrative)}</div>` : ''}
      ${pickCards || (v.decision === 'SIT_OUT' ? '<div class="empty">No picks today.</div>' : '')}
      ${overrideBanner}
    </div>`;
  }

  function renderPoolSection(d) {

    if (!pool.length) {
      return `<div class="section">
        <h2>📊 90-day pool top 10</h2>
        <div class="empty">No suitability data — F-DATA-1 may not have populated yet.</div>
      </div>`;
    }

    const rows = pool.map((r, i) => {
      const inPicks = pickedSyms.has(r.symbol);
      return `<div class="pool-row ${inPicks ? 'in-picks' : ''}" data-stock-symbol="${escapeHtml(r.symbol)}">
        <span class="rank">#${i + 1}</span>
        <div>
          <div class="symbol">${escapeHtml(r.symbol)}${inPicks ? ' <span style="font-size:10px;color:var(--green)">✓ in picks</span>' : ''}</div>
