<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Wealth Engine — Today</title>
<link rel="manifest" href="/trading/manifest.json">
<meta name="theme-color" content="#0a0f1c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="color-scheme" content="dark">
<style>
  :root {
    --bg: #0a0f1c; --panel: #121a2e; --panel-2: #1a2540;
    --border: #2a3656; --text: #e6ecff; --muted: #8a96b8;
    --green: #2ecc71; --red: #e74c3c; --yellow: #f5b041; --blue: #4fa3ff;
    --accent: #7c5cff; --orange: #ff8a3c; --purple: #b164ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "SF Pro Text", system-ui, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.5; min-height: 100vh;
    padding: 14px; padding-top: env(safe-area-inset-top, 14px);
    font-variant-numeric: tabular-nums;
  }
  header { margin-bottom: 14px; }
  h1 { font-size: 17px; font-weight: 700; }
  h1 .sub { display: block; font-size: 11px; color: var(--muted); font-weight: 400; margin-top: 3px; }
  .tab-nav { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
  .tab-nav a {
    padding: 4px 9px; border-radius: 14px; font-size: 11px; font-weight: 500;
    text-decoration: none; border: 1px solid var(--border); color: var(--muted);
    background: var(--panel-2);
  }
  .tab-nav a.active { background: rgba(124,92,255,0.18); color: var(--accent); border-color: var(--accent); }

  .pin-gate { max-width: 380px; margin: 80px auto; padding: 28px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px; }
  .pin-gate input { width: 100%; padding: 12px; font-size: 16px; margin: 10px 0;
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); }
  .pin-gate button { width: 100%; padding: 12px; font-size: 15px; font-weight: 600;
    background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; min-height: 44px; }

  .section { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; }
  .section h2 { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .section h2 .meta { margin-left: auto; font-size: 10px; color: var(--muted); text-transform: none; letter-spacing: 0; font-weight: 400; }

  .phase-head { display: flex; align-items: center; gap: 8px; padding: 10px 14px;
    border-radius: 12px; margin-bottom: 12px; font-size: 12px; flex-wrap: wrap; }
  .phase-head .pill { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; }
  .phase-head.PRE_MARKET .pill { background: rgba(245,176,65,0.18); color: var(--yellow); }
  .phase-head.PRE_OPEN .pill   { background: rgba(79,163,255,0.18); color: var(--blue); }
  .phase-head.LIVE .pill       { background: rgba(46,204,113,0.18); color: var(--green); }
  .phase-head.CLOSE .pill      { background: rgba(177,100,255,0.18); color: var(--purple); }
  .phase-head.POST_CLOSE .pill { background: rgba(192,138,91,0.18); color: var(--orange); }
  .phase-head.OFF_HOURS .pill  { background: rgba(138,150,184,0.18); color: var(--muted); }

  .integrity-row { display: flex; gap: 10px; margin-bottom: 8px; }
  @media (max-width: 600px) { .integrity-row { flex-direction: column; } }
  .integrity-card { flex: 1; padding: 10px; background: var(--panel-2); border-radius: 8px;
    border-top: 4px solid var(--border); min-width: 0; }
  .integrity-card.critical { border-top-color: var(--red); }
  .integrity-card.warning  { border-top-color: var(--yellow); }
  .integrity-card.info     { border-top-color: var(--green); }
  .integrity-card .layer-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; }
  .integrity-card .layer-name { font-size: 13px; font-weight: 700; margin-top: 2px; margin-bottom: 8px; }
  .integrity-card .check-row { display: flex; gap: 6px; padding: 3px 0; font-size: 11px; }
  .integrity-card .check-row .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .integrity-card .dot.pass { background: var(--green); }
  .integrity-card .dot.warn { background: var(--yellow); }
  .integrity-card .dot.fail { background: var(--red); }
  .integrity-card .check-name { color: var(--text); flex: 1; min-width: 0; word-wrap: break-word; }
  .integrity-card .check-name .det { color: var(--muted); font-size: 10px; margin-top: 1px; }

  .verdict-decision { display: inline-block; padding: 6px 14px; border-radius: 12px;
    font-size: 14px; font-weight: 700; letter-spacing: 0.4px; margin-bottom: 8px; }
  .verdict-decision.TRADE    { background: rgba(46,204,113,0.18); color: var(--green); }
  .verdict-decision.SIT_OUT  { background: rgba(231,76,60,0.18);  color: var(--red); }
  .verdict-decision.OBSERVE  { background: rgba(245,176,65,0.18); color: var(--yellow); }
  .verdict-decision.PENDING  { background: rgba(138,150,184,0.18); color: var(--muted); }
  .verdict-headline { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
  .verdict-narrative { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 12px; padding: 10px; background: var(--panel-2); border-radius: 8px; }
  .pick-card { background: var(--panel-2); border-radius: 8px; padding: 12px; margin-bottom: 8px; border-left: 3px solid var(--border); }
  .pick-card.pick-1 { border-left-color: var(--green); }
  .pick-card.pick-2 { border-left-color: var(--blue); }
  .pick-card.pick-3 { border-left-color: var(--purple); }
  .pick-card .pick-head { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
  .pick-card .pick-rank { font-size: 10px; color: var(--muted); }
  .pick-card .pick-symbol { font-size: 14px; font-weight: 700; }
  .pick-card .pick-weight { padding: 1px 7px; border-radius: 8px; font-size: 9px; background: rgba(124,92,255,0.18); color: var(--accent); font-weight: 700; }
  .pick-card .pick-rationale { font-size: 11px; color: var(--muted); line-height: 1.45; }

  .override-banner { padding: 10px; background: rgba(245,176,65,0.12); border-left: 3px solid var(--yellow); border-radius: 6px; margin-top: 10px; font-size: 11px; }
  .override-banner strong { color: var(--yellow); }

  .pool-list { display: flex; flex-direction: column; gap: 4px; }
  .pool-row { display: grid; grid-template-columns: 22px 1fr auto; gap: 8px; align-items: center;
    padding: 8px 10px; background: var(--panel-2); border-radius: 6px; font-size: 12px; }
  .pool-row.in-picks { background: rgba(46,204,113,0.08); border-left: 2px solid var(--green); }
  .pool-row .rank { color: var(--muted); font-size: 10px; }
  .pool-row .symbol { font-weight: 700; font-size: 13px; }
  .pool-row .scores { display: flex; gap: 6px; flex-wrap: wrap; }
  .pool-row .score-pill { padding: 1px 6px; border-radius: 4px; font-size: 10px; }
  .pool-row .score-pill.high   { background: rgba(46,204,113,0.18); color: var(--green); }
  .pool-row .score-pill.med    { background: rgba(245,176,65,0.18); color: var(--yellow); }
  .pool-row .score-pill.low    { background: rgba(138,150,184,0.18); color: var(--muted); }

  .feed { display: flex; flex-direction: column; gap: 6px; max-height: 280px; overflow-y: auto; }
  .feed-row { display: grid; grid-template-columns: 50px 1fr; gap: 10px; padding: 6px 0; font-size: 11px;
    border-bottom: 1px solid var(--border); }
  .feed-row:last-child { border-bottom: none; }
  .feed-row .ts { color: var(--muted); font-size: 10px; }
  .feed-row .body { min-width: 0; }
  .feed-row.crossasset .label { font-weight: 700; color: var(--text); }
  .feed-row.crossasset .delta.up { color: var(--green); }
  .feed-row.crossasset .delta.down { color: var(--red); }
  .feed-row.crossasset .delta.flat { color: var(--muted); }
  .feed-row.news .headline { color: var(--text); line-height: 1.4; }
  .feed-row.news .src { font-size: 9px; color: var(--muted); margin-top: 2px; }
  .feed-row.news .sent { display: inline-block; width: 4px; height: 14px; border-radius: 2px; margin-right: 6px; vertical-align: middle; }
  .feed-row.news .sent.pos { background: var(--green); }
  .feed-row.news .sent.neg { background: var(--red); }
  .feed-row.news .sent.neu { background: var(--muted); }

  .swing-toggle { display: flex; align-items: center; gap: 8px; padding: 10px 14px; cursor: pointer; user-select: none;
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 12px; font-size: 12px; }
  .swing-toggle .arrow { transition: transform 0.2s; }
  .swing-toggle.open .arrow { transform: rotate(90deg); }
  .swing-toggle .lbl { color: var(--muted); }
  .swing-toggle .lbl strong { color: var(--text); }
  .swing-content { display: none; }
  .swing-content.open { display: block; }

  .loading { text-align: center; padding: 40px; color: var(--muted); }
  .empty { text-align: center; padding: 30px; color: var(--muted); font-size: 12px; }
  .small-meta { font-size: 10px; color: var(--muted); margin-top: 8px; }
</style>
</head>
<body>
<div id="content"><div class="loading">Loading…</div></div>

<script>
  const STORE_KEY = 'wealth_dashboard_key';
  let DASHBOARD_KEY = localStorage.getItem(STORE_KEY) || '';
  let _data = null;

  function showPinGate(err) {
    document.getElementById('content').innerHTML = `
      <div class="pin-gate">
        <h2 style="margin-bottom: 6px;">Today</h2>
        <p style="font-size: 12px; color: var(--muted); margin-bottom: 14px;">Enter dashboard key</p>
        <input type="password" id="pin-input" placeholder="dashboard key" autofocus>
        <button onclick="loginAndLoad()">Unlock</button>
        ${err ? `<div style="color: var(--red); font-size: 11px; margin-top: 8px;">${err}</div>` : ''}
      </div>`;
    document.getElementById('pin-input').addEventListener('keydown', e => { if (e.key === 'Enter') loginAndLoad(); });
  }

  async function loginAndLoad() {
    const v = document.getElementById('pin-input').value.trim();
    if (!v) return;
    DASHBOARD_KEY = v;
    const ok = await load();
    if (ok) localStorage.setItem(STORE_KEY, v);
  }

  async function load() {
    if (!DASHBOARD_KEY) { showPinGate(); return false; }
    try {
      const res = await fetch('/api/trading?action=today_consolidated&key=' + encodeURIComponent(DASHBOARD_KEY));
      if (res.status === 401) { showPinGate('Wrong key'); return false; }
      if (!res.ok) throw new Error('HTTP ' + res.status);
      _data = await res.json();
      render(_data);
      return true;
    } catch (e) {
      document.getElementById('content').innerHTML = '<div class="loading">Error: ' + e.message + '</div>';
      return false;
    }
  }

  function fmtIstFromMs(ms) {
    if (!ms) return '—';
    const d = new Date(ms + 5.5 * 3600000);
    return ('0' + d.getUTCHours()).slice(-2) + ':' + ('0' + d.getUTCMinutes()).slice(-2);
  }
  function fmtRelative(ms) {
    if (!ms) return '—';
    const diffMin = Math.round((Date.now() - ms) / 60000);
    if (diffMin < 1) return 'now';
    if (diffMin < 60) return diffMin + 'm ago';
    if (diffMin < 1440) return Math.round(diffMin / 60) + 'h ago';
    return Math.round(diffMin / 1440) + 'd ago';
  }
  function fmtPct(v) {
    if (v == null || isNaN(v)) return '—';
    const sign = v > 0 ? '+' : '';
    return sign + Number(v).toFixed(2) + '%';
  }
  function deltaCls(v) {
    if (v == null || isNaN(v)) return 'flat';
    if (v > 0.05) return 'up'; if (v < -0.05) return 'down'; return 'flat';
  }
  function scoreClass(v, thresholds) {
    if (v == null || isNaN(v)) return 'low';
    if (v >= thresholds[0]) return 'high';
    if (v >= thresholds[1]) return 'med';
    return 'low';
  }
  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  const PHASE_DESC = {
    PRE_MARKET:  { lbl: 'Pre-market', help: 'Verdict composes at 08:30 IST.' },
    PRE_OPEN:    { lbl: 'NSE pre-open', help: 'Live opens at 09:15 IST.' },
    LIVE:        { lbl: 'Market live', help: 'Hard exit at 15:10 IST.' },
    CLOSE:       { lbl: 'Closing tick', help: 'Final settlement.' },
    POST_CLOSE:  { lbl: 'Closed', help: 'Tomorrow opens at 09:15 IST.' },
    OFF_HOURS:   { lbl: 'Off-hours', help: 'Market closed.' },
  };

  function renderIntegritySection(d) {
    const i = d.pre_market_integrity || {};
    const renderLayer = (label, lay) => {
      if (!lay) {
        return `<div class="integrity-card">
          <div class="layer-lbl">${label}</div>
          <div class="layer-name" style="color: var(--muted)">no check yet today</div>
        </div>`;
      }
      const checks = (lay.checks || []).map(c => `
        <div class="check-row">
          <div class="dot ${c.status}"></div>
          <div class="check-name">${escapeHtml(c.check)}<div class="det">${escapeHtml(c.detail || '')}</div></div>
        </div>`).join('');
      return `<div class="integrity-card ${lay.severity}">
        <div class="layer-lbl">${label} · ${lay.severity.toUpperCase()}</div>
        <div class="layer-name">${escapeHtml(lay.title || label)}</div>
        ${checks}
      </div>`;
    };
    return `<div class="section">
      <h2>🔍 Pre-market integrity check
        <span class="meta">next at ${i.next_check_ist || '08:25 IST'} weekday</span>
      </h2>
      <div class="integrity-row">
        ${renderLayer('L1 · Intelligence', i.layer1)}
        ${renderLayer('L2 · Execution', i.layer2)}
      </div>
      <div class="small-meta">
        Each layer must be GREEN for May 11 real-money launch.
      </div>
    </div>`;
  }

  function renderVerdictSection(d) {
    const v = d.verdict;
    if (!v) {
      const isPreMarket = d.phase === 'PRE_MARKET';
      return `<div class="section">
        <h2>🎯 Today's verdict</h2>
        <div class="empty">
          ${isPreMarket
            ? `Verdict has not composed yet. Opus fires at 08:30 IST (after 07:30 enrichment + 08:25 integrity check).`
            : `No morning verdict for today found.`}
        </div>
      </div>`;
    }

    const decisionClass = v.decision || 'PENDING';
    const composedIst = fmtIstFromMs(v.composed_at);
    const composedRel = fmtRelative(v.composed_at);
    const isOverridden = !!v.override;
    const picksToShow = isOverridden ? v.override.new_picks : (v.picks || []);

    const pickCards = picksToShow.map((p, i) => `
      <div class="pick-card pick-${i + 1}">
        <div class="pick-head">
          <span class="pick-rank">#${i + 1}</span>
          <span class="pick-symbol">${escapeHtml(p.symbol)}</span>
          ${p.weight_pct ? `<span class="pick-weight">${p.weight_pct}% capital</span>` : ''}
          ${p.target_pct ? `<span style="font-size:10px;color:var(--green)">target +${p.target_pct}%</span>` : ''}
          ${p.stop_pct ? `<span style="font-size:10px;color:var(--red)">stop -${p.stop_pct}%</span>` : ''}
        </div>
        ${p.entry_window ? `<div style="font-size:10px;color:var(--muted);margin-bottom:4px">Entry: ${escapeHtml(p.entry_window)}${p.hard_exit_ist ? ` · Hard exit: ${escapeHtml(p.hard_exit_ist)}` : ''}</div>` : ''}
        <div class="pick-rationale">${escapeHtml(p.rationale || '')}</div>
      </div>`).join('');

    const overrideBanner = isOverridden ? `
      <div class="override-banner">
        <strong>OWNER OVERRIDE</strong> — composed verdict was ${(v.override.original_picks || []).map(p => escapeHtml(p.symbol)).join(' / ')},
        replaced with ${(v.override.new_picks || []).map(p => escapeHtml(p.symbol)).join(' / ')}.
        <div style="margin-top:4px;color:var(--muted)">${escapeHtml(v.override.reason || '')}</div>
        <div style="margin-top:4px;color:var(--muted);font-size:10px">by ${escapeHtml(v.override.by || '')} at ${fmtIstFromMs(v.override.overridden_at)} IST</div>
      </div>` : '';

    return `<div class="section">
      <h2>🎯 Today's verdict
        <span class="meta">composed ${composedIst} IST · ${composedRel} · ${escapeHtml(v.composed_by_model || '')}</span>
      </h2>
      <span class="verdict-decision ${decisionClass}">${escapeHtml(v.decision)}</span>
      ${v.headline ? `<div class="verdict-headline">${escapeHtml(v.headline)}</div>` : ''}
      ${v.narrative ? `<div class="verdict-narrative">${escapeHtml(v.narrative)}</div>` : ''}
      ${pickCards || (v.decision === 'SIT_OUT' ? '<div class="empty">No picks today.</div>' : '')}
      ${overrideBanner}
    </div>`;
  }

  function renderPoolSection(d) {
    const pool = d.pool_top10 || [];
    const pickedSyms = new Set();
    if (d.verdict?.picks) for (const p of d.verdict.picks) pickedSyms.add(p.symbol);
    if (d.verdict?.override?.new_picks) for (const p of d.verdict.override.new_picks) pickedSyms.add(p.symbol);

    if (!pool.length) {
      return `<div class="section">
        <h2>📊 90-day pool top 10</h2>
        <div class="empty">No suitability data — F-DATA-1 may not have populated yet.</div>
      </div>`;
    }

    const rows = pool.map((r, i) => {
      const inPicks = pickedSyms.has(r.symbol);
      return `<div class="pool-row ${inPicks ? 'in-picks' : ''}">
        <span class="rank">#${i + 1}</span>
        <div>
          <div class="symbol">${escapeHtml(r.symbol)}${inPicks ? ' <span style="font-size:10px;color:var(--green)">✓ in picks</span>' : ''}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px">
            ${r.sector ? escapeHtml(r.sector) + ' · ' : ''}aoh ${(r.avg_open_to_high_pct || 0).toFixed(1)}% · h2 ${Math.round(((r.hit_2pct_rate || 0) > 1 ? r.hit_2pct_rate / 100 : r.hit_2pct_rate) * 100)}% · gc ${Math.round(((r.green_close_rate || 0) > 1 ? r.green_close_rate / 100 : r.green_close_rate) * 100)}%
          </div>
        </div>
        <div class="scores">
          <span class="score-pill ${scoreClass(r.owner_score, [50, 45])}">o ${r.owner_score}</span>
          <span class="score-pill ${scoreClass(r.intraday_score, [50, 45])}">i ${r.intraday_score}</span>
          ${r.avg_up_last_week_pct != null ? `<span class="score-pill ${scoreClass(r.avg_up_last_week_pct, [4, 2])}">aw ${r.avg_up_last_week_pct.toFixed(1)}%</span>` : '<span class="score-pill low">aw n/a</span>'}
        </div>
      </div>`;
    }).join('');

    return `<div class="section">
      <h2>📊 90-day pool · top 10 by owner_score
        <span class="meta">refreshed daily 16:30 IST</span>
      </h2>
      <div class="pool-list">${rows}</div>
      <div class="small-meta">
        owner_score = intraday_score × 0.6 + loss_resistance_score × 0.4 (per F-L1).
        ✓ marker = stock is in today's verdict picks (composed or overridden).
      </div>
    </div>`;
  }

  function renderFeedSection(d) {
    const feed = d.pre_market_feed || [];
    if (!feed.length) {
      return `<div class="section">
        <h2>📡 Live feed</h2>
        <div class="empty">No recent activity in last 12h.</div>
      </div>`;
    }
    const rows = feed.map(f => {
      const ts = fmtIstFromMs(f.ts);
      if (f.kind === 'crossasset' || f.kind === 'gift_nifty') {
        const dCls = deltaCls(f.change_pct);
        const dStr = f.change_pct == null ? '' : fmtPct(f.change_pct);
        return `<div class="feed-row crossasset">
          <span class="ts">${ts}</span>
          <div class="body"><span class="label">${escapeHtml(f.label)}</span> ${Number(f.value).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
            ${dStr ? `<span class="delta ${dCls}">${dStr}</span>` : ''}
          </div>
        </div>`;
      }
      const sentClass = f.sentiment > 0.1 ? 'pos' : f.sentiment < -0.1 ? 'neg' : 'neu';
      return `<div class="feed-row news">
        <span class="ts">${ts}</span>
        <div class="body">
          <span class="sent ${sentClass}"></span>
          <span class="headline">${escapeHtml(f.headline)}</span>
          <div class="src">${escapeHtml(f.source || '')}${f.symbols_tagged ? ' · ' + escapeHtml(f.symbols_tagged) : ''}</div>
        </div>
      </div>`;
    }).join('');
    return `<div class="section">
      <h2>📡 Live feed
        <span class="meta">cross-asset moves + breaking news (last 12h)</span>
      </h2>
      <div class="feed">${rows}</div>
    </div>`;
  }

  function renderSwingToggle(d) {
    const sc = d.swing_candidates || {};
    const candidates = sc.candidates || [];
    const computedIst = sc.computed_at ? fmtIstFromMs(sc.computed_at) : null;
    const computedRel = sc.computed_at ? fmtRelative(sc.computed_at) : null;

    const candidateRows = candidates.map((c, i) => `
      <div class="pool-row">
        <span class="rank">#${i + 1}</span>
        <div>
          <div class="symbol">${escapeHtml(c.symbol)}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px">regime: ${escapeHtml(c.regime || 'unknown')}</div>
        </div>
        <span class="score-pill high">${c.composite_score}</span>
      </div>`).join('');

    return `
      <div class="swing-toggle" id="swing-toggle">
        <span class="arrow">▶</span>
        <span class="lbl">Show <strong>swing/positional candidates</strong> (composite ≥ 70 · separate from intraday) · ${candidates.length} stocks</span>
      </div>
      <div class="swing-content" id="swing-content">
        <div class="section">
          <h2>📈 Swing candidates · composite_score ≥ 70
            <span class="meta">${computedIst ? `computed ${computedIst} IST · ${computedRel}` : 'no recent compute'}</span>
          </h2>
          ${candidates.length ? `<div class="pool-list">${candidateRows}</div>` : '<div class="empty">No candidates above threshold.</div>'}
          <div class="small-meta">
            ⚠ This is a SEPARATE intelligence layer from intraday paper-trading.
            Multi-day to weeks horizon. NOT relevant for May 11 real-money intraday launch.
            Full candidates at <a href="/trading/execute/" style="color: var(--accent)">/trading/execute/</a>.
          </div>
        </div>
      </div>`;
  }

  function render(d) {
    const phase = d.phase || 'OFF_HOURS';
    const phaseDesc = PHASE_DESC[phase] || PHASE_DESC.OFF_HOURS;

    const html = `
      <header>
        <h1>Today
          <span class="sub">Pre-market verdict + 90D pool ranking + live feed · per doc 19 §6.1</span>
        </h1>
        <nav class="tab-nav">
          <a href="/trading/">Hub</a>
          <a href="/trading/today/" class="active">Today</a>
          <a href="/trading/desk/">Desk</a>
          <a href="/trading/execute/">Execute</a>
          <a href="/trading/ops/">Ops</a>
          <a href="/trading/audit/">Audit</a>
          <a href="/trading/readiness/">Readiness</a>
          <a href="/trading/roadmap/">Roadmap</a>
        </nav>
      </header>

      <div class="phase-head ${phase}">
        <span class="pill">${phaseDesc.lbl}</span>
        <span style="color: var(--muted)">${phaseDesc.help}</span>
      </div>

      ${renderVerdictSection(d)}
      ${renderIntegritySection(d)}
      ${renderPoolSection(d)}
      ${renderFeedSection(d)}
      ${renderSwingToggle(d)}

      <div class="small-meta" style="text-align:center;margin-top:14px">
        Auto-refreshes every 60s · last updated ${fmtIstFromMs(d.generated_at)} IST
      </div>
    `;

    document.getElementById('content').innerHTML = html;

    const tog = document.getElementById('swing-toggle');
    const cnt = document.getElementById('swing-content');
    if (tog && cnt) {
      tog.addEventListener('click', () => {
        tog.classList.toggle('open');
        cnt.classList.toggle('open');
      });
    }
  }

  load();
  setInterval(load, 60000);
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') load();
  });
</script>
<script src="/trading/_lib/spine.js" defer></script>
</body>
</html>
