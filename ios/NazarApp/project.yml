name: NazarApp
options:
  minimumXcodeGenVersion: 2.42.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: "FZ58DQ52QS"
    CODE_SIGN_STYLE: Automatic
targets:
  NazarApp:
    type: application
    platform: iOS
    sources:
      - Nazar
    info:
      path: Nazar/Info.plist
      properties:
        CFBundleDisplayName: Nazar
        CFBundleIconName: AppIcon
        CFBundleVersion: "4"
        CFBundleShortVersionString: "1.0"
        ITSAppUsesNonExemptEncryption: false
        NSFaceIDUsageDescription: "Unlock Nazar with Face ID instead of typing your PIN."
        NSLocalNetworkUsageDescription: "Nazar connects to the RTX camera server on your private network."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSExceptionDomains:
            100.107.54.16:
              NSIncludesSubdomains: false
              NSExceptionAllowsInsecureHTTPLoads: true
              NSExceptionMinimumTLSVersion: TLSv1.0
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: Nazar/Nazar.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hnhotels.nazar
        PRODUCT_NAME: Nazar
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
schemes:
  NazarApp:
    build:
      targets:
        NazarApp: all
    run:
      config: Debug
    archive:
      config: Release
