name: TakhtApp
options:
  minimumXcodeGenVersion: 2.42.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: "FZ58DQ52QS"
    CODE_SIGN_STYLE: Automatic
targets:
  TakhtApp:
    type: application
    platform: iOS
    sources:
      - Takht
      - TakhtShared
    info:
      path: Takht/Info.plist
      properties:
        CFBundleDisplayName: Takht
        CFBundleName: Takht
        CFBundleIconName: AppIcon
        CFBundleVersion: "202606251616"
        CFBundleShortVersionString: "1.0"
        ITSAppUsesNonExemptEncryption: false
        NSFaceIDUsageDescription: "Unlock Takht with Face ID instead of typing your PIN."
        NSLocalNetworkUsageDescription: "Takht reads the live settlement bridge on HN Hotels private network."
        UILaunchScreen: {}
    entitlements:
      path: Takht/Takht.entitlements
    dependencies:
      - target: TakhtWatch
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hnhotels.takht
        PRODUCT_NAME: Takht
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
  TakhtWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - TakhtWatch
      - TakhtShared
    info:
      path: TakhtWatch/Info.plist
      properties:
        CFBundleDisplayName: Takht
        CFBundleIconName: AppIcon
        CFBundleVersion: "202606251616"
        CFBundleShortVersionString: "1.0"
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.hnhotels.takht
        NSLocalNetworkUsageDescription: "Takht Watch reads the live settlement bridge on HN Hotels private network."
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hnhotels.takht.watchkitapp
        PRODUCT_NAME: Takht
        SDKROOT: watchos
        SUPPORTED_PLATFORMS: "watchsimulator watchos"
        TARGETED_DEVICE_FAMILY: "4"
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SKIP_INSTALL: YES
schemes:
  TakhtApp:
    build:
      targets:
        TakhtApp: all
    run:
      config: Debug
    archive:
      config: Release
