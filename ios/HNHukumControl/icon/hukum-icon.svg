<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#23130b"/>
      <stop offset="0.55" stop-color="#160c06"/>
      <stop offset="1" stop-color="#0c0603"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#c8642d" stop-opacity="0.42"/>
      <stop offset="0.45" stop-color="#9a3f15" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#9a3f15" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="0.42" cy="0.38" r="0.7">
      <stop offset="0" stop-color="#ffe6bf"/>
      <stop offset="0.36" stop-color="#f0a44e"/>
      <stop offset="0.72" stop-color="#d2701f"/>
      <stop offset="1" stop-color="#a8470f"/>
    </radialGradient>
    <radialGradient id="node" cx="0.4" cy="0.35" r="0.75">
      <stop offset="0" stop-color="#f3b970"/>
      <stop offset="0.6" stop-color="#c8642d"/>
      <stop offset="1" stop-color="#8f3f15"/>
    </radialGradient>
    <linearGradient id="spoke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f0a44e" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#c8642d" stop-opacity="0.28"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
    <filter id="coreGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <circle cx="512" cy="512" r="470" fill="url(#glow)"/>

  <!-- spokes: command core -> 6 chambers -->
  <g stroke-linecap="round" fill="none">
    <g stroke="url(#spoke)" stroke-width="9" opacity="0.9">
      <line x1="512" y1="512" x2="512" y2="236"/>
      <line x1="512" y1="512" x2="751" y2="374"/>
      <line x1="512" y1="512" x2="751" y2="650"/>
      <line x1="512" y1="512" x2="512" y2="788"/>
      <line x1="512" y1="512" x2="273" y2="650"/>
      <line x1="512" y1="512" x2="273" y2="374"/>
    </g>
    <!-- faint ring connecting the chambers (the cross-connection) -->
    <polygon points="512,236 751,374 751,650 512,788 273,650 273,374"
             stroke="#c8642d" stroke-width="5" opacity="0.30"/>
  </g>

  <!-- chamber nodes -->
  <g>
    <g filter="url(#soft)" opacity="0.55">
      <circle cx="512" cy="236" r="34" fill="#c8642d"/>
      <circle cx="751" cy="374" r="34" fill="#c8642d"/>
      <circle cx="751" cy="650" r="34" fill="#c8642d"/>
      <circle cx="512" cy="788" r="34" fill="#c8642d"/>
      <circle cx="273" cy="650" r="34" fill="#c8642d"/>
      <circle cx="273" cy="374" r="34" fill="#c8642d"/>
    </g>
    <circle cx="512" cy="236" r="30" fill="url(#node)"/>
    <circle cx="751" cy="374" r="30" fill="url(#node)"/>
    <circle cx="751" cy="650" r="30" fill="url(#node)"/>
    <circle cx="512" cy="788" r="30" fill="url(#node)"/>
    <circle cx="273" cy="650" r="30" fill="url(#node)"/>
    <circle cx="273" cy="374" r="30" fill="url(#node)"/>
  </g>

  <!-- command core -->
  <circle cx="512" cy="512" r="150" fill="#f0a44e" opacity="0.5" filter="url(#coreGlow)"/>
  <circle cx="512" cy="512" r="96" fill="url(#core)"/>
  <circle cx="512" cy="512" r="96" fill="none" stroke="#ffe6bf" stroke-width="2" opacity="0.5"/>
  <!-- command spark -->
  <path d="M512 452 L526 498 L572 512 L526 526 L512 572 L498 526 L452 512 L498 498 Z"
        fill="#fff3e0" opacity="0.96"/>
</svg>
