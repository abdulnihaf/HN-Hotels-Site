name: HNHukumControl
options:
  minimumXcodeGenVersion: 2.42.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  HNHukumControl:
    type: application
    platform: iOS
    sources:
      - HNHukumControl/App
      - HNHukumControl/Core
      - HNHukumControl/Intents
      - HNHukumControl/Views
      - HNHukumControl/Assets.xcassets
    info:
      path: HNHukumControl/App/Info.plist
      properties:
        CFBundleDisplayName: Hukum
        NSSupportsLiveActivities: true
        UIBackgroundModes:
          - audio
          - fetch
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - com.hnhotels.hukum.refresh
        NSLocalNetworkUsageDescription: "HN Hukum connects to your Mac Hukum bridge and the Nazar RTX controller on your private Tailscale/local network."
        NSFaceIDUsageDescription: "Unlock the Diwan with Face ID instead of typing your PIN."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UILaunchScreen: {}
    entitlements:
      path: HNHukumControl/App/HNHukumControl.entitlements
    dependencies:
      - target: HNHukumActivityWidget
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hnhotels.hukumcontrol
        PRODUCT_NAME: HN Hukum Control
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  HNHukumActivityWidget:
    type: app-extension
    platform: iOS
    sources:
      - HNHukumActivityWidget
      - HNHukumControl/Core/HukumActivityModel.swift
    info:
      path: HNHukumActivityWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: HNHukumActivityWidget/HNHukumActivityWidget.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hnhotels.hukumcontrol.activity
        PRODUCT_NAME: HN Hukum Activity
        SKIP_INSTALL: YES

