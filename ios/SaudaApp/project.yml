name: SaudaApp
options:
  minimumXcodeGenVersion: 2.42.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: "FZ58DQ52QS"
    CODE_SIGN_STYLE: Automatic
targets:
  SaudaApp:
    type: application
    platform: iOS
    sources:
      - Sauda
    info:
      path: Sauda/Info.plist
      properties:
        CFBundleDisplayName: Sauda
        ITSAppUsesNonExemptEncryption: false
        NSFaceIDUsageDescription: "Unlock Sauda with Face ID instead of typing your PIN."
        NSLocalNetworkUsageDescription: "Sauda connects to HN services on your private network."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UILaunchScreen: {}
    entitlements:
      path: Sauda/Sauda.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hnhotels.sauda
        PRODUCT_NAME: Sauda
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
schemes:
  SaudaApp:
    build:
      targets:
        SaudaApp: all
    run:
      config: Debug
    archive:
      config: Release
