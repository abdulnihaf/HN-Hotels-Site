name: SaudaApp
options:
  minimumXcodeGenVersion: 2.42.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: "FZ58DQ52QS"
    CODE_SIGN_STYLE: Automatic
targets:
  SaudaApp:
    type: application
    platform: iOS
    sources:
      - Sauda
    info:
      path: Sauda/Info.plist
      properties:
        CFBundleDisplayName: Sauda
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "6"
        ITSAppUsesNonExemptEncryption: false
        NSFaceIDUsageDescription: "Unlock Sauda with Face ID instead of typing your PIN."
        NSLocalNetworkUsageDescription: "Sauda connects to HN services on your private network."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UILaunchScreen: {}
    entitlements:
      path: Sauda/Sauda.entitlements
    dependencies:
      - target: SaudaWatch
        embed: true                  # watch app embedded into the iOS app (one IPA)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hnhotels.sauda
        PRODUCT_NAME: Sauda
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"

  # ---------- the watchOS app (glance: today's to-pay) ----------
  SaudaWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - SaudaWatch
    info:
      path: SaudaWatch/Info.plist
      properties:
        CFBundleDisplayName: Sauda
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "6"
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.hnhotels.sauda   # MUST equal the iOS app bundle id
        ITSAppUsesNonExemptEncryption: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hnhotels.sauda.watchkitapp   # MUST be <app-id>.watchkitapp
        PRODUCT_NAME: Sauda
        SDKROOT: watchos
        SUPPORTED_PLATFORMS: "watchsimulator watchos"
        TARGETED_DEVICE_FAMILY: "4"
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SKIP_INSTALL: YES            # embeds in the iOS app, never top-level installable

# ---------- explicit schemes: iOS app (archive) + watch (sim verify only) ----------
schemes:
  SaudaApp:
    build:
      targets:
        SaudaApp: all
    run:
      config: Debug
    archive:
      config: Release
  SaudaWatch:
    build:
      targets:
        SaudaWatch: all
    run:
      config: Debug
