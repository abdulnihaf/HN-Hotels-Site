name: Mezaan
options:
  bundleIdPrefix: com.hnhotels
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: 5.0
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    DEVELOPMENT_TEAM: FZ58DQ52QS
targets:
  Mezaan:
    type: application
    platform: iOS
    sources:
      - path: Sources
    resources:
      - path: Resources
    settings:
      base:
        PRODUCT_NAME: Mezaan
        PRODUCT_BUNDLE_IDENTIFIER: com.hnhotels.mezaan
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Mezaan
        CFBundleName: Mezaan
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        UIUserInterfaceStyle: Dark
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        ITSAppUsesNonExemptEncryption: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
schemes:
  Mezaan:
    build:
      targets:
        Mezaan: all
    run:
      config: Debug
    archive:
      config: Release
