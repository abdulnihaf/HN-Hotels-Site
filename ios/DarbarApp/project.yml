name: DarbarApp
options:
  minimumXcodeGenVersion: 2.42.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: "FZ58DQ52QS"
    CODE_SIGN_STYLE: Automatic
targets:
  DarbarApp:
    type: application
    platform: iOS
    sources:
      - Darbar
    info:
      path: Darbar/Info.plist
      properties:
        CFBundleDisplayName: Darbar
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "6"
        ITSAppUsesNonExemptEncryption: false
        NSFaceIDUsageDescription: "Unlock Darbar with Face ID instead of typing your PIN."
        NSLocalNetworkUsageDescription: "Darbar connects to HN services on your private network."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UILaunchScreen: {}
    entitlements:
      path: Darbar/Darbar.entitlements
    dependencies:
      - target: DarbarWatch
        embed: true                  # watch app embedded into the iOS app (one IPA)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hnhotels.darbar
        PRODUCT_NAME: Darbar
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"

  # ---------- the watchOS app (glance: today's attendance + exceptions) ----------
  DarbarWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - DarbarWatch
    info:
      path: DarbarWatch/Info.plist
      properties:
        CFBundleDisplayName: Darbar
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "6"
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.hnhotels.darbar   # MUST equal the iOS app bundle id
        ITSAppUsesNonExemptEncryption: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hnhotels.darbar.watchkitapp   # MUST be <app-id>.watchkitapp
        PRODUCT_NAME: Darbar
        SDKROOT: watchos
        SUPPORTED_PLATFORMS: "watchsimulator watchos"
        TARGETED_DEVICE_FAMILY: "4"
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SKIP_INSTALL: YES            # embeds in the iOS app, never top-level installable

# ---------- ONE explicit scheme, iOS app only (watch pulled in via embed dep) ----------
schemes:
  DarbarApp:
    build:
      targets:
        DarbarApp: all
    run:
      config: Debug
    archive:
      config: Release
  DarbarWatch:
    build:
      targets:
        DarbarWatch: all
    run:
      config: Debug
