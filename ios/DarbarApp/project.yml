name: DarbarApp
options:
  minimumXcodeGenVersion: 2.42.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: "FZ58DQ52QS"
    CODE_SIGN_STYLE: Automatic
targets:
  DarbarApp:
    type: application
    platform: iOS
    sources:
      - Darbar
    info:
      path: Darbar/Info.plist
      properties:
        CFBundleDisplayName: Darbar
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "9"
        CFBundleIconName: AppIcon
        ITSAppUsesNonExemptEncryption: false
        NSFaceIDUsageDescription: "Unlock Darbar with Face ID instead of typing your PIN."
        NSLocalNetworkUsageDescription: "Darbar connects to HN services on your private network."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UILaunchScreen: {}
    entitlements:
      path: Darbar/Darbar.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hnhotels.darbar
        PRODUCT_NAME: Darbar
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
schemes:
  DarbarApp:
    build:
      targets:
        DarbarApp: all
    run:
      config: Debug
    archive:
      config: Release
