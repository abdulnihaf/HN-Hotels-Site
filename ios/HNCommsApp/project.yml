name: HNCommsApp
options:
  minimumXcodeGenVersion: 2.42.0
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: "FZ58DQ52QS"
    CODE_SIGN_STYLE: Automatic
targets:
  HNCommsApp:
    type: application
    platform: iOS
    sources:
      - HNComms
    info:
      path: HNComms/Info.plist
      properties:
        CFBundleDisplayName: HN Comms
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "6"
        CFBundleIconName: AppIcon
        HNCommsDefaultKey: "$(HN_COMMS_APP_KEY)"
        ITSAppUsesNonExemptEncryption: false
        NSFaceIDUsageDescription: "Unlock HN Comms without typing the API key again."
        UILaunchScreen: {}
    entitlements:
      path: HNComms/HNComms.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hnhotels.comms
        PRODUCT_NAME: HNComms
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
  HNCommsMac:
    type: application
    platform: macOS
    sources:
      - HNComms
    info:
      path: HNComms/MacInfo.plist
      properties:
        CFBundleDisplayName: HN Comms
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "6"
        CFBundleIconName: AppIcon
        HNCommsDefaultKey: "$(HN_COMMS_APP_KEY)"
        ITSAppUsesNonExemptEncryption: false
        LSMinimumSystemVersion: "14.0"
    entitlements:
      path: HNComms/HNComms.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hnhotels.comms.mac
        PRODUCT_NAME: HNComms
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: YES
schemes:
  HNCommsApp:
    build:
      targets:
        HNCommsApp: all
    run:
      config: Debug
    archive:
      config: Release
  HNCommsMac:
    build:
      targets:
        HNCommsMac: all
    run:
      config: Debug
    archive:
      config: Release
