name: HNCommsApp
options:
  minimumXcodeGenVersion: 2.42.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: "FZ58DQ52QS"
    CODE_SIGN_STYLE: Automatic
targets:
  HNCommsApp:
    type: application
    platform: iOS
    sources:
      - HNComms
    info:
      path: HNComms/Info.plist
      properties:
        CFBundleDisplayName: HN Comms
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        CFBundleIconName: AppIcon
        ITSAppUsesNonExemptEncryption: false
        NSFaceIDUsageDescription: "Unlock HN Comms without typing the API key again."
        UILaunchScreen: {}
    entitlements:
      path: HNComms/HNComms.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hnhotels.comms
        PRODUCT_NAME: HNComms
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
schemes:
  HNCommsApp:
    build:
      targets:
        HNCommsApp: all
    run:
      config: Debug
    archive:
      config: Release
