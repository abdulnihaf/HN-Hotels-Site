name: WealthApp
options:
  minimumXcodeGenVersion: 2.42.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: "FZ58DQ52QS"
    CODE_SIGN_STYLE: Automatic
targets:
  WealthApp:
    type: application
    platform: iOS
    sources:
      - Wealth
      - path: Wealth/Secrets.swift
    info:
      path: Wealth/Info.plist
      properties:
        CFBundleDisplayName: Wealth
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "17"
        ITSAppUsesNonExemptEncryption: false
        NSFaceIDUsageDescription: "Unlock Wealth with Face ID instead of typing your PIN."
        NSLocalNetworkUsageDescription: "Wealth connects to HN services on your private network."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UILaunchScreen: {}
    entitlements:
      path: Wealth/Wealth.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hnhotels.wealth
        PRODUCT_NAME: Wealth
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
schemes:
  WealthApp:
    build:
      targets:
        WealthApp: all
    run:
      config: Debug
    archive:
      config: Release
